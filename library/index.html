<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#eef1ea">
  <title>LIBRARY | THE GAME BUREAU</title>
  <link rel="icon" href="../assets/brand/tgb.ico" type="image/x-icon">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --paper: #eef1ea;
      --ink: #171511;
      --muted: #4f5a4e;
      --line: #171511;
      --danger: #a03f2d;
    }

    body {
      min-height: 100svh;
      padding: 2rem 1.5rem 6rem;
      background: var(--paper);
      color: var(--ink);
      font-family: Georgia, 'Times New Roman', serif;
    }

    a { color: inherit; }

    .top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .back-btn,
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 0 1rem;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--paper);
      color: var(--ink);
      text-decoration: none;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 0.82rem;
      cursor: pointer;
    }

    .back-btn:hover,
    .back-btn:focus-visible,
    .btn:hover,
    .btn:focus-visible {
      background: var(--ink);
      color: var(--paper);
      outline: none;
    }

    .admin-btn {
      position: fixed;
      right: 0.75rem;
      bottom: 0.75rem;
      padding: 0.25rem 0.55rem;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--paper);
      color: var(--muted);
      text-decoration: none;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 0.68rem;
      letter-spacing: 0.02em;
      opacity: 0.55;
    }

    .admin-btn:hover,
    .admin-btn:focus-visible {
      background: var(--ink);
      color: var(--paper);
      opacity: 1;
      outline: none;
    }

    /* ── Password gate ── */
    .gate {
      max-width: 380px;
      margin: 14vh auto 0;
      padding: 1.5rem;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: rgba(255,255,255,0.6);
    }

    .gate h1 {
      font-size: 2rem;
      letter-spacing: 0;
      line-height: 1;
      margin-bottom: 0.5rem;
    }

    .gate p {
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.45;
      margin-bottom: 1.1rem;
    }

    .gate form {
      display: grid;
      gap: 0.6rem;
    }

    .gate input {
      width: 100%;
      height: 44px;
      padding: 0 0.75rem;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255,255,255,0.85);
      color: var(--ink);
      font: inherit;
    }

    .gate input:focus {
      outline: 2px solid rgba(23,21,17,0.18);
      outline-offset: 2px;
    }

    .gate-error {
      min-height: 1.2em;
      color: var(--danger);
      font-family: Arial, Helvetica, sans-serif;
      font-size: 0.78rem;
      letter-spacing: 0.02em;
    }

    /* ── Library ── */
    .library h1 {
      font-size: clamp(2.4rem, 8vw, 4rem);
      line-height: 0.95;
      letter-spacing: 0;
      text-transform: uppercase;
      margin-bottom: 0.25rem;
    }

    .library .lead {
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.5;
      max-width: 32rem;
      margin-bottom: 1.75rem;
    }

    .status {
      min-height: 1.2em;
      margin-bottom: 1rem;
      color: var(--muted);
      font-family: Arial, Helvetica, sans-serif;
      font-size: 0.78rem;
      letter-spacing: 0.02em;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 14px;
    }

    .card {
      --game-primary: var(--ink);
      --game-secondary: var(--muted);
      display: grid;
      grid-template-rows: auto 1fr;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: rgba(255,255,255,0.55);
      color: inherit;
      text-decoration: none;
      transition: transform 0.12s ease, box-shadow 0.12s ease;
    }

    .card:hover,
    .card:focus-visible {
      transform: translateY(-2px);
      box-shadow: 0 14px 28px rgba(23,21,17,0.12);
      outline: none;
    }

    .card-media {
      position: relative;
      aspect-ratio: 2 / 1;
      overflow: hidden;
      background:
        linear-gradient(135deg, var(--game-secondary), var(--game-primary)),
        var(--game-primary);
    }

    .card-media::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,0.16), rgba(0,0,0,0.18));
      pointer-events: none;
      z-index: 2;
    }

    .card-image {
      position: absolute;
      inset: 0;
      z-index: 1;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .card-monogram {
      position: absolute;
      inset: 0;
      z-index: 0;
      display: grid;
      place-items: center;
      color: rgba(255,255,255,0.86);
      font-family: Arial, Helvetica, sans-serif;
      font-size: 1.75rem;
      font-weight: 800;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }

    .card-media[data-has-image="true"] .card-monogram { opacity: 0.18; }

    .card-badge {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 3;
      padding: 4px 7px;
      border-radius: 999px;
      background: rgba(255,255,255,0.92);
      color: var(--game-primary);
      font-family: Arial, Helvetica, sans-serif;
      font-size: 0.6rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .card-body {
      display: grid;
      gap: 4px;
      padding: 10px 12px 12px;
    }

    .card-eyebrow {
      color: var(--muted);
      font-family: Arial, Helvetica, sans-serif;
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .card-title {
      color: var(--game-primary);
      font-size: 1.15rem;
      line-height: 1.1;
      letter-spacing: 0;
    }

    .card-caption {
      color: var(--muted);
      font-size: 0.84rem;
      line-height: 1.35;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .empty {
      grid-column: 1 / -1;
      min-height: 220px;
      display: grid;
      place-items: center;
      padding: 1.5rem;
      border: 1px dashed var(--line);
      border-radius: 10px;
      color: var(--muted);
      text-align: center;
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>
  <!-- Password gate (shown until unlocked) -->
  <section class="gate" id="gate">
    <h1>Library</h1>
    <p>Enter the access code to browse The Game Bureau library.</p>
    <form id="gateForm" autocomplete="off">
      <input id="gateInput" type="password" placeholder="Access code" required autocomplete="off" autofocus>
      <button class="btn" type="submit">Enter</button>
      <div class="gate-error" id="gateError" aria-live="polite"></div>
    </form>
  </section>

  <!-- Library (shown after unlock) -->
  <main class="library hidden" id="library">
    <div class="top">
      <a class="back-btn" href="https://thegamebureau.com">&larr; The Game Bureau</a>
      <button class="btn" type="button" id="lockBtn">Lock</button>
    </div>
    <h1>Library</h1>
    <p class="lead">Pick a game to play.</p>
    <p class="status" id="libraryStatus" aria-live="polite"></p>
    <div class="grid" id="grid"></div>
  </main>

  <a class="admin-btn" href="../admin/">Admin</a>

  <script>
    // ── Simple password gate ────────────────────────────────────────────
    // Change the password by replacing the value below. The plaintext
    // string is visible to anyone viewing source; this is a soft barrier,
    // not real security. Pair it with whatever stronger access controls
    // belong further down the stack (RLS, etc.).
    const LIBRARY_PASSWORD = 'bureau';
    const UNLOCK_FLAG_KEY = 'tgb-library-unlocked';

    const gateEl = document.getElementById('gate');
    const gateForm = document.getElementById('gateForm');
    const gateInput = document.getElementById('gateInput');
    const gateError = document.getElementById('gateError');
    const libraryEl = document.getElementById('library');
    const lockBtn = document.getElementById('lockBtn');
    const statusEl = document.getElementById('libraryStatus');
    const gridEl = document.getElementById('grid');

    function isUnlocked() {
      try { return sessionStorage.getItem(UNLOCK_FLAG_KEY) === '1'; }
      catch (e) { return false; }
    }

    function setUnlocked(value) {
      try {
        if (value) sessionStorage.setItem(UNLOCK_FLAG_KEY, '1');
        else sessionStorage.removeItem(UNLOCK_FLAG_KEY);
      } catch (e) { /* ignore */ }
    }

    function showLibrary() {
      gateEl.classList.add('hidden');
      libraryEl.classList.remove('hidden');
      loadLibrary();
    }

    function showGate() {
      libraryEl.classList.add('hidden');
      gateEl.classList.remove('hidden');
      gateInput.value = '';
      gateError.textContent = '';
      setTimeout(() => gateInput.focus(), 0);
    }

    gateForm.addEventListener('submit', (event) => {
      event.preventDefault();
      const value = String(gateInput.value || '');
      if (value === LIBRARY_PASSWORD) {
        setUnlocked(true);
        showLibrary();
      } else {
        gateError.textContent = 'Incorrect access code.';
        gateInput.select();
      }
    });

    lockBtn.addEventListener('click', () => {
      setUnlocked(false);
      showGate();
    });

    // ── Library data ────────────────────────────────────────────────────
    const SB_CONFIG = {
      url: 'https://qmaafbncpzrdmqapkkgr.supabase.co',
      key: 'sb_publishable_6a9XqxYa0-AZtyrwz4ZeUg_aiMsVH-3',
      table: 'games'
    };

    function setStatus(message) {
      statusEl.textContent = message || '';
    }

    function isTrueish(value) {
      if (typeof value === 'boolean') return value;
      if (typeof value === 'string') {
        const trimmed = value.trim().toLowerCase();
        return !!trimmed && trimmed !== 'false' && trimmed !== '0' && trimmed !== 'no';
      }
      return !!value;
    }

    function isLiveGame(game) {
      return !isTrueish(game && game.archived) && !isTrueish(game && game.erased);
    }

    function isFeatured(game) {
      if (typeof game?.featured === 'boolean') return game.featured;
      if (typeof game?.featured === 'string' && game.featured.trim()) return true;
      const tags = Array.isArray(game?.tags) ? game.tags : [];
      return tags.some((tag) => String(tag || '').trim().toLowerCase() === 'featured');
    }

    function getPalette(game) {
      return {
        primary: String(game?.primary_color || '').trim() || '#171511',
        secondary: String(game?.secondary_color || '').trim() || '#4f5a4e'
      };
    }

    function sanitizeAssetUrl(value) {
      const raw = String(value || '').trim().replace(/\\/g, '/')
        .replace('https://the-game-bureau.github.io/the-game-bureau/', 'https://thegamebureau.com/')
        .replace('https://the-game-bureau.github.io/', 'https://thegamebureau.com/');
      if (!raw) return '';
      if (raw.startsWith('data:') || raw.startsWith('blob:')) return raw;
      try {
        const base = /^assets\//i.test(raw) ? new URL('../', window.location.href).toString() : window.location.href;
        const resolved = new URL(raw, base);
        const proto = String(resolved.protocol || '').toLowerCase();
        return proto === 'http:' || proto === 'https:' ? resolved.toString() : '';
      } catch (e) {
        return '';
      }
    }

    function getImageUrl(game) {
      return sanitizeAssetUrl(game?.logo_url || game?.guide_image_url || '');
    }

    function getMonogram(game) {
      const title = String(game?.name || 'Game').trim();
      const words = title.match(/[A-Za-z0-9]+/g) || [];
      if (words.length >= 2) return ((words[0][0] || '') + (words[1][0] || '')).toUpperCase();
      return title.replace(/[^A-Za-z0-9]/g, '').slice(0, 2).toUpperCase() || 'TG';
    }

    function getCaption(game) {
      const tagline = String(game?.tagline || '').replace(/\s+/g, ' ').trim();
      const body = String(game?.body || '').replace(/\s+/g, ' ').trim();
      const text = tagline || body || '';
      return text.length > 140 ? text.slice(0, 137).trimEnd() + '...' : text;
    }

    async function fetchGames() {
      const url = new URL('rest/v1/' + SB_CONFIG.table, SB_CONFIG.url.replace(/\/+$/, '') + '/');
      url.searchParams.set('apikey', SB_CONFIG.key);
      url.searchParams.set('select', '*');
      url.searchParams.set('order', 'name.asc');

      // Note: deliberately no custom headers (no Authorization, no Accept) so
      // the browser treats this as a "simple" CORS request and skips the
      // preflight OPTIONS round-trip that some local-dev origins trip on.
      let response;
      try {
        response = await fetch(url.toString());
      } catch (networkError) {
        console.error('Library fetch failed:', networkError, 'URL:', url.toString());
        throw new Error('Network request to Supabase failed. Check that the project URL and publishable key are correct, and that the origin is allowed.');
      }

      if (!response.ok) {
        const text = await response.text().catch(() => '');
        throw new Error('Supabase ' + response.status + ': ' + text.slice(0, 200));
      }
      return response.json();
    }

    function sortGames(games) {
      return [...games].sort((left, right) => {
        const featuredDelta = Number(isFeatured(right)) - Number(isFeatured(left));
        if (featuredDelta !== 0) return featuredDelta;
        return String(left?.name || '').localeCompare(String(right?.name || ''), undefined, { sensitivity: 'base' });
      });
    }

    function createCard(game) {
      const id = String(game?.id || '').trim();
      const palette = getPalette(game);

      const card = document.createElement('a');
      card.className = 'card';
      card.href = '../game/run/index.html?id=' + encodeURIComponent(id);
      card.style.setProperty('--game-primary', palette.primary);
      card.style.setProperty('--game-secondary', palette.secondary);

      const media = document.createElement('div');
      media.className = 'card-media';

      const monogram = document.createElement('div');
      monogram.className = 'card-monogram';
      monogram.textContent = getMonogram(game);
      media.appendChild(monogram);

      const imageUrl = getImageUrl(game);
      media.dataset.hasImage = imageUrl ? 'true' : 'false';
      if (imageUrl) {
        const img = document.createElement('img');
        img.className = 'card-image';
        img.src = imageUrl;
        img.alt = '';
        img.loading = 'lazy';
        img.decoding = 'async';
        img.addEventListener('error', () => {
          img.remove();
          media.dataset.hasImage = 'false';
        });
        media.appendChild(img);
      }

      if (isFeatured(game)) {
        const badge = document.createElement('div');
        badge.className = 'card-badge';
        badge.textContent = 'Featured';
        media.appendChild(badge);
      }

      const body = document.createElement('div');
      body.className = 'card-body';

      const eyebrow = document.createElement('p');
      eyebrow.className = 'card-eyebrow';
      eyebrow.textContent = String(game?.city || '').trim() || 'The Game Bureau';

      const title = document.createElement('h2');
      title.className = 'card-title';
      title.textContent = String(game?.name || '').trim() || 'Untitled Game';

      body.append(eyebrow, title);

      const caption = getCaption(game);
      if (caption) {
        const captionEl = document.createElement('p');
        captionEl.className = 'card-caption';
        captionEl.textContent = caption;
        body.appendChild(captionEl);
      }

      card.append(media, body);
      return card;
    }

    function renderEmpty(message) {
      gridEl.innerHTML = '';
      const empty = document.createElement('div');
      empty.className = 'empty';
      empty.textContent = message;
      gridEl.appendChild(empty);
    }

    async function loadLibrary() {
      setStatus('Loading...');
      renderEmpty('Loading games...');
      try {
        const games = await fetchGames();
        const live = sortGames((Array.isArray(games) ? games : []).filter(isLiveGame));
        gridEl.innerHTML = '';
        if (!live.length) {
          renderEmpty('No games available.');
          setStatus('No games available.');
          return;
        }
        live.forEach((game) => gridEl.appendChild(createCard(game)));
        setStatus(live.length + ' game' + (live.length === 1 ? '' : 's') + '.');
      } catch (error) {
        console.error(error);
        renderEmpty('Could not load games.');
        setStatus(error instanceof Error ? error.message : String(error));
      }
    }

    // Boot
    if (isUnlocked()) {
      showLibrary();
    } else {
      showGate();
    }
  </script>
</body>
</html>
