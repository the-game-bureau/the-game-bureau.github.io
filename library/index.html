<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#f8f6f1">
  <title>LIBRARY | THE GAME BUREAU</title>
  <link rel="icon" href="../assets/tgb.ico" type="image/x-icon">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      overflow-x: hidden;
    }

    :root {
      --page-bg: #fbf7f0;
      --surface: #ffffff;
      --ink: #1d1c18;
      --muted: #6f695f;
      --line: #d9d1c6;
      --line-soft: #ebe4d8;
      --accent: #23211c;
      --shadow-sm: 0 14px 34px rgba(18, 18, 18, 0.06);
      --shadow-lg: 0 22px 52px rgba(18, 18, 18, 0.1);
      --radius-xl: 32px;
      --radius-lg: 24px;
      --radius-md: 18px;
      --green-dot: #33d17a;
    }

    body {
      font-family: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #fffdfa 0%, var(--page-bg) 100%);
      color: var(--ink);
      line-height: 1.55;
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    .app-container {
      max-width: 1440px;
      margin: 0 auto;
      padding: 1.25rem 1.5rem 5rem;
    }

    .library-header {
      padding: 0.75rem 0 1rem;
      margin-bottom: 1.25rem;
      border-bottom: 1px solid var(--line-soft);
    }

    .home-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      text-decoration: none;
      color: var(--muted);
      font-family: 'Archivo', sans-serif;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-bottom: 0.75rem;
      transition: color 0.15s ease;
    }

    .home-btn::before {
      content: '←';
      font-size: 0.85rem;
    }

    .home-btn:hover {
      color: var(--ink);
    }

    .page-wordmark {
      font-family: 'Archivo', sans-serif;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }

    .hero {
      display: grid;
      gap: 0.4rem;
      max-width: 54rem;
    }

    .hero-kicker {
      font-family: 'Archivo', sans-serif;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 0.2rem;
    }

    .hero h1 {
      font-family: 'Archivo', sans-serif;
      font-size: clamp(2.2rem, 6vw, 4rem);
      font-weight: 700;
      line-height: 0.95;
      letter-spacing: -0.04em;
      text-wrap: balance;
    }

    .hero p {
      max-width: 48ch;
      font-size: 0.95rem;
      line-height: 1.6;
      color: var(--muted);
      margin-top: 0.15rem;
    }

    .library-shell {
      display: grid;
      gap: 1.5rem;
    }

    .game-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 1.5rem;
      list-style: none;
      align-items: stretch;
    }

    .game-card {
      --game-primary: #111111;
      --game-secondary: #454545;
      position: relative;
      display: grid;
      grid-template-rows: auto 1fr;
      height: 100%;
      border: 1px solid var(--line-soft);
      border-radius: var(--radius-lg);
      background: var(--surface);
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
    }

    .game-card:hover {
      transform: translateY(-4px);
      border-color: #d4caba;
      box-shadow: var(--shadow-lg);
    }

    .game-card:focus-visible {
      outline: 2px solid rgba(29, 28, 24, 0.78);
      outline-offset: 5px;
    }

    .game-card-media {
      position: relative;
      aspect-ratio: 1 / 1;
      overflow: hidden;
      background: linear-gradient(145deg, var(--game-secondary), var(--game-primary));
    }

    .game-card-media::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,0.18), rgba(0,0,0,0.12));
      pointer-events: none;
      z-index: 2;
    }

    .game-card-image {
      position: absolute;
      inset: 0;
      z-index: 1;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.35s ease;
    }

    .game-card:hover .game-card-image {
      transform: scale(1.04);
    }

    .game-card-monogram {
      position: absolute;
      inset: 0;
      z-index: 0;
      display: grid;
      place-items: center;
      font-family: 'Archivo', sans-serif;
      font-size: clamp(3rem, 8vw, 4.8rem);
      font-weight: 700;
      letter-spacing: -0.08em;
      color: rgba(255,255,255,0.9);
      text-transform: uppercase;
    }

    .game-card-media[data-has-image="true"] .game-card-monogram {
      opacity: 0.15;
    }

    .game-badge {
      position: absolute;
      top: 1rem;
      left: 1rem;
      z-index: 3;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 30px;
      padding: 0.3rem 0.72rem;
      border-radius: 999px;
      background: rgba(255,255,255,0.92);
      color: var(--accent);
      font-family: 'Archivo', sans-serif;
      font-size: 0.67rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .game-card-body {
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
      padding: 1rem 1rem 1.1rem;
    }

    .game-eyebrow {
      font-family: 'Archivo', sans-serif;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      line-height: 1.4;
      text-transform: uppercase;
      color: var(--muted);
    }

    .game-title {
      font-family: 'Archivo', sans-serif;
      font-size: 1.55rem;
      font-weight: 700;
      letter-spacing: -0.05em;
      line-height: 1.02;
      color: var(--game-primary);
      text-wrap: balance;
    }

    .game-caption {
      margin: 0;
      font-size: 0.95rem;
      line-height: 1.65;
      color: var(--muted);
      display: -webkit-box;
      line-clamp: 3;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .game-tags {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0;
    }

    .game-tag {
      flex-shrink: 0;
      font-family: 'Archivo', sans-serif;
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--game-tertiary, #ffffff);
      white-space: nowrap;
    }

    .game-tag-sep {
      flex-shrink: 0;
      margin: 0 0.5rem;
      opacity: 0.55;
      font-size: 0.85rem;
    }

    .play-action {
      display: flex;
      align-items: stretch;
      gap: 0.7rem;
      margin-top: auto;
      padding-top: 0;
    }

    .play-btn,
    .edit-btn {
      display: inline-flex;
      flex: 1 1 0;
      align-items: center;
      justify-content: center;
      min-height: 46px;
      padding: 0 1rem;
      border-radius: 999px;
      text-decoration: none;
      font-family: 'Archivo', sans-serif;
      font-size: 0.73rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      transition: transform 0.12s ease, background-color 0.18s ease, border-color 0.18s ease, color 0.18s ease;
    }

    .play-btn {
      background: var(--accent);
      color: #ffffff;
      border: 1px solid var(--accent);
    }

    .edit-btn {
      background: transparent;
      color: var(--ink);
      border: 1px solid var(--line);
    }

    .play-btn:hover,
    .edit-btn:hover {
      transform: translateY(-1px);
    }

    .admin-mode-toggle {
      position: fixed;
      right: 1.25rem;
      bottom: 1.25rem;
      z-index: 130;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.94);
      color: var(--ink);
      border-radius: 999px;
      padding: 0.9rem 1.1rem;
      font-family: 'Archivo', sans-serif;
      font-size: 0.76rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      box-shadow: var(--shadow-sm);
      transition: transform 0.14s ease, background-color 0.18s ease, border-color 0.18s ease, color 0.18s ease;
    }

    .admin-mode-toggle::before {
      content: '';
      width: 8px;
      height: 8px;
      margin-right: 0.55rem;
      display: inline-block;
      vertical-align: middle;
      border-radius: 50%;
      background: rgba(29, 28, 24, 0.22);
      transition: background-color 0.18s ease, box-shadow 0.18s ease;
    }

    .admin-mode-toggle:hover {
      transform: translateY(-2px);
      border-color: #c7bfb3;
    }

    .admin-mode-toggle[data-active="true"] {
      background: var(--accent);
      border-color: var(--accent);
      color: #ffffff;
    }

    .admin-mode-toggle[data-active="true"]::before {
      background: var(--green-dot);
      box-shadow: 0 0 12px rgba(16, 185, 129, 0.65);
    }

    .empty-state,
    .error-state {
      grid-column: 1 / -1;
      min-height: 240px;
      display: grid;
      place-items: center;
      padding: 2rem;
      border: 1px solid var(--line-soft);
      border-radius: var(--radius-lg);
      background: #ffffff;
      color: var(--muted);
      text-align: center;
      font-family: 'Archivo', sans-serif;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .error-state {
      color: #8a3327;
    }

    @media (max-width: 960px) {
      .library-toolbar {
        align-items: stretch;
        flex-direction: column;
      }

      .toolbar-controls {
        width: 100%;
        justify-content: stretch;
      }

      .search-control,
      .toolbar-controls {
        flex: 1 1 100%;
        width: 100%;
      }
    }

    @media (max-width: 720px) {
      .app-container {
        padding: 1rem 1rem 4.6rem;
      }

      .page-nav {
        margin-bottom: 2rem;
      }

      .hero h1 {
        font-size: clamp(2.8rem, 15vw, 4.2rem);
      }

      .toolbar-summary {
        font-size: 1.3rem;
      }

      .game-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 1rem;
      }
    }

    @media (max-width: 560px) {
      .page-nav {
        flex-direction: column;
        align-items: stretch;
      }

      .page-wordmark {
        text-align: left;
      }

      .game-grid {
        grid-template-columns: 1fr;
      }

      .play-action {
        flex-direction: column;
      }

      .admin-mode-toggle {
        right: 1rem;
        bottom: 1rem;
      }
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(14px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <main class="app-container">
    <header class="library-header">
      <a href="https://thegamebureau.com" class="home-btn">The Game Bureau</a>
      <section class="hero">
        <h1>Library</h1>
        <p class="hero-kicker" id="game-count-kicker">Counting games...</p>
        <p>Welcome to The Game Bureau's Game Library, where scavenger hunt meets escape-room-style adventure. Find your game's starting location in the real world. Grab your phone. Play. Win.</p>
      </section>
    </header>

    <section class="library-shell">
      <ul class="game-grid" id="gamesListContainer">
        <li class="empty-state">Loading games...</li>
      </ul>
    </section>
  </main>

  <button class="admin-mode-toggle" id="adminModeToggle" type="button" data-active="false" aria-pressed="false">Admin Mode</button>

  <script>
    window.TGB_SUPABASE_CONFIG = {
      enabled: true,
      url: 'https://qmaafbncpzrdmqapkkgr.supabase.co',
      publishableKey: 'sb_publishable_6a9XqxYa0-AZtyrwz4ZeUg_aiMsVH-3',
      gamesTable: 'games'
    };

    const ADMIN_MODE_KEY = 'tgb-library-admin-mode';
    let adminModeEnabled = false;
    const GAMES_SCHEMA = {
      featured: true
    };

    function readAdminMode() {
      try {
        return sessionStorage.getItem(ADMIN_MODE_KEY) === 'true';
      } catch (error) {
        return false;
      }
    }

    function writeAdminMode(value) {
      try {
        sessionStorage.setItem(ADMIN_MODE_KEY, value ? 'true' : 'false');
      } catch (error) {
        // Ignore storage issues and keep the in-memory state.
      }
    }

    function updateAdminModeUi() {
      const toggle = document.getElementById('adminModeToggle');
      if (toggle) {
        toggle.dataset.active = adminModeEnabled ? 'true' : 'false';
        toggle.setAttribute('aria-pressed', adminModeEnabled ? 'true' : 'false');
        toggle.textContent = adminModeEnabled ? 'Admin Mode On' : 'Admin Mode';
      }
    }

    function getMissingGamesColumnName(errorMessage = '') {
      const message = String(errorMessage || '');
      const match = message.match(/column\s+games\.([a-z_]+)\s+does\s+not\s+exist/i);
      return match ? String(match[1] || '').trim().toLowerCase() : '';
    }

    function buildGameSelect() {
      const columns = ['id', 'name', 'primary_color', 'secondary_color', 'archived', 'erased', 'nodes'];
      if (GAMES_SCHEMA.featured) columns.splice(4, 0, 'featured');
      return columns.join(',');
    }

    async function fetchGames(config, selectOverride = '') {
      const baseUrl = `${config.url.replace(/\/+$/, '')}/`;
      const requestUrl = new URL(`rest/v1/${config.gamesTable}`, baseUrl);
      const select = selectOverride || buildGameSelect();
      requestUrl.searchParams.set('select', select);
      requestUrl.searchParams.set('order', 'name.asc');

      const response = await fetch(requestUrl.toString(), {
        headers: {
          apikey: config.publishableKey,
          Authorization: `Bearer ${config.publishableKey}`,
          Accept: 'application/json'
        },
        cache: 'no-store'
      });

      if (!response.ok) {
        let message = `Request failed with status ${response.status}`;

        try {
          const errorPayload = await response.json();
          message =
            errorPayload.message ||
            errorPayload.error_description ||
            errorPayload.error ||
            message;
        } catch (parseError) {
          // Fall back to the status-based message when no JSON body is available.
        }

        const missingColumn = getMissingGamesColumnName(message);
        if (missingColumn === 'featured' && GAMES_SCHEMA.featured) {
          GAMES_SCHEMA.featured = false;
          return fetchGames(config, buildGameSelect());
        }

        throw new Error(message);
      }

      return response.json();
    }

    function renderEmptyState(listContainer, message, className = 'empty-state') {
      listContainer.innerHTML = '';

      const item = document.createElement('li');
      item.className = className;
      item.textContent = message;
      listContainer.appendChild(item);
    }

    function getGameNode(game) {
      if (!game || !Array.isArray(game.nodes)) return null;
      return game.nodes.find((node) => node && node.type === 'game') || null;
    }

    function getSearchableText(game) {
      const gameNode = getGameNode(game) || {};
      return [
        game && game.name,
        game && game.city,
        gameNode.city,
        gameNode.tagline,
        gameNode.body,
        gameNode.guideName,
        gameNode.guideBio,
        Array.isArray(gameNode.tags) ? gameNode.tags.join(' ') : ''
      ]
        .filter(Boolean)
        .join(' ')
        .toLowerCase();
    }

    function isLiveGame(game) {
      const isArchived = typeof game?.archived === 'string' && game.archived.trim();
      const isErased = typeof game?.erased === 'string' && game.erased.trim();
      return !isArchived && !isErased;
    }

    function getGamePalette(game) {
      const gameNode = getGameNode(game);
      return {
        primary: String(game && (game.primary_color || game.primaryColor) || '').trim() || '#191919',
        secondary: String(game && (game.secondary_color || game.secondaryColor) || '').trim() || '#454545',
        tertiary: String(gameNode && gameNode.tertiaryColor || '').trim() || '#ffffff'
      };
    }

    function resolveLibraryAssetUrl(value) {
      const raw = String(value || '').trim();
      if (!raw) return '';
      try {
        if (/^assets\//i.test(raw)) {
          return new URL(`../${raw}`, window.location.href).toString();
        }
        return new URL(raw, window.location.href).toString();
      } catch (error) {
        return '';
      }
    }

    function getGameImageUrl(game) {
      const gameNode = getGameNode(game);
      return resolveLibraryAssetUrl(gameNode && (gameNode.logo || gameNode.logoUrl || gameNode.guideImage || gameNode.guideImageUrl) || '');
    }

    function getGameMonogram(game) {
      const title = String(game && game.name || 'Game').trim();
      const words = title.match(/[A-Za-z0-9]+/g) || [];
      if (words.length >= 2) {
        return `${words[0][0] || ''}${words[1][0] || ''}`.toUpperCase();
      }
      return title.replace(/[^A-Za-z0-9]/g, '').slice(0, 2).toUpperCase() || 'TG';
    }

    function getGameEyebrow(game) {
      const gameNode = getGameNode(game) || {};
      const parts = [];
      const city = String(game && game.city || gameNode.city || '').trim();
      const guideName = String(gameNode.guideName || '').trim();
      if (city) parts.push(city);
      if (guideName) parts.push(guideName);
      if (parts.length) return parts.join(' / ');
      return 'Live Experience';
    }

    function getGameTagLabels(game) {
      const gameNode = getGameNode(game);
      const tags = Array.isArray(gameNode && gameNode.tags)
        ? gameNode.tags.map((tag) => String(tag || '').trim()).filter(Boolean)
        : [];
      const visibleTags = tags.filter((tag) => tag.toLowerCase() !== 'featured');
      if (visibleTags.length) return visibleTags;
      return ['Phone-Led'];
    }

    function getGameCaption(game) {
      const gameNode = getGameNode(game);
      const tagline = String(gameNode && gameNode.tagline || '').replace(/\s+/g, ' ').trim();
      if (tagline) return tagline.length > 120 ? tagline.slice(0, 117).trimEnd() + '...' : tagline;
      return 'A live local experience designed to get people moving through a shared place together.';
    }

    function isGameFeatured(game) {
      const featuredField = game && game.featured;
      if (typeof featuredField === 'boolean') return featuredField;
      if (typeof featuredField === 'string' && featuredField.trim()) return true;
      const gameNode = getGameNode(game);
      const tags = Array.isArray(gameNode && gameNode.tags) ? gameNode.tags : [];
      return tags.some((tag) => String(tag || '').trim().toLowerCase() === 'featured');
    }

    function filterGames(games, filter = '') {
      const normalizedFilter = String(filter || '').trim().toLowerCase();
      return games.filter((game) => {
        if (!isLiveGame(game)) return false;
        if (!normalizedFilter) return true;
        return getSearchableText(game).includes(normalizedFilter);
      });
    }

    function createGameCard(game, index) {
      const palette = getGamePalette(game);
      const gameNode = getGameNode(game) || {};
      const defaultEmoji = gameNode.defaultEmoji || '🧩';
      const tagLabels = getGameTagLabels(game);
      const caption = getGameCaption(game);
      const eyebrow = getGameEyebrow(game);
      const detailHref = `../game/?id=${encodeURIComponent(game.id ?? '')}`;
      const featured = isGameFeatured(game);

      const li = document.createElement('li');
      li.className = 'game-card';
      li.tabIndex = 0;
      li.setAttribute('role', 'link');
      li.setAttribute('aria-label', `Open ${game.name || 'Untitled Game'}`);
      li.style.animationDelay = `${(index % 10) * 0.1}s`;
      li.style.setProperty('--game-primary', palette.primary);
      li.style.setProperty('--game-secondary', palette.secondary);
      li.style.setProperty('--game-tertiary', palette.tertiary);
      li.style.animation = 'slideUp 0.45s ease-out backwards';
      li.addEventListener('click', () => {
        window.location.href = detailHref;
      });
      li.addEventListener('keydown', (event) => {
        if (event.key !== 'Enter' && event.key !== ' ') return;
        event.preventDefault();
        window.location.href = detailHref;
      });

      const media = document.createElement('div');
      media.className = 'game-card-media';

      const imageUrl = getGameImageUrl(game);
      media.dataset.hasImage = imageUrl ? 'true' : 'false';

      const monogram = document.createElement('div');
      monogram.className = 'game-card-monogram';
      monogram.textContent = getGameMonogram(game);
      media.appendChild(monogram);

      if (imageUrl) {
        const image = document.createElement('img');
        image.className = 'game-card-image';
        image.src = imageUrl;
        image.alt = '';
        image.loading = 'lazy';
        image.decoding = 'async';
        image.addEventListener('error', () => {
          image.remove();
          media.dataset.hasImage = 'false';
        });
        media.appendChild(image);
      }

      if (featured) {
        const badge = document.createElement('div');
        badge.className = 'game-badge';
        badge.textContent = 'FEATURED';
        media.appendChild(badge);
      }

      const title = document.createElement('h2');
      title.className = 'game-title';
      title.textContent = game.name || 'Untitled Game';

      const body = document.createElement('div');
      body.className = 'game-card-body';

      const eyebrowEl = document.createElement('p');
      eyebrowEl.className = 'game-eyebrow';
      eyebrowEl.textContent = eyebrow;

      const tagsWrap = document.createElement('div');
      tagsWrap.className = 'game-tags';
      tagLabels.forEach((tagLabel, i) => {
        if (i > 0) {
          const sep = document.createElement('span');
          sep.className = 'game-tag-sep';
          sep.textContent = defaultEmoji;
          tagsWrap.appendChild(sep);
        }
        const span = document.createElement('span');
        span.className = 'game-tag';
        span.textContent = tagLabel;
        tagsWrap.appendChild(span);
      });

      const captionEl = document.createElement('p');
      captionEl.className = 'game-caption';
      captionEl.textContent = caption;

      const playAction = document.createElement('div');
      playAction.className = 'play-action';
      playAction.addEventListener('click', (event) => {
        event.stopPropagation();
      });
      playAction.addEventListener('keydown', (event) => {
        event.stopPropagation();
      });

      const playLink = document.createElement('a');
      playLink.className = 'play-btn';
      playLink.href = detailHref;
      playLink.textContent = 'Preview';
      playAction.appendChild(playLink);

      if (adminModeEnabled) {
        const editLink = document.createElement('a');
        editLink.className = 'edit-btn';
        editLink.href = `../builder/?id=${encodeURIComponent(game.id ?? '')}`;
        editLink.textContent = 'Edit';
        playAction.appendChild(editLink);
      }

      body.append(eyebrowEl, title, captionEl, tagsWrap, playAction);
      li.append(media, body);
      return li;
    }

    function sortGamesForLibrary(games) {
      return [...games].sort((left, right) => {
        const featuredDelta = Number(isGameFeatured(right)) - Number(isGameFeatured(left));
        if (featuredDelta !== 0) return featuredDelta;
        const leftName = String(left && left.name || 'Untitled Game');
        const rightName = String(right && right.name || 'Untitled Game');
        return leftName.localeCompare(rightName, undefined, { sensitivity: 'base' });
      });
    }

    function renderList(listContainer, games, filter = '') {
      listContainer.innerHTML = '';

      const filteredGames = filterGames(games, filter);
      const orderedGames = sortGamesForLibrary(filteredGames);

      if (orderedGames.length === 0) {
        renderEmptyState(listContainer, 'No games match your search.');
        return;
      }

      orderedGames.forEach((game, index) => {
        listContainer.appendChild(createGameCard(game, index));
      });
    }

    async function loadGames() {
      const listContainer = document.getElementById('gamesListContainer');

      if (!window.TGB_SUPABASE_CONFIG) {
        renderEmptyState(listContainer, 'Error: Could not load database configuration.', 'error-state');
        return;
      }

      try {
        const games = await fetchGames(window.TGB_SUPABASE_CONFIG);

        if (!games || games.length === 0) {
          renderEmptyState(listContainer, 'No games available right now.');
          return;
        }

        const kicker = document.getElementById('game-count-kicker');
        if (kicker) { const liveCount = games.filter(isLiveGame).length; kicker.textContent = liveCount + ' Live Game' + (liveCount !== 1 ? 's' : ''); }

        renderList(listContainer, games);

        const adminModeToggle = document.getElementById('adminModeToggle');
        if (adminModeToggle) {
          adminModeToggle.addEventListener('click', () => {
            adminModeEnabled = !adminModeEnabled;
            writeAdminMode(adminModeEnabled);
            updateAdminModeUi();
            renderList(listContainer, games);
          });
        }
      } catch (err) {
        console.error('Database fetch error:', err);
        const errorMessage = err instanceof Error ? err.message : String(err);
        renderEmptyState(listContainer, `System Error: ${errorMessage}`, 'error-state');
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      adminModeEnabled = readAdminMode();
      updateAdminModeUi();
      loadGames();
    });
  </script>
</body>
</html>
