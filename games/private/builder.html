<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Builder</title>
  <link rel="icon" href="builder.ico" type="image/x-icon">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#f4f4f4;--ink:#111111;--panel:#eaf0f5;--muted:#5a5a5a;
      --ok:#1a6b3a;--warn:#9a5f00;--err:#c1121f;--danger:#c1121f;
      --line:#111111;--accent:#111111;
      --lp:300px;
      --space-1:4px;--space-2:8px;--space-3:12px;--space-4:16px;--space-5:20px;--space-6:24px;--space-7:32px;
      --bubble-gap:var(--space-4);
      --sans:"JetBrains Mono",monospace;--mono:"JetBrains Mono",monospace;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    html{height:100%;}
    body{font-family:var(--sans);background:var(--bg);color:var(--ink);display:flex;flex-direction:column;height:100vh;overflow:hidden;}
    .page-header{background:var(--ink);color:var(--bg);padding:14px 24px;flex-shrink:0;display:flex;align-items:center;gap:16px;}
    .page-header .bureau{font-size:.62rem;font-weight:700;letter-spacing:.16em;text-transform:uppercase;opacity:.5;}
    .page-header .tool{font-size:1rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;}

    /* ── Scrollbar hiding ── */
    *{scrollbar-width:none;}
    *::-webkit-scrollbar{display:none;}

    /* ── Three-column layout ── */
    /* ── Two-panel layout ── */
    .builder-layout{display:grid;grid-template-columns:240px 1fr;flex:1;min-height:0;overflow:hidden;}
    .left-nav{display:flex;flex-direction:column;background:var(--panel);border-right:2px solid var(--ink);min-width:0;}
    .header-mode-btn{font-family:var(--sans);font-size:.6rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:5px 14px;border:1px solid rgba(255,255,255,.35);background:transparent;color:rgba(255,255,255,.6);cursor:pointer;margin-top:0;width:auto;}
    .header-mode-btn:hover{background:rgba(255,255,255,.12);color:#fff;}
    .header-mode-btn.active{background:#fff;color:var(--ink);border-color:#fff;}
    .nav-body{flex:1;overflow-y:auto;min-height:0;}
    .nav-panel{display:none;flex-direction:column;}
    .nav-panel.active{display:flex;}
    .center-panel{min-width:0;overflow-y:auto;height:100%;background:linear-gradient(90deg,rgba(100,160,240,.14) 1px,transparent 1px),linear-gradient(0deg,rgba(100,160,240,.14) 1px,transparent 1px),var(--bg);background-size:28px 28px,28px 28px,auto;}
    #view-routes{padding:28px 32px 56px;}
    .center-view{display:none;flex-direction:column;}
    .center-view.active{display:flex;}
    .center-empty{padding:64px 0;font-size:.72rem;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;text-align:center;}
    .route-builder-card{max-width:480px;border:2px solid var(--ink);background:var(--panel);}

    /* ── Left panel sections ── */
    .lp-section{border-bottom:2px solid var(--ink);padding:14px 16px;}
    .lp-section:last-child{border-bottom:none;}
    .lp-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
    .lp-title{font-size:.62rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);}
    .lp-btn{font-family:var(--sans);font-size:.64rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:3px 9px;border:1px solid var(--ink);border-radius:0;background:#fff;color:var(--ink);cursor:pointer;margin-top:0;width:auto;}
    .lp-btn:hover{background:var(--panel);}
    .lp-btn.primary{background:var(--ink);color:var(--bg);}
    .lp-btn.primary:hover{background:#333;}
    .lp-btn.danger{border-color:var(--err);color:var(--err);}
    .lp-btn.danger:hover{background:#fff0f0;}
    .lp-btn:disabled{opacity:.4;cursor:default;}

    /* Game list */
    .game-row{display:flex;align-items:center;gap:7px;padding:7px 6px;border-bottom:1px solid rgba(17,17,17,.1);font-size:.78rem;cursor:pointer;user-select:none;}
    .game-row:last-child{border-bottom:none;}
    .game-row:hover{background:rgba(100,160,240,.12);}
    .game-row.selected{background:var(--ink);color:var(--bg);}
    .game-row.selected .gr-sub{color:rgba(255,255,255,.5);}
.gr-info{flex:1;min-width:0;display:flex;flex-direction:column;gap:1px;}
    .gr-name{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .gr-sub{font-size:.66rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .game-row.archived .gr-name,.game-row.archived .gr-sub{color:#bbb;}
    .empty-list{font-size:.74rem;color:var(--muted);padding:4px 0;}

    /* Game edit form */
    label{display:block;font-size:.62rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:4px;}
    input[type="text"],textarea,select{width:100%;font-family:var(--sans);font-size:.82rem;padding:7px 9px;border:1px solid var(--ink);border-radius:0;background:#fff;color:var(--ink);outline:none;}
    input[type="text"]:focus,textarea:focus{box-shadow:inset 0 0 0 2px var(--ink);}
    textarea{resize:vertical;line-height:1.4;}
    .gf-field{margin-top:10px;}
    .gf-row{display:flex;gap:8px;margin-top:10px;}
    .gf-row button{flex:1;margin-top:0;}
    .g-status{margin-top:8px;font-size:.66rem;letter-spacing:.04em;text-transform:uppercase;min-height:1em;color:var(--muted);}
    .g-status.ok{color:var(--ok);font-weight:700;}.g-status.warn{color:var(--warn);font-weight:700;}.g-status.err{color:var(--err);font-weight:700;}
    .g-id-display{font-size:.62rem;color:var(--muted);letter-spacing:.04em;min-height:.9em;margin-top:3px;}
    .g-share-row{display:flex;align-items:center;gap:8px;border:1px solid var(--ink);background:#fff;padding:6px 9px;}
    .g-share-url{font-size:.72rem;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--muted);user-select:all;cursor:text;}
    .adv-toggle{font-family:var(--sans);font-size:.62rem;color:var(--muted);text-decoration:underline;cursor:pointer;background:none;border:none;padding:0;margin-top:8px;width:auto;}
    .adv-fields{margin-top:0;}

    /* Tag picker */
    .tag-picker{display:flex;flex-wrap:wrap;gap:5px;padding:6px 0 2px;}
    .tag-pill{font-family:var(--sans);font-size:.62rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:3px 8px;border:1px solid rgba(17,17,17,.3);border-radius:999px;background:#fff;color:var(--muted);cursor:pointer;user-select:none;}
    .tag-pill:hover{border-color:var(--ink);color:var(--ink);}.tag-pill.on{background:var(--ink);color:var(--bg);border-color:var(--ink);}
    #g-tagNewInput{font-family:var(--sans);font-size:.62rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:3px 8px;border:1px dashed rgba(17,17,17,.3);border-radius:999px;background:#fff;color:var(--ink);outline:none;width:90px;margin:0;}
    #g-tagNewInput:focus{border-color:var(--ink);border-style:solid;}
    .tag-add-btn{font-family:var(--sans);font-size:.62rem;font-weight:700;padding:3px 8px;border:1px solid var(--ink);border-radius:999px;background:#fff;color:var(--ink);cursor:pointer;margin-top:0;width:auto;}

    /* Stop type picker popup */
    .stop-type-popup{position:absolute;top:100%;right:0;margin-top:4px;background:#fff;border:2px solid var(--ink);z-index:200;display:none;flex-direction:column;min-width:140px;}
    .stop-type-popup.open{display:flex;}
    .stop-type-opt{font-family:var(--sans);font-size:.66rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:10px 14px;cursor:pointer;border:none;background:none;text-align:left;color:var(--ink);width:100%;margin-top:0;}
    .stop-type-opt:hover{background:var(--panel);}
    .stop-type-opt+.stop-type-opt{border-top:1px solid rgba(17,17,17,.12);}

    /* Stop nav list */
    .stop-nav-row{display:flex;align-items:center;gap:7px;padding:7px 6px;border-bottom:1px solid rgba(17,17,17,.1);font-size:.78rem;cursor:pointer;user-select:none;}
    .stop-nav-row:last-child{border-bottom:none;}
    .stop-nav-row:hover{background:rgba(100,160,240,.12);}
    .stop-nav-row.selected{background:var(--ink);color:var(--bg);}
    .stop-nav-row.selected .reply-tag{opacity:.8;}
    .stop-nav-name{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:600;}

    /* Route panel */
    .r-stop-item{display:flex;align-items:center;gap:6px;padding:6px 8px;background:#fff;border:1px solid rgba(17,17,17,.18);margin-bottom:4px;font-size:.74rem;cursor:grab;user-select:none;}
    .r-stop-item:hover{border-color:var(--ink);}
    .r-stop-item.dragging{opacity:.4;}
    .r-stop-item.drop-before{box-shadow:0 -2px 0 var(--ink);}
    .r-stop-item.drop-after{box-shadow:0 2px 0 var(--ink);}
    .r-stop-grip{color:var(--muted);font-size:.6rem;flex-shrink:0;}
    .r-stop-num{flex-shrink:0;font-size:.6rem;color:var(--muted);min-width:14px;text-align:right;}
    .r-stop-id{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .r-remove-btn{flex-shrink:0;padding:0;width:16px;height:16px;background:transparent;border:none;color:var(--muted);font-size:.9rem;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:var(--sans);margin-top:0;}
    .r-remove-btn:hover{color:var(--err);}
    .r-zone-empty{padding:20px 12px;font-size:.66rem;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;text-align:center;border:2px dashed rgba(17,17,17,.15);}
    .r-drop-zone{min-height:56px;padding:2px;}
    .r-drop-zone.drag-over{background:rgba(100,160,240,.13);outline:2px dashed var(--ink);outline-offset:-2px;}
    .r-status{font-size:.64rem;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);margin-top:6px;min-height:.9em;}
    .r-status.ok{color:var(--ok);font-weight:700;}.r-status.err{color:var(--err);font-weight:700;}
    .anytime-tag{font-size:.56rem;font-weight:700;letter-spacing:.07em;color:#fff;padding:2px 4px;border-radius:3px;flex-shrink:0;text-transform:uppercase;background:#4ecf98;}
    .r-no-game{font-size:.72rem;color:var(--muted);padding:6px 0;font-style:italic;}

    /* Right panel — stops */
    .right-toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:20px;}
    button{margin-top:14px;width:100%;font-family:var(--sans);font-size:.75rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:10px;border:1px solid var(--ink);border-radius:0;background:var(--ink);color:var(--bg);cursor:pointer;}
    button:hover{background:#333;}button:active{opacity:.7;}button:disabled{opacity:.4;cursor:default;}
    button.primary{background:#fff;color:var(--ink);border-color:var(--ink);}
    button.primary:hover{background:var(--panel);}
    .status{display:block;font-size:.76rem;min-height:1.2rem;margin:0;color:var(--muted);letter-spacing:.03em;text-transform:uppercase;}
    .status.ok{color:var(--accent);font-weight:700;}.status.error{color:var(--danger);font-weight:700;}.status.warn{color:#9a5f00;font-weight:700;}
    .warnings{font-size:.82rem;color:#9a5f00;background:#fff7e8;border:1px solid #f1d7a3;padding:10px 14px;margin-bottom:14px;display:none;line-height:1.45;}
    .warnings ul{margin:0 0 0 16px;padding:0;}.warnings strong{display:block;margin-bottom:6px;}
    .dirty-badge{position:absolute;top:100%;left:50%;transform:translateX(-50%);margin-top:4px;font-size:.72rem;color:#475569;font-weight:700;letter-spacing:.04em;white-space:nowrap;visibility:hidden;}

    /* Stop cards */
    .stop-card{border:2px solid var(--line);background:var(--panel);position:relative;margin-bottom:10px;}
    .stop-card.dragging{opacity:.5;transform:rotate(1.5deg);cursor:grabbing;box-shadow:0 8px 24px rgba(0,0,0,.18);z-index:50;}
    .stop-card.drop-before{box-shadow:0 -4px 0 var(--accent);}.stop-card.drop-after{box-shadow:0 4px 0 var(--accent);}
    .section-header{display:flex;align-items:center;gap:8px;padding:10px 14px;cursor:pointer;user-select:none;}
    .stop-header{cursor:grab;}
    .stop-header .stop-card-actions *,.stop-header button{cursor:pointer;}
    .stop-header .stop-title-edit{cursor:text;}
    .stop-card.dragging .stop-header{cursor:grabbing;}
    .section-header.expanded{border-bottom:2px solid var(--line);}
    .section-title-text{font-weight:700;font-size:.84rem;letter-spacing:.04em;text-transform:uppercase;}
    .stop-title-edit[contenteditable="true"]{user-select:text;cursor:text;outline:none;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;border-bottom:1.5px solid transparent;padding-bottom:1px;transition:border-color .15s;}
    .stop-title-edit[contenteditable="true"]:hover{border-bottom-color:rgba(17,17,17,.3);}
    .stop-title-edit[contenteditable="true"]:focus{text-overflow:clip;white-space:normal;border-bottom-color:var(--ink);}
    .section-meta{font-size:.68rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);flex-shrink:0;white-space:nowrap;font-family:var(--mono);}
    .stop-name-group{display:inline-flex;align-items:center;gap:.26em;flex:0 1 auto;min-width:0;}
    .stop-name-suffix{font-size:.84rem;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--ink);flex-shrink:0;user-select:none;}
    .stop-card-actions{display:flex;gap:8px;flex-shrink:0;margin-left:auto;align-items:center;}
    .stop-card-body{padding:14px 16px;background:none;display:grid;gap:var(--bubble-gap);}
    .stop-action{color:#475569;background:#f8fafc;border:2px solid currentColor;padding:0;width:26px;height:26px;display:inline-flex;align-items:center;justify-content:center;line-height:0;cursor:pointer;user-select:none;margin-top:0;flex-shrink:0;}
    .stop-action svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
    .stop-paste{color:#0f766e;background:#f0fdfa;}.stop-delete{color:#ff4d57;background:#fff;}
    .stop-add-route{color:#7c3aed;background:#f5f3ff;border-color:#7c3aed;}
    .stop-add-route:hover{background:#ede9fe;}
    .stop-add-route.no-game{opacity:.25;cursor:not-allowed;}
    .stop-action.disabled{opacity:.3;cursor:not-allowed;}
    .stop-grip{color:var(--muted);cursor:grab;flex-shrink:0;display:flex;align-items:center;user-select:none;}
    .stop-grip:active{cursor:grabbing;}.stop-grip svg{width:13px;height:13px;pointer-events:none;}
    #s-stopList,#s-anytime-section{display:flex;flex-direction:column;}
    .stops-add-row{margin-top:6px;display:flex;gap:8px;flex-wrap:wrap;}
    .stops-section-gap{margin-bottom:28px;}
    .stops-anytime-divider{border:none;border-top:1px solid var(--line);margin:10px 0;opacity:.35;}
    .reply-tag,.anytime-badge{font-size:.58rem;font-weight:700;letter-spacing:.1em;color:#fff;padding:2px 5px;border-radius:3px;flex-shrink:0;}
    .anytime-badge,.reply-tag-anytime{background:#4ecf98;}.reply-tag-noreply{background:#9ca3af;}.reply-tag-wordreply{background:#1a73e8;}.reply-tag-anyreply{background:#f5a623;}.reply-tag-choicereply{background:#9333ea;}
    .section-toggle{width:24px;height:24px;border:1px solid var(--line);background:transparent;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;margin-left:0;padding:0;color:var(--ink);margin-top:0;}

    /* Bubble editor */
    .bubble{border:2px solid var(--line);border-radius:0;background:#fff;padding:12px;margin:0;cursor:default;position:relative;}
    .bubble.photo-bubble{border-color:#60a5fa;}
    .bubble-type-row{display:flex;flex-wrap:wrap;align-items:center;column-gap:8px;row-gap:4px;margin-bottom:8px;}
    .bubble-type-row label{margin:0;white-space:nowrap;cursor:pointer;}
    .bubble-type-row input[type="radio"]{accent-color:#0f766e;cursor:pointer;margin:0;}
    .bubble-type-row span.type-pair{display:inline-flex;align-items:center;gap:5px;min-height:18px;}
    .msg-type-section,.reply-fields,.bubble-reply-section{display:grid;gap:8px;}
    .bubble-reply-section{margin-top:12px;}
    .msg-type-section label,.reply-fields label{margin:0;}.bubble-reply-label{margin:0;}
    .bubble-chat-stage{border:1px solid #d7dde6;background:#f8fafc;padding:8px;min-height:56px;}
    .bubble-html-shell{position:relative;background:#1a73e8;border-radius:20px;border-bottom-left-radius:5px;overflow:visible;max-width:min(90%,920px);}
    .bubble-html-shell::before{content:'';position:absolute;bottom:0;left:-8px;width:20px;height:20px;background:#1a73e8;border-bottom-right-radius:16px;z-index:0;}
    .bubble-html-shell::after{content:'';position:absolute;bottom:0;left:-12px;width:12px;height:20px;background:#fff;border-bottom-right-radius:10px;z-index:0;}
    .bubble.cta-bubble .bubble-html-shell{background:#cc0000;}
    .bubble.cta-bubble .bubble-html-shell::before{background:#cc0000;}
    .bubble-html-input{position:relative;z-index:1;background:transparent;border:0;border-radius:20px;width:100%;color:#fff;padding:.55rem .85rem;font-size:1.3rem;font-weight:700;line-height:1.5;min-height:80px;resize:none;overflow:hidden;}
    .bubble-html-input::placeholder{color:rgba(255,255,255,.7);}.bubble-html-input:focus{outline:none;}
    .bubble-answer-shell{position:relative;margin-left:auto;background:#e5e7eb;color:#111827;border-radius:20px;border-bottom-right-radius:5px;max-width:min(80%,760px);}
    .bubble-answer-shell::before{content:'';position:absolute;bottom:0;right:-8px;width:20px;height:20px;background:#e5e7eb;border-bottom-left-radius:16px;z-index:0;}
    .bubble-answer-shell::after{content:'';position:absolute;bottom:0;right:-12px;width:12px;height:20px;background:#f8fafc;border-bottom-left-radius:10px;z-index:0;}
    .bubble-answer-input{position:relative;z-index:1;width:100%;background:transparent;border:0;color:#111827;border-radius:20px;padding:.55rem .85rem;font-size:1.05rem;font-weight:600;line-height:1.45;min-height:50px;resize:none;overflow:hidden;}
    .bubble-answer-input::placeholder{color:rgba(17,24,39,.5);}.bubble-answer-input:focus{outline:none;}
    .bubble-top{position:absolute;top:8px;right:8px;display:flex;gap:4px;}
    .field-hint{margin:8px 0 0;font-size:.76em;color:#888;}.field-hint.tight{margin-top:4px;}
    .bubble-list{display:flex;flex-direction:column;gap:var(--bubble-gap);}
    .bubble-details-label{font-size:.64rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;}
    .bubble.cta-bubble{background:#fff;border-color:#cc0000;}
    .bubble-flash{font-size:.68rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#0f766e;opacity:0;transition:opacity .15s;}
    .bubble-flash.visible{opacity:1;}
    .row{display:grid;gap:12px;grid-template-columns:1fr 1fr;margin-bottom:12px;}
    .row.full{grid-template-columns:1fr;}.row.no-margin{margin-bottom:0;}
    .norm-preview{font-family:var(--mono);font-size:.72rem;color:#555;min-height:1rem;white-space:pre-wrap;word-break:break-all;}

    /* Anytime */
    .anytime-bubble-row{display:flex;flex-direction:column;gap:4px;}
    .anytime-bubble-lbl{font-size:.6rem;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--muted);}
    .anytime-bubble-preview{display:flex;}.anytime-bubble-preview.right{justify-content:flex-end;}.anytime-bubble-preview.left{justify-content:flex-start;}
    .anytime-chat-bubble{max-width:72%;padding:8px 12px;border-radius:18px;font-size:.86rem;line-height:1.4;}
    .anytime-chat-bubble.player{background:#e5e7eb;color:#111;border-bottom-right-radius:4px;}
    .anytime-chat-bubble.game{background:#1a73e8;color:#fff;border-bottom-left-radius:4px;}
    .anytime-chat-bubble textarea,.anytime-chat-bubble input[type="text"]{background:transparent;border:none;outline:none;resize:none;font:inherit;color:inherit;width:100%;min-width:140px;padding:0;margin:0;}
    .anytime-chat-bubble.player textarea::placeholder,.anytime-chat-bubble.player input[type="text"]::placeholder{color:rgba(0,0,0,.38);}
    .anytime-chat-bubble.game textarea::placeholder,.anytime-chat-bubble.game input[type="text"]::placeholder{color:rgba(255,255,255,.55);}

    /* Undo toast */
    .undo-toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#111;color:#fff;padding:12px 16px;font-size:.82rem;letter-spacing:.03em;display:none;align-items:center;gap:12px;z-index:9999;border:1px solid #444;white-space:nowrap;}
    .undo-toast button{border:1px solid #fff;color:#fff;background:transparent;padding:4px 10px;font-size:.74rem;letter-spacing:.05em;text-transform:uppercase;cursor:pointer;font-family:var(--sans);margin-top:0;width:auto;}
    .undo-toast button:hover{background:rgba(255,255,255,.15);}
  </style>
</head>
<body>

<header class="page-header">
  <div class="bureau">The Game Bureau</div>
  <div class="tool">Builder</div>
  <div style="margin-left:auto;display:flex;gap:6px;">
    <button class="header-mode-btn active" data-mode="games" type="button">Games</button>
    <button class="header-mode-btn" data-mode="stops" type="button">Stops</button>
    <button class="header-mode-btn" data-mode="routes" type="button">Routes</button>
  </div>

<script>
const API = 'http://localhost:3000';
let games = [];
let stopsList = [];
let stopMap = {};

// ══════════════════════════════════════════════
// MODE SWITCHING
// ══════════════════════════════════════════════
let currentMode = 'games';

function setMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.header-mode-btn').forEach(t => t.classList.toggle('active', t.dataset.mode === mode));
  document.querySelectorAll('.nav-panel').forEach(p => p.classList.toggle('active', p.id === 'nav-'+mode));
  document.querySelectorAll('.center-view').forEach(v => v.classList.toggle('active', v.id === 'view-'+mode));
  if(mode === 'routes') r_renderGameList();
}

document.querySelectorAll('.header-mode-btn').forEach(btn => {
  btn.addEventListener('click', () => setMode(btn.dataset.mode));
});

// ══════════════════════════════════════════════
// GAMES + ROUTE (left panel)
// ══════════════════════════════════════════════
let g_editingIndex = -1;
let copiedGame = null;

function g_updateIconBtns() {
  const on = g_editingIndex >= 0;
  document.getElementById('g-copyBtn').style.display = on ? '' : 'none';
  document.getElementById('g-pasteBtn').style.display = on ? '' : 'none';
  document.getElementById('g-deleteBtn').style.display = on ? '' : 'none';
  document.getElementById('g-pasteBtn').classList.toggle('disabled', !copiedGame);
}

function g_copyGame() {
  if(g_editingIndex < 0) return;
  copiedGame = JSON.parse(JSON.stringify(games[g_editingIndex]));
  g_updateIconBtns();
}

function g_pasteGame() {
  if(!copiedGame) return;
  const clone = JSON.parse(JSON.stringify(copiedGame));
  clone.name = (clone.name || 'Game') + ' Copy';
  clone.id = slugify(clone.name) + '-' + Date.now();
  clone.createdAt = new Date().toISOString();
  clone.updatedAt = new Date().toISOString();
  delete clone.archived;
  games.push(clone);
  g_setEditMode(games.length - 1);
  saveAll();
}

function g_deleteGame() {
  if(g_editingIndex < 0) return;
  games.splice(g_editingIndex, 1);
  g_editingIndex = -1;
  document.getElementById('g-editForm').style.display = 'none';
  const emptyEl = document.getElementById('view-games-empty');
  if(emptyEl) emptyEl.style.display = '';
  document.getElementById('g-archiveBtn').style.display = 'none';
  g_updateIconBtns();
  g_renderList();
  saveAll();
}
let g_allTags = ['Mystery','Puzzle','SMS','Walking Tour','Sports','History','Food','Adventure','Family','Conspiracy','Trivia','Horror','Romance','Comedy','Music','Culture','Night Life','City Tour','Scavenger Hunt','New Orleans'];
let g_selectedTags = new Set();

function slugify(s) { return String(s||'').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,''); }

function g_getTagsValue() { return [...g_selectedTags].join(';'); }
function g_setTagsValue(str) {
  g_selectedTags = new Set((str||'').split(';').map(t=>t.trim()).filter(Boolean));
  g_selectedTags.forEach(t=>{if(!g_allTags.includes(t))g_allTags.push(t);});
  g_renderTags();
}
function g_renderTags() {
  const picker = document.getElementById('g-tagPicker');
  picker.querySelectorAll('.tag-pill').forEach(p=>p.remove());
  const input = document.getElementById('g-tagNewInput');
  g_allTags.forEach(tag => {
    const pill = document.createElement('span');
    pill.className = 'tag-pill'+(g_selectedTags.has(tag)?' on':'');
    pill.textContent = tag;
    pill.addEventListener('click',()=>{ if(g_selectedTags.has(tag)) g_selectedTags.delete(tag); else g_selectedTags.add(tag); pill.classList.toggle('on'); });
    picker.insertBefore(pill, input);
  });
}
function g_addNewTag() {
  const val = document.getElementById('g-tagNewInput').value.trim(); if(!val) return;
  if(!g_allTags.includes(val)) g_allTags.push(val); g_selectedTags.add(val);
  document.getElementById('g-tagNewInput').value = ''; g_renderTags();
}
function g_setStatus(msg,type) { const el=document.getElementById('g-status'); el.textContent=msg; el.className='g-status'+(type?' '+type:''); }

function g_setEditMode(index) {
  g_editingIndex = index;
  if(currentMode === 'routes') {
    const g = index >= 0 ? games[index] : null;
    document.getElementById('r-panelTitle').textContent = g ? 'Route — '+(g.name||g.id) : 'Route';
    document.getElementById('r-panel').style.display = g ? '' : 'none';
    document.getElementById('view-routes-empty').style.display = g ? 'none' : '';
    r_renderRoute();
    r_renderGameList();
    return;
  }
  const form = document.getElementById('g-editForm');
  const archBtn = document.getElementById('g-archiveBtn');
  const emptyEl = document.getElementById('view-games-empty');
  form.style.display = '';
  if(emptyEl) emptyEl.style.display = 'none';
  if(index===-1) {
    archBtn.style.display = 'none';
    document.getElementById('g-gameName').value = '';
    document.getElementById('g-gameIdDisplay').textContent = '';
    g_updateShareUrl('');
    document.getElementById('g-gameSubtitle').value = 'Mission Control';
    g_selectedTags = new Set(); g_renderTags();
    document.getElementById('g-gameDesc').value = '';
    document.getElementById('g-gamePrice').value = 'Free To Start / In App Purchases';
    document.getElementById('g-gameLogo').value = 'logo.png';
    document.getElementById('g-gameThumbnail').value = 'thumbnail.png';
    document.getElementById('g-gameFavicon').value = 'index.ico';
  } else {
    const g = games[index];
    archBtn.style.display = '';
    archBtn.textContent = g.archived ? 'Unarchive' : 'Archive';
    document.getElementById('g-gameName').value = g.name||'';
    document.getElementById('g-gameIdDisplay').textContent = g.id||'';
    g_updateShareUrl(g.id||'');
    document.getElementById('g-gameSubtitle').value = g.subtitle||'';
    g_setTagsValue(g.tag||'');
    document.getElementById('g-gameDesc').value = g.description||'';
    document.getElementById('g-gamePrice').value = g.price||'';
    document.getElementById('g-gameLogo').value = g.logo||'';
    document.getElementById('g-gameThumbnail').value = g.thumbnail||'';
    document.getElementById('g-gameFavicon').value = g.favicon||'';
    document.getElementById('r-panelTitle').textContent = 'Route — '+(g.name||g.id);
    r_renderRoute();
  }
  g_setStatus('',''); g_renderList(); g_updateIconBtns();
  document.getElementById('g-gameName').focus();
  // refresh add-to-route buttons
  s_refreshAddRouteButtons();
}

async function saveAll() {
  const btn=document.getElementById('s-saveBtn'); if(btn)btn.disabled=true; setStatus('Saving…','');
  try {
    let newGameCreated=false;
    const formVisible=document.getElementById('g-editForm').style.display!=='none';
    if(formVisible){
      const name=document.getElementById('g-gameName').value.trim();
      if(!name&&g_editingIndex===-1){g_setStatus('Enter a game name first.','warn');setStatus('');btn.disabled=false;return;}
      if(name){
        if(g_editingIndex===-1){games.push({id:slugify(name),name,subtitle:document.getElementById('g-gameSubtitle').value.trim(),tag:g_getTagsValue(),price:document.getElementById('g-gamePrice').value.trim(),description:document.getElementById('g-gameDesc').value.trim(),logo:document.getElementById('g-gameLogo').value.trim(),thumbnail:document.getElementById('g-gameThumbnail').value.trim(),favicon:document.getElementById('g-gameFavicon').value.trim(),featured:false,archived:false,stops:[],createdAt:new Date().toISOString()});newGameCreated=true;}
        else{const g=games[g_editingIndex];g.name=name;g.id=slugify(name);g.subtitle=document.getElementById('g-gameSubtitle').value.trim();g.tag=g_getTagsValue();g.price=document.getElementById('g-gamePrice').value.trim();g.description=document.getElementById('g-gameDesc').value.trim();g.logo=document.getElementById('g-gameLogo').value.trim();g.thumbnail=document.getElementById('g-gameThumbnail').value.trim();g.favicon=document.getElementById('g-gameFavicon').value.trim();g.updatedAt=new Date().toISOString();}
      }
    }
    const[gRes,sRes]=await Promise.all([fetch(API+'/games',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({games})}),fetch(API+'/stops',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(toDoc(),null,2)})]);
    if(!gRes.ok)throw new Error('Games: server error '+gRes.status);
    if(!sRes.ok)throw new Error('Stops: server error '+sRes.status);
    loadedStopsSnapshot=deepClone(toDoc());renderDirtyBadge();
    if(newGameCreated){g_setStatus('','');g_setEditMode(games.length-1);}
    else if(g_editingIndex>=0){g_renderList();document.getElementById('g-formTitle').textContent=games[g_editingIndex].name||'Game';document.getElementById('r-panelTitle').textContent='Route — '+(games[g_editingIndex].name||games[g_editingIndex].id);}
    const warnings=renderWarnings();
    if(warnings.length)setStatus('Saved with warnings.','warn');else flashStatus('Saved.','ok');
  }catch(e){setStatus(e.message||'Save failed.','error');}
  finally{if(btn)btn.disabled=false;}
}

async function g_archiveGame() {
  if(g_editingIndex<0) return;
  const g = games[g_editingIndex];
  g.archived = !g.archived;
  const res = await fetch(API+'/games',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({games})});
  if(!res.ok) { g_setStatus('Save failed.','err'); g.archived=!g.archived; return; }
  g_setEditMode(-1);
}

function g_renderList() {
  const el = document.getElementById('g-gameList');
  if(!games.length) { el.innerHTML='<div class="empty-list">No games yet.</div>'; return; }
  const active = games.map((g,i)=>({g,i})).filter(({g})=>!g.archived);
  const archived = games.map((g,i)=>({g,i})).filter(({g})=>g.archived).sort((a,b)=>(a.g.name||'').localeCompare(b.g.name||''));
  const recentTime = ({g}) => { const u=g.updatedAt?new Date(g.updatedAt).getTime():0, c=g.createdAt?new Date(g.createdAt).getTime():0; return Math.max(u,c); };
  const latestTime = active.length ? Math.max(...active.map(recentTime)) : 0;
  const sortedActive = active.sort((a,b)=>{ const ta=recentTime(a),tb=recentTime(b); if(ta===latestTime&&tb!==latestTime)return -1; if(tb===latestTime&&ta!==latestTime)return 1; return(a.g.name||'').localeCompare(b.g.name||''); });
  function rowHTML({g,i}) { return '<div class="game-row'+(i===g_editingIndex?' selected':'')+(g.archived?' archived':'')+'" data-i="'+i+'"><span class="gr-info"><span class="gr-name">'+(g.name||'(unnamed)')+'</span>'+(g.subtitle?'<span class="gr-sub">'+g.subtitle+'</span>':'')+' </span></div>'; }
  el.innerHTML = sortedActive.map(rowHTML).join('') + (archived.length ? archived.map(rowHTML).join('') : '');
  el.querySelectorAll('.game-row').forEach(row=>row.addEventListener('click',()=>g_setEditMode(+row.dataset.i)));
}

document.getElementById('g-archiveBtn').addEventListener('click', g_archiveGame);
document.getElementById('g-copyBtn').addEventListener('click', g_copyGame);
document.getElementById('g-pasteBtn').addEventListener('click', g_pasteGame);
document.getElementById('g-deleteBtn').addEventListener('click', g_deleteGame);
document.getElementById('g-newBtn').addEventListener('click', ()=>g_setEditMode(-1));
const SHARE_BASE = 'https://the-game-bureau.github.io/the-game-bureau/games/go.html?id=';
function g_updateShareUrl(id) {
  const el = document.getElementById('g-shareUrl');
  el.textContent = id ? SHARE_BASE + id : '';
  el.closest('.gf-field').style.display = id ? '' : 'none';
}
document.getElementById('g-gameName').addEventListener('input', ()=>{
  const id = slugify(document.getElementById('g-gameName').value);
  document.getElementById('g-gameIdDisplay').textContent = id;
  g_updateShareUrl(id);
});
document.getElementById('g-copyShareBtn').addEventListener('click', () => {
  const url = document.getElementById('g-shareUrl').textContent;
  if(!url) return;
  navigator.clipboard.writeText(url).then(() => g_setStatus('Copied!', 'ok'));
});
document.getElementById('g-gameName').addEventListener('keydown', e=>{ if(e.key==='Enter') saveAll(); });
document.getElementById('g-tagAddBtn').addEventListener('click', g_addNewTag);
document.getElementById('g-tagNewInput').addEventListener('keydown', e=>{ if(e.key==='Enter'){e.preventDefault();g_addNewTag();} });
g_renderTags();

// ══════════════════════════════════════════════
// ROUTE (left panel, single game)
// ══════════════════════════════════════════════
let r_dragging = null, r_flashTimer = null;

function r_currentGame() { return g_editingIndex >= 0 ? games[g_editingIndex] : null; }

function r_renderGameList() {
  const el = document.getElementById('r-gameList');
  if(!el) return;
  const active = games.map((g,i) => ({g,i})).filter(({g}) => !g.archived);
  if(!active.length) { el.innerHTML='<div class="empty-list">No games yet.</div>'; return; }
  el.innerHTML = active.map(({g,i}) =>
    '<div class="game-row'+(i===g_editingIndex?' selected':'')+'" data-i="'+i+'">'
    +'<span class="gr-info"><span class="gr-name">'+(g.name||'(unnamed)')+'</span>'
    +(g.subtitle?'<span class="gr-sub">'+g.subtitle+'</span>':'')
    +'</span></div>'
  ).join('');
  el.querySelectorAll('.game-row').forEach(row => row.addEventListener('click', () => g_setEditMode(+row.dataset.i)));
}

function r_anytimeTag(stopId) { const s=stopMap[stopId]; return (s&&s.playerReply&&s.playerReply.anytime)?'<span class="anytime-tag">ANYTIME</span>':''; }

function r_setStatus(msg,type) { if(r_flashTimer)clearTimeout(r_flashTimer); const el=document.getElementById('r-status'); el.textContent=msg; el.className='r-status'+(type?' '+type:''); if(msg) r_flashTimer=setTimeout(()=>{el.textContent='';el.className='r-status';},2500); }

function r_isAnytime(stopId){const s=(state.stops||[]).find(x=>x&&x.id===stopId)||stopMap[stopId];return!!(s&&s.playerReply&&s.playerReply.anytime);}
function r_addStop(stopId) {
  const game = r_currentGame(); if(!game) return;
  if(!Array.isArray(game.stops)) game.stops=[];
  if(r_isAnytime(stopId)){if(game.stops.includes(stopId)){r_setStatus('Already in route.','warn');return;}const firstRegular=game.stops.findIndex(id=>!r_isAnytime(id));game.stops.splice(firstRegular<0?0:firstRegular,0,stopId);}
  else game.stops.push(stopId);
  r_renderRoute();
}

function r_clearDropIndicators(){document.querySelectorAll('.r-stop-item').forEach(el=>el.classList.remove('drop-before','drop-after'));}
function r_getInsertionIndex(items,clientY){for(let i=0;i<items.length;i++){const r=items[i].getBoundingClientRect();if(clientY<r.top+r.height/2)return i;}return items.length;}
function r_updateDropIndicator(items,clientY){items.forEach(el=>el.classList.remove('drop-before','drop-after'));const idx=r_getInsertionIndex(items,clientY);if(idx<items.length)items[idx].classList.add('drop-before');else if(items.length)items[items.length-1].classList.add('drop-after');}

function r_sortRouteAnytimeFirst(game){if(!game||!Array.isArray(game.stops))return;const at=game.stops.filter(id=>r_isAnytime(id)),reg=game.stops.filter(id=>!r_isAnytime(id));game.stops=[...at,...reg];}
function r_renderRoute() {
  const zone = document.getElementById('r-dropZone');
  const game = r_currentGame();
  zone.innerHTML = '';
  if(!game) { zone.innerHTML='<div class="r-no-game">Select a game</div>'; return; }
  if(!Array.isArray(game.stops)) game.stops=[];
  r_sortRouteAnytimeFirst(game);
  if(!game.stops.length) { zone.innerHTML='<div class="r-zone-empty">Drag stops here</div>'; return; }
  let shownDivider=false;
  game.stops.forEach((sid,idx)=>{
    if(!shownDivider&&!r_isAnytime(sid)&&game.stops.some(id=>r_isAnytime(id))){shownDivider=true;const div=document.createElement('hr');div.style.cssText='border:none;border-top:1px solid rgba(0,0,0,.2);margin:4px 0;';zone.appendChild(div);}
    const item=document.createElement('div');
    item.className='r-stop-item';item.draggable=true;item.dataset.idx=idx;
    item.innerHTML='<span class="r-stop-grip">⋮</span><span class="r-stop-num">'+(idx+1)+'</span><span class="r-stop-id">'+sid+'</span>'+r_anytimeTag(sid)+'<button class="r-remove-btn" type="button" title="Remove">×</button>';
    item.querySelector('.r-remove-btn').addEventListener('click',e=>{e.stopPropagation();game.stops.splice(idx,1);r_renderRoute();});
    item.addEventListener('dragstart',e=>{r_dragging={idx};e.dataTransfer.effectAllowed='move';e.dataTransfer.setData('text/plain',String(idx));setTimeout(()=>item.classList.add('dragging'),0);});
    item.addEventListener('dragend',()=>{item.classList.remove('dragging');r_clearDropIndicators();r_dragging=null;});
    zone.appendChild(item);
  });
}

(()=>{
  const zone=document.getElementById('r-dropZone');
  zone.addEventListener('dragover',e=>{
    const types=Array.from(e.dataTransfer.types);
    if(r_dragging!=null){
      e.preventDefault();

function s_renderNavList() {
  const el = document.getElementById('s-stopNavList');
  if(!el) return;
  el.innerHTML = '';
  const stops = state.stops || [];
  if(!stops.length) { el.innerHTML = '<div class="empty-list">No stops yet.</div>'; return; }
  const regular = [], anytime = [];
  stops.forEach((stop, i) => {
    if(!stop) return;
    (stop.playerReply && stop.playerReply.anytime ? anytime : regular).push({stop, i});
  });
  const makeRow = ({stop, i}) => {
    const row = document.createElement('div');
    const tag = getReplyTag(stop);
    row.className = 'stop-nav-row' + (i === selectedStopIndex ? ' selected' : '');
    const nameEl = document.createElement('span');
    nameEl.className = 'stop-nav-name';
    nameEl.textContent = (stop.id || '(unnamed)');
    const badge = document.createElement('span');
    badge.className = 'reply-tag ' + tag.cls;
    badge.textContent = tag.label;
    row.appendChild(nameEl);
    row.appendChild(badge);
    row.addEventListener('click', () => { selectedStopIndex = i; s_renderNavList(); s_renderStopDetail(); });
    return row;
  };
  anytime.forEach(e => el.appendChild(makeRow(e)));
  if(anytime.length && regular.length) { const hr = document.createElement('hr'); hr.className = 'stops-anytime-divider'; el.appendChild(hr); }
  regular.forEach(e => el.appendChild(makeRow(e)));
}

  copyBtn.addEventListener('click', () => { copiedStop = JSON.parse(JSON.stringify(stop)); });

  if(stop.playerReply && stop.playerReply.anytime) renderAnytimeEditorInto(body, stop);
  else renderStopEditorInto(body, stop);
  detailEl.appendChild(body);

  // Name editing
  nameEl.addEventListener('keydown', e => { if(e.key === 'Enter') { e.preventDefault(); nameEl.blur(); } });
  nameEl.addEventListener('input', () => { stop.id = String(nameEl.textContent || ''); });
  nameEl.addEventListener('blur', () => {
    const next = String(nameEl.textContent || '').replace(/\s+/g, ' ').trim();
    stop.id = next || stop.id || ('NEW-' + (i + 1));
    nameEl.textContent = stop.id;
    renderWarnings();
    s_renderNavList();
  });
}

function s_renderAll(){renderHeader();renderBuilderOptions();s_renderNavList();s_renderStopDetail();renderAnytimeSection();renderWarnings();renderDirtyBadge();renderCollapseState();}

function toDoc(){const doc={_comment:state._comment||DEFAULT_DOC._comment,header:Object.assign({},DEFAULT_DOC.header,state.header||{}),stops:state.stops.map((s,i)=>{const n=ensureStop(s,i);return{id:n.id,messages:n.messages,playerReply:n.playerReply};})};if(Array.isArray(state.variables)&&state.variables.length)doc.variables=deepClone(state.variables);if(Array.isArray(state.routes)&&state.routes.length)doc.routes=deepClone(state.routes);doc.header.pageTitle=doc.header.title||'';return doc;}
function docsEqual(a,b){return JSON.stringify(a)===JSON.stringify(b);}
function isDirty(){if(!loadedStopsSnapshot)return false;return!docsEqual(toDoc(),loadedStopsSnapshot);}
function markDirty(){renderDirtyBadge();}
function renderDirtyBadge(){const badge=document.getElementById('s-dirtyBadge');if(!badge)return;badge.style.visibility=isDirty()?'visible':'hidden';}

let undoDeleteTimer=null,deletedStopUndo=null;
function showUndoToast(stopObj,index){deletedStopUndo={stop:stopObj,index};if(undoDeleteTimer)clearTimeout(undoDeleteTimer);const toast=document.getElementById('s-undoToast');if(toast)toast.style.display='flex';undoDeleteTimer=setTimeout(dismissUndoToast,5000);}
function dismissUndoToast(){if(undoDeleteTimer){clearTimeout(undoDeleteTimer);undoDeleteTimer=null;}deletedStopUndo=null;const toast=document.getElementById('s-undoToast');if(toast)toast.style.display='none';}

document.getElementById('s-saveBtn').addEventListener('click',saveAll);
const s_popup = document.getElementById('s-stopTypePopup');
document.getElementById('s-addStopBtn').addEventListener('click', e => { e.stopPropagation(); s_popup.classList.toggle('open'); });
document.addEventListener('click', () => s_popup.classList.remove('open'));
document.getElementById('s-addRegularBtn').addEventListener('click', () => { const stop=createEmptyStop(); state.stops.push(stop); selectedStopIndex=state.stops.length-1; s_renderAll(); });
document.getElementById('s-addAnytimeBtn').addEventListener('click',()=>{const stop=createEmptyStop();stop.id='ANYTIME-'+nextStopNumber();stop.playerReply={type:'text',answers:[],correct:[{bubbleId:createBubbleId(),html:''}],incorrect:[],anytime:true};stop.messages=[];state.stops.push(stop);selectedStopIndex=state.stops.length-1;markDirty();s_renderAll();});
document.getElementById('s-undoDeleteBtn').addEventListener('click',()=>{if(!deletedStopUndo)return;const{stop,index}=deletedStopUndo;state.stops.splice(index,0,stop);selectedStopIndex=index;dismissUndoToast();s_renderAll();});
document.getElementById('s-mobilePreviewBtn').addEventListener('click',()=>{try{localStorage.setItem('nola360_preview_stops',JSON.stringify(toDoc()));}catch(e){}window.open('../index.html?preview','mobile_preview','width=390,height=844,resizable=yes,scrollbars=yes');});
document.addEventListener('input',renderDirtyBadge);
document.addEventListener('change',renderDirtyBadge);
window.addEventListener('beforeunload',e=>{if(isDirty()){e.preventDefault();e.returnValue='';}});

// ══════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════
async function init(){
  try{
    const[gRes,sRes]=await Promise.all([fetch(API+'/games'),fetch(API+'/stops')]);
    const gData=await gRes.json();
    games=Array.isArray(gData)?gData:(gData.games||[]);
    games.forEach(g=>{if(!Array.isArray(g.stops))g.stops=[];});

    const sData=await sRes.json();
    stopsList=Array.isArray(sData)?sData:(sData.stops||[]);
    stopMap={};stopsList.forEach(s=>{if(s&&s.id)stopMap[s.id]=s;});

    // Select most recent active game
    const active=games.map((g,i)=>({g,i})).filter(({g})=>!g.archived);
    if(active.length){
      let ri=active[active.length-1].i,rt=0;
      active.forEach(({g,i})=>{const t=g.createdAt?new Date(g.createdAt).getTime():0;if(t>rt){rt=t;ri=i;}});
      g_setEditMode(ri);
    } else { g_renderList(); }

    // Load stops
    const sState=(sData&&Array.isArray(sData.stops))?ensureDoc(deepClone(sData)):defaultState();
    state=sState;loadedStopsSnapshot=deepClone(toDoc());expandedStops=new Set();selectedStopIndex=-1;
    s_renderAll();
  }catch(e){
    document.getElementById('g-gameList').innerHTML='<div class="empty-list" style="color:var(--err)">Could not load — is server.js running?</div>';
  }
}
init();

</script>
