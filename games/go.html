<!DOCTYPE html>
<!-- Redirect shim: old share links used go.html?id=X — forward them to index.html?id=X -->
<html><head><meta charset="UTF-8">
<script>
  const id = new URLSearchParams(location.search).get('id');
  location.replace(id ? 'index.html?id=' + encodeURIComponent(id) : 'index.html');
</script>
</head><body></body></html>
