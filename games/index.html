<!DOCTYPE html>
<!--
  File: index.html
  Purpose: Landing page + game shell for The Game Bureau.

  Flow:
    1. Loaded with ?id=GAME_ID or ?game=GAME_ID  →  shows landing page
    2. Player taps GO  →  landing hides, game shell appears, engine.js loads
       The URL is rewritten to ?game=GAME_ID so engine.js can read it.
-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#111111">
  <title>The Game Bureau</title>
  <link id="favicon" rel="icon" href="favicon.ico" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="index.css">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { min-height: 100dvh; }

    body {
      background: #111;
      color: #fff;
      font-family: 'DM Sans', -apple-system, sans-serif;
    }

    /* ── Landing page ── */
    #landing {
      width: 100%;
      max-width: 520px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
    }

    /* Hero thumbnail — full width at top */
    .hero-img {
      width: 100%;
      aspect-ratio: 16/9;
      object-fit: cover;
      display: block;
    }
    .hero-img.hidden { display: none; }

    /* Game identity block */
    .identity {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 24px 24px 0;
    }

    .logo-img {
      width: 64px;
      height: 64px;
      border-radius: 12px;
      object-fit: cover;
      flex-shrink: 0;
    }
    .logo-img.hidden { display: none; }

    .title-block {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .game-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2.4rem, 11vw, 4rem);
      letter-spacing: 0.04em;
      line-height: 1;
    }

    .game-subtitle {
      font-size: .82rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,.4);
    }

    /* Tags */
    .tag-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 16px 24px 0;
    }
    .tag-list:empty { display: none; }

    .tag {
      font-size: .7rem;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: rgba(255,255,255,.5);
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 999px;
      padding: 3px 10px;
    }

    /* Description */
    .description {
      font-size: clamp(.93rem, 3vw, 1rem);
      line-height: 1.7;
      color: rgba(255,255,255,.72);
      padding: 20px 24px 0;
      white-space: pre-wrap;
    }
    .description:empty { display: none; }

    /* Price */
    .price-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 16px 24px 0;
    }
    .price-row.hidden { display: none; }
    .price-label {
      font-size: .68rem;
      font-weight: 600;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: rgba(255,255,255,.32);
    }
    .price-value {
      font-size: .92rem;
      font-weight: 600;
      color: rgba(255,255,255,.65);
    }

    /* GO button */
    .go-wrap {
      padding: 28px 24px 0;
    }

    .go-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fff;
      color: #111;
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2rem, 7vw, 2.6rem);
      letter-spacing: 0.14em;
      height: 72px;
      width: 100%;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      touch-action: manipulation;
      transition: background 0.1s, transform 0.1s;
    }
    .go-btn:active { background: #d1d5db; transform: scale(0.97); }

    /* QR / share section */
    .share-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      padding: 40px 24px 56px;
      border-top: 1px solid rgba(255,255,255,.08);
    }

    .share-hint {
      font-size: .72rem;
      font-weight: 600;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: rgba(255,255,255,.3);
    }

    .qr-wrap {
      background: #fff;
      padding: 12px;
      border-radius: 8px;
    }
    .qr-wrap img {
      display: block;
      width: min(180px, 52vw);
      height: min(180px, 52vw);
      image-rendering: pixelated;
    }

    .share-url {
      font-size: .64rem;
      color: rgba(255,255,255,.25);
      word-break: break-all;
      text-align: center;
      max-width: 320px;
    }

    /* Error */
    .error {
      display: none;
      color: #f87171;
      font-size: 1rem;
      max-width: 300px;
      line-height: 1.6;
      text-align: center;
      margin: auto;
      padding: 48px 32px;
    }
  </style>
</head>
<body>

  <!-- ── LANDING VIEW ── -->
  <div id="landing" style="display:none">

    <img class="hero-img hidden" id="heroImg" alt="">

    <div class="identity">
      <img class="logo-img hidden" id="logoImg" alt="">
      <div class="title-block">
        <div class="game-title" id="gameTitle"></div>
        <div class="game-subtitle" id="gameSubtitle"></div>
      </div>
    </div>

    <div class="tag-list" id="tagList"></div>

    <p class="description" id="description"></p>

    <div class="price-row hidden" id="priceRow">
      <span class="price-label">Price</span>
      <span class="price-value" id="priceValue"></span>
    </div>

    <div class="go-wrap">
      <button class="go-btn" id="goBtn">GO</button>
    </div>

    <div class="share-section">
      <div class="share-hint">Scan to play on another device</div>
      <div class="qr-wrap"><img id="qrImg" alt="QR Code"></div>
      <div class="share-url" id="shareUrl"></div>
    </div>

  </div>

  <div class="error" id="error"></div>

  <!-- ── GAME SHELL VIEW (hidden until GO is tapped) ── -->
  <div id="game-shell" style="display:none; width:100%; flex-direction:column;">
    <div class="icon-preload" aria-hidden="true"></div>
    <div class="contact-header">
      <div class="avatar"><img id="header-logo" src="logo.png" alt="Game Logo"></div>
      <div class="contact-name" id="header-title"></div>
      <div class="contact-name" id="header-subtitle"></div>
      <div class="contact-status"><div class="online-dot"></div><span id="header-status">online</span></div>
      <button class="restart-btn" id="restartBtn" type="button">↺ RESTART</button>
    </div>
    <div class="chat" id="chat"></div>
    <div class="input-area" id="input-area"></div>
  </div>

  <script>
    const params = new URLSearchParams(location.search);
    const gameId = params.get('id') || params.get('game');

    function showError(msg) {
      document.getElementById('error').textContent = msg;
      document.getElementById('error').style.display = '';
    }

    let resolvedId = gameId;
    function launchGame() {
      document.getElementById('landing').style.display = 'none';
      document.getElementById('game-shell').style.display = 'flex';
      history.replaceState(null, '', '?game=' + encodeURIComponent(resolvedId));
      const s = document.createElement('script');
      s.src = 'util/engine.js';
      document.body.appendChild(s);
    }

    function mostRecent(games) {
      const active = games.filter(g => !g.archived);
      if (!active.length) return null;
      return active.reduce((best, g) => {
        const t = g => Math.max(
          g.createdAt ? new Date(g.createdAt).getTime() : 0,
          g.updatedAt ? new Date(g.updatedAt).getTime() : 0
        );
        return t(g) > t(best) ? g : best;
      });
    }

    fetch('data/games.json')
      .then(r => r.json())
      .then(data => {
        const games = Array.isArray(data) ? data : (data.games || []);
        let game = gameId ? games.find(g => g.id === gameId) : null;
        if (!game) game = mostRecent(games);
        if (!game) { showError('No games available.'); return; }

        resolvedId = game.id;

        document.title = game.name || gameId;
        if (game.favicon) document.getElementById('favicon').href = game.favicon;

        // Hero image
        if (game.thumbnail) {
          const img = document.getElementById('heroImg');
          img.src = game.thumbnail;
          img.classList.remove('hidden');
        }

        // Logo
        if (game.logo) {
          const logo = document.getElementById('logoImg');
          logo.src = game.logo;
          logo.classList.remove('hidden');
        }

        document.getElementById('gameTitle').textContent = game.name || gameId;
        if (game.subtitle) document.getElementById('gameSubtitle').textContent = 'Guide: ' + game.subtitle;

        // Tags
        const tags = (game.tag || '').split(/[,;]+/).map(t => t.trim()).filter(Boolean);
        const tagList = document.getElementById('tagList');
        tags.forEach(t => {
          const span = document.createElement('span');
          span.className = 'tag';
          span.textContent = t;
          tagList.appendChild(span);
        });

        // Description
        const desc = (game.description || '').trim();
        if (desc) document.getElementById('description').textContent = desc;

        // Price
        if (game.price) {
          document.getElementById('priceValue').textContent = game.price;
          document.getElementById('priceRow').classList.remove('hidden');
        }

        document.getElementById('goBtn').addEventListener('click', launchGame);

        // QR code
        const shareUrl = 'https://the-game-bureau.github.io/the-game-bureau/games/index.html?id=' + encodeURIComponent(game.id);
        const cssSize  = Math.min(180, Math.round(window.innerWidth * 0.52));
        const px       = cssSize * Math.min(window.devicePixelRatio || 2, 3);
        document.getElementById('qrImg').src = 'https://api.qrserver.com/v1/create-qr-code/?size=' + px + 'x' + px + '&data=' + encodeURIComponent(shareUrl);
        document.getElementById('shareUrl').textContent = shareUrl;

        document.getElementById('landing').style.display = '';
      })
      .catch(() => showError('Could not load game data.'));
  </script>

</body>
</html>
