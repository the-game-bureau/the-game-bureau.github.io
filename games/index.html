<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0c0c0c">
  <title>The Game Bureau</title>
  <meta id="og-title"       property="og:title"       content="The Game Bureau">
  <meta id="og-description" property="og:description" content="">
  <meta id="og-image"       property="og:image"       content="">
  <meta id="og-url"         property="og:url"         content="">
  <meta                     property="og:type"        content="website">
  <meta name="twitter:card"         content="summary_large_image">
  <meta id="tw-title"       name="twitter:title"       content="The Game Bureau">
  <meta id="tw-description" name="twitter:description" content="">
  <meta id="tw-image"       name="twitter:image"       content="">
  <link id="favicon" rel="icon" href="favicon.ico" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="index.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html, body { background: #0c0c0c; }

    body {
      color: #fff;
      font-family: 'DM Sans', -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    #landing {
      display: none;
      max-width: 430px;
      margin: 0 auto;
      padding: max(env(safe-area-inset-top), 52px) 0 72px;
    }

    /* ── Logo ── */
    .logo-wrap {
      display: flex;
      justify-content: center;
      padding: 0 32px;
    }

    #gameLogo {
      width: 220px;
      height: 220px;
      border-radius: 40px;
      object-fit: contain;
      display: none;
      box-shadow: 0 8px 32px rgba(0,0,0,.6);
    }
    #gameLogo.show { display: block; }

    /* ── Title block ── */
    .title-wrap {
      padding: 20px 28px 0;
      text-align: center;
    }

    #gameTitle {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3.4rem, 16vw, 5.2rem);
      letter-spacing: 0.04em;
      line-height: 1;
      color: #fff;
    }

    #gameGuide {
      margin-top: 8px;
      font-size: .8rem;
      font-weight: 600;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: rgba(255,255,255,.5);
    }

    /* ── Tags ── */
    #tags {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 6px;
      padding: 18px 28px 0;
    }
    #tags:empty { display: none; }

    .tag {
      font-size: .7rem;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: rgba(255,255,255,.55);
      border: 1px solid rgba(255,255,255,.2);
      border-radius: 999px;
      padding: 5px 13px;
    }

    /* ── Divider ── */
    .divider {
      margin: 28px 28px 0;
      border: none;
      border-top: 1px solid rgba(255,255,255,.1);
    }

    /* ── Description ── */
    #desc {
      padding: 24px 28px 0;
      font-size: 1rem;
      font-weight: 400;
      line-height: 1.8;
      color: rgba(255,255,255,.72);
    }
    #desc p { margin-bottom: .8em; }
    #desc p:last-child { margin-bottom: 0; }
    #desc a { color: rgba(255,255,255,.85); }
    #desc b, #desc strong { font-weight: 700; color: #fff; }
    #desc:empty { display: none; }

    /* ── Price ── */
    #price {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 10px;
    }
    #price.show { display: flex; }

    .price-label {
      font-size: .68rem;
      font-weight: 600;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: rgba(255,255,255,.38);
    }
    .price-val {
      font-size: .95rem;
      font-weight: 600;
      color: rgba(255,255,255,.75);
    }

    /* ── GO button ── */
    .go-wrap {
      padding: 32px 28px 0;
    }

    #goBtn {
      width: 100%;
      height: 68px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fff;
      color: #0c0c0c;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.4rem;
      letter-spacing: .2em;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      touch-action: manipulation;
      user-select: none;
      transition: opacity .12s, transform .12s;
    }
    #goBtn:active { opacity: .8; transform: scale(.975); }

    /* ── Share section ── */
    .share-section {
      margin: 44px 28px 0;
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 14px;
      overflow: hidden;
    }

    .share-heading {
      font-size: .68rem;
      font-weight: 700;
      letter-spacing: .16em;
      text-transform: uppercase;
      color: rgba(255,255,255,.45);
      padding: 18px 20px 14px;
      border-bottom: 1px solid rgba(255,255,255,.1);
    }

    /* QR option */
    .share-qr {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 24px 20px;
      border-bottom: 1px solid rgba(255,255,255,.1);
    }

    .share-qr-label {
      font-size: .8rem;
      font-weight: 600;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: rgba(255,255,255,.6);
      text-align: center;
    }

    .qr-box {
      background: #fff;
      padding: 10px;
      border-radius: 10px;
    }
    .qr-box img {
      display: block;
      width: 180px;
      height: 180px;
      image-rendering: pixelated;
    }

    /* OR divider */
    .share-or {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 20px;
      border-bottom: 1px solid rgba(255,255,255,.1);
    }
    .share-or::before, .share-or::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,.1);
    }
    .share-or span {
      font-size: .68rem;
      font-weight: 700;
      letter-spacing: .14em;
      color: rgba(255,255,255,.38);
      padding: 14px 0;
    }

    /* Text option */
    .share-text {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 20px;
    }

    .share-text-info {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .share-text-title {
      font-size: .95rem;
      font-weight: 600;
      color: #fff;
    }

    .share-text-sub {
      font-size: .78rem;
      color: rgba(255,255,255,.5);
    }

    .share-text-btn {
      flex-shrink: 0;
      background: rgba(255,255,255,.1);
      border: 1px solid rgba(255,255,255,.2);
      border-radius: 8px;
      color: #fff;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.2rem;
      letter-spacing: .1em;
      padding: 10px 20px;
      cursor: pointer;
      touch-action: manipulation;
      transition: background .12s;
    }
    .share-text-btn:active { background: rgba(255,255,255,.2); }

    /* ── Error ── */
    #error {
      display: none;
      max-width: 300px;
      margin: 80px auto;
      padding: 0 32px;
      text-align: center;
      color: #f87171;
      font-size: .9rem;
      line-height: 1.6;
    }
  </style>
</head>
<body>

  <div id="landing">
    <div class="logo-wrap">
      <img id="gameLogo" alt="">
    </div>

    <div class="title-wrap">
      <div id="gameTitle"></div>
      <div id="gameGuide"></div>
      <div id="price">
        <span class="price-label">Price</span>
        <span class="price-val" id="priceVal"></span>
      </div>
    </div>

    <div id="tags"></div>

    <hr class="divider">

    <p id="desc"></p>

    <div class="go-wrap">
      <button id="goBtn">GO</button>
    </div>

    <div class="share-section">
      <div class="share-heading">Invite Players</div>

      <div class="share-qr">
        <div class="share-qr-label">Hold up your screen &amp; let players scan</div>
        <div class="qr-box"><img id="qrImg" alt="QR Code"></div>
      </div>

      <div class="share-or"><span>OR</span></div>

      <div class="share-text">
        <div class="share-text-info">
          <div class="share-text-title">Send via Text</div>
          <div class="share-text-sub">Opens a new message with the link</div>
        </div>
        <button class="share-text-btn" id="copyBtn">SEND</button>
      </div>
    </div>
  </div>

  <div id="error"></div>

  <!-- Game shell — revealed after GO is tapped -->
  <div id="game-shell" style="display:none; width:100%; flex-direction:column;">
    <div class="icon-preload" aria-hidden="true"></div>
    <div class="contact-header">
      <div class="avatar"><img id="header-logo" src="logo.png" alt=""></div>
      <div class="contact-name" id="header-title"></div>
      <div class="contact-name" id="header-subtitle"></div>
      <div class="contact-status"><div class="online-dot"></div><span id="header-status">online</span></div>
      <button class="restart-btn" id="restartBtn" type="button">↺ RESTART</button>
    </div>
    <div class="chat" id="chat"></div>
    <div class="input-area" id="input-area"></div>
  </div>

  <script>
    const DEFAULT_GAME = 'oswald-s-diary';
    const params  = new URLSearchParams(location.search);
    const gameId  = params.get('id') || params.get('game') || DEFAULT_GAME;
    let resolvedId = gameId;

    function showError(msg) {
      const el = document.getElementById('error');
      el.textContent = msg;
      el.style.display = '';
    }

    function launchGame() {
      document.getElementById('landing').style.display    = 'none';
      document.getElementById('game-shell').style.display = 'flex';
      document.body.classList.add('game-active');
      history.replaceState(null, '', '?game=' + encodeURIComponent(resolvedId));
      const s = document.createElement('script');
      s.src = 'util/engine.js';
      document.body.appendChild(s);
    }

    function mostRecent(games) {
      const active = games.filter(g => !g.archived);
      if (!active.length) return null;
      return active.reduce((a, b) => {
        const t = g => Math.max(
          g.createdAt ? new Date(g.createdAt).getTime() : 0,
          g.updatedAt ? new Date(g.updatedAt).getTime() : 0
        );
        return t(b) > t(a) ? b : a;
      });
    }

    fetch('data/games.json')
      .then(r => r.json())
      .then(data => {
        const games = Array.isArray(data) ? data : (data.games || []);
        const game  = games.find(g => g.id === gameId) || mostRecent(games);
        if (!game) { showError('No games available.'); return; }

        resolvedId = game.id;

        const prodUrl   = 'https://the-game-bureau.github.io/the-game-bureau/games/index.html?id=' + encodeURIComponent(game.id);
        const shareUrl  = location.hostname === 'localhost' || location.hostname === '127.0.0.1'
          ? location.origin + location.pathname + '?id=' + encodeURIComponent(game.id)
          : prodUrl;
        const fullDesc  = (game.description || '').trim();
        const firstLine = fullDesc.split('\n')[0].trim();

        document.title = game.name || game.id;
        if (game.favicon) document.getElementById('favicon').href = game.favicon;

        document.getElementById('og-title').content       = game.name || game.id;
        document.getElementById('og-description').content = firstLine;
        document.getElementById('og-url').content         = prodUrl;
        document.getElementById('tw-title').content       = game.name || game.id;
        document.getElementById('tw-description').content = firstLine;
        if (game.thumbnail) {
          document.getElementById('og-image').content = game.thumbnail;
          document.getElementById('tw-image').content = game.thumbnail;
        }

        if (game.logo) {
          const logo = document.getElementById('gameLogo');
          logo.src = game.logo;
          logo.classList.add('show');
        }

        document.getElementById('gameTitle').textContent = game.name || game.id;
        if (game.subtitle) document.getElementById('gameGuide').textContent = 'Guide: ' + game.subtitle;

        (game.tag || '').split(/[,;]+/).map(t => t.trim()).filter(Boolean).forEach(t => {
          const s = document.createElement('span');
          s.className = 'tag';
          s.textContent = t;
          document.getElementById('tags').appendChild(s);
        });

        if (fullDesc) document.getElementById('desc').innerHTML = fullDesc;

        if (game.price) {
          document.getElementById('priceVal').textContent = game.price;
          document.getElementById('price').classList.add('show');
        }

        document.getElementById('goBtn').addEventListener('click', launchGame);

        const px = Math.round(180 * Math.min(window.devicePixelRatio || 2, 3));
        document.getElementById('qrImg').src = 'https://api.qrserver.com/v1/create-qr-code/?size=' + px + 'x' + px + '&data=' + encodeURIComponent(shareUrl);

        document.getElementById('copyBtn').addEventListener('click', () => {
          window.location.href = 'sms:?body=' + encodeURIComponent(shareUrl);
        });

        document.getElementById('landing').style.display = 'block';
      })
      .catch(() => showError('Could not load game data.'));
  </script>

</body>
</html>
