<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#ffffff">
  <title>Loading…</title>
  <link id="favicon" rel="icon" href="favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="index.css">
  <link rel="stylesheet" href="games.css">
</head>
<body class="game-active">
  <div class="icon-preload" aria-hidden="true"></div>

  <div class="contact-header compact">
    <img class="game-thumbnail" id="gameThumbnail" alt="">
    <div class="avatar"><img id="header-logo" src="games/logo.png" alt=""></div>
    <div class="header-info">
      <div class="contact-name" id="header-title"></div>
      <div class="contact-name" id="header-subtitle"></div>
      <div class="contact-status">
        <div class="online-dot"></div>
        <span id="header-status">online</span>
      </div>
    </div>
    <button class="restart-btn" id="restartBtn" type="button">↺ RESTART</button>
  </div>

  <div class="chat" id="chat"></div>
  <div class="input-area" id="input-area"></div>

  <script>
    const TYPING_DELAY = 700;
    const BUBBLE_PAUSE = 180;

    const params  = new URLSearchParams(location.search);
    const gameId  = params.get('id') || params.get('game');
    const STORE_KEY = 'tgb_' + (gameId || 'default');

    const chatEl      = document.getElementById('chat');
    const inputAreaEl = document.getElementById('input-area');

    let gameStops        = [];
    let currentStopIndex = 0;

    // ── Persistence ──────────────────────────────────────────────
    function saveStep(i) {
      try { localStorage.setItem(STORE_KEY + '_step', String(i)); } catch(e) {}
    }
    function loadStep() {
      try { return parseInt(localStorage.getItem(STORE_KEY + '_step') || '0', 10) || 0; } catch(e) { return 0; }
    }
    function clearSave() {
      try { localStorage.removeItem(STORE_KEY + '_step'); } catch(e) {}
    }

    // ── Helpers ───────────────────────────────────────────────────
    function norm(s) {
      return String(s || '').toLowerCase().replace(/[$,.\s]/g, '');
    }
    function pick(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }
    function scrollBottom() {
      chatEl.scrollTop = chatEl.scrollHeight;
    }

    // ── DOM builders ──────────────────────────────────────────────
    function addBubble(html, fromGame = true, extraClass = '') {
      const wrap = document.createElement('div');
      wrap.className = 'msg ' + (fromGame ? 'from-game' : 'from-player') + (extraClass ? ' ' + extraClass : '');
      const bubble = document.createElement('div');
      bubble.className = 'msg-bubble';
      bubble.innerHTML = String(html || '').replace(/\n/g, '<br>');
      if (bubble.querySelector('img')) wrap.classList.add('has-img');
      wrap.appendChild(bubble);
      chatEl.appendChild(wrap);
      scrollBottom();
      return wrap;
    }

    function showTypingIndicator() {
      const el = document.createElement('div');
      el.className = 'typing';
      el.innerHTML = '<span></span><span></span><span></span>';
      chatEl.appendChild(el);
      scrollBottom();
      return el;
    }

    // ── Message sequencing ────────────────────────────────────────
    function showMessages(messages, onDone) {
      let i = 0;
      function next() {
        if (i >= messages.length) { onDone && onDone(); return; }
        const msg = messages[i++];
        const html = msg.html || msg.text || '';
        if (!html) { next(); return; }
        const indicator = showTypingIndicator();
        setTimeout(() => {
          indicator.remove();
          addBubble(html);
          setTimeout(next, BUBBLE_PAUSE);
        }, TYPING_DELAY);
      }
      next();
    }

    // ── Input area ────────────────────────────────────────────────
    function clearInput() { inputAreaEl.innerHTML = ''; }

    function showTextInput(stop) {
      clearInput();
      const reply = stop.playerReply || {};
      const row   = document.createElement('div');
      row.className = 'answer-row';

      const input = document.createElement('input');
      input.type        = 'text';
      input.className   = 'answer-input';
      input.placeholder = reply.placeholder || 'Type here…';
      input.autocomplete = 'off';

      const btn = document.createElement('button');
      btn.className = 'submit-btn';
      btn.setAttribute('aria-label', 'Send');
      btn.innerHTML = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>`;

      row.appendChild(input);
      row.appendChild(btn);
      inputAreaEl.appendChild(row);
      setTimeout(() => input.focus(), 80);

      function submit() {
        const val = input.value.trim();
        if (!val) return;

        const answers  = (reply.answers || []).map(a => String(a || '').trim()).filter(Boolean);
        const isAny    = reply.type === 'any' || answers.length === 0;
        const correct  = isAny || answers.some(a => norm(a) === norm(val));

        clearInput();
        addBubble(val, false);

        const correctReplies   = Array.isArray(reply.correct)   && reply.correct.length   ? reply.correct   : [];
        const incorrectReplies = Array.isArray(reply.incorrect)  && reply.incorrect.length ? reply.incorrect : [];

        if (!correct) {
          const after = () => {
            showTextInput(stop);
            const inp = inputAreaEl.querySelector('.answer-input');
            if (inp) {
              inp.classList.add('wrong');
              setTimeout(() => inp.classList.remove('wrong'), 400);
              setTimeout(() => inp.focus(), 80);
            }
          };
          if (incorrectReplies.length) {
            showMessages([{ html: pick(incorrectReplies) }], after);
          } else {
            after();
          }
          return;
        }

        const advance = () => { saveStep(currentStopIndex + 1); advanceStop(); };
        if (correctReplies.length) {
          showMessages([{ html: pick(correctReplies) }], advance);
        } else {
          advance();
        }
      }

      btn.addEventListener('click', submit);
      input.addEventListener('keydown', e => { if (e.key === 'Enter') submit(); });
    }

    // ── Stop flow ─────────────────────────────────────────────────
    function playStop(index) {
      currentStopIndex = index;
      const stop    = gameStops[index];
      const reply   = stop.playerReply || {};
      const messages = (Array.isArray(stop.messages) ? stop.messages : [])
        .filter(m => (m.html || m.text || '').trim());

      const needsInput = reply.type === 'any'
        || (Array.isArray(reply.answers) && reply.answers.length > 0);

      showMessages(messages, () => {
        if (needsInput) {
          showTextInput(stop);
        } else {
          setTimeout(() => { saveStep(index + 1); advanceStop(); }, 400);
        }
      });
    }

    function advanceStop() {
      const next = currentStopIndex + 1;
      if (next >= gameStops.length) { clearInput(); return; }
      playStop(next);
    }

    // ── Restart ───────────────────────────────────────────────────
    document.getElementById('restartBtn').addEventListener('click', () => {
      clearSave();
      chatEl.innerHTML = '';
      clearInput();
      playStop(0);
    });

    // ── Boot ──────────────────────────────────────────────────────
    Promise.all([
      fetch('games/data/games.json').then(r => r.json()),
      fetch('games/data/stops.json').then(r => r.json())
    ]).then(([gamesData, stopsData]) => {
      const games   = Array.isArray(gamesData) ? gamesData : (gamesData.games || []);
      const game    = games.find(g => g.id === gameId) || games.find(g => !g.archived);

      if (game) {
        document.title = game.name || game.id;
        if (game.favicon) document.getElementById('favicon').href = game.favicon;
        document.getElementById('header-title').textContent    = game.name || game.id;
        document.getElementById('header-subtitle').textContent = game.subtitle || '';
        if (game.thumbnail) {
          document.getElementById('gameThumbnail').src = game.thumbnail;
          document.getElementById('gameThumbnail').classList.add('show');
          document.getElementById('header-logo').closest('.avatar').style.display = 'none';
        } else if (game.logo) {
          document.getElementById('header-logo').src = game.logo;
        }
      }

      const allStops = Array.isArray(stopsData) ? stopsData : (stopsData.stops || []);
      const stopMap  = Object.fromEntries(allStops.map(s => [s.id, s]));
      const routeIds = Array.isArray(game && game.stops) ? game.stops : [];
      gameStops      = routeIds.map(sid => stopMap[sid]).filter(Boolean);

      if (!gameStops.length) gameStops = allStops.filter(s => !s.archived);
      if (!gameStops.length) { chatEl.textContent = 'No stops found.'; return; }

      const savedStep = Math.min(loadStep(), gameStops.length - 1);
      if (savedStep > 0) {
        // Replay prior stops silently then start at saved step
        for (let i = 0; i < savedStep; i++) {
          const stop = gameStops[i];
          (stop.messages || []).filter(m => (m.html || m.text || '').trim()).forEach(m => {
            addBubble(m.html || m.text || '');
          });
        }
      }
      playStop(savedStep);
    }).catch(err => {
      console.error(err);
      chatEl.textContent = 'Could not load game data.';
      console.error(err);
    });
  </script>
</body>
</html>
