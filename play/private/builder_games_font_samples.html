<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Builder Font Samples</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Handlee&family=IBM+Plex+Mono:wght@400;500&family=Shadows+Into+Light&display=swap" rel="stylesheet">
  <style>
    :root{
      --bic-blue:#2f5cc2;
      --bic-blue-rgb:47, 92, 194;
    }

    *{
      box-sizing:border-box;
    }

    body{
      margin:0;
      color:var(--bic-blue);
      font-family:"IBM Plex Mono", monospace;
      background:
        linear-gradient(rgba(var(--bic-blue-rgb), .22) 1px, transparent 1px),
        linear-gradient(90deg, rgba(var(--bic-blue-rgb), .22) 1px, transparent 1px),
        linear-gradient(rgba(var(--bic-blue-rgb), .34) 1px, transparent 1px),
        linear-gradient(90deg, rgba(var(--bic-blue-rgb), .34) 1px, transparent 1px),
        linear-gradient(180deg, #ffffff 0%, rgba(var(--bic-blue-rgb), .08) 100%);
      background-size:24px 24px, 24px 24px, 120px 120px, 120px 120px, 100% 100%;
    }

    main{
      width:min(1100px, 100%);
      margin:0 auto;
      padding:28px;
    }

    h1{
      margin:0 0 18px;
      font-size:1rem;
      font-weight:500;
      letter-spacing:.08em;
      text-transform:uppercase;
    }

    .samples{
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(320px, 1fr));
      gap:20px;
    }

    .sample{
      min-width:0;
      padding:26px 28px 30px;
      border:1px solid rgba(var(--bic-blue-rgb), .18);
      border-radius:20px;
      background:rgba(255,255,255,.72);
      box-shadow:0 14px 28px rgba(var(--bic-blue-rgb), .12);
      backdrop-filter:blur(6px);
    }

    .sample-label{
      margin:0 0 18px;
      font-size:.82rem;
      font-weight:500;
      letter-spacing:.08em;
      text-transform:uppercase;
      opacity:.72;
    }

    .sample-kicker{
      margin:0 0 2px;
      font-size:1.35rem;
      line-height:1;
    }

    .sample-title{
      margin:0 0 16px;
      font-size:4.35rem;
      line-height:.88;
    }

    .sample-actions{
      display:flex;
      flex-wrap:wrap;
      gap:18px;
      margin:0 0 22px;
      font-size:2.6rem;
      line-height:.88;
    }

    .sample-action{
      position:relative;
      display:inline-block;
      padding-bottom:8px;
    }

    .sample-action::after{
      content:"";
      position:absolute;
      left:0;
      right:0;
      bottom:2px;
      height:3px;
      border-radius:999px;
      background:currentColor;
      opacity:.45;
      transform:rotate(-1.4deg);
    }

    .sample-note{
      margin:0;
      font-size:1.9rem;
      line-height:1.06;
      max-width:18ch;
    }

    .sample--handlee .sample-kicker,
    .sample--handlee .sample-title,
    .sample--handlee .sample-actions,
    .sample--handlee .sample-note{
      font-family:"Handlee", cursive;
    }

    .sample--shadows .sample-kicker,
    .sample--shadows .sample-title,
    .sample--shadows .sample-actions,
    .sample--shadows .sample-note{
      font-family:"Shadows Into Light", cursive;
    }

    @media (max-width: 640px){
      main{
        padding:16px;
      }

      .sample{
        padding:20px 20px 24px;
      }

      .sample-title{
        font-size:3.35rem;
      }

      .sample-actions{
        font-size:2.1rem;
        gap:14px;
      }

      .sample-note{
        font-size:1.6rem;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>Builder Font Samples</h1>
    <section class="samples" aria-label="Handwriting font comparison">
      <article class="sample sample--handlee">
        <p class="sample-label">Handlee</p>
        <p class="sample-kicker">The Game Bureau presents:</p>
        <h2 class="sample-title">Game Builder</h2>
        <div class="sample-actions" aria-label="Action samples">
          <span class="sample-action">New</span>
          <span class="sample-action">Edit</span>
          <span class="sample-action">Duplicate</span>
        </div>
        <p class="sample-note">Are you sure you want to erase Phone Analogies?</p>
      </article>

      <article class="sample sample--shadows">
        <p class="sample-label">Shadows Into Light</p>
        <p class="sample-kicker">The Game Bureau presents:</p>
        <h2 class="sample-title">Game Builder</h2>
        <div class="sample-actions" aria-label="Action samples">
          <span class="sample-action">New</span>
          <span class="sample-action">Edit</span>
          <span class="sample-action">Duplicate</span>
        </div>
        <p class="sample-note">Are you sure you want to erase Phone Analogies?</p>
      </article>
    </section>
  </main>
</body>
</html>
