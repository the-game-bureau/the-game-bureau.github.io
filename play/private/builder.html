<!DOCTYPE html>
<!--
  TGB Builder project note for humans and AI:
  This builder writes JSON data that is read later by the game engine.
  builder.html writes play/data/games.json and play/data/stops.json.
-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TGB Game Builder</title>
  <link rel="icon" href="builder.ico" type="image/x-icon">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#f4f4f4; --ink:#111111; --panel:#eaf0f5; --muted:#5a5a5a;
      --ok:#1a6b3a; --warn:#9a5f00; --err:#c1121f;
      --sans:"JetBrains Mono",monospace; --mono:"JetBrains Mono",monospace;
      --bubble-gap:16px;
    }
    *{box-sizing:border-box;margin:0;padding:0;scrollbar-width:none;}
    *::-webkit-scrollbar{display:none;}
    html,body{height:100%;font-family:var(--sans);background:var(--bg);color:var(--ink);}
    body{display:flex;flex-direction:column;overflow:hidden;}

    /* ── Header ── */
    .page-header{background:var(--ink);color:var(--bg);padding:14px 24px;flex-shrink:0;display:flex;align-items:center;gap:16px;}
    .page-header .bureau{font-size:.62rem;font-weight:700;letter-spacing:.16em;text-transform:uppercase;opacity:.5;}
    .page-header .tool{font-size:1rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;}
    #globalSaveBtn{margin-left:auto;}

    /* ── Workspace ── */
    .workspace{flex:1;display:flex;flex-direction:column;padding:20px;overflow:hidden;gap:16px;}
    .top-panels{display:flex;flex-direction:row;gap:20px;flex:1;min-height:0;overflow:hidden;}
    .map-panel-wrap{flex-shrink:0;display:flex;gap:16px;min-height:0;align-items:stretch;}

    /* ── Panel ── */
    .panel{background:var(--panel);border:2px solid var(--ink);display:flex;flex-direction:column;min-width:0;}
    .panel-head{padding:0 16px;border-bottom:2px solid var(--ink);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;height:48px;}
    .panel-foot{padding:0 16px;border-top:2px solid var(--ink);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;height:48px;}
    .panel-title{font-size:.62rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);}
    .panel-body{padding:0;overflow-y:auto;}

    /* ── Games panel ── */
    .games-panel{flex:3;min-width:0;}

    /* ── Game row ── */
    .game-row{display:flex;align-items:center;gap:8px;padding:10px 16px;border-bottom:1px solid rgba(17,17,17,.1);font-size:.78rem;cursor:pointer;user-select:none;}
    .game-row:hover{background:rgba(100,160,240,.12);}
    .game-row.selected{background:var(--ink);color:var(--bg);}
    .game-row.selected .game-row-sub{color:rgba(255,255,255,.5);}
    .game-row.selected.archived .game-row-name,.game-row.selected.archived .game-row-sub{color:rgba(255,255,255,.5);}
    .game-row:last-child{border-bottom:none;}
    .game-row-thumb{width:38px;height:38px;flex-shrink:0;object-fit:cover;border:1px solid rgba(17,17,17,.16);background:#fff;display:block;}
    .game-row.selected .game-row-thumb{border-color:rgba(255,255,255,.28);}
    .game-row-info{flex:1;min-width:0;}
    .game-row-name{font-weight:600;line-height:1.35;white-space:normal;overflow-wrap:anywhere;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;line-clamp:2;-webkit-box-orient:vertical;}
    .game-row-sub{font-size:.64rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .game-row.archived .game-row-name,.game-row.archived .game-row-sub{color:#bbb;}
    .game-row.archived .game-row-thumb{opacity:.55;}

    /* ── Buttons ── */
    .btn{font-family:var(--sans);font-size:.62rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:4px 10px;border:1px solid var(--ink);background:#fff;color:var(--ink);cursor:pointer;border-radius:0;margin-top:0;width:auto;}
    .btn:hover{background:var(--panel);}
    .btn.primary{background:var(--ink);color:var(--bg);}
    .btn.primary:hover{background:#333;}
    .btn.active{background:var(--ink);color:var(--bg);}
    .btn.danger{border-color:var(--err);color:var(--err);}
    .btn.danger:hover{background:#fff0f0;}
    .btn:disabled{opacity:.4;cursor:default;}

    /* ── Details panel ── */
    .details-panel{flex:7;min-width:0;display:flex;}

    /* ── Stops panel ── */
    .stops-panel{flex:3;min-width:0;display:flex;}

    /* ── Stop details panel ── */
    .stop-details-panel{flex:7;min-width:0;display:flex;flex-direction:column;}

    /* ── Stop row ── */
    .stop-row{display:flex;align-items:center;gap:8px;padding:8px 16px;border-bottom:1px solid rgba(17,17,17,.1);font-size:.76rem;cursor:pointer;user-select:none;}
    .stop-row:hover{background:rgba(100,160,240,.12);}
    .stop-row:last-child{border-bottom:none;}
    .stop-row.drop-before{box-shadow:0 -2px 0 var(--ink);}
    .stop-row.drop-after{box-shadow:0 2px 0 var(--ink);}
    .stop-row.dragging{opacity:.4;}
    .stop-row-info{flex:1;min-width:0;}
    .stop-row-name{font-weight:600;line-height:1.35;white-space:normal;overflow-wrap:anywhere;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;line-clamp:2;-webkit-box-orient:vertical;}
    .stop-row-sub{font-size:.64rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .stop-row.archived .stop-row-name,.stop-row.archived .stop-row-sub{color:#bbb;}
    .stop-row.selected .stop-row-sub{color:rgba(255,255,255,.5);}
    .stop-row.selected.archived .stop-row-name,.stop-row.selected.archived .stop-row-sub{color:rgba(255,255,255,.5);}
    .stop-add-route{flex-shrink:0;width:22px;height:22px;border-radius:50%;border:1.5px solid var(--ink);background:none;color:var(--ink);font-size:1rem;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;opacity:.6;}
    .stop-add-route:hover{opacity:1;background:var(--ink);color:#fff;}
    .stop-row.selected .stop-add-route{border-color:#fff;color:#fff;opacity:1;}
    .stop-add-route.no-game{opacity:.2;cursor:default;}
    .reply-badge{font-size:.54rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#fff;padding:2px 5px;border-radius:3px;flex-shrink:0;}
    .rb-noreply{background:#9ca3af;} .rb-text{background:#1a73e8;} .rb-any{background:#f5a623;} .rb-choice{background:#9333ea;} .rb-anytime{background:#4ecf98;}

    /* ── Form fields ── */
    .field{padding:12px 16px;border-bottom:1px solid rgba(17,17,17,.1);}
    .field:last-child{border-bottom:none;}
    .field label{display:block;font-size:.58rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:5px;}
    .field input,.field textarea,.field select{width:100%;font-family:var(--sans);font-size:.8rem;padding:6px 8px;border:1px solid rgba(17,17,17,.3);background:#fff;color:var(--ink);outline:none;border-radius:0;}
    .field input:focus,.field textarea:focus{border-color:var(--ink);box-shadow:inset 0 0 0 1px var(--ink);}
    .field textarea{resize:vertical;line-height:1.4;}
    .field-hint{font-size:.62rem;color:var(--muted);margin-top:4px;letter-spacing:.02em;}
    /* ── Image picker ── */
    .img-picker-wrap{display:flex;flex-direction:column;gap:6px;}
    .img-picker-preview{max-height:60px;max-width:100%;border:1px solid rgba(17,17,17,.2);object-fit:contain;background:#fff;}
    .img-picker-row{display:flex;align-items:center;gap:6px;}
    .img-picker-row .img-pick-btn{flex-shrink:0;}
    .img-picker-or{font-size:.58rem;color:var(--muted);flex-shrink:0;text-transform:uppercase;letter-spacing:.08em;}
    .img-picker-row input[type="text"]{flex:1;font-family:var(--sans);font-size:.8rem;padding:6px 8px;border:1px solid rgba(17,17,17,.3);background:#fff;color:var(--ink);outline:none;border-radius:0;}
    .img-picker-row input[type="text"]:focus{border-color:var(--ink);box-shadow:inset 0 0 0 1px var(--ink);}

    /* ── Share ── */
    .share-row{display:flex;align-items:flex-start;gap:8px;margin-bottom:8px;}
    .share-url{font-size:.68rem;color:var(--muted);word-break:break-all;line-height:1.5;flex:1;}
    .share-btns{display:flex;gap:6px;}

    /* ── Status ── */

    /* ── Empty state ── */
    .empty{padding:24px 16px;font-size:.7rem;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;}

    /* ── Tag pills ── */
    .tag-picker{display:flex;flex-wrap:wrap;gap:4px;padding-top:6px;}
    .tag-pill{font-family:var(--sans);font-size:.58rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:2px 7px;border:1px solid rgba(17,17,17,.3);border-radius:999px;background:#fff;color:var(--muted);cursor:pointer;user-select:none;}
    .tag-pill:hover{border-color:var(--ink);color:var(--ink);}
    .tag-pill.on{background:var(--ink);color:var(--bg);border-color:var(--ink);}
    #g-tagNewInput{font-family:var(--sans);font-size:.58rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:2px 7px;border:1px dashed rgba(17,17,17,.3);border-radius:999px;background:#fff;color:var(--ink);outline:none;width:80px;}
    #g-tagNewInput:focus{border-color:var(--ink);border-style:solid;}
    .tag-add-btn{font-family:var(--sans);font-size:.62rem;font-weight:700;padding:2px 7px;border:1px solid var(--ink);border-radius:999px;background:#fff;color:var(--ink);cursor:pointer;}

    /* ── Map panel — full-width horizontal strip ── */
    .map-panel{flex:1 1 auto;min-width:0;display:flex;flex-direction:column;overflow:hidden;}
    .vars-panel{width:300px;min-width:260px;display:flex;flex-direction:column;}
    .r-head-tools{display:flex;align-items:center;gap:6px;}
    .r-scroll-btn{font-family:var(--sans);font-size:.72rem;font-weight:700;line-height:1;width:28px;height:28px;border:1px solid var(--ink);background:#fff;color:var(--ink);cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;}
    .r-scroll-btn:hover:not(:disabled){background:var(--ink);color:var(--bg);}
    .r-scroll-btn:disabled{opacity:.24;cursor:default;}
    .r-drop-zone{display:flex;flex-direction:row;align-items:center;overflow-x:auto;overflow-y:hidden;padding:18px 34px 22px 20px;min-height:190px;flex-shrink:0;position:relative;background:linear-gradient(180deg,rgba(255,255,255,.88),rgba(226,236,246,.78)),repeating-linear-gradient(90deg,rgba(15,23,42,.03) 0 1px,transparent 1px 36px);box-shadow:inset 0 1px 0 rgba(255,255,255,.72),inset 0 -1px 0 rgba(15,23,42,.05);scroll-behavior:smooth;}
    .r-drop-zone::before{content:'';position:absolute;left:20px;right:28px;top:50%;height:2px;transform:translateY(-50%);background:linear-gradient(90deg,rgba(15,23,42,.08),rgba(11,87,208,.16),rgba(15,23,42,.08));pointer-events:none;z-index:0;}
    .r-drop-zone > *{position:relative;z-index:1;}
    .r-drop-zone.drag-over{background:linear-gradient(180deg,rgba(239,247,255,.96),rgba(217,234,252,.9)),repeating-linear-gradient(90deg,rgba(11,87,208,.04) 0 1px,transparent 1px 36px);}
    /* Octagon stop cards — two-layer for border */
    .r-stop-wrap{position:relative;flex-shrink:0;width:176px;height:154px;background:linear-gradient(155deg,#0f172a,#020617);clip-path:polygon(18px 0,calc(100% - 18px) 0,100% 18px,100% calc(100% - 18px),calc(100% - 18px) 100%,18px 100%,0 calc(100% - 18px),0 18px);cursor:grab;box-shadow:0 16px 34px rgba(15,23,42,.16);transition:transform .18s ease,box-shadow .18s ease,background .18s ease;}
    .r-stop-wrap:hover{transform:translateY(-4px);box-shadow:0 22px 38px rgba(15,23,42,.22);}
    .r-stop-wrap.dragging{opacity:.42;transform:none;box-shadow:none;}
    .r-stop-wrap.selected{background:linear-gradient(155deg,#0b57d0,#081427);}
    .r-stop-wrap.anytime{background:linear-gradient(155deg,#0f766e,#05332f);}
    .r-stop-wrap.anytime.selected{background:linear-gradient(155deg,#0d8b79,#064e3b);}
    .r-insert-line{position:absolute;width:3px;top:18px;bottom:18px;background:#0057ff;box-shadow:0 0 0 4px rgba(0,87,255,.12);pointer-events:none;display:none;z-index:10;}
    .r-stop-item{position:absolute;inset:2px;background:linear-gradient(180deg,#ffffff 0%,#f5f8fc 56%,#e9eef6 100%);user-select:none;clip-path:polygon(16px 0,calc(100% - 16px) 0,100% 16px,100% calc(100% - 16px),calc(100% - 16px) 100%,16px 100%,0 calc(100% - 16px),0 16px);display:flex;flex-direction:column;text-align:left;padding:14px 14px 13px;gap:10px;overflow:hidden;}
    .r-stop-wrap:hover .r-stop-item{background:linear-gradient(180deg,#ffffff 0%,#f1f6ff 56%,#e4edf9 100%);}
    .r-stop-wrap.selected .r-stop-item{background:linear-gradient(180deg,#ffffff 0%,#f3f8ff 50%,#e4efff 100%);}
    .r-stop-wrap.anytime .r-stop-item{background:linear-gradient(180deg,#f8fffc 0%,#ecfaf4 54%,#dff3ea 100%);}
    .r-stop-wrap.anytime:hover .r-stop-item,.r-stop-wrap.anytime.selected .r-stop-item{background:linear-gradient(180deg,#fbfffd 0%,#eefcf6 54%,#d7f1e6 100%);}
    .r-stop-top{display:flex;align-items:center;justify-content:flex-start;gap:8px;padding-right:28px;min-height:26px;}
    .r-stop-top-actions{margin-left:auto;display:flex;align-items:center;gap:6px;}
    .r-stop-num{font-size:.56rem;font-weight:700;color:#fff;line-height:1;letter-spacing:.18em;text-transform:uppercase;font-variant-numeric:tabular-nums;background:#0f172a;padding:6px 8px;border-radius:999px;box-shadow:inset 0 0 0 1px rgba(255,255,255,.08);}
    .r-stop-wrap.selected .r-stop-num{background:#0b57d0;}
    .r-stop-wrap.anytime .r-stop-num{background:#0f766e;}
    .r-ifthen-btn{height:24px;border:1px solid rgba(15,23,42,.16);background:rgba(255,255,255,.82);color:#475569;font-family:var(--sans);font-size:.52rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;padding:0 8px;cursor:pointer;}
    .r-ifthen-btn:hover,.r-ifthen-btn.active{background:#0f172a;color:#fff;border-color:#0f172a;}
    .r-stop-type{font-size:.5rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;border-radius:999px;padding:4px 8px;border:1px solid transparent;max-width:100%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;box-shadow:inset 0 0 0 1px rgba(255,255,255,.38);}
    .r-stop-type.rb-noreply{background:#eef2f7;border-color:#d6dde7;color:#5b6472;}
    .r-stop-type.rb-text{background:#e7f0ff;border-color:#c9dcff;color:#1a73e8;}
    .r-stop-type.rb-any{background:#fff2d9;border-color:#ffd58a;color:#9a5f00;}
    .r-stop-type.rb-choice{background:#f1e8ff;border-color:#dcc6ff;color:#7c3aed;}
    .r-stop-type.rb-anytime{background:#dbfaea;border-color:#a7e7c8;color:#0f766e;}
    .r-stop-body{display:flex;flex-direction:column;align-items:flex-start;justify-content:flex-start;min-height:0;overflow:hidden;flex:1;}
    .r-stop-title{font-size:.84rem;font-weight:700;line-height:1.24;color:#0f172a;min-height:calc(2 * 1.24em + 2px);overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;line-clamp:2;-webkit-box-orient:vertical;word-break:break-word;}
    .r-stop-foot{display:flex;align-items:center;justify-content:flex-start;gap:6px;row-gap:5px;flex-wrap:wrap;font-size:.54rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#5b6778;min-height:30px;margin-top:auto;padding-top:8px;border-top:1px solid rgba(148,163,184,.24);}
    .r-stop-count{display:inline-flex;align-items:center;padding:3px 7px;border-radius:999px;background:rgba(255,255,255,.78);border:1px solid rgba(148,163,184,.26);}
    .r-stop-flag{color:#b42318;background:#fff1f2;border:1px solid #fecdd3;border-radius:999px;padding:3px 7px;font-size:.5rem;letter-spacing:.12em;}
    .r-stop-flag.missing{color:#9f1239;background:#fff1f2;border-color:#fecdd3;}
    .r-stop-flag.branch{color:#b45309;background:#fff7ed;border-color:#fdba74;}
    .r-remove-btn{position:absolute;top:12px;right:12px;padding:0;width:20px;height:20px;background:rgba(255,255,255,.96);border:1px solid rgba(17,17,17,.12);border-radius:50%;color:rgba(17,17,17,.45);font-size:.8rem;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:var(--sans);box-shadow:0 4px 10px rgba(15,23,42,.08);opacity:0;transform:scale(.9);transition:opacity .14s ease,transform .14s ease,color .14s ease;}
    .r-stop-wrap:hover .r-remove-btn,.r-stop-wrap.selected .r-remove-btn{opacity:1;transform:scale(1);}
    .r-remove-btn:hover{color:#c00;}
    .r-stop-arrow{flex-shrink:0;display:flex;align-items:center;align-self:center;color:rgba(15,23,42,.36);padding:0 10px;user-select:none;pointer-events:none;}
    .r-stop-arrow svg{width:24px;height:10px;}
    .r-branch-link{flex-shrink:0;display:flex;align-items:center;align-self:center;color:rgba(15,23,42,.42);padding:0 8px;user-select:none;pointer-events:none;}
    .r-ifthen-wrap{position:relative;flex-shrink:0;width:224px;height:154px;background:linear-gradient(165deg,#fb923c,#c2410c);clip-path:polygon(50% 0,100% 20px,100% 100%,0 100%,0 20px);box-shadow:0 16px 28px rgba(124,45,18,.18);}
    .r-ifthen-card{position:absolute;inset:2px;background:linear-gradient(180deg,#fffaf5 0%,#ffffff 46%,#fff0e6 100%);clip-path:polygon(50% 0,100% 18px,100% 100%,0 100%,0 18px);display:flex;flex-direction:column;padding:18px 12px 12px;gap:8px;overflow:hidden;}
    .r-ifthen-remove{position:absolute;top:12px;right:12px;padding:0;width:20px;height:20px;border-radius:50%;border:1px solid rgba(17,17,17,.12);background:rgba(255,255,255,.96);color:rgba(17,17,17,.45);font-family:var(--sans);font-size:.8rem;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 10px rgba(15,23,42,.08);}
    .r-ifthen-remove:hover{color:#c00;}
    .r-ifthen-title{font-size:.58rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#c2410c;}
    .r-ifthen-hint{font-size:.54rem;color:#9a3412;letter-spacing:.04em;}
    .r-ifthen-list{display:flex;flex-direction:column;gap:6px;overflow:auto;padding-right:2px;}
    .r-ifthen-row{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr) 22px;gap:6px;align-items:center;}
    .r-ifthen-row.blank{grid-template-columns:minmax(0,1fr) minmax(0,1fr);}
    .r-ifthen-value,.r-ifthen-stop{width:100%;min-width:0;font-family:var(--sans);font-size:.62rem;padding:6px 7px;border:1px solid rgba(17,17,17,.18);background:#fff;color:var(--ink);outline:none;}
    .r-ifthen-value:focus,.r-ifthen-stop:focus{border-color:#c2410c;box-shadow:inset 0 0 0 1px #c2410c;}
    .r-ifthen-case-remove{width:22px;height:22px;padding:0;border:1px solid rgba(17,17,17,.14);background:#fff;color:#7f1d1d;font-family:var(--sans);font-size:.72rem;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;}
    .r-ifthen-case-remove:hover{border-color:#7f1d1d;background:#fff7f7;}
    .r-anytime-gap{flex-shrink:0;width:20px;height:4px;align-self:center;border-radius:999px;background:linear-gradient(90deg,rgba(15,118,110,.28),rgba(15,118,110,.08));}
    .r-anytime-divider{flex-shrink:0;width:2px;height:78px;background:linear-gradient(180deg,rgba(15,118,110,.24),rgba(15,23,42,.14));align-self:center;margin:0 18px;border-radius:999px;box-shadow:0 0 0 4px rgba(15,118,110,.06);}
    .r-zone-empty{display:flex;align-items:center;justify-content:center;min-height:132px;padding:0 28px;font-size:.66rem;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;border:2px dashed rgba(15,23,42,.12);background:linear-gradient(180deg,rgba(255,255,255,.9),rgba(238,244,251,.62));white-space:nowrap;flex:1;clip-path:polygon(18px 0,calc(100% - 18px) 0,100% 18px,100% calc(100% - 18px),calc(100% - 18px) 100%,18px 100%,0 calc(100% - 18px),0 18px);}
    .vars-body{padding:0;overflow-y:auto;min-height:150px;}
    .var-row{padding:10px 14px;border-bottom:1px solid rgba(17,17,17,.1);display:grid;gap:4px;}
    .var-row:last-child{border-bottom:none;}
    .var-name{font-size:.58rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);}
    .var-value{font-size:.76rem;line-height:1.35;color:var(--ink);word-break:break-word;white-space:normal;}
    .var-value.empty{color:#94a3b8;font-style:italic;}
    .anytime-tag{font-size:.54rem;font-weight:700;letter-spacing:.07em;color:#fff;padding:2px 4px;border-radius:3px;flex-shrink:0;text-transform:uppercase;background:#4ecf98;}

    /* ── lp- section styles (stop detail header uses these) ── */
    .lp-section{border-bottom:2px solid var(--ink);padding:14px 16px;}
    .lp-section:last-child{border-bottom:none;}
    .lp-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
    .lp-title{font-size:.62rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);}
    .lp-btn{font-family:var(--sans);font-size:.64rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:3px 9px;border:1px solid var(--ink);border-radius:0;background:#fff;color:var(--ink);cursor:pointer;margin-top:0;width:auto;}
    .lp-btn:hover{background:var(--panel);}
    .lp-btn.primary{background:var(--ink);color:var(--bg);}
    .lp-btn.primary:hover{background:#333;}
    .lp-btn.danger{border-color:var(--err);color:var(--err);}
    .lp-btn.danger:hover{background:#fff0f0;}
    .lp-btn:disabled{opacity:.4;cursor:default;}

    /* ── Stop action icons ── */
    .stop-action{color:#475569;background:#f8fafc;border:2px solid currentColor;padding:0;width:26px;height:26px;display:inline-flex;align-items:center;justify-content:center;line-height:0;cursor:pointer;user-select:none;flex-shrink:0;}
    .stop-action svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
    .stop-paste{color:#0f766e;background:#f0fdfa;}.stop-delete{color:#ff4d57;background:#fff;}
    .stop-action.disabled{opacity:.3;cursor:not-allowed;}

    /* ── Stop name editing ── */
    .section-title-text{font-weight:700;font-size:.84rem;letter-spacing:.04em;text-transform:uppercase;}
    .stop-title-edit[contenteditable="true"]{user-select:text;cursor:text;outline:none;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;border-bottom:1.5px solid transparent;padding-bottom:1px;transition:border-color .15s;}
    .stop-title-edit[contenteditable="true"]:hover{border-bottom-color:rgba(17,17,17,.3);}
    .stop-title-edit[contenteditable="true"]:focus{text-overflow:clip;white-space:normal;border-bottom-color:var(--ink);}
    .stop-name-group{display:inline-flex;align-items:center;gap:.26em;flex:0 1 auto;min-width:0;}
    .stop-name-suffix{font-size:.84rem;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--ink);flex-shrink:0;user-select:none;}

    /* ── Reply tags ── */
    .reply-tag,.anytime-badge{font-size:.58rem;font-weight:700;letter-spacing:.1em;color:#fff;padding:2px 5px;border-radius:3px;flex-shrink:0;}
    .reply-tag-noreply{background:#9ca3af;}.reply-tag-wordreply{background:#1a73e8;}.reply-tag-anyreply{background:#f5a623;}.reply-tag-choicereply{background:#9333ea;}.reply-tag-anytime{background:#4ecf98;}

    /* ── Stop card body ── */
    .stop-card-body{padding:14px 16px;background:none;display:grid;gap:var(--bubble-gap);}
    .simple-stop-toolbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
    .simple-stop-toolbar .add-bubble-btn{width:100%;display:flex;align-items:center;justify-content:center;}
    .simple-stop-group{display:grid;gap:12px;padding:14px;border:1px solid rgba(17,17,17,.14);background:#f8fafc;}
    .simple-stop-group-header{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;}
    .simple-stop-group-title{font-size:.64rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);}
    .simple-stop-group-actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
    .simple-stop-field{display:grid;gap:6px;}
    .simple-stop-textarea{width:100%;min-height:120px;font-family:var(--sans);font-size:.8rem;padding:10px 12px;border:1px solid rgba(17,17,17,.3);background:#fff;color:var(--ink);outline:none;border-radius:0;resize:vertical;line-height:1.45;}
    .simple-stop-textarea:focus{border-color:var(--ink);}

    /* ── Bubble editor ── */
    .bubble-list{display:flex;flex-direction:column;gap:var(--bubble-gap);}
    .bubble{border:2px solid var(--ink);border-radius:0;background:#fff;padding:12px;margin:0;cursor:default;position:relative;}
    .bubble.photo-bubble{border-color:#60a5fa;}
    .bubble.cta-bubble{background:#fff;border-color:#cc0000;}
    .bubble-details-label{font-size:.64rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;}
    .bubble-top{position:absolute;top:8px;right:8px;display:flex;gap:4px;}
    .bubble-type-row{display:flex;flex-wrap:wrap;align-items:center;column-gap:8px;row-gap:4px;margin-bottom:8px;}
    .bubble-type-row label{margin:0;white-space:nowrap;cursor:pointer;font-size:.7rem;font-weight:600;color:var(--ink);letter-spacing:.04em;text-transform:none;}
    .bubble-type-row input[type="radio"]{accent-color:#0f766e;cursor:pointer;margin:0;}
    .bubble-type-row span.type-pair{display:inline-flex;align-items:center;gap:5px;min-height:18px;}
    .simple-stop-group .bubble-type-row{display:grid;grid-template-columns:1fr;justify-items:start;}
    .msg-type-section,.reply-fields,.bubble-reply-section{display:grid;gap:8px;}
    .bubble-reply-section{margin-top:12px;}
    .msg-type-section label,.reply-fields label{margin:0;font-size:.62rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);}
    .bubble-reply-label{margin:0;}
    .bubble-chat-stage{border:1px solid #d7dde6;background:#f8fafc;padding:8px;min-height:56px;}
    .bubble-html-shell{position:relative;background:#1a73e8;border-radius:20px;border-bottom-left-radius:5px;overflow:visible;max-width:min(90%,920px);}
    .bubble-html-shell::before{content:'';position:absolute;bottom:0;left:-8px;width:20px;height:20px;background:#1a73e8;border-bottom-right-radius:16px;z-index:0;}
    .bubble-html-shell::after{content:'';position:absolute;bottom:0;left:-12px;width:12px;height:20px;background:#fff;border-bottom-right-radius:10px;z-index:0;}
    .bubble.cta-bubble .bubble-html-shell{background:#cc0000;}
    .bubble.cta-bubble .bubble-html-shell::before{background:#cc0000;}
    .bubble-html-input{position:relative;z-index:1;background:transparent;border:0;border-radius:20px;width:100%;color:#fff;padding:.55rem .85rem;font-size:1.3rem;font-weight:700;line-height:1.5;min-height:80px;resize:none;overflow:hidden;font-family:var(--sans);}
    .bubble-html-input::placeholder{color:rgba(255,255,255,.7);}.bubble-html-input:focus{outline:none;}
    .bubble-answer-shell{position:relative;margin-left:auto;background:#e5e7eb;color:#111827;border-radius:20px;border-bottom-right-radius:5px;max-width:min(80%,760px);}
    .bubble-answer-shell::before{content:'';position:absolute;bottom:0;right:-8px;width:20px;height:20px;background:#e5e7eb;border-bottom-left-radius:16px;z-index:0;}
    .bubble-answer-shell::after{content:'';position:absolute;bottom:0;right:-12px;width:12px;height:20px;background:#f8fafc;border-bottom-left-radius:10px;z-index:0;}
    .bubble-answer-input{position:relative;z-index:1;width:100%;background:transparent;border:0;color:#111827;border-radius:20px;padding:.55rem .85rem;font-size:1.05rem;font-weight:600;line-height:1.45;min-height:50px;resize:none;overflow:hidden;font-family:var(--sans);}
    .bubble-answer-input::placeholder{color:rgba(17,24,39,.5);}.bubble-answer-input:focus{outline:none;}
    .bubble-flash{font-size:.68rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#0f766e;opacity:0;transition:opacity .15s;}
    .bubble-flash.visible{opacity:1;}
    .field-hint.tight{margin-top:4px;}
    .row{display:grid;gap:12px;grid-template-columns:1fr 1fr;margin-bottom:12px;}
    .row.full{grid-template-columns:1fr;}.row.no-margin{margin-bottom:0;}
    /* Bubble input/textarea overrides (scoped to bubble editor) */
    .bubble input[type="text"],.bubble textarea,.bubble select,.stop-card-body input[type="text"],.stop-card-body textarea,.stop-card-body select{width:100%;font-family:var(--sans);font-size:.82rem;padding:7px 9px;border:1px solid var(--ink);border-radius:0;background:#fff;color:var(--ink);outline:none;}
    .bubble input[type="text"]:focus,.bubble textarea:focus{box-shadow:inset 0 0 0 2px var(--ink);}
    .bubble textarea{resize:vertical;line-height:1.4;}
    .stop-card-body label{display:block;font-size:.62rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:4px;}
    /* Add bubble button */
    .stop-card-body button.add-bubble-btn{font-family:var(--sans);font-size:.75rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:8px 14px;border:1px solid var(--ink);border-radius:0;background:var(--ink);color:var(--bg);cursor:pointer;margin-top:0;width:auto;}
    .stop-card-body button.add-bubble-btn:hover{background:#333;}

    /* ── Anytime editor ── */
    .anytime-bubble-row{display:flex;flex-direction:column;gap:4px;}
    .anytime-bubble-lbl{font-size:.6rem;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--muted);}
    .anytime-bubble-preview{display:flex;}.anytime-bubble-preview.right{justify-content:flex-end;}.anytime-bubble-preview.left{justify-content:flex-start;}
    .anytime-chat-bubble{max-width:72%;padding:8px 12px;border-radius:18px;font-size:.86rem;line-height:1.4;}
    .anytime-chat-bubble.player{background:#e5e7eb;color:#111;border-bottom-right-radius:4px;}
    .anytime-chat-bubble.game{background:#1a73e8;color:#fff;border-bottom-left-radius:4px;}
    .anytime-chat-bubble textarea,.anytime-chat-bubble input[type="text"]{background:transparent;border:none;outline:none;resize:none;font:inherit;color:inherit;width:100%;min-width:140px;padding:0;margin:0;}
    .anytime-chat-bubble.player textarea::placeholder,.anytime-chat-bubble.player input[type="text"]::placeholder{color:rgba(0,0,0,.38);}
    .anytime-chat-bubble.game textarea::placeholder,.anytime-chat-bubble.game input[type="text"]::placeholder{color:rgba(255,255,255,.55);}

    /* ── Warnings ── */
    .warnings{font-size:.82rem;color:#9a5f00;background:#fff7e8;border:1px solid #f1d7a3;padding:10px 14px;line-height:1.45;display:none;flex-shrink:0;}
    .warnings ul{margin:0 0 0 16px;padding:0;}.warnings strong{display:block;margin-bottom:6px;}
    /* ── Dirty badge ── */
    .dirty-badge{font-size:.62rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#9a5f00;background:#fff7e8;border:1px solid #f1d7a3;padding:2px 7px;margin-left:6px;display:none;}
    .dirty-badge.visible{display:inline;}
    /* ── Undo toast ── */
    .undo-toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#111;color:#fff;padding:12px 16px;font-size:.82rem;letter-spacing:.03em;display:none;align-items:center;gap:12px;z-index:9999;border:1px solid #444;white-space:nowrap;}
    .ctx-menu{position:fixed;background:#fff;border:2px solid var(--ink);z-index:9999;min-width:120px;display:none;flex-direction:column;}
    .ctx-item{font-family:var(--sans);font-size:.72rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:8px 14px;cursor:pointer;user-select:none;color:var(--ink);}
    .ctx-item:hover{background:var(--panel);}
    .ctx-item.disabled{opacity:.35;pointer-events:none;}
    .ctx-divider{border-top:1px solid rgba(17,17,17,.15);margin:4px 0;}
    .ctx-item.ctx-danger{color:var(--err);}
    .ctx-item.ctx-danger:hover{background:#fff0f0;}
    .undo-toast button{border:1px solid #fff;color:#fff;background:transparent;padding:4px 10px;font-size:.74rem;letter-spacing:.05em;text-transform:uppercase;cursor:pointer;font-family:var(--sans);margin-top:0;width:auto;}
    .undo-toast button:hover{background:rgba(255,255,255,.15);}
  </style>
</head>
<body>

<header class="page-header">
  <div class="bureau">The Game Bureau</div>
  <div class="tool">Game Builder</div>
  <button class="btn primary" id="globalSaveBtn">Save</button>
  <button class="btn primary" id="g-publishBtn" style="display:none;">Publish</button>
</header>

<div class="workspace">
<div class="top-panels">

  <!-- ── GAMES PANEL ── -->
  <div class="panel games-panel">
    <div class="panel-head">
      <span class="panel-title">Games</span>
      <button class="btn" id="newGameBtn">New</button>
    </div>
    <div class="panel-body" id="gameList">
      <div class="empty">Loading…</div>
    </div>
  </div>

  <!-- ── DETAILS PANEL ── -->
  <div class="panel details-panel" id="detailsPanel">
    <div class="panel-head">
      <span class="panel-title" id="detailsTitle">Game Details</span>
    </div>
    <div class="panel-body" id="detailsBody">

      <div class="field">
        <label for="g-name">Game Name</label>
        <input type="text" id="g-name" placeholder="Oswald's Diary" autocomplete="off">
        <div class="field-hint" id="g-idHint" style="display:none;"></div>
      </div>

      <div class="field">
        <label for="g-tagline">Tagline</label>
        <input type="text" id="g-tagline" placeholder="A mystery hidden in plain sight" autocomplete="off">
      </div>

      <div class="field">
        <label for="g-subtitle">Guide Name</label>
        <input type="text" id="g-subtitle" placeholder="Mission Control" autocomplete="off">
      </div>

      <div class="field">
        <label>Tags</label>
        <div class="tag-picker" id="g-tagPicker">
          <input type="text" id="g-tagNewInput" placeholder="New tag…" autocomplete="off">
          <button type="button" class="tag-add-btn" id="g-tagAddBtn">+</button>
        </div>
      </div>

      <div class="field">
        <label for="g-desc">Description</label>
        <textarea id="g-desc" rows="2" placeholder="Short description…"></textarea>
      </div>

      <div class="field">
        <label for="g-price">Price</label>
        <input type="text" id="g-price" placeholder="Free To Start / In App Purchases" autocomplete="off">
      </div>

      <div class="field">
        <label>Logo</label>
        <div class="img-picker-wrap">
          <img id="g-logo-preview" class="img-picker-preview" src="" alt="" style="display:none;">
          <div class="img-picker-row">
            <button type="button" class="btn img-pick-btn" onclick="document.getElementById('g-logo-file').click()">Choose File</button>
            <input type="file" id="g-logo-file" accept="image/*,.webp" style="display:none;">
            <span class="img-picker-or">or</span>
            <input type="text" id="g-logo-url" placeholder="https://... or assets/logo.png" autocomplete="off">
          </div>
          <input type="hidden" id="g-logo">
        </div>
      </div>

      <div class="field">
        <label>Thumbnail</label>
        <div class="img-picker-wrap">
          <img id="g-thumbnail-preview" class="img-picker-preview" src="" alt="" style="display:none;">
          <div class="img-picker-row">
            <button type="button" class="btn img-pick-btn" onclick="document.getElementById('g-thumbnail-file').click()">Choose File</button>
            <input type="file" id="g-thumbnail-file" accept="image/*,.webp" style="display:none;">
            <span class="img-picker-or">or</span>
            <input type="text" id="g-thumbnail-url" placeholder="https://... or assets/thumbnail.png" autocomplete="off">
          </div>
          <input type="hidden" id="g-thumbnail">
        </div>
      </div>

      <div class="field">
        <label>Favicon</label>
        <div class="img-picker-wrap">
          <img id="g-favicon-preview" class="img-picker-preview" src="" alt="" style="display:none;">
          <div class="img-picker-row">
            <button type="button" class="btn img-pick-btn" onclick="document.getElementById('g-favicon-file').click()">Choose File</button>
            <input type="file" id="g-favicon-file" accept="image/*,.ico" style="display:none;">
            <span class="img-picker-or">or</span>
            <input type="text" id="g-favicon-url" placeholder="https://... or index.ico" autocomplete="off">
          </div>
          <input type="hidden" id="g-favicon">
        </div>
      </div>

      <div class="field" id="g-shareField" style="display:none;">
        <label>Share</label>
        <div class="share-row">
          <div id="g-shareUrl" class="share-url"></div>
          <div class="share-btns">
            <button class="btn" id="g-copyShareBtn">Copy</button>
            <button class="btn" id="g-goShareBtn">Go</button>
          </div>
        </div>
        <div class="share-row">
          <div id="g-shareUrlLocal" class="share-url"></div>
          <div class="share-btns">
            <button class="btn" id="g-copyShareBtnLocal">Copy</button>
            <button class="btn" id="g-goShareBtnLocal">Go</button>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- ── STOPS PANEL ── -->
  <div class="panel stops-panel" id="stopsPanel">
    <div class="panel-head">
      <span class="panel-title">Stops</span>
      <button class="btn" id="s-newBtn">New</button>
    </div>
    <div class="panel-body" id="stopsList">
      <div class="empty">No stops yet.</div>
    </div>
  </div>

  <!-- ── STOP DETAILS PANEL ── -->
  <div class="panel stop-details-panel" id="stopDetailsPanel">
    <div class="panel-head">
      <span class="panel-title">Stop Details</span>
      <button class="btn danger" id="s-archiveBtn" style="display:none;">Archive</button>
    </div>
    <div id="s-warnings" class="warnings"></div>
    <div class="panel-body" id="s-stopDetail" style="overflow-y:auto;flex:1;"></div>
  </div>

</div><!-- /top-panels -->

  <!-- ── MAP PANEL ── -->
  <div class="map-panel-wrap">
  <div class="panel map-panel">
    <div class="panel-head">
      <span class="panel-title" id="r-panelTitle">Game Stop Order</span>
      <div class="r-head-tools">
        <button class="r-scroll-btn" id="r-scrollLeftBtn" type="button" title="Scroll left" aria-label="Scroll left"><</button>
        <button class="r-scroll-btn" id="r-scrollRightBtn" type="button" title="Scroll right" aria-label="Scroll right">></button>
      </div>
    </div>
    <div class="r-drop-zone" id="r-dropZone">
      <div class="r-zone-empty">Select a game</div>
    </div>
  </div>
  <div class="panel vars-panel" id="varsPanel">
    <div class="panel-head">
      <span class="panel-title">Variables</span>
    </div>
    <div class="panel-body vars-body" id="r-varsList">
      <div class="empty">Select a game</div>
    </div>
  </div>
  </div><!-- /map-panel-wrap -->

</div><!-- /workspace -->

<div id="s-undoToast" class="undo-toast" role="status">
  Stop deleted. <button id="s-undoDeleteBtn" type="button">Undo</button>
</div>

<div id="gameCtxMenu" class="ctx-menu">
  <div class="ctx-item" id="ctxDuplicate">Duplicate</div>
  <div class="ctx-divider"></div>
  <div class="ctx-item" id="ctxArchive">Archive</div>
  <div class="ctx-item ctx-danger" id="ctxDelete">Delete</div>
</div>

<div id="routeCtxMenu" class="ctx-menu">
  <div class="ctx-item" id="rCtxDetach">Detach</div>
</div>

<div id="stopCtxMenu" class="ctx-menu">
  <div class="ctx-item" id="sCtxDuplicate">Duplicate</div>
  <div class="ctx-divider"></div>
  <div class="ctx-item" id="sCtxArchive">Archive</div>
  <div class="ctx-item ctx-danger" id="sCtxDelete">Delete</div>
</div>

<script>
// ══════════════════════════════════════════════════════════════════════════════
// THE GAME BUREAU — GAME BUILDER
// ══════════════════════════════════════════════════════════════════════════════
//
// What this file is:
//   A local-only admin tool for building SMS-based scavenger hunt / walking tour
//   games on The Game Bureau platform.
//
// How it works:
//   This page is served from the /games/private/ directory and requires a local
//   Node.js server (server.js, typically at localhost:3000) to be running.
//   The server exposes POST /games and POST /stops endpoints that write directly
//   to games.json and stops.json in the repository.  The "Publish" button calls
//   POST /publish which runs a git commit + push to deploy to GitHub Pages.
//   TGB Builder writes JSON data here so the game engine can read it later.
//
// How it fits into the project:
//   - games.json   — catalog of all game metadata (name, id, tags, images, etc.)
//   - stops.json   — all stops across all games (messages, reply logic, routing)
//   - go.html      — the public player page, reads from the JSON files at runtime
//   - play.html    — alternate player entry point
//
// Panels (left → right):
//   1. Games        — list of all games; click to select, right-click for actions
//   2. Game Details — edit metadata for the selected game
//   3. Game Stop Order (Map) — drag-and-drop stop ordering within a game route
//   4. Stops        — master list of all stops; drag to reorder or into the route
//   5. Stop Details — bubble editor for the selected stop's messages and replies
//
// NOTE: This file should NOT be opened directly via the filesystem (file://).
//   Always open it through the local dev server so API calls succeed.
// ══════════════════════════════════════════════════════════════════════════════

// Detect whether we are running locally so we can show/enable the API and Publish button.
// When deployed to GitHub Pages IS_LOCAL will be false and the builder is inaccessible.
const IS_LOCAL = ['localhost','127.0.0.1'].includes(location.hostname);
const API = IS_LOCAL ? 'http://localhost:3000' : null;
// Base URL for shareable player links shown in the Game Details panel
const SHARE_BASE       = 'https://the-game-bureau.github.io/the-game-bureau/play/index.html?id=';
const SHARE_BASE_LOCAL = 'http://localhost:3000/play/index.html?id=';
// Preset genre/category tags that appear as pills in the game details form
const ALL_TAGS = ['Mystery','Puzzle','SMS','Walking Tour','Sports','History','Food','Adventure','Family','Conspiracy','Trivia','Horror','Romance','Comedy','Music','Culture','Night Life','City Tour','Scavenger Hunt','New Orleans'];

// ══ STATE VARIABLES ══════════════════════════════════════════════════════════
let games = [];            // Full array of game objects loaded from /games (games.json)
let selectedIndex = -1;   // Index into `games` of the currently selected game (-1 = none)
let selectedStopIndex = -1; // Index into `state.stops` of the currently selected stop (-1 = none)
let selectedTags = new Set(); // Tags that are toggled ON for the currently selected game
let isNew = false;         // True when a new game form is open but not yet saved
let allTags = [...ALL_TAGS]; // Working tag list — extended when the user adds a custom tag
let gamesDirty = false;    // True when game route data changed outside the active game form and still needs saving

// ══════════════════════════════════════════════
// BUBBLE EDITOR — DATA / CONSTANTS
// ══════════════════════════════════════════════

// Skeleton structure written to stops.json when none exists yet
const DEFAULT_DOC = {
  _comment:'File: stops.json | Purpose: Source-of-truth game stops data.',

function generateBubbleHtml(bubble){const t=bubble.msgType||'text';if(t==='image')return'<img src="'+(bubble.src||'').replace(/"/g,'&quot;')+'" alt="'+(bubble.alt||'').replace(/"/g,'&quot;')+'" style="max-width:100%;">';if(t==='video'){const yt=getYouTubeEmbedUrl(bubble.src||'');if(yt)return'<iframe src="'+yt.replace(/"/g,'&quot;')+'" frameborder="0" allowfullscreen style="width:100%;aspect-ratio:16/9;display:block;"></iframe>';return'<video src="'+(bubble.src||'').replace(/"/g,'&quot;')+'" controls style="max-width:100%;"></video>';}if(t==='button')return'<a href="'+(bubble.href||'#').replace(/"/g,'&quot;')+'" class="action-btn">'+(bubble.label||'Button')+'</a>';if(t==='pay')return'<a href="'+(bubble.href||'#').replace(/"/g,'&quot;')+'" class="action-btn pay-btn">'+(bubble.label||'CLICK HERE TO BUY')+'</a>';return bubble.html||'';}

// Renders an array of bubble objects into `container` as interactive editor cards.

// `stopRef` is the parent stop object, needed so remove buttons can splice from the right array.

    const bubbleId=ensureBubbleId(bubble);
    if(!String(bubble.html||'').trim()){const sugg=listKey==='correct'?getCorrectReplySuggestions():listKey==='incorrect'?getIncorrectReplySuggestions():null;if(sugg&&sugg.length)bubble.html=pickRandomSuggestion(sugg);}
    const wrap=document.createElement('div');

  const triggerInput=document.createElement('input');triggerInput.type='text';triggerInput.placeholder='word1, word2, …';triggerInput.value=(pr.answers||[]).join(', ');
  triggerInput.addEventListener('input',()=>{pr.answers=triggerInput.value.split(/[,\n]+/).map(s=>s.trim()).filter(Boolean);});
  triggerBubble.appendChild(triggerInput);triggerPreview.appendChild(triggerBubble);triggerRow.appendChild(triggerLbl);triggerRow.appendChild(triggerPreview);body.appendChild(triggerRow);

  replyBubble.appendChild(replyInput);replyPreview.appendChild(replyBubble);replyRow.appendChild(replyLbl);replyRow.appendChild(replyPreview);body.appendChild(replyRow);
}

function renderSimpleStopEditorInto(body, stop) {

    const speakerRow=document.createElement('div');

      radio.type='radio';

}

// Returns the currently selected stop object from state, or null if no stop is selected
function getSelectedStop() { if(selectedStopIndex<0||selectedStopIndex>=state.stops.length)return null; return state.stops[selectedStopIndex]; }
function getGamesUsingStop(stopId) {
  const key=String(stopId||'').trim();
  if(!key)return[];
  return games.filter(g=>{
    if(!g||!Array.isArray(g.stops))return false;
    return r_getRouteEntries(g).some(entry=>{
      if(r_getRouteStopId(entry)===key)return true;
      return r_getIfThenCases(entry).some(branchCase=>String(branchCase.stopId||'').trim()===key);
    });
  });
}
function removeStopFromAllGames(stopId) {
  const key=String(stopId||'').trim();
  if(!key)return 0;
  let changed=0;
  const now=new Date().toISOString();
  games.forEach(g=>{
    if(!g||!Array.isArray(g.stops))return;
    const entries=r_getRouteEntries(g);
    let entryChanged=false;
    const nextEntries=entries.reduce((all,entry)=>{
      if(r_getRouteStopId(entry)===key){
        entryChanged=true;
        return all;
      }
      const nextCases=r_getIfThenCases(entry).filter(branchCase=>String(branchCase.stopId||'').trim()!==key);
      if(nextCases.length!==r_getIfThenCases(entry).length){
        entryChanged=true;
        entry=Object.assign({}, entry, { ifThen:nextCases.length?{ cases:nextCases }:null });
      }
      all.push(entry);
      return all;
    },[]);
    if(!entryChanged)return;
    r_setRouteEntries(g,nextEntries);
    g.updatedAt=now;
    changed++;
  });
  if(changed)gamesDirty=true;
  return changed;
}
function getStopDeleteConfirmMessage(stop) {
  const label=String((stop&&stop.id)||'this stop');
  const usedBy=getGamesUsingStop(label);
  if(!usedBy.length)return`Delete "${label}"? This cannot be undone.`;
  const names=usedBy.map(g=>g.name||g.id||'(unnamed)').sort((a,b)=>a.localeCompare(b));
  const countLabel=usedBy.length===1?'game':'games';
  return `Delete "${label}"? This cannot be undone.\n\nWarning: this stop is currently in ${usedBy.length} ${countLabel}: ${names.join(', ')}.\nDeleting it will remove it from those game routes.\n\nContinue?`;
}

// Rebuilds the entire stop detail panel for the currently selected stop index.
// The stop editor is intentionally minimal: stop name plus a flat list of generic bubbles.
function s_renderStopDetail() {
  const detailEl = document.getElementById('s-stopDetail');
  const panel = document.getElementById('stopDetailsPanel');
  if(!detailEl) return;
  const i = selectedStopIndex;
  const archBtn = document.getElementById('s-archiveBtn');

  if(i < 0 || i >= (state.stops || []).length) {
    detailEl.innerHTML = '<div class="empty">Select a stop.</div>';
    if(archBtn) archBtn.style.display = 'none';
    return;
  }

  detailEl.innerHTML = '';
  const stop = state.stops[i];
  if(archBtn) { archBtn.style.display = isNewStop ? 'none' : ''; archBtn.textContent = stop.archived ? 'Unarchive' : 'Archive'; }

  // Stop Name field → slug auto-generates the Stop ID, mirroring how Game Name → Game ID works
  const nameField = document.createElement('div');
  nameField.className = 'field';
  const nameLabel = document.createElement('label');
  nameLabel.textContent = 'Stop Name';
  const nameInput = document.createElement('input');
  nameInput.type = 'text';
  nameInput.placeholder = "Pete Fountain's Club";
  nameInput.value = stop.name || '';
  nameInput.autocomplete = 'off';
  const idHint = document.createElement('div');
  idHint.className = 'field-hint';
  idHint.textContent = stop.id;
  idHint.style.display = stop.id ? '' : 'none';
  nameInput.addEventListener('input', () => {
    stop.name = nameInput.value;
    const slug = slugify(nameInput.value);
    if(slug) { stop.id = slug; idHint.textContent = slug; idHint.style.display = ''; }
    else { idHint.style.display = 'none'; }
    markDirty();
  });
  nameInput.addEventListener('blur', () => {
    stop.name = nameInput.value.trim();
    const slug = slugify(stop.name) || stop.id || ('new-' + (i + 1));
    stop.id = slug;
    idHint.textContent = slug;
    idHint.style.display = '';
    renderStopsList();
  });
  nameInput.addEventListener('keydown', e => { if(e.key === 'Enter') nameInput.blur(); });
  nameField.appendChild(nameLabel);
  nameField.appendChild(nameInput);
  nameField.appendChild(idHint);
  detailEl.appendChild(nameField);

  // Stop type selector — styled as BUBBLE DETAILS TYPE row
  // Editor body
  const body = document.createElement('div');
  body.className = 'stop-card-body';
  renderSimpleStopEditorInto(body, stop);
  detailEl.appendChild(body);
}

// Full re-render of all stops-related UI: the list, the detail panel, warnings, and the dirty badge
function s_renderAll() {
  renderStopsList();
  s_renderStopDetail();
  renderWarnings();
  renderDirtyBadge();
  r_renderRoute();
}

// POSTs the full stops document to the local server, then updates the snapshot so isDirty() resets.
// Note: the global Save button calls saveAll() instead, which saves both games and stops together.
async function saveStops() {
  try {
    const res = await fetch(API + '/stops', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(toDoc())
    });
    if(!res.ok) throw new Error('Server error ' + res.status);
    // Update the snapshot so the dirty badge clears
    loadedStopsSnapshot = deepClone(toDoc());
    isNewStop = false;
    setStatus('');
    renderStopsList();
  } catch(e) {
    setStatus(e.message || 'Save failed.', 'err');
  }
}

// ── Archive stop ──────────────────────────────
// Toggles the stop's archived flag and immediately saves to the server.
// On failure, reverts the flag so state stays consistent with what's on disk.
document.getElementById('s-archiveBtn').addEventListener('click', async () => {
  if(selectedStopIndex < 0 || selectedStopIndex >= (state.stops||[]).length) return;
  const stop = state.stops[selectedStopIndex];
  stop.archived = !stop.archived;
  try {
    const res = await fetch(API + '/stops', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(toDoc())
    });
    if(!res.ok) throw new Error('Server error ' + res.status);
    loadedStopsSnapshot = deepClone(toDoc());
    document.getElementById('s-archiveBtn').textContent = stop.archived ? 'Unarchive' : 'Archive';
    s_renderAll();
  } catch(e) {
    // Revert the optimistic toggle if the save failed
    stop.archived = !stop.archived;
  }
});

// ── New stop ──────────────────────────────────
// Creates a blank stop, appends it to state.stops, and opens it for editing.
// isNewStop prevents the Archive button from showing until the stop is first saved.
document.getElementById('s-newBtn').addEventListener('click', () => {

});

// ══════════════════════════════════════════════
// MAP / ROUTE
// ══════════════════════════════════════════════
// The Map panel shows the ordered list of stops assigned to the selected game.
// Stops are dragged from the Stops panel into this panel to add them to a route.
// Within the panel, stops can be reordered by dragging. Anytime stops always sort to the top.

let r_dragging = null;  // Tracks the route item currently being dragged for in-panel reorder
let r_autoScrollFrame = 0; // requestAnimationFrame handle for edge-drag horizontal scrolling
let r_autoScrollDir = 0; // -1 = scroll left, 1 = scroll right, 0 = stop
let r_pendingIfThenFocus = null;

// Returns the currently selected game object, or null if none is selected
function r_currentGame() { return selectedIndex >= 0 ? games[selectedIndex] : null; }
function r_getStop(stopId) { return (state.stops||[]).find(x=>x&&x.id===stopId) || null; }
function r_normalizeIfThenCase(branchCase) {
  const src=branchCase&&typeof branchCase==='object'?branchCase:{};
  return {
    value:String(src.value??src.when??src.answer??'').trim(),
    stopId:String(src.stopId??src.thenStopId??src.goToStopId??src.goTo??src.stop??'').trim()
  };
}
function r_serializeIfThenCase(branchCase) {
  const normalized=r_normalizeIfThenCase(branchCase);
  if(!normalized.value&&!normalized.stopId)return null;
  return normalized;
}
function r_normalizeIfThen(ifThen) {
  if(!ifThen||typeof ifThen!=='object')return null;
  const rawCases=Array.isArray(ifThen.cases)?ifThen.cases:Array.isArray(ifThen.values)?ifThen.values:[];
  return { cases:rawCases.map(r_normalizeIfThenCase).filter(branchCase=>branchCase.value||branchCase.stopId) };
}
function r_serializeIfThen(ifThen) {
  const normalized=r_normalizeIfThen(ifThen);
  if(!normalized||!Array.isArray(normalized.cases))return null;
  const cases=normalized.cases.map(r_serializeIfThenCase).filter(Boolean);
  return { cases };
}
function r_normalizeRouteEntry(entry) {
  if(typeof entry==='string')return { type:'stop', stopId:String(entry).trim(), ifThen:null };
  if(!entry||typeof entry!=='object')return null;
  const stopId=String(entry.stopId??entry.id??'').trim();
  if(!stopId)return null;
  return {
    type:'stop',
    stopId,
    ifThen:r_normalizeIfThen(entry.ifThen||entry.branch||entry.ifThenTriangle||null)
  };
}
function r_serializeRouteEntry(entry) {
  const normalized=r_normalizeRouteEntry(entry);
  if(!normalized||!normalized.stopId)return null;
  const ifThen=r_serializeIfThen(normalized.ifThen);
  if(!ifThen)return normalized.stopId;
  return { type:'stop', stopId:normalized.stopId, ifThen };
}
function r_getRouteEntries(game) {
  if(!game||!Array.isArray(game.stops))return [];
  return game.stops.map(r_normalizeRouteEntry).filter(entry=>entry&&entry.stopId);
}
function r_setRouteEntries(game, entries) {
  if(!game)return [];
  const serialized=(Array.isArray(entries)?entries:[]).map(r_serializeRouteEntry).filter(Boolean);
  game.stops=serialized;
  return serialized;
}
function r_getRouteStopId(entry) {
  return String((entry&&entry.stopId)||'').trim();
}
function r_getIfThenCases(entry) {
  const ifThen=entry&&entry.ifThen;
  if(!ifThen||!Array.isArray(ifThen.cases))return [];
  return ifThen.cases.map(r_normalizeIfThenCase).filter(branchCase=>branchCase.value||branchCase.stopId);
}
function r_hasIfThen(entry) {
  return !!(entry&&entry.ifThen);
}
function r_getIfThenStopOptions(currentStopId) {
  return (state.stops||[])
    .filter(stop=>stop&&!stop.archived&&!stop.playerReply?.anytime&&stop.id!==currentStopId)
    .slice()
    .sort((a,b)=>(a.name||a.id||'').localeCompare(b.name||b.id||''))
    .map(stop=>({ id:stop.id, label:stop.name||stop.id||'(unnamed stop)' }));
}
function r_setPendingIfThenFocus(stopId, caseIndex, field) {
  r_pendingIfThenFocus={ stopId:String(stopId||''), caseIndex:Number(caseIndex)||0, field:String(field||'value') };
}
function r_applyPendingIfThenFocus(stopId, caseIndex, field, el) {
  if(!r_pendingIfThenFocus||!el)return;
  if(r_pendingIfThenFocus.stopId!==String(stopId||''))return;
  if(r_pendingIfThenFocus.caseIndex!==caseIndex)return;
  if(r_pendingIfThenFocus.field!==field)return;
  requestAnimationFrame(()=>{
    el.focus();
    if(typeof el.setSelectionRange==='function'){
      const len=String(el.value||'').length;
      el.setSelectionRange(len,len);
    }
  });
  r_pendingIfThenFocus=null;
}
// Returns true if the stop with the given ID is an anytime stop (responds to a keyword globally)
function r_isAnytime(stopId) { const s=r_getStop(stopId); return!!(s&&s.playerReply&&s.playerReply.anytime); }
// Returns an ANYTIME badge HTML string for anytime stops, or empty string for regular stops
function r_anytimeTag(stopId) { return r_isAnytime(stopId)?'<span class="anytime-tag">ANYTIME</span>':''; }
function r_getRouteBadge(stop) {
  if(!stop) return { cls:'rb-noreply', label:'MISSING' };
  const cls = replyTagToRb(getReplyTag(stop).cls);
  const labels = {
    'rb-noreply':'NO REPLY',
    'rb-text':'WORD',
    'rb-any':'ANY',
    'rb-choice':'CHOICE',
    'rb-anytime':'ANYTIME'
  };
  return { cls, label: labels[cls] || 'NO REPLY' };
}
function r_normalizeVarName(raw) {
  const s=String(raw||'').trim();
  if(!s)return'';
  const w=s.match(/^\{\{\s*([A-Za-z_]\w*)\s*\}\}$|^\{\s*([A-Za-z_]\w*)\s*\}$/);
  return w?(w[1]||w[2]||''):s;
}
function r_collectTemplateVars(text, store) {
  const src=String(text||'');
  if(!src)return;
  const re=/\{\{\s*([A-Za-z_]\w*)\s*\}\}|\{\s*([A-Za-z_]\w*)\s*\}/g;
  let m;
  while((m=re.exec(src))) {
    const name=m[1]||m[2]||'';
    if(name)store.add(name);
  }
}
function r_collectBubbleVars(bubble, store) {
  if(!bubble||typeof bubble!=='object')return;
  const ownName=r_normalizeVarName(bubble.storesAs||'');
  if(ownName)store.add(ownName);
  [bubble.html,bubble.replyResponse,bubble.label,bubble.href,bubble.src].forEach(val=>r_collectTemplateVars(val, store));
}
function r_collectStopVars(stop, store) {
  if(!stop||typeof stop!=='object')return;
  const pr=stop.playerReply||{};
  const prName=r_normalizeVarName(pr.storesAs||'');
  if(prName)store.add(prName);
  (Array.isArray(stop.messages)?stop.messages:[]).forEach(b=>r_collectBubbleVars(b, store));
  (Array.isArray(pr.correct)?pr.correct:[]).forEach(b=>r_collectBubbleVars(b, store));
  (Array.isArray(pr.incorrect)?pr.incorrect:[]).forEach(b=>r_collectBubbleVars(b, store));
}
function r_formatVariableValue(val) {
  if(val===undefined||val===null)return'';
  if(Array.isArray(val))return val.map(v=>r_formatVariableValue(v)).join(', ');
  if(typeof val==='object'){ try{return JSON.stringify(val);}catch(_){ return String(val); } }
  return String(val);
}
function r_getVariableEntry(name) {
  const key=String(name||'').trim().toLowerCase();
  const vars=Array.isArray(state.variables)?state.variables:[];
  for(const entry of vars){
    if(typeof entry==='string'){
      if(entry.trim().toLowerCase()===key)return { name:entry, value:'' };
      continue;
    }
    if(!entry||typeof entry!=='object')continue;
    const candidate=String(entry.name||entry.key||entry.id||entry.variable||'').trim();
    if(candidate&&candidate.toLowerCase()===key)return entry;
  }
  return null;
}
function r_getVariableValue(name) {
  const entry=r_getVariableEntry(name);
  if(entry==null)return'';
  if(typeof entry!=='object')return'';
  const candidates=['value','currentValue','defaultValue','default','initialValue','sample','example'];
  for(const key of candidates){
    if(entry[key]!==undefined&&entry[key]!==null&&String(entry[key])!=='')return r_formatVariableValue(entry[key]);
  }
  if(Array.isArray(entry.values)&&entry.values.length)return entry.values.map(v=>r_formatVariableValue(v)).join(', ');
  return'';
}
function r_collectRouteEntryVars(entry, store) {
  const stopId=r_getRouteStopId(entry);
  if(stopId)r_collectStopVars(r_getStop(stopId), store);
  r_getIfThenCases(entry).forEach(branchCase=>{
    if(branchCase.stopId)r_collectStopVars(r_getStop(branchCase.stopId), store);
  });
}
function r_getCurrentGameVariables() {
  const game=r_currentGame();
  if(!game||!Array.isArray(game.stops))return[];
  const routeEntries=r_getRouteEntries(game);
  const names=new Set();
  routeEntries.forEach(entry=>r_collectRouteEntryVars(entry, names));
  return Array.from(names).sort((a,b)=>a.localeCompare(b)).map(name=>({ name, value:r_getVariableValue(name) }));
}
function r_renderVariables() {
  const el=document.getElementById('r-varsList');
  const game=r_currentGame();
  if(!el)return;
  if(!game){el.innerHTML='<div class="empty">Select a game</div>';return;}
  const vars=r_getCurrentGameVariables();
  if(!vars.length){el.innerHTML='<div class="empty">No variables in this route.</div>';return;}
  el.innerHTML='';
  vars.forEach(v=>{
    const row=document.createElement('div');
    row.className='var-row';
    const name=document.createElement('div');
    name.className='var-name';
    name.textContent=v.name;
    const value=document.createElement('div');
    value.className='var-value'+(v.value?'':' empty');
    value.textContent=v.value||'—';
    row.appendChild(name);
    row.appendChild(value);
    el.appendChild(row);
  });
}
function r_updateScrollButtons() {
  const zone=document.getElementById('r-dropZone');
  const left=document.getElementById('r-scrollLeftBtn');
  const right=document.getElementById('r-scrollRightBtn');
  if(!zone||!left||!right)return;
  const maxScroll=Math.max(0,zone.scrollWidth-zone.clientWidth);
  const canScroll=maxScroll>4;
  left.disabled=!canScroll||zone.scrollLeft<=4;
  right.disabled=!canScroll||zone.scrollLeft>=maxScroll-4;
}
function r_scrollBy(delta) {
  const zone=document.getElementById('r-dropZone');
  if(!zone)return;
  zone.scrollBy({ left:delta, behavior:'smooth' });
}
function r_stopAutoScroll() {
  r_autoScrollDir=0;
  if(r_autoScrollFrame){
    cancelAnimationFrame(r_autoScrollFrame);
    r_autoScrollFrame=0;
  }
}
function r_stepAutoScroll() {
  const zone=document.getElementById('r-dropZone');
  if(!zone||!r_autoScrollDir){r_autoScrollFrame=0;return;}
  zone.scrollLeft += r_autoScrollDir * 18;
  r_updateScrollButtons();
  r_autoScrollFrame=requestAnimationFrame(r_stepAutoScroll);
}
function r_setAutoScroll(dir) {
  if(dir===r_autoScrollDir)return;
  r_autoScrollDir=dir;
  if(!dir){ if(r_autoScrollFrame){ cancelAnimationFrame(r_autoScrollFrame); r_autoScrollFrame=0; } return; }
  if(!r_autoScrollFrame)r_autoScrollFrame=requestAnimationFrame(r_stepAutoScroll);
}
function r_handleEdgeScroll(clientX) {
  const zone=document.getElementById('r-dropZone');
  if(!zone)return;
  if(zone.scrollWidth<=zone.clientWidth+4){ r_stopAutoScroll(); return; }
  const rect=zone.getBoundingClientRect();
  const gutter=Math.min(72, rect.width/4);
  if(clientX < rect.left + gutter) r_setAutoScroll(-1);
  else if(clientX > rect.right - gutter) r_setAutoScroll(1);
  else r_stopAutoScroll();
}
function r_setStatus(msg,type) { browserNotify(msg); }
// Hides the vertical insert line indicator
function r_clearDropIndicators() { const l=document.getElementById('r-insertLine'); if(l) l.style.display='none'; }
// Calculates where to insert a dragged item based on cursor X position (inserts left of midpoint)
function r_getInsertionIndex(items,clientX) { for(let i=0;i<items.length;i++){const r=items[i].getBoundingClientRect();if(clientX<r.left+r.width/2)return i;}return items.length; }
// Positions the vertical insert line between items based on cursor X
function r_updateDropIndicator(items,clientX) {
  const line=document.getElementById('r-insertLine'); if(!line) return;
  const zone=document.getElementById('r-dropZone'); const zr=zone.getBoundingClientRect();
  const idx=r_getInsertionIndex(items,clientX);
  let x; if(idx<items.length){const r=items[idx].getBoundingClientRect();x=r.left-zr.left+zone.scrollLeft-1;}
  else if(items.length){const r=items[items.length-1].getBoundingClientRect();x=r.right-zr.left+zone.scrollLeft+1;}
  else{x=8;}
  line.style.left=x+'px'; line.style.display='block';
}
// Re-sorts a game's stop array so anytime stops always appear before regular stops in the route
function r_touchGame(game) {
  if(!game)return;
  game.updatedAt=new Date().toISOString();
  gamesDirty=true;
}
function r_commitRouteEntries(game, entries) {
  if(!game)return;
  r_setRouteEntries(game, entries);
  r_touchGame(game);
}
function r_sortRouteAnytimeFirst(game) {
  if(!game||!Array.isArray(game.stops))return;
  const current=r_getRouteEntries(game);
  const next=[
    ...current.filter(entry=>r_isAnytime(r_getRouteStopId(entry))),
    ...current.filter(entry=>!r_isAnytime(r_getRouteStopId(entry)))
  ];
  if(JSON.stringify(current.map(r_serializeRouteEntry))===JSON.stringify(next.map(r_serializeRouteEntry)))return;
  r_setRouteEntries(game,next);
}
// Adds a stop to the current game's route; anytime stops are inserted before the first regular stop
function r_addStop(stopId) {
  const game=r_currentGame(); if(!game)return;
  const entries=r_getRouteEntries(game);
  if(entries.some(entry=>r_getRouteStopId(entry)===stopId)){r_setStatus('Already in route.','warn');return;}
  const nextEntry={ type:'stop', stopId:String(stopId||'').trim(), ifThen:null };
  if(r_isAnytime(stopId)){
    const firstRegular=entries.findIndex(entry=>!r_isAnytime(r_getRouteStopId(entry)));
    entries.splice(firstRegular<0?entries.length:firstRegular,0,nextEntry);
  } else {
    entries.push(nextEntry);
  }
  r_commitRouteEntries(game, entries);
  r_renderRoute();
}
function r_addIfThenToRouteIndex(routeIndex) {
  const game=r_currentGame();
  if(!game)return;
  const entries=r_getRouteEntries(game);
  const entry=entries[routeIndex];
  const stopId=r_getRouteStopId(entry);
  if(!entry||!stopId)return;
  if(r_isAnytime(stopId)){browserNotify('IF THEN can only go after a regular stop.');return;}
  entry.ifThen=entry.ifThen&&typeof entry.ifThen==='object'?entry.ifThen:{ cases:[] };
  r_setPendingIfThenFocus(stopId, r_getIfThenCases(entry).length, 'value');
  r_commitRouteEntries(game, entries);
  r_renderRoute();
}
function r_removeIfThenFromRouteIndex(routeIndex) {
  const game=r_currentGame();
  if(!game)return;
  const entries=r_getRouteEntries(game);
  const entry=entries[routeIndex];
  if(!entry)return;
  entry.ifThen=null;
  r_commitRouteEntries(game, entries);
  r_renderRoute();
}
function r_renderIfThenCard(game, entry, routeIndex) {
  const currentStopId=r_getRouteStopId(entry);
  const wrap=document.createElement('div');
  wrap.className='r-ifthen-wrap';

  const card=document.createElement('div');
  card.className='r-ifthen-card';

  const removeBtn=document.createElement('button');
  removeBtn.type='button';
  removeBtn.className='r-ifthen-remove';
  removeBtn.textContent='x';
  removeBtn.title='Remove IF THEN';
  removeBtn.addEventListener('click',e=>{
    e.stopPropagation();
    r_removeIfThenFromRouteIndex(routeIndex);
  });
  card.appendChild(removeBtn);

  const title=document.createElement('div');
  title.className='r-ifthen-title';
  title.textContent='IF THEN';
  card.appendChild(title);

  const hint=document.createElement('div');
  hint.className='r-ifthen-hint';
  hint.textContent='Player value -> stop';
  card.appendChild(hint);

  const list=document.createElement('div');
  list.className='r-ifthen-list';
  const branchCases=r_getIfThenCases(entry);
  const displayCases=branchCases.concat([{ value:'', stopId:'' }]);
  const stopOptions=r_getIfThenStopOptions(currentStopId);

  displayCases.forEach((branchCase, caseIndex)=>{
    const isBlank=caseIndex>=branchCases.length;
    const row=document.createElement('div');
    row.className='r-ifthen-row'+(isBlank?' blank':'');

    const valueInput=document.createElement('input');
    valueInput.type='text';
    valueInput.className='r-ifthen-value';
    valueInput.placeholder='Value';
    valueInput.value=branchCase.value||'';
    valueInput.addEventListener('input',()=>{
      const latestEntries=r_getRouteEntries(game);
      const latestEntry=latestEntries[routeIndex];
      if(!latestEntry)return;
      latestEntry.ifThen=latestEntry.ifThen&&typeof latestEntry.ifThen==='object'?latestEntry.ifThen:{ cases:[] };
      const latestCases=Array.isArray(latestEntry.ifThen.cases)?latestEntry.ifThen.cases:[];
      if(isBlank){
        if(!valueInput.value.trim())return;
        latestCases.push({ value:valueInput.value, stopId:'' });
        latestEntry.ifThen.cases=latestCases;
        r_setPendingIfThenFocus(currentStopId, latestCases.length-1, 'value');
        r_commitRouteEntries(game, latestEntries);
        r_renderRoute();
        return;
      }
      latestCases[caseIndex]=Object.assign({}, latestCases[caseIndex]||{}, { value:valueInput.value });
      latestEntry.ifThen.cases=latestCases;
      r_commitRouteEntries(game, latestEntries);
    });
    row.appendChild(valueInput);
    r_applyPendingIfThenFocus(currentStopId, caseIndex, 'value', valueInput);

    const stopSelect=document.createElement('select');
    stopSelect.className='r-ifthen-stop';
    const placeholder=document.createElement('option');
    placeholder.value='';
    placeholder.textContent='Then stop';
    stopSelect.appendChild(placeholder);
    stopOptions.forEach(option=>{
      const opt=document.createElement('option');
      opt.value=option.id;
      opt.textContent=option.label;
      stopSelect.appendChild(opt);
    });
    stopSelect.value=branchCase.stopId||'';
    stopSelect.addEventListener('change',()=>{
      const latestEntries=r_getRouteEntries(game);
      const latestEntry=latestEntries[routeIndex];
      if(!latestEntry)return;
      latestEntry.ifThen=latestEntry.ifThen&&typeof latestEntry.ifThen==='object'?latestEntry.ifThen:{ cases:[] };
      const latestCases=Array.isArray(latestEntry.ifThen.cases)?latestEntry.ifThen.cases:[];
      if(isBlank){
        if(!stopSelect.value)return;
        latestCases.push({ value:'', stopId:stopSelect.value });
        latestEntry.ifThen.cases=latestCases;
        r_setPendingIfThenFocus(currentStopId, latestCases.length-1, 'stop');
        r_commitRouteEntries(game, latestEntries);
        r_renderRoute();
        return;
      }
      latestCases[caseIndex]=Object.assign({}, latestCases[caseIndex]||{}, { stopId:stopSelect.value });
      latestEntry.ifThen.cases=latestCases;
      r_commitRouteEntries(game, latestEntries);
    });
    row.appendChild(stopSelect);
    r_applyPendingIfThenFocus(currentStopId, caseIndex, 'stop', stopSelect);

    if(!isBlank){
      const removeCaseBtn=document.createElement('button');
      removeCaseBtn.type='button';
      removeCaseBtn.className='r-ifthen-case-remove';
      removeCaseBtn.textContent='x';
      removeCaseBtn.title='Remove value';
      removeCaseBtn.addEventListener('click',()=>{
        const latestEntries=r_getRouteEntries(game);
        const latestEntry=latestEntries[routeIndex];
        if(!latestEntry||!latestEntry.ifThen||!Array.isArray(latestEntry.ifThen.cases))return;
        latestEntry.ifThen.cases.splice(caseIndex,1);
        r_commitRouteEntries(game, latestEntries);
        r_renderRoute();
      });
      row.appendChild(removeCaseBtn);
    }

    list.appendChild(row);
  });

  card.appendChild(list);
  wrap.appendChild(card);
  return wrap;
}
// Rebuilds the route panel DOM from the selected game's stops array
function r_renderRoute() {
  const zone=document.getElementById('r-dropZone');

// IIFE: wires up drag-and-drop event handlers for the route drop zone.
// Handles two distinct drag sources:
//   1. Reordering within the route (r_dragging is set) — uses text/x-stop-index
//   2. Adding a stop from the Stops list — uses text/x-stop-id (set in renderStopsList)
(()=>{
  const zone=document.getElementById('r-dropZone');
  const leftBtn=document.getElementById('r-scrollLeftBtn');
  const rightBtn=document.getElementById('r-scrollRightBtn');
  leftBtn.addEventListener('click',()=>r_scrollBy(-260));
  rightBtn.addEventListener('click',()=>r_scrollBy(260));
  zone.addEventListener('scroll',r_updateScrollButtons);
  zone.addEventListener('wheel',e=>{
    if(zone.scrollWidth<=zone.clientWidth+4)return;
    const delta=Math.abs(e.deltaX)>Math.abs(e.deltaY)?e.deltaX:e.deltaY;
    if(!delta)return;
    e.preventDefault();
    zone.scrollLeft += delta;
    r_updateScrollButtons();
  },{passive:false});
  window.addEventListener('resize',r_updateScrollButtons);
  zone.addEventListener('dragover',e=>{
    const types=Array.from(e.dataTransfer.types);
    // In-panel reorder: show precise drop indicator line
    if(r_dragging!=null){e.preventDefault();const items=Array.from(zone.querySelectorAll('.r-stop-wrap:not(.dragging)'));r_updateDropIndicator(items,e.clientX);r_handleEdgeScroll(e.clientX);}
    // Cross-panel add: highlight the entire drop zone
    else if(types.includes('text/x-stop-id')&&selectedIndex>=0){e.preventDefault();zone.classList.add('drag-over');r_handleEdgeScroll(e.clientX);}
  });
  zone.addEventListener('dragleave',e=>{if(!zone.contains(e.relatedTarget)){zone.classList.remove('drag-over');r_clearDropIndicators();r_stopAutoScroll();}});
  zone.addEventListener('drop',e=>{
    zone.classList.remove('drag-over');r_clearDropIndicators();r_stopAutoScroll();
    if(r_dragging!=null){
      e.preventDefault();const game=r_currentGame();if(!game)return;
      const items=Array.from(zone.querySelectorAll('.r-stop-wrap:not(.dragging)'));
      const insertionIndex=r_getInsertionIndex(items,e.clientX);
      const from=r_dragging.idx;r_dragging=null;
      const entries=r_getRouteEntries(game);
      const[moved]=entries.splice(from,1);
      entries.splice(insertionIndex,0,moved);
      r_commitRouteEntries(game, entries);
      r_sortRouteAnytimeFirst(game);
      r_renderRoute();
      return;
    }
    const sid=e.dataTransfer.getData('text/x-stop-id');
    if(!sid||selectedIndex<0)return;
    const dropStop=(state.stops||[]).find(s=>s.id===sid);
    if(dropStop&&dropStop.archived)return;
    e.preventDefault();r_addStop(sid);
  });
})();

// ── Route item context menu ───────────────────
(()=>{
  const menu = document.getElementById('routeCtxMenu');
  let targetIdx = -1;
  function hideRouteCtx(){ menu.style.display='none'; targetIdx=-1; }
  function showRouteCtx(x, y, idx){
    targetIdx = idx;
    menu.style.display='flex'; menu.style.left='0'; menu.style.top='0';
    const mw=menu.offsetWidth, mh=menu.offsetHeight;
    menu.style.left=Math.min(x, window.innerWidth-mw-4)+'px';
    menu.style.top=Math.min(y, window.innerHeight-mh-4)+'px';
  }

  document.getElementById('rCtxDetach').addEventListener('click', ()=>{

// Rebuilds the left-hand games list; most recently edited/created game first,
// then a divider, then the rest alphabetically, then archived games alphabetically.
function renderGameList() {
  const el = document.getElementById('gameList');
  if(!games.length) { el.innerHTML = '<div class="empty">No games yet.</div>'; return; }

  const sortAlpha = arr => arr.sort((a,b) => (a.g.name||'').localeCompare(b.g.name||''));
  const getTs = g => Math.max(g.updatedAt ? new Date(g.updatedAt).getTime() : 0, g.createdAt ? new Date(g.createdAt).getTime() : 0);

  const activeAll = games.map((g,i) => ({g,i})).filter(({g}) => !g.archived);
  const archived = sortAlpha(games.map((g,i) => ({g,i})).filter(({g}) => g.archived));

  let recentEntry = null, recentTs = -1;
  activeAll.forEach(e => { const ts = getTs(e.g); if(ts > recentTs) { recentTs = ts; recentEntry = e; } });
  const active = sortAlpha(activeAll.filter(e => e !== recentEntry));

  const makeRow = ({g, i}) => {
    const row = document.createElement('div');
    row.className = 'game-row' + (g.archived ? ' archived' : '') + (i === selectedIndex ? ' selected' : '');
    row.dataset.i = i;
    row.addEventListener('click', () => openDetails(i));
    row.addEventListener('contextmenu', e => { e.preventDefault(); openDetails(i); showCtxMenu(e.clientX, e.clientY, i); });
    const thumb = document.createElement('img');
    thumb.className = 'game-row-thumb';
    thumb.src = g.thumbnail || g.logo || 'assets/logo.png';
    thumb.alt = '';
    thumb.loading = 'lazy';
    thumb.decoding = 'async';
    thumb.draggable = false;
    const info = document.createElement('div');
    info.className = 'game-row-info';
    const name = document.createElement('div');
    name.className = 'game-row-name';
    name.textContent = g.name || '(unnamed)';
    info.appendChild(name);
    row.appendChild(thumb);
    row.appendChild(info);
    return row;
  };
  const makeDivider = () => { const hr = document.createElement('hr'); hr.style.cssText = 'border:none;border-top:1px solid rgba(17,17,17,.1);margin:0;'; return hr; };

  el.innerHTML = '';
  if(recentEntry) {
    el.appendChild(makeRow(recentEntry));
    if(active.length || archived.length) el.appendChild(makeDivider());
  }
  active.forEach(e => el.appendChild(makeRow(e)));
  if(archived.length) {
    el.appendChild(makeDivider());
    archived.forEach(e => el.appendChild(makeRow(e)));
  }
}
