<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#ffffff">
  <title>Loading…</title>
  <link id="favicon" rel="icon" href="../index.ico" type="image/x-icon">
  <link rel="stylesheet" href="../index.css">
  <link rel="stylesheet" href="game.css">
</head>
<body class="game-active">
  <div class="icon-preload" aria-hidden="true"></div>

  <div class="contact-header compact">
    <img class="game-thumbnail" id="gameThumbnail" alt="">
    <div class="avatar"><img id="header-logo" src="assets/logo.png" alt=""></div>
    <div class="header-info">
      <div class="contact-name" id="header-title"></div>
      <div class="contact-name" id="header-subtitle"></div>
      <div class="contact-status">
        <div class="online-dot"></div>
        <span id="header-status">online</span>
      </div>
    </div>
    <button class="restart-btn" id="restartBtn" type="button">↺ RESTART</button>
  </div>

  <div class="chat" id="chat"></div>

  <div class="input-area" id="input-area">
    <div class="answer-row">
      <input id="gameInput" type="text" class="answer-input" autocomplete="off" placeholder="" disabled>
      <button id="gameSubmitBtn" class="submit-btn" aria-label="Send" disabled>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2L11 13"/><path d="M22 2L15 22L11 13L2 9L22 2Z" fill="white" stroke="white"/></svg>
      </button>
    </div>
  </div>

  <script>
    const TYPING_DELAY = 700;
    const BUBBLE_PAUSE = 180;

    const params  = new URLSearchParams(location.search);
    const gameId  = params.get('id') || params.get('game');
    const STORE_KEY = 'tgb_' + (gameId || 'default');

    const chatEl      = document.getElementById('chat');
    const gameInput   = document.getElementById('gameInput');
    const submitBtn   = document.getElementById('gameSubmitBtn');

    let gameStops          = [];
    let anytimeStops       = [];
    let globalCorrectPool  = [];
    let globalIncorrectPool= [];
    let currentStopIndex   = 0;
    let _submitHandler     = null;
    let vars               = {};

    // ── Persistence ──────────────────────────────────────────────
    function saveStep(i) {
      try { localStorage.setItem(STORE_KEY + '_step', String(i)); } catch(e) {}
    }
    function loadStep() {
      try { return parseInt(localStorage.getItem(STORE_KEY + '_step') || '0', 10) || 0; } catch(e) { return 0; }
    }
    function saveVars() {
      try { localStorage.setItem(STORE_KEY + '_vars', JSON.stringify(vars)); } catch(e) {}
    }
    function loadVars() {
      try { return JSON.parse(localStorage.getItem(STORE_KEY + '_vars') || '{}'); } catch(e) { return {}; }
    }
    function clearSave() {
      try {
        localStorage.removeItem(STORE_KEY + '_step');
        localStorage.removeItem(STORE_KEY + '_vars');
        vars = {};
      } catch(e) {}
    }

    // ── Helpers ───────────────────────────────────────────────────
    function norm(s) {
      return String(s || '').toLowerCase().replace(/[$,.\s]/g, '');
    }
    function pick(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }
    function scrollBottom() {
      chatEl.scrollTop = chatEl.scrollHeight;
    }
    function normalizeVarKey(raw) {
      const s = String(raw || '').trim();
      const m = s.match(/^\{\{\s*([A-Za-z_]\w*)\s*\}\}$/) || s.match(/^\{\s*([A-Za-z_]\w*)\s*\}$/);
      return m ? m[1] : s;
    }
    function interpolate(str) {
      return String(str || '').replace(/\{\{\s*([A-Za-z_]\w*)\s*\}\}|\{\s*([A-Za-z_]\w*)\s*\}/g, (match, k1, k2) => {
        const key = k1 || k2;
        return Object.prototype.hasOwnProperty.call(vars, key) ? vars[key] : match;
      });
    }

    // ── DOM builders ──────────────────────────────────────────────
    function addBubble(html, fromGame = true) {
      const wrap = document.createElement('div');
      wrap.className = 'msg ' + (fromGame ? 'from-game' : 'from-player');
      const bubble = document.createElement('div');
      bubble.className = 'msg-bubble';
      bubble.innerHTML = interpolate(String(html || '')).replace(/\n/g, '<br>');
      if (bubble.querySelector('img')) wrap.classList.add('has-img');
      wrap.appendChild(bubble);
      chatEl.appendChild(wrap);
      scrollBottom();
      return wrap;
    }

    function showTypingIndicator() {
      const el = document.createElement('div');
      el.className = 'typing';
      el.innerHTML = '<span></span><span></span><span></span>';
      chatEl.appendChild(el);
      scrollBottom();
      return el;
    }

    // ── Message sequencing ────────────────────────────────────────
    function showMessages(messages, onDone) {
      let i = 0;
      function next() {
        if (i >= messages.length) { onDone && onDone(); return; }
        const msg = messages[i++];
        const html = msg.html || msg.text || '';
        if (!html) { next(); return; }
        const indicator = showTypingIndicator();
        setTimeout(() => {
          indicator.remove();
          addBubble(html);
          setTimeout(next, BUBBLE_PAUSE);
        }, TYPING_DELAY);
      }
      next();
    }

    // ── Permanent input bar ───────────────────────────────────────
    function disableInput() {
      gameInput.disabled = true;
      gameInput.value = '';
      gameInput.placeholder = '';
      submitBtn.disabled = true;
      _submitHandler = null;
    }

    function showTextInput(stop) {
      const reply = stop.playerReply || {};
      gameInput.placeholder = reply.placeholder || 'Type here…';
      gameInput.disabled = false;
      submitBtn.disabled = false;
      setTimeout(() => gameInput.focus(), 80);

      _submitHandler = function() {
        const val = gameInput.value.trim();
        if (!val) return;

        // Anytime stops intercept any input regardless of current stop
        const anytimeMatch = anytimeStops.find(s =>
          (s.playerReply?.answers || []).some(a => norm(a) === norm(val))
        );
        if (anytimeMatch) {
          disableInput();
          addBubble(val, false);
          const msgs = (anytimeMatch.messages || []).filter(m => (m.html || m.text || '').trim());
          const cr   = Array.isArray(anytimeMatch.playerReply?.correct) && anytimeMatch.playerReply.correct.length
                       ? [pick(anytimeMatch.playerReply.correct)] : [];
          showMessages([...msgs, ...cr], () => showTextInput(stop));
          return;
        }

        const answers  = (reply.answers || []).map(a => String(a || '').trim()).filter(Boolean);
        const isAny    = reply.type === 'any' || answers.length === 0;
        const correct  = isAny || answers.some(a => norm(a) === norm(val));

        const varKey = normalizeVarKey(reply.storesAs || '');
        if (varKey && correct) { vars[varKey] = val; saveVars(); }

        disableInput();
        addBubble(val, false);

        const correctReplies   = Array.isArray(reply.correct)   && reply.correct.length   ? reply.correct   : [];
        const incorrectReplies = Array.isArray(reply.incorrect)  && reply.incorrect.length ? reply.incorrect : [];

        if (!correct) {
          const after = () => {
            showTextInput(stop);
            gameInput.classList.add('wrong');
            setTimeout(() => gameInput.classList.remove('wrong'), 400);
            setTimeout(() => gameInput.focus(), 80);
          };
          if (incorrectReplies.length) {
            showMessages([pick(incorrectReplies)], after);
          } else if (globalIncorrectPool.length) {
            showMessages([{ html: pick(globalIncorrectPool) }], after);
          } else {
            after();
          }
          return;
        }

        const advance = () => { saveStep(currentStopIndex + 1); advanceStop(); };
        if (correctReplies.length) {
          showMessages([pick(correctReplies)], advance);
        } else if (globalCorrectPool.length) {
          showMessages([{ html: pick(globalCorrectPool) }], advance);
        } else {
          advance();
        }
      };
    }

    submitBtn.addEventListener('click', () => { if (_submitHandler) _submitHandler(); });
    gameInput.addEventListener('keydown', e => { if (e.key === 'Enter' && _submitHandler) _submitHandler(); });

    // ── Stop flow ─────────────────────────────────────────────────
    function playStop(index) {
      currentStopIndex = index;
      const stop    = gameStops[index];
      const reply   = stop.playerReply || {};
      const messages = (Array.isArray(stop.messages) ? stop.messages : [])
        .filter(m => (m.html || m.text || '').trim());

      const hasCallToAction = messages.some(m => m.callToAction);
      const needsInput = reply.type === 'any'
        || (Array.isArray(reply.answers) && reply.answers.length > 0)
        || !!(reply.placeholder && reply.placeholder.trim())
        || hasCallToAction;

      showMessages(messages, () => {
        if (needsInput) {
          showTextInput(stop);
        } else {
          setTimeout(() => { saveStep(index + 1); advanceStop(); }, 400);
        }
      });
    }

    function advanceStop() {
      const next = currentStopIndex + 1;
      if (next >= gameStops.length) { disableInput(); return; }
      playStop(next);
    }

    // ── Restart ───────────────────────────────────────────────────
    document.getElementById('restartBtn').addEventListener('click', () => {
      clearSave();
      chatEl.innerHTML = '';
      disableInput();
      playStop(0);
    });

    // ── Boot ──────────────────────────────────────────────────────
    Promise.all([
      fetch('data/games.json').then(r => r.json()),
      fetch('data/stops.json').then(r => r.json())
    ]).then(([gamesData, stopsData]) => {
      const games   = Array.isArray(gamesData) ? gamesData : (gamesData.games || []);
      const game    = games.find(g => g.id === gameId) || games.find(g => !g.archived);

      if (game) {
        document.title = game.name || game.id;
        if (game.favicon) document.getElementById('favicon').href = game.favicon;
        document.getElementById('header-title').textContent    = game.name || game.id;
        document.getElementById('header-subtitle').textContent = game.subtitle || '';
        if (game.thumbnail) {
          document.getElementById('gameThumbnail').src = game.thumbnail;
          document.getElementById('gameThumbnail').classList.add('show');
          document.getElementById('header-logo').closest('.avatar').style.display = 'none';
        } else if (game.logo) {
          document.getElementById('header-logo').src = game.logo;
        }
      }

      const opts = stopsData.header?.builderOptions || {};
      globalCorrectPool   = Array.isArray(opts.correctReplies)   && opts.correctReplies.length   ? opts.correctReplies   : ['✓'];
      globalIncorrectPool = Array.isArray(opts.incorrectReplies)  && opts.incorrectReplies.length ? opts.incorrectReplies : ['Not quite. Try again.'];

      const allStops = Array.isArray(stopsData) ? stopsData : (stopsData.stops || []);
      const stopMap  = Object.fromEntries(allStops.map(s => [s.id.toLowerCase(), s]));
      anytimeStops   = allStops.filter(s => !s.archived && s.playerReply?.anytime);
      const routeIds = Array.isArray(game && game.stops) ? game.stops : [];
      gameStops = routeIds.map(sid => stopMap[sid.toLowerCase()]).filter(s => s && !s.playerReply?.anytime);

      if (!gameStops.length) { chatEl.textContent = 'No stops configured for this game.'; return; }

      vars = loadVars();
      const savedStep = Math.min(loadStep(), gameStops.length - 1);
      if (savedStep > 0) {
        for (let i = 0; i < savedStep; i++) {
          const stop = gameStops[i];
          (stop.messages || []).filter(m => (m.html || m.text || '').trim()).forEach(m => {
            addBubble(m.html || m.text || '');
          });
        }
      }
      playStop(savedStep);
    }).catch(err => {
      console.error(err);
      chatEl.textContent = 'Could not load game data.';
    });
  </script>
</body>
</html>
