<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0c0c0c">
  <title>The Game Bureau</title>
  <meta id="og-title"       property="og:title"       content="The Game Bureau">
  <meta id="og-description" property="og:description" content="">
  <meta id="og-image"       property="og:image"       content="">
  <meta id="og-url"         property="og:url"         content="">
  <meta                     property="og:type"        content="website">
  <meta name="twitter:card"         content="summary_large_image">
  <meta id="tw-title"       name="twitter:title"       content="The Game Bureau">
  <meta id="tw-description" name="twitter:description" content="">
  <meta id="tw-image"       name="twitter:image"       content="">
  <link id="favicon" rel="icon" href="../index.ico" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="index.css">
</head>
<body>

  <div id="landing">
    <div class="logo-wrap">
      <img id="gameLogo" alt="">
    </div>

    <div class="title-wrap">
      <div id="gameTitle"></div>
      <div id="taglineWrap" hidden>
        <div class="title-rule"></div>
        <div id="gameTagline"></div>
        <div class="title-rule"></div>
      </div>
    </div>

    <div id="tags"></div>

    <div id="price">
      <span class="price-label">Price</span>
      <span class="price-val" id="priceVal"></span>
    </div>

    <hr class="divider">

    <p id="desc"></p>

    <div id="guideSection" hidden>
      <div class="guide-container">
        <div class="guide-thumbnail">
          <img id="guideImage" alt="Guide">
        </div>
        <div class="guide-info">
          <div class="guide-label">Your Guide</div>
          <div class="guide-val" id="guideVal"></div>
          <div class="guide-bio" id="guideBio" hidden></div>
        </div>
      </div>
    </div>

    <div class="go-wrap">
      <button id="goBtn">PLAY</button>
    </div>

    <div class="share-section">
      <div class="share-heading">Invite Players</div>

      <div class="share-qr">
        <div class="share-qr-label">Hold up your screen &amp; let players scan</div>
        <div class="qr-box"><img id="qrImg" alt="QR Code"></div>
      </div>

      <div class="share-or"><span>OR</span></div>

      <div class="share-text">
        <div class="share-text-info">
          <div class="share-text-title">Send via Text</div>
          <div class="share-text-sub">Opens a new message with the link</div>
        </div>
        <button class="share-text-btn" id="copyBtn">SEND</button>
      </div>
    </div>
  </div>

  <div id="error"></div>

  <!-- Game shell — revealed after GO is tapped -->
  <div id="game-shell" style="display:none; width:100%; flex:1 1 auto; min-height:0; flex-direction:column;">
    <div class="icon-preload" aria-hidden="true"></div>
    <div class="contact-header">
      <div class="avatar"><img id="header-logo" src="assets/logo.png" alt=""></div>
      <div class="contact-name" id="header-title"></div>
      <div class="contact-name" id="header-subtitle"></div>
      <div class="contact-status"><div class="online-dot"></div><span id="header-status">online</span></div>
      <button class="restart-btn" id="restartBtn" type="button">↺ RESTART</button>
    </div>
    <div class="chat" id="chat"></div>
    <div class="input-area" id="input-area"></div>
  </div>

  <script src="data/supabase-config.js"></script>
  <script src="util/games_new_runtime.js?v=1774522000"></script>
  <script>
    const params = new URLSearchParams(location.search);
    const requestedGame = (params.get('game') || params.get('id') || '').trim();
    let resolvedGameQuery = requestedGame;

    // ── Supabase helpers (mirrors builder pattern) ──────────────────────────
    const _sbCfg = (window.TGB_SUPABASE_CONFIG && window.TGB_SUPABASE_CONFIG.enabled)
      ? window.TGB_SUPABASE_CONFIG : null;

    function buildSupabaseUrl(params) {
      const url = new URL('/rest/v1/' + encodeURIComponent(_sbCfg.gamesTable), _sbCfg.url + '/');
      Object.entries(params || {}).forEach(([k, v]) => {
        if (v != null && v !== '') url.searchParams.set(k, String(v));
      });
      return url.toString();
    }

    function sbHeaders() {
      return {
        apikey: _sbCfg.publishableKey,
        Authorization: 'Bearer ' + _sbCfg.publishableKey,
        Accept: 'application/json'
      };
    }

    async function fetchGameById(id) {
      if (!_sbCfg) return null;
      const res = await fetch(buildSupabaseUrl({
        select: 'id,name,primary_color,secondary_color,nodes,links',
        id: 'eq.' + id,
        limit: '1'
      }), { cache: 'no-store', headers: sbHeaders() });
      if (!res.ok) return null;
      const rows = await res.json();
      return Array.isArray(rows) && rows.length ? rows[0] : null;
    }

    function gameNodeFromRow(row) {
      const nodes = Array.isArray(row && row.nodes) ? row.nodes : [];
      return nodes.find(n => n && n.type === 'game') || null;
    }

    function landingFromRow(row) {
      const gn = gameNodeFromRow(row);
      return {
        id: row.id || '',
        name: (gn && gn.title) || row.name || 'Untitled Game',
        subtitle: (gn && gn.guideName) || '',
        guideBio: (gn && gn.guideBio) || '',
        price: (gn && gn.price) || '',
        tags: Array.isArray(gn && gn.tags) ? gn.tags : [],
        descriptionText: (gn && gn.body) || '',
        descriptionHtml: null,
        logo: (gn && gn.logoUrl) || '',
        guideImage: (gn && gn.guideImageUrl) || 'https://upload.wikimedia.org/wikipedia/commons/6/60/Eugene_F._Kranz_at_his_console_at_the_NASA_Mission_Control_Center.jpg',
        favicon: '',
        thumbnail: '',
        tagline: (gn && gn.tagline) || '',
        primaryColor: (typeof row.primary_color === 'string' && row.primary_color.trim()) || '',
        secondaryColor: (typeof row.secondary_color === 'string' && row.secondary_color.trim()) || '',
        query: row.id || ''
      };
    }
    // ────────────────────────────────────────────────────────────────────────

    function showError(msg) {
      const el = document.getElementById('error');
      el.textContent = msg;
      el.style.display = '';
    }

    function escapeHtml(value) {
      return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function textToHtml(value) {
      return escapeHtml(value).replace(/\n/g, '<br>');
    }

    function launchGame() {
      document.getElementById('landing').style.display    = 'none';
      document.getElementById('game-shell').style.display = 'flex';
      document.body.classList.add('game-active');
      history.replaceState(null, '', '?game=' + encodeURIComponent(resolvedGameQuery));
      ['../index.css', 'game.css?v=1774511700'].forEach(href => {
        const l = document.createElement('link');
        l.rel = 'stylesheet'; l.href = href;
        document.head.appendChild(l);
      });
      const s = document.createElement('script');
      s.src = 'util/engine.js?v=1774522000';
      document.body.appendChild(s);
    }

    function mostRecentOldGame(games) {
      const active = games.filter(g => !g.archived);
      if (!active.length) return null;
      return active.reduce((a, b) => {
        const t = g => Math.max(
          g.createdAt ? new Date(g.createdAt).getTime() : 0,
          g.updatedAt ? new Date(g.updatedAt).getTime() : 0
        );
        return t(b) > t(a) ? b : a;
      });
    }

    function normalizeLegacyLandingGame(game) {
      return {
        id: game.id || '',
        name: game.name || game.id || 'Untitled Game',
        subtitle: game.subtitle || '',
        price: game.price || '',
        tags: String(game.tag || '').split(/[,;]+/).map(t => t.trim()).filter(Boolean),
        descriptionText: '',
        descriptionHtml: (game.description || '').trim(),
        logo: game.logo || '',
        favicon: game.favicon || '',
        thumbnail: game.thumbnail || '',
        query: game.name || game.id || ''
      };
    }

    function renderLanding(game) {
      if (game.primaryColor) document.documentElement.style.setProperty('--primary', game.primaryColor);
      if (game.secondaryColor) document.documentElement.style.setProperty('--secondary', game.secondaryColor);

      const shareQuery = game.query || game.name || game.id || '';
      const prodUrl = 'https://the-game-bureau.github.io/the-game-bureau/play/index.html?game=' + encodeURIComponent(shareQuery);
      const shareUrl = location.hostname === 'localhost' || location.hostname === '127.0.0.1'
        ? location.origin + location.pathname + '?game=' + encodeURIComponent(shareQuery)
        : prodUrl;
      const fullDescText = (game.descriptionText || '').trim();
      const fullDescHtml = game.descriptionHtml != null ? game.descriptionHtml : textToHtml(fullDescText);
      const firstLine = (fullDescText || String(fullDescHtml).replace(/<[^>]+>/g, ' '))
        .split('\n')[0]
        .trim();

      console.log('renderLanding game object:', { name: game.name, subtitle: game.subtitle, logo: game.logo, tagline: game.tagline });

      resolvedGameQuery = shareQuery;
      document.title = game.name || game.id;
      if (game.favicon) document.getElementById('favicon').href = game.favicon;

      document.getElementById('og-title').content = game.name || game.id;
      document.getElementById('og-description').content = firstLine;
      document.getElementById('og-url').content = prodUrl;
      document.getElementById('tw-title').content = game.name || game.id;
      document.getElementById('tw-description').content = firstLine;
      if (game.thumbnail) {
        document.getElementById('og-image').content = game.thumbnail;
        document.getElementById('tw-image').content = game.thumbnail;
      }

      const logo = document.getElementById('gameLogo');
      if (game.logo) {
        console.log('Setting gameLogo src:', game.logo);
        logo.src = game.logo;
        logo.classList.add('show');
        console.log('gameLogo classList after add:', logo.classList);
        logo.onerror = () => console.error('Failed to load gameLogo image:', game.logo);
      } else {
        console.log('No game.logo, hiding gameLogo');
        logo.removeAttribute('src');
        logo.classList.remove('show');
      }

      const gameTitleEl = document.getElementById('gameTitle');
      gameTitleEl.textContent = game.name || game.id;
      gameTitleEl.style.color = game.primaryColor || '';

      const taglineWrap = document.getElementById('taglineWrap');
      if (game.tagline) {
        document.getElementById('gameTagline').textContent = game.tagline;
        taglineWrap.querySelectorAll('.title-rule').forEach(r => r.style.background = game.primaryColor || '');
        taglineWrap.hidden = false;
      } else {
        taglineWrap.hidden = true;
      }

      const guideSection = document.getElementById('guideSection');
      const guideImage = document.getElementById('guideImage');
      if (game.subtitle) {
        console.log('Displaying guide section with subtitle:', game.subtitle);
        document.getElementById('guideVal').textContent = game.subtitle;
        const guideBioEl = document.getElementById('guideBio');
        if (game.guideBio) {
          guideBioEl.textContent = game.guideBio;
          guideBioEl.hidden = false;
        } else {
          guideBioEl.textContent = '';
          guideBioEl.hidden = true;
        }
        if (game.guideImage) {
          guideImage.src = game.guideImage;
          guideImage.classList.add('show');
        } else {
          guideImage.removeAttribute('src');
          guideImage.classList.remove('show');
        }
        guideSection.hidden = false;
      } else {
        console.log('No subtitle, hiding guide section');
        document.getElementById('guideVal').textContent = '';
        guideImage.removeAttribute('src');
        guideImage.classList.remove('show');
        guideSection.hidden = true;
      }

      const tagsEl = document.getElementById('tags');
      tagsEl.innerHTML = '';
      (game.tags || []).forEach((tag) => {
        const s = document.createElement('span');
        s.className = 'tag';
        s.textContent = tag;
        tagsEl.appendChild(s);
      });

      document.getElementById('desc').innerHTML = fullDescHtml;

      const priceEl = document.getElementById('price');
      if (game.price) {
        document.getElementById('priceVal').textContent = game.price;
        priceEl.classList.add('show');
      } else {
        document.getElementById('priceVal').textContent = '';
        priceEl.classList.remove('show');
      }

      const goBtnEl = document.getElementById('goBtn');
      goBtnEl.onclick = launchGame;
      goBtnEl.style.background = game.primaryColor || '';
      goBtnEl.style.color = game.secondaryColor || '';

      const px = Math.round(180 * Math.min(window.devicePixelRatio || 2, 3));
      document.getElementById('qrImg').src = 'https://api.qrserver.com/v1/create-qr-code/?size=' + px + 'x' + px + '&data=' + encodeURIComponent(shareUrl);

      document.getElementById('copyBtn').onclick = () => {
        window.location.href = 'sms:?body=' + encodeURIComponent(shareUrl);
      };

      document.getElementById('landing').style.display = 'block';
    }

    async function loadLandingGame() {
      try {
        // 1. Try Supabase by ID (new builder games)
        if (_sbCfg && requestedGame) {
          const row = await fetchGameById(requestedGame);
          if (row) {
            renderLanding(landingFromRow(row));
            return;
          }
        }

        // 2. Try legacy runtime graph
        if (window.TGBGamesNewRuntime) {
          const graphGame = await window.TGBGamesNewRuntime.loadGraphGame(requestedGame);
          if (graphGame) {
            const landing = window.TGBGamesNewRuntime.buildLandingData(graphGame);
            renderLanding({
              id: graphGame.id,
              name: landing.name,
              subtitle: landing.subtitle,
              price: landing.price,
              tags: landing.tags,
              descriptionText: landing.description,
              descriptionHtml: textToHtml(landing.description),
              logo: '',
              favicon: '',
              thumbnail: '',
              query: landing.query
            });
            return;
          }
        }

        // 3. Fall back to local games_archive.json
        const response = await fetch('data/games_archive.json', { cache: 'no-store' });
        const data = await response.json();
        const games = Array.isArray(data) ? data : (data.games || []);
        const matcher = window.TGBGamesNewRuntime ? window.TGBGamesNewRuntime.slugify : (value) => String(value || '').toLowerCase();
        const legacyGame = requestedGame
          ? (games.find((game) => matcher(game.id) === matcher(requestedGame) || matcher(game.name) === matcher(requestedGame)) || null)
          : mostRecentOldGame(games);
        if (!legacyGame) {
          showError('No games available.');
          return;
        }

        renderLanding(normalizeLegacyLandingGame(legacyGame));
      } catch (error) {
        showError('Could not load game data.');
      }
    }

    loadLandingGame();
  </script>

</body>
</html>
