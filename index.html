<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HOME | THE GAME BUREAU</title>
  <link rel="icon" href="assets/brand/tgb.ico" type="image/x-icon">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --paper: #eef1ea;
      --ink: #171511;
      --muted: #4f5a4e;
      --line: #171511;
    }

    body {
      min-height: 100svh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
      background: var(--paper);
      color: var(--ink);
      font-family: Georgia, 'Times New Roman', serif;
      text-align: center;
    }

    h1 {
      font-size: clamp(2.8rem, 10vw, 5.5rem);
      font-weight: 800;
      line-height: 0.92;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    p {
      margin-top: 1.25rem;
      color: var(--muted);
      font-size: clamp(1.1rem, 3vw, 1.5rem);
    }

    .admin-btn {
      position: fixed;
      right: 0.75rem;
      bottom: 0.75rem;
      padding: 0.25rem 0.55rem;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--paper);
      color: var(--muted);
      text-decoration: none;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 0.68rem;
      letter-spacing: 0.02em;
      opacity: 0.55;
    }

    .admin-btn:hover,
    .admin-btn:focus-visible {
      background: var(--ink);
      color: var(--paper);
      opacity: 1;
      outline: none;
    }
  </style>
</head>
<body>
  <main>
    <h1>The Game Bureau</h1>
    <p>The cure for the common tour.</p>
  </main>
  <a class="admin-btn" href="admin/">Admin</a>
</body>
</html>
