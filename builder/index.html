<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game Builder</title>
  <meta name="description" content="Build and organize phone-style text adventures in The Game Bureau's Game Builder.">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Game Builder">
  <meta property="og:description" content="Build and organize phone-style text adventures in The Game Bureau's Game Builder.">
  <meta property="og:image" content="share-thumbnail.png?v=1774985200">
  <meta property="og:image:type" content="image/png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Game Builder">
  <meta name="twitter:description" content="Build and organize phone-style text adventures in The Game Bureau's Game Builder.">
  <meta name="twitter:image" content="share-thumbnail.png?v=1774985200">
  <link rel="icon" type="image/svg+xml" href="message-bubble-icon.svg?v=1774985200">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Patrick+Hand&family=Shadows+Into+Light&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="builder_header.css?v=1775018800">
  <link rel="stylesheet" href="index.css?v=1775018800">
</head>
<body class="builder-page builder-page--games">
  <main class="games-page">
    <section class="games-page-hero" aria-label="Builder tools">
      <div class="games-page-brand">
        <div class="games-page-brand-copy">
          <p class="games-page-brand-kicker">The Game Bureau presents:</p>
          <h1 class="games-page-brand-title">Game Builder</h1>
        </div>
      </div>
      <div class="games-page-actions" role="toolbar" aria-label="Game actions">
        <div class="games-page-links" aria-label="Game links">
          <a class="games-page-link is-disabled" id="playGameLink" aria-disabled="true">Play</a>
          <a class="games-page-link" id="newGameLink" href="builder.html?new=1">New</a>
          <a class="games-page-link" id="editGameLink" href="builder.html">Edit</a>
          <a class="games-page-link is-disabled" id="renameGameLink" aria-disabled="true">Rename</a>
          <a class="games-page-link is-disabled" id="duplicateGameLink" aria-disabled="true">Duplicate</a>
          <a class="games-page-link is-disabled" id="archiveGameLink" aria-disabled="true">Archive</a>
        </div>
        <button class="pen-btn pen-btn--eraser" id="deleteGameBtn" type="button" disabled title="Erase" aria-label="Erase"><span class="pen-btn-eraser__word">Erase</span></button>
      </div>
    </section>

    <section class="games-board" aria-label="Games">
      <div class="games-grid" id="gamesGrid">
        <div class="games-empty">Loading Games</div>
      </div>
    </section>
  </main>

  <div class="context-menu" id="gamesContextMenu" hidden>
    <button class="context-menu-item" id="gamesMenuPlayBtn" type="button">Play</button>
    <button class="context-menu-item" id="gamesMenuNewBtn" type="button">New</button>
    <button class="context-menu-item" id="gamesMenuEditBtn" type="button">Edit</button>
    <button class="context-menu-item" id="gamesMenuRenameBtn" type="button">Rename</button>
    <button class="context-menu-item" id="gamesMenuDuplicateBtn" type="button">Duplicate</button>
    <button class="context-menu-item" id="gamesMenuArchiveBtn" type="button">Archive</button>
    <button class="context-menu-item" id="gamesMenuUnarchiveBtn" type="button" hidden>Unarchive</button>
    <button class="context-menu-item context-menu-item--danger" id="gamesMenuDeleteBtn" type="button">Erase</button>
  </div>

  <div class="erase-note-backdrop" id="eraseConfirmBackdrop" hidden>
    <div class="erase-note" role="dialog" aria-modal="true" aria-labelledby="eraseConfirmMessage">
      <p class="erase-note-message" id="eraseConfirmMessage">
        Are you sure you want to erase <span class="erase-note-game" id="eraseConfirmGameName">this game</span>?
      </p>
      <div class="erase-note-actions">
        <button class="erase-note-btn erase-note-btn--confirm" id="eraseConfirmYesBtn" type="button">Yup, Erase</button>
        <button class="erase-note-btn erase-note-btn--cancel" id="eraseConfirmNoBtn" type="button">Do Not Erase</button>
      </div>
    </div>
  </div>

  <script src="supabase-config.js?v=1774970400"></script>
  <script src="index.js?v=1775006200"></script>
</body>
</html>
