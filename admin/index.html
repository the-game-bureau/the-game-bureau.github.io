<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>ADMIN | THE GAME BUREAU</title>
  <link rel="icon" href="../assets/brand/tgb.ico" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }

    :root {
      --paper-base: #fefef9;
      --bic-blue: #2d4880;
      --bic-blue-rgb: 45, 72, 128;
      --paper-line-minor: rgba(var(--bic-blue-rgb), 0.22);
      --paper-line-major: rgba(190, 55, 55, 0.24);
      --ink: var(--bic-blue);
      --muted: rgba(var(--bic-blue-rgb), 0.72);
      --line: rgba(var(--bic-blue-rgb), 0.18);
      --accent: var(--bic-blue);
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Space Grotesk", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background:
        linear-gradient(var(--paper-line-minor) 1px, transparent 1px),
        linear-gradient(90deg, var(--paper-line-minor) 1px, transparent 1px),
        linear-gradient(var(--paper-line-major) 1px, transparent 1px),
        linear-gradient(90deg, var(--paper-line-major) 1px, transparent 1px),
        linear-gradient(180deg, var(--paper-base) 0%, rgba(var(--bic-blue-rgb), 0.05) 100%);
      background-size: 24px 24px, 24px 24px, 120px 120px, 120px 120px, 100% 100%;
      color: var(--ink);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .portal {
      width: min(480px, calc(100vw - 48px));
      padding: 48px 0;
      display: flex;
      flex-direction: column;
      gap: 40px;
    }

    .brand { display: flex; flex-direction: column; gap: 4px; }
    .kicker {
      font-family: "IBM Plex Mono", monospace;
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin: 0;
    }
    h1 {
      font-size: 2rem;
      font-weight: 700;
      margin: 0;
      letter-spacing: -0.02em;
    }

    .tools {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .tool-link {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 24px;
      background: rgba(255,255,255,0.7);
      border: 1px solid var(--line);
      border-radius: 10px;
      text-decoration: none;
      color: var(--ink);
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
    }
    .tool-link:hover {
      background: rgba(255,255,255,0.95);
      border-color: var(--accent);
      transform: translateY(-1px);
    }

    .tool-name {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: -0.01em;
    }
    .tool-desc {
      font-size: 0.82rem;
      color: var(--muted);
      margin-top: 2px;
    }
    .tool-arrow {
      font-size: 1.2rem;
      color: var(--muted);
      flex-shrink: 0;
    }

    .home-link {
      font-family: "IBM Plex Mono", monospace;
      font-size: 0.75rem;
      color: var(--muted);
      text-decoration: none;
      letter-spacing: 0.06em;
    }
    .home-link:hover { color: var(--ink); }
  </style>
</head>
<body>
  <main class="portal">
    <div class="brand">
      <p class="kicker">The Game Bureau</p>
      <h1>Admin</h1>
    </div>

    <div class="tools">
      <a class="tool-link" href="library.html">
        <div>
          <div class="tool-name">Library</div>
          <div class="tool-desc">Manage and publish games</div>
        </div>
        <span class="tool-arrow">→</span>
      </a>
      <a class="tool-link" href="builder/">
        <div>
          <div class="tool-name">Builder</div>
          <div class="tool-desc">Create and edit game content</div>
        </div>
        <span class="tool-arrow">→</span>
      </a>
      <a class="tool-link" href="photos.html">
        <div>
          <div class="tool-name">Photos</div>
          <div class="tool-desc">Review player photo submissions</div>
        </div>
        <span class="tool-arrow">→</span>
      </a>
    </div>

    <a class="home-link" href="../">← Home</a>
  </main>
</body>
</html>
