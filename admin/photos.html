<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>ADMIN | THE GAME BUREAU</title>
  <link rel="icon" href="../../assets/brand/tgb.ico" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <style>
    * { box-sizing: border-box; }

    :root {
      --paper-base: #fefef9;
      --bic-blue: #2d4880;
      --bic-blue-rgb: 45, 72, 128;
      --paper-shadow: rgba(var(--bic-blue-rgb), 0.12);
      --paper-line-minor: rgba(var(--bic-blue-rgb), 0.22);
      --paper-line-major: rgba(190, 55, 55, 0.24);
      --bic-red: #c23737;
      --ink: var(--bic-blue);
      --muted: rgba(var(--bic-blue-rgb), 0.72);
      --line: rgba(var(--bic-blue-rgb), 0.18);
      --paper: rgba(255,255,255,0.92);
      --mist: var(--paper-base);
      --accent: var(--bic-blue);
      --danger: #a03f2d;
      --success: #2f6b3d;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Space Grotesk", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background:
        linear-gradient(var(--paper-line-minor) 1px, transparent 1px),
        linear-gradient(90deg, var(--paper-line-minor) 1px, transparent 1px),
        linear-gradient(var(--paper-line-major) 1px, transparent 1px),
        linear-gradient(90deg, var(--paper-line-major) 1px, transparent 1px),
        linear-gradient(180deg, var(--paper-base) 0%, rgba(var(--bic-blue-rgb), 0.05) 100%);
      background-size: 24px 24px, 24px 24px, 120px 120px, 120px 120px, 100% 100%;
      color: var(--ink);
    }

    button,
    input {
      font: inherit;
    }

    .app {
      width: min(1180px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 24px 0 40px;
    }

    .topbar {
      display: flex;
      align-items: flex-start;
      justify-content: flex-end;
      gap: 16px;
      margin-bottom: 18px;
    }

    .topbar-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .admin-nav { display: flex; gap: 4px; }
    .admin-nav-link {
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 0.85rem;
      font-weight: 600;
      text-decoration: none;
      color: var(--muted);
      letter-spacing: 0.04em;
      transition: background 0.15s, color 0.15s;
    }
    .admin-nav-link:hover { background: var(--line); color: var(--ink); }
    .admin-nav-link--active { background: var(--accent); color: #fff; }

    .brand {
      display: grid;
      gap: 4px;
    }

    .section-head {
      display: grid;
      gap: 4px;
      margin: 0 0 14px;
    }

    .kicker {
      margin: 0;
      color: var(--accent);
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      color: var(--bic-blue);
      font-size: 4.5rem;
      letter-spacing: 0;
      line-height: 0.92;
      text-shadow: 0 6px 14px rgba(var(--bic-blue-rgb), 0.08);
    }

    h2 {
      margin: 0;
      color: var(--bic-blue);
      font-size: 3rem;
      letter-spacing: 0;
      line-height: 1;
    }

    .copy {
      margin: 0;
      max-width: 620px;
      color: var(--muted);
      line-height: 1.55;
    }

    .toolbar {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
      padding: 14px;
      margin-bottom: 18px;
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 18px 36px var(--paper-shadow);
    }

    .toolbar input {
      min-width: min(100%, 260px);
      flex: 1;
      height: 42px;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--ink);
      background: rgba(255,255,255,0.86);
    }

    .toolbar input:focus,
    .auth input:focus {
      outline: 2px solid rgba(var(--bic-blue-rgb), 0.24);
      outline-offset: 2px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 0 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--ink);
      background: rgba(255,255,255,0.92);
      font-weight: 800;
      text-decoration: none;
      cursor: pointer;
    }

    .btn.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: default;
    }

    .signout-btn {
      width: 42px;
      min-width: 42px;
      height: 42px;
      min-height: 42px;
      padding: 0;
      line-height: 0;
    }

    .signout-btn svg {
      width: 31px;
      height: 31px;
      display: block;
      flex: 0 0 auto;
    }

    .auth {
      width: min(430px, 100%);
      margin: 12vh auto 0;
      padding: 22px;
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 26px 60px rgba(var(--bic-blue-rgb), 0.18);
    }

    .auth h1 {
      margin-bottom: 10px;
      font-size: 2.4rem;
    }

    .auth-form {
      display: grid;
      gap: 12px;
      margin-top: 18px;
    }

    .auth-actions {
      display: flex;
      align-items: stretch;
      gap: 10px;
    }

    .auth-actions .btn.primary {
      flex: 1 1 auto;
    }

    .home-icon-btn {
      width: 44px;
      min-width: 44px;
      height: 42px;
      min-height: 42px;
      padding: 0;
      line-height: 0;
    }

    .home-icon-btn svg {
      display: block;
      width: 22px;
      height: 22px;
      flex: 0 0 auto;
    }

    .auth label {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 700;
    }

    .auth input {
      height: 44px;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--ink);
      background: rgba(255,255,255,0.86);
    }

    .status {
      min-height: 22px;
      margin: 10px 0 0;
      color: var(--muted);
      line-height: 1.45;
    }

    .status.error {
      color: var(--danger);
      font-weight: 700;
    }

    .status.success {
      color: var(--success);
      font-weight: 700;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
      gap: 14px;
    }

    .admin-section {
      margin-top: 34px;
    }

    .photo-card {
      position: relative;
      overflow: hidden;
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 18px 36px var(--paper-shadow);
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .photo-card.is-selected {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px var(--accent), 0 18px 36px var(--paper-shadow);
    }

    .photo-select {
      position: absolute;
      top: 8px;
      right: 8px;
      z-index: 2;
      width: 28px;
      height: 28px;
      display: grid;
      place-items: center;
      padding: 0;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: rgba(255,255,255,0.9);
      color: var(--ink);
      cursor: pointer;
      font-size: 16px;
      font-weight: 800;
      line-height: 1;
      user-select: none;
    }

    .photo-select:hover { background: var(--paper); }
    .photo-select[aria-pressed="true"] {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .photo-link {
      display: block;
      width: 100%;
      aspect-ratio: 4 / 3;
      background:
        linear-gradient(var(--paper-line-minor) 1px, transparent 1px),
        linear-gradient(90deg, var(--paper-line-minor) 1px, transparent 1px),
        rgba(var(--bic-blue-rgb), 0.08);
      background-size: 24px 24px, 24px 24px, 100% 100%;
      border: 0;
      padding: 0;
      cursor: zoom-in;
    }

    .photo-link img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
    }

    .meta {
      display: grid;
      gap: 6px;
      padding: 12px;
      font-size: 0.86rem;
      line-height: 1.35;
    }

    .meta strong {
      font-size: 0.95rem;
    }

    .meta span {
      color: var(--muted);
      word-break: break-word;
    }

    .empty {
      display: grid;
      place-items: center;
      grid-column: 1 / -1;
      min-height: 260px;
      padding: 24px;
      color: var(--muted);
      background: var(--paper);
      border: 1px dashed var(--line);
      border-radius: 8px;
      text-align: center;
    }

    .lightbox {
      position: fixed;
      inset: 0;
      z-index: 30;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: rgba(2, 6, 23, 0.88);
    }

    .lightbox.open {
      display: flex;
    }

    .lightbox img {
      max-width: 100%;
      max-height: 100%;
      border-radius: 8px;
      background: #fff;
    }

    .lightbox-close {
      position: fixed;
      top: 16px;
      right: 16px;
      width: 42px;
      height: 42px;
      border: 1px solid rgba(255,255,255,0.35);
      border-radius: 8px;
      color: #fff;
      background: rgba(0,0,0,0.35);
      cursor: pointer;
      font-size: 1.2rem;
      font-weight: 900;
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 700px) {
      .app {
        width: min(100vw - 22px, 1180px);
        padding-top: 16px;
      }

      .topbar {
        display: grid;
      }

      .topbar-actions {
        justify-content: stretch;
      }

      .topbar-actions .btn {
        flex: 1;
      }

      .topbar-actions .signout-btn {
        flex: 0 0 42px;
      }

      h1 {
        font-size: 3rem;
      }

      h2 {
        font-size: 2rem;
      }

      .toolbar {
        display: grid;
      }

      .toolbar input,
      .toolbar .btn {
        width: 100%;
      }

    }
  </style>
</head>
<body>
  <main class="app">
    <section class="auth" id="authPanel">
      <p class="kicker">The Game Bureau</p>
      <h1>Admin</h1>
      <p class="copy">Sign in with an admin account.</p>
      <form class="auth-form" id="authForm">
        <label>
          Email
          <input id="emailInput" type="email" autocomplete="username" required>
        </label>
        <label>
          Password
          <input id="passwordInput" type="password" autocomplete="current-password" required>
        </label>
        <div class="auth-actions">
          <button class="btn primary" id="signInBtn" type="submit">Sign In</button>
          <a class="btn home-icon-btn" href="../" aria-label="Home" title="Home">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M4 11.2 12 4l8 7.2" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M6.5 10.5V20h11v-9.5" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M10 20v-5h4v5" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </a>
        </div>
      </form>
      <p class="status" id="authStatus" aria-live="polite"></p>
    </section>

    <section id="reviewPanel" class="hidden">
      <div class="topbar">
        <div class="topbar-actions">
          <a class="btn" href="./">← Admin</a>
          <button class="btn signout-btn" id="signOutBtn" type="button" aria-label="Sign out" title="Sign out">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="12" cy="8" r="3.5" fill="none" stroke="currentColor" stroke-width="1.8"/>
              <path d="M5.5 19.5c1.2-3.4 3.8-5.1 6.5-5.1s5.3 1.7 6.5 5.1" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            </svg>
          </button>
        </div>
      </div>

      <section class="admin-section" aria-labelledby="photosHeading">
        <div class="section-head">
          <p class="kicker">Review</p>
          <h2 id="photosHeading">Recent Photos</h2>
          <p class="copy">Player photo submissions from live games.</p>
        </div>

        <div class="toolbar">
          <input id="gameFilterInput" type="text" placeholder="Filter by game id">
          <button class="btn primary" id="refreshBtn" type="button">Refresh</button>
          <button class="btn" id="clearFilterBtn" type="button">Clear</button>
          <button class="btn" id="selectAllBtn" type="button" disabled>Select All</button>
          <button class="btn" id="deselectAllBtn" type="button" disabled>Deselect</button>
          <button class="btn primary" id="downloadZipBtn" type="button" disabled>Download ZIP</button>
          <button class="btn" id="deleteSelectedBtn" type="button" disabled style="border-color:#c23737;color:#c23737">Delete</button>
        </div>

        <p class="status" id="reviewStatus" aria-live="polite"></p>
        <div class="grid" id="photoGrid"></div>
      </section>
    </section>
  </main>

  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" id="lightboxClose" type="button" aria-label="Close">x</button>
    <img id="lightboxImage" src="" alt="">
  </div>

  <script>
    const SUPABASE_CONFIG = {
      url: 'https://qmaafbncpzrdmqapkkgr.supabase.co',
      publishableKey: 'sb_publishable_6a9XqxYa0-AZtyrwz4ZeUg_aiMsVH-3'
    };

    const AUTH_STORAGE_KEY = 'tgb-photo-review-auth-session';
    const PHOTO_BUCKET = 'game-photo-submissions';
    const PAGE_LIMIT = 60;
    const SIGNED_URL_SECONDS = 60 * 60;

    const authPanel = document.getElementById('authPanel');
    const reviewPanel = document.getElementById('reviewPanel');
    const authForm = document.getElementById('authForm');
    const emailInput = document.getElementById('emailInput');
    const passwordInput = document.getElementById('passwordInput');
    const signInBtn = document.getElementById('signInBtn');
    const signOutBtn = document.getElementById('signOutBtn');
    const refreshBtn = document.getElementById('refreshBtn');
    const clearFilterBtn = document.getElementById('clearFilterBtn');
    const selectAllBtn = document.getElementById('selectAllBtn');
    const deselectAllBtn = document.getElementById('deselectAllBtn');
    const downloadZipBtn = document.getElementById('downloadZipBtn');
    const deleteSelectedBtn = document.getElementById('deleteSelectedBtn');
    const gameFilterInput = document.getElementById('gameFilterInput');
    const authStatus = document.getElementById('authStatus');
    const reviewStatus = document.getElementById('reviewStatus');
    const photoGrid = document.getElementById('photoGrid');
    const lightbox = document.getElementById('lightbox');
    const lightboxImage = document.getElementById('lightboxImage');
    const lightboxClose = document.getElementById('lightboxClose');

    let currentSession = null;

    function authUrl(path) {
      return new URL('/auth/v1/' + String(path || '').replace(/^\/+/, ''), SUPABASE_CONFIG.url + '/').toString();
    }

    function restUrl(table, params = {}) {
      const url = new URL('/rest/v1/' + encodeURIComponent(table), SUPABASE_CONFIG.url + '/');
      Object.entries(params).forEach(([key, value]) => {
        if (value !== undefined && value !== null && value !== '') {
          url.searchParams.set(key, String(value));
        }
      });
      return url.toString();
    }

    function encodeStoragePath(path) {
      return String(path || '').split('/').map(encodeURIComponent).join('/');
    }

    function storageSignUrl(bucket, path) {
      const objectPath = encodeURIComponent(bucket) + '/' + encodeStoragePath(path);
      return new URL('/storage/v1/object/sign/' + objectPath, SUPABASE_CONFIG.url + '/').toString();
    }

    function resolveSignedStorageUrl(value) {
      const signed = String(value || '').trim();
      if (!signed) return '';
      if (/^https?:\/\//i.test(signed)) return signed;

      const origin = new URL(SUPABASE_CONFIG.url).origin;
      if (signed.startsWith('/storage/v1/')) return origin + signed;
      if (signed.startsWith('/object/')) return origin + '/storage/v1' + signed;
      if (signed.startsWith('storage/v1/')) return origin + '/' + signed;
      if (signed.startsWith('object/')) return origin + '/storage/v1/' + signed;

      return new URL(signed, origin + '/storage/v1/').toString();
    }

    function setStatus(el, message, state = '') {
      if (!el) return;
      el.textContent = message || '';
      el.classList.toggle('error', state === 'error');
      el.classList.toggle('success', state === 'success');
    }

    async function readError(response, fallback) {
      try {
        const text = await response.text();
        if (!text) return fallback;
        try {
          const payload = JSON.parse(text);
          const message = payload.message || payload.msg || payload.error_description || payload.error || text;
          if (/public\.admin_users|admin_users/i.test(message) && /schema cache|could not find/i.test(message)) {
            return 'Admin access is not set up yet. Run docs/supabase/photo-submissions.sql in Supabase, then add your email to public.admin_users.';
          }
          return message;
        } catch (error) {
          return text;
        }
      } catch (error) {
        return fallback;
      }
    }

    function readStoredSession() {
      try {
        return JSON.parse(localStorage.getItem(AUTH_STORAGE_KEY) || 'null');
      } catch (error) {
        return null;
      }
    }

    function storeSession(session) {
      try {
        if (session) localStorage.setItem(AUTH_STORAGE_KEY, JSON.stringify(session));
        else localStorage.removeItem(AUTH_STORAGE_KEY);
      } catch (error) {
      }
    }

    async function signIn(email, password) {
      const response = await fetch(authUrl('token?grant_type=password'), {
        method: 'POST',
        headers: {
          apikey: SUPABASE_CONFIG.publishableKey,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ email, password })
      });

      if (!response.ok) {
        throw new Error(await readError(response, 'Sign in failed.'));
      }

      return response.json();
    }

    async function refreshSession(session) {
      if (!session || !session.refresh_token) return null;
      const response = await fetch(authUrl('token?grant_type=refresh_token'), {
        method: 'POST',
        headers: {
          apikey: SUPABASE_CONFIG.publishableKey,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ refresh_token: session.refresh_token })
      });

      if (!response.ok) return null;
      return response.json();
    }

    async function getUsableSession() {
      const stored = readStoredSession();
      if (!stored || !stored.access_token) return null;
      const expiresAt = Number(stored.expires_at || 0) * 1000;
      if (expiresAt && expiresAt > Date.now() + 60000) return stored;
      const refreshed = await refreshSession(stored);
      if (refreshed && refreshed.access_token) {
        storeSession(refreshed);
        return refreshed;
      }
      storeSession(null);
      return null;
    }

    function authHeaders(extra = {}) {
      return {
        apikey: SUPABASE_CONFIG.publishableKey,
        Authorization: 'Bearer ' + currentSession.access_token,
        ...extra
      };
    }

    async function verifyAdmin() {
      const email = currentSession && currentSession.user ? currentSession.user.email : '';
      const response = await fetch(restUrl('admin_users', {
        select: 'email',
        email: 'eq.' + email,
        limit: '1'
      }), {
        headers: authHeaders({ Accept: 'application/json' }),
        cache: 'no-store'
      });

      if (!response.ok) {
        throw new Error(await readError(response, 'Could not verify admin access.'));
      }

      const rows = await response.json();
      return Array.isArray(rows) && rows.length > 0;
    }

    async function fetchSubmissions() {
      const gameFilter = String(gameFilterInput.value || '').trim();
      const params = {
        select: 'id,created_at,game_id,player_id,storage_bucket,storage_path,file_name,mime_type,file_size,stop_id,stop_title,stop_index,flow_kind,status',
        order: 'created_at.desc',
        limit: String(PAGE_LIMIT)
      };
      if (gameFilter) params.game_id = 'eq.' + gameFilter;

      const response = await fetch(restUrl('photo_submissions', params), {
        headers: authHeaders({ Accept: 'application/json' }),
        cache: 'no-store'
      });

      if (!response.ok) {
        throw new Error(await readError(response, 'Could not load photos.'));
      }

      return response.json();
    }

    async function createSignedUrl(row) {
      const bucket = row.storage_bucket || PHOTO_BUCKET;
      const response = await fetch(storageSignUrl(bucket, row.storage_path), {
        method: 'POST',
        headers: authHeaders({
          'Content-Type': 'application/json',
          Accept: 'application/json'
        }),
        body: JSON.stringify({ expiresIn: SIGNED_URL_SECONDS })
      });

      if (!response.ok) {
        throw new Error(await readError(response, 'Could not sign photo URL.'));
      }

      const payload = await response.json();
      const signed = payload.signedURL || payload.signedUrl || payload.signed_url || '';
      return resolveSignedStorageUrl(signed);
    }

    function formatDate(value) {
      if (!value) return '';
      try {
        return new Intl.DateTimeFormat(undefined, {
          dateStyle: 'medium',
          timeStyle: 'short'
        }).format(new Date(value));
      } catch (error) {
        return String(value);
      }
    }

    function formatSize(bytes) {
      const size = Number(bytes || 0);
      if (!size) return '';
      if (size < 1024 * 1024) return Math.round(size / 1024) + ' KB';
      return (size / (1024 * 1024)).toFixed(1) + ' MB';
    }

    function openLightbox(src, alt) {
      lightboxImage.src = src;
      lightboxImage.alt = alt || 'Submitted photo';
      lightbox.classList.add('open');
    }

    function closeLightbox() {
      lightbox.classList.remove('open');
      lightboxImage.src = '';
      lightboxImage.alt = '';
    }

    function escapeHtml(value) {
      return String(value || '').replace(/[&<>"']/g, (ch) => (
        ch === '&' ? '&amp;'
          : ch === '<' ? '&lt;'
          : ch === '>' ? '&gt;'
          : ch === '"' ? '&quot;'
          : '&#39;'
      ));
    }

    function renderEmpty(message) {
      photoGrid.innerHTML = '<div class="empty">' + escapeHtml(message) + '</div>';
    }

    let currentPhotos = [];
    const selectedPhotoIds = new Set();

    function updateSelectionUi() {
      const count = selectedPhotoIds.size;
      if (downloadZipBtn) {
        downloadZipBtn.disabled = count === 0;
        downloadZipBtn.textContent = count > 0 ? `Download ZIP (${count})` : 'Download ZIP';
      }
      if (deleteSelectedBtn) {
        deleteSelectedBtn.disabled = count === 0;
        deleteSelectedBtn.textContent = count > 0 ? `Delete (${count})` : 'Delete';
      }
      if (selectAllBtn) selectAllBtn.disabled = !currentPhotos.length;
      if (deselectAllBtn) deselectAllBtn.disabled = count === 0;
    }

    function togglePhotoSelection(id, force) {
      if (!id) return;
      const shouldSelect = typeof force === 'boolean' ? force : !selectedPhotoIds.has(id);
      if (shouldSelect) selectedPhotoIds.add(id);
      else selectedPhotoIds.delete(id);
      const card = photoGrid.querySelector(`[data-card-id="${CSS.escape(id)}"]`);
      if (card) {
        card.classList.toggle('is-selected', shouldSelect);
        const btn = card.querySelector('.photo-select');
        if (btn) btn.setAttribute('aria-pressed', shouldSelect ? 'true' : 'false');
      }
      updateSelectionUi();
    }

    function renderPhotos(items) {
      currentPhotos = Array.isArray(items) ? items : [];
      const validIds = new Set(currentPhotos.map((item) => String(item.id || '')));
      [...selectedPhotoIds].forEach((id) => { if (!validIds.has(id)) selectedPhotoIds.delete(id); });

      if (!currentPhotos.length) {
        renderEmpty('No photos found.');
        updateSelectionUi();
        return;
      }

      photoGrid.innerHTML = currentPhotos.map((item, index) => {
        const id = String(item.id || '');
        const isSelected = selectedPhotoIds.has(id);
        return `
          <article class="photo-card${isSelected ? ' is-selected' : ''}" data-card-id="${escapeAttr(id)}">
            <button class="photo-select" type="button" data-select-id="${escapeAttr(id)}" aria-pressed="${isSelected}" aria-label="Select photo">${isSelected ? '\u2713' : ''}</button>
            <button class="photo-link" type="button" data-index="${index}" aria-label="Open photo">
              <img src="${escapeHtml(item.signedUrl)}" alt="${escapeHtml(item.file_name || 'Submitted photo')}" loading="lazy">
            </button>
            <div class="meta">
              <strong>${escapeHtml(item.stop_title || item.game_id || 'Photo')}</strong>
              <span>${escapeHtml(formatDate(item.created_at))}</span>
              <span>Game: ${escapeHtml(item.game_id)}</span>
              <span>Player: ${escapeHtml(item.player_id)}</span>
              <span>${escapeHtml(item.file_name || '')}${item.file_size ? ' - ' + escapeHtml(formatSize(item.file_size)) : ''}</span>
              <span>${escapeHtml(item.status || 'submitted')}</span>
            </div>
          </article>
        `;
      }).join('');

      photoGrid.querySelectorAll('.photo-link').forEach((button) => {
        button.addEventListener('click', () => {
          const index = Number(button.dataset.index || -1);
          const item = currentPhotos[index];
          if (item && item.signedUrl) openLightbox(item.signedUrl, item.file_name);
        });
      });

      photoGrid.querySelectorAll('.photo-select').forEach((button) => {
        button.addEventListener('click', (event) => {
          event.stopPropagation();
          togglePhotoSelection(button.dataset.selectId);
        });
      });

      updateSelectionUi();
    }

    function escapeAttr(value) {
      return escapeHtml(value);
    }

    function buildZipFileName(item, usedNames) {
      const originalName = String(item && item.file_name || '').trim();
      const safeGame = String(item && item.game_id || 'game').replace(/[^A-Za-z0-9_-]+/g, '_');
      const safePlayer = String(item && item.player_id || 'player').replace(/[^A-Za-z0-9_-]+/g, '_');
      const ext = (originalName.match(/\.[A-Za-z0-9]+$/) || ['.jpg'])[0];
      const baseName = originalName
        ? originalName.replace(/[^A-Za-z0-9._-]+/g, '_')
        : `${safePlayer}_${String(item.id || '').slice(0, 8)}${ext}`;
      let candidate = `${safeGame}/${baseName}`;
      let counter = 2;
      while (usedNames.has(candidate)) {
        const dot = baseName.lastIndexOf('.');
        const stem = dot > 0 ? baseName.slice(0, dot) : baseName;
        const tail = dot > 0 ? baseName.slice(dot) : '';
        candidate = `${safeGame}/${stem}_${counter}${tail}`;
        counter += 1;
      }
      usedNames.add(candidate);
      return candidate;
    }

    async function downloadSelectedAsZip() {
      if (typeof JSZip !== 'function') {
        setStatus(reviewStatus, 'ZIP library failed to load.', 'error');
        return;
      }
      const selected = currentPhotos.filter((item) => selectedPhotoIds.has(String(item.id || '')));
      if (!selected.length) return;

      downloadZipBtn.disabled = true;
      const originalLabel = downloadZipBtn.textContent;
      downloadZipBtn.textContent = `Zipping 0/${selected.length}...`;
      setStatus(reviewStatus, `Building ZIP for ${selected.length} photo${selected.length === 1 ? '' : 's'}...`);

      try {
        const zip = new JSZip();
        const usedNames = new Set();
        let done = 0;
        for (const item of selected) {
          if (!item.signedUrl) { done += 1; continue; }
          try {
            const response = await fetch(item.signedUrl);
            if (!response.ok) throw new Error('HTTP ' + response.status);
            const blob = await response.blob();
            zip.file(buildZipFileName(item, usedNames), blob);
          } catch (err) {
            console.warn('Could not fetch for zip:', item.id, err);
          }
          done += 1;
          downloadZipBtn.textContent = `Zipping ${done}/${selected.length}...`;
        }

        const zipBlob = await zip.generateAsync({ type: 'blob' }, (meta) => {
          downloadZipBtn.textContent = `Packing ${Math.round(meta.percent)}%`;
        });
        const url = URL.createObjectURL(zipBlob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `photos-${new Date().toISOString().slice(0, 10)}.zip`;
        document.body.appendChild(a);
        a.click();
        a.remove();
        setTimeout(() => URL.revokeObjectURL(url), 2000);

        setStatus(reviewStatus, `Downloaded ${selected.length} photo${selected.length === 1 ? '' : 's'}.`, 'success');
      } catch (err) {
        console.error(err);
        setStatus(reviewStatus, 'Could not build ZIP: ' + (err instanceof Error ? err.message : String(err)), 'error');
      } finally {
        downloadZipBtn.textContent = originalLabel;
        updateSelectionUi();
      }
    }

    async function deleteSelectedPhotos() {
      const selected = currentPhotos.filter((item) => selectedPhotoIds.has(String(item.id || '')));
      if (!selected.length) return;
      const confirmed = window.confirm(
        `Permanently delete ${selected.length} photo${selected.length === 1 ? '' : 's'}?\n\n`
        + `This removes the file from storage and the submission record from the database. Cannot be undone.`
      );
      if (!confirmed) return;

      deleteSelectedBtn.disabled = true;
      const originalLabel = deleteSelectedBtn.textContent;
      deleteSelectedBtn.textContent = `Deleting 0/${selected.length}...`;
      setStatus(reviewStatus, `Deleting ${selected.length} photo${selected.length === 1 ? '' : 's'}...`);

      let deletedCount = 0;
      const failures = [];
      for (const item of selected) {
        try {
          // Remove storage object first so we don't end up with orphaned files if the row delete fails.
          if (item.storage_path) {
            const bucket = item.storage_bucket || PHOTO_BUCKET;
            const storageUrl = new URL(
              '/storage/v1/object/' + encodeURIComponent(bucket) + '/' + encodeStoragePath(item.storage_path),
              SUPABASE_CONFIG.url + '/'
            ).toString();
            const storageRes = await fetch(storageUrl, { method: 'DELETE', headers: authHeaders() });
            if (!storageRes.ok && storageRes.status !== 404) {
              throw new Error(await readError(storageRes, 'storage DELETE failed'));
            }
          }

          const rowUrl = restUrl('photo_submissions', { id: 'eq.' + item.id });
          const rowRes = await fetch(rowUrl, { method: 'DELETE', headers: authHeaders() });
          if (!rowRes.ok) {
            throw new Error(await readError(rowRes, 'row DELETE failed'));
          }

          selectedPhotoIds.delete(String(item.id));
          deletedCount += 1;
          deleteSelectedBtn.textContent = `Deleting ${deletedCount}/${selected.length}...`;
        } catch (err) {
          console.error('Delete failed for', item && item.id, err);
          failures.push(item && item.id);
        }
      }

      deleteSelectedBtn.textContent = originalLabel;

      if (failures.length) {
        setStatus(
          reviewStatus,
          `Deleted ${deletedCount}; ${failures.length} failed.`,
          failures.length === selected.length ? 'error' : ''
        );
      } else {
        setStatus(reviewStatus, `Deleted ${deletedCount} photo${deletedCount === 1 ? '' : 's'}.`, 'success');
      }

      await loadPhotos();
    }

    async function loadPhotos() {
      refreshBtn.disabled = true;
      setStatus(reviewStatus, 'Loading photos...');
      renderEmpty('Loading...');

      try {
        const rows = await fetchSubmissions();
        const withUrls = await Promise.all(rows.map(async (row) => {
          try {
            return {
              ...row,
              signedUrl: await createSignedUrl(row)
            };
          } catch (error) {
            console.warn('Could not sign photo URL.', row && row.storage_path, error);
            return {
              ...row,
              signedUrl: ''
            };
          }
        }));
        const visibleRows = withUrls.filter((row) => row.signedUrl);
        renderPhotos(visibleRows);
        const skipped = withUrls.length - visibleRows.length;
        const suffix = skipped ? ' ' + skipped + ' could not be previewed.' : '';
        setStatus(reviewStatus, 'Showing ' + visibleRows.length + ' recent photo' + (visibleRows.length === 1 ? '.' : 's.') + suffix, 'success');
      } catch (error) {
        console.error(error);
        renderEmpty('Could not load photos.');
        setStatus(reviewStatus, error instanceof Error ? error.message : String(error), 'error');
      } finally {
        refreshBtn.disabled = false;
      }
    }

    function showAuth() {
      authPanel.classList.remove('hidden');
      reviewPanel.classList.add('hidden');
      setStatus(authStatus, 'Sign in with an admin account.');
    }

    async function showReview(session) {
      currentSession = session;
      authPanel.classList.add('hidden');
      reviewPanel.classList.remove('hidden');
      await loadPhotos();
    }

    authForm.addEventListener('submit', async (event) => {
      event.preventDefault();
      const email = String(emailInput.value || '').trim();
      const password = String(passwordInput.value || '');
      if (!email || !password) return;

      signInBtn.disabled = true;
      setStatus(authStatus, 'Signing in...');
      try {
        const session = await signIn(email, password);
        currentSession = session;
        storeSession(session);
        const isAdmin = await verifyAdmin();
        if (!isAdmin) {
          storeSession(null);
          currentSession = null;
          throw new Error('This account is signed in, but it is not on the photo admin list.');
        }
        passwordInput.value = '';
        setStatus(authStatus, '');
        await showReview(session);
      } catch (error) {
        setStatus(authStatus, error instanceof Error ? error.message : String(error), 'error');
      } finally {
        signInBtn.disabled = false;
      }
    });

    signOutBtn.addEventListener('click', () => {
      currentSession = null;
      storeSession(null);
      photoGrid.innerHTML = '';
      showAuth();
    });

    refreshBtn.addEventListener('click', loadPhotos);
    clearFilterBtn.addEventListener('click', () => {
      gameFilterInput.value = '';
      loadPhotos();
    });
    if (selectAllBtn) {
      selectAllBtn.addEventListener('click', () => {
        currentPhotos.forEach((item) => {
          const id = String(item.id || '');
          if (id) togglePhotoSelection(id, true);
        });
      });
    }
    if (deselectAllBtn) {
      deselectAllBtn.addEventListener('click', () => {
        [...selectedPhotoIds].forEach((id) => togglePhotoSelection(id, false));
      });
    }
    if (downloadZipBtn) {
      downloadZipBtn.addEventListener('click', downloadSelectedAsZip);
    }
    if (deleteSelectedBtn) {
      deleteSelectedBtn.addEventListener('click', deleteSelectedPhotos);
    }
    gameFilterInput.addEventListener('keydown', (event) => {
      if (event.key !== 'Enter') return;
      event.preventDefault();
      loadPhotos();
    });

    lightbox.addEventListener('click', (event) => {
      if (event.target === lightbox) closeLightbox();
    });
    lightboxClose.addEventListener('click', closeLightbox);
    document.addEventListener('keydown', (event) => {
      if (event.key === 'Escape') closeLightbox();
    });

    (async function init() {
      const initialParams = new URLSearchParams(window.location.search);
      gameFilterInput.value = initialParams.get('game') || initialParams.get('id') || '';

      const session = await getUsableSession();
      if (!session) {
        showAuth();
        return;
      }

      currentSession = session;
      try {
        const isAdmin = await verifyAdmin();
        if (!isAdmin) {
          storeSession(null);
          currentSession = null;
          showAuth();
          setStatus(authStatus, 'This account is signed in, but it is not on the photo admin list.', 'error');
          return;
        }
        await showReview(session);
      } catch (error) {
        console.error(error);
        storeSession(null);
        currentSession = null;
        showAuth();
        setStatus(authStatus, error instanceof Error ? error.message : String(error), 'error');
      }
    })();
  </script>
</body>
</html>
