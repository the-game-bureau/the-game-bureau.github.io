name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Regenerate asset manifest
        run: |
          python3 << 'EOF'
          import os, json
          exts = {'.jpg','.jpeg','.png','.gif','.svg','.webp','.avif','.ico','.bmp','.tiff','.tif'}
          exclude = {'404.webp','builder.ico','builder.png','share-thumbnail.png'}
          files = sorted(f for f in os.listdir('assets') if os.path.splitext(f)[1].lower() in exts and f not in exclude)
          with open('assets/asset-manifest.json','w') as fh:
              json.dump({'files': files}, fh, indent=2)
              fh.write('\n')
          print(f'Wrote {len(files)} entries to asset-manifest.json')
          EOF

      - name: Build public site
        run: |
          rsync -av \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='README.md' \
            --filter='dir-merge,- .gitignore' \
            --exclude='private/' \
            . _site/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - uses: actions/deploy-pages@v5
        id: deployment
