<!DOCTYPE html>
<!--
  File: builder_games.html
  Purpose: Simple editor for games.json — manages the game catalogue shown on the homepage.
  Saves to: sms/games/games.json (../games/games.json relative to this file)
-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Games Editor</title>
  <link rel="icon" href="builder.ico" type="image/x-icon">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:     #ffffff;
      --ink:    #111827;
      --panel:  #f3f4f6;
      --line:   #e5e7eb;
      --accent: #1a73e8;
      --danger: #e85568;
      --ok:     #2d6a4f;
      --warn:   #9c6500;
      --font:   -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
    }

    /* ── HEADER ── */
    header {
      background: #f9f9f9;
      border-bottom: 1px solid var(--line);
      padding: 0.5rem 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex-shrink: 0;
    }
    header h1 { font-size: 0.9rem; font-weight: 700; color: var(--ink); }
    .header-btns { display: flex; gap: .5rem; }

    /* ── MAIN LAYOUT ── */
    main {
      display: grid;
      grid-template-columns: 280px 1fr;
      overflow: hidden;
      height: calc(100vh - 44px - 32px);
    }

    /* ── GAME LIST ── */
    .game-list {
      border-right: 1px solid var(--line);
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      display: flex;
      flex-direction: column;
    }
    .list-header {
      padding: .6rem 1rem;
      font-size: .72rem;
      font-weight: 600;
      color: #6b7280;
      letter-spacing: .05em;
      text-transform: uppercase;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .game-row {
      padding: .7rem 1rem;
      border-bottom: 1px solid var(--line);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: .6rem;
      font-size: .9rem;
      transition: background .1s;
    }
    .game-row:hover { background: var(--panel); }
    .game-row.active { background: var(--accent); color: #fff; }
    .game-row .row-emoji { font-size: 1.1rem; flex-shrink: 0; }
    .game-row .row-name { flex: 1; font-weight: 600; }
    .game-row .row-inactive { font-size: .65rem; opacity: .65; margin-left: auto; }

    /* ── FORM PANEL ── */
    .form-panel {
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 1.5rem;
    }
    .empty-state {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      font-size: .9rem;
      color: #6b7280;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem 1.5rem;
      max-width: 760px;
    }
    .form-grid .full { grid-column: span 2; }

    .field { display: flex; flex-direction: column; gap: .35rem; }
    .field label {
      font-size: .72rem;
      font-weight: 600;
      color: #6b7280;
      letter-spacing: .04em;
      text-transform: uppercase;
    }
    .field input[type="text"],
    .field input[type="url"],
    .field textarea {
      font-family: var(--font);
      font-size: 1rem;
      padding: 0.6rem 1rem;
      background: var(--panel);
      border: 2px solid var(--line);
      border-radius: 24px;
      color: var(--ink);
      outline: none;
      transition: border-color .2s;
      -webkit-appearance: none;
      appearance: none;
    }
    .field input:focus,
    .field textarea:focus { border-color: var(--accent); }
    .field input::placeholder,
    .field textarea::placeholder { color: #9ca3af; }
    .field textarea { resize: vertical; min-height: 80px; line-height: 1.5; border-radius: 12px; }

    .color-row { display: flex; gap: .5rem; align-items: center; }
    .color-row input[type="color"] {
      width: 44px; height: 42px; padding: 2px;
      cursor: pointer; border: 2px solid var(--line); border-radius: 12px;
      background: var(--panel);
    }
    .color-row input[type="text"] { flex: 1; }

    .checkbox-row {
      display: flex;
      gap: 1.5rem;
      align-items: center;
      padding: .55rem 0;
    }
    .checkbox-row label {
      display: flex;
      align-items: center;
      gap: .4rem;
      font-size: .9rem;
      color: var(--ink);
      cursor: pointer;
    }
    .checkbox-row input[type="checkbox"] {
      width: 15px;
      height: 15px;
      accent-color: var(--accent);
      cursor: pointer;
    }

    .form-actions {
      display: flex;
      gap: .75rem;
      margin-top: 1.5rem;
      align-items: center;
    }

    /* ── BUTTONS ── */
    .btn {
      font-family: var(--font);
      font-size: .9rem;
      font-weight: 600;
      padding: .5rem 1.1rem;
      border: 2px solid var(--line);
      background: transparent;
      color: var(--ink);
      cursor: pointer;
      border-radius: 8px;
      transition: background .12s, color .12s, opacity .1s;
    }
    .btn:hover { background: var(--panel); }
    .btn:active { opacity: 0.6; }
    .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
    .btn-primary:hover { background: #1557b0; border-color: #1557b0; }
    .btn-danger { border-color: var(--danger); color: var(--danger); }
    .btn-danger:hover { background: var(--danger); color: #fff; }
    .btn-sm { padding: .25rem .65rem; font-size: .72rem; border-radius: 8px; }

    /* ── STATUS BAR ── */
    footer {
      border-top: 1px solid var(--line);
      padding: .4rem 1.5rem;
      font-size: .72rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      min-height: 32px;
      background: #f9f9f9;
    }
    #status { color: #6b7280; }
    #status.ok   { color: var(--ok);     }
    #status.warn { color: var(--warn);   }
    #status.err  { color: var(--danger); }

    .dirty-badge {
      background: var(--warn);
      color: #fff;
      font-size: .65rem;
      padding: .1rem .4rem;
      border-radius: 4px;
      display: none;
    }
    .dirty-badge.show { display: inline; }
  </style>
</head>
<body>

<header>
  <h1>GAMES EDITOR — games.json</h1>
  <div class="header-btns">
    <button class="btn btn-sm" id="loadBtn">↺ Load</button>
    <button class="btn btn-sm btn-primary" id="saveBtn">↓ Save</button>
  </div>
</header>

<main>
  <!-- Game list sidebar -->
  <div class="game-list" id="gameList">
    <div class="list-header">
      <span>GAMES</span>
      <button class="btn btn-sm" id="addBtn">+ New</button>
    </div>
    <div id="listItems"></div>
  </div>

  <!-- Form panel -->
  <div class="form-panel" id="formPanel">
    <div class="empty-state" id="emptyState">← select a game or add new</div>
    <div id="formWrap" style="display:none">
      <div class="form-grid">

        <div class="field full">
          <label>Name</label>
          <input type="text" id="f-name" placeholder="Oswald's Diary">
        </div>

        <div class="field full">
          <label>Subtitle (Guide's Name)</label>
          <input type="text" id="f-subtitle" placeholder="A mystery told one text at a time">
        </div>

        <div class="field">
          <label>Tag / Genre</label>
          <input type="text" id="f-tag" placeholder="Text-based mystery">
        </div>

        <div class="field">
          <label>Price / Status</label>
          <input type="text" id="f-price" placeholder="Free to start">
        </div>

        <div class="field full">
          <label>Description</label>
          <textarea id="f-description" placeholder="Short description shown on the game card..."></textarea>
        </div>

        <div class="field full">
          <label>Location</label>
          <input type="url" id="f-url" placeholder="https://... or relative path like WordFleet/">
        </div>

        <div class="field">
          <label>Emoji / Symbol</label>
          <input type="text" id="f-emoji" placeholder="📓">
        </div>

        <div class="field">
          <label>Game Logo (URL or path)</label>
          <input type="text" id="f-logo" placeholder="assets/images/oswald-logo.png">
        </div>

        <div class="field">
          <label>Card Art Color</label>
          <div class="color-row">
            <input type="color" id="f-color-picker" value="#1a1a2e">
            <input type="text" id="f-color" placeholder="#1a1a2e" maxlength="7">
          </div>
        </div>

        <div class="field full">
          <label>Options</label>
          <div class="checkbox-row">
            <label><input type="checkbox" id="f-featured"> Featured (wide card)</label>
            <label><input type="checkbox" id="f-active" checked> Active (show on site)</label>
          </div>
        </div>

      </div>

      <div class="form-actions">
        <button class="btn btn-primary" id="formSaveBtn">↓ Save</button>
        <button class="btn btn-danger" id="deleteBtn">Delete Game</button>
      </div>
    </div>
  </div>
</main>

<footer>
  <span id="status">Ready. Load games.json or add a new game.</span>
  <span class="dirty-badge" id="dirtyBadge">UNSAVED</span>
</footer>

<script>
  const GAMES_PATH = '../games/games.json';

  let games = [];
  let selectedIndex = -1;
  let savedSnapshot = null;
  let fileHandle = null;

  // ── DOM refs ──
  const listItems    = document.getElementById('listItems');
  const emptyState   = document.getElementById('emptyState');
  const formWrap     = document.getElementById('formWrap');
  const dirtyBadge   = document.getElementById('dirtyBadge');
  const statusEl     = document.getElementById('status');

  const fName        = document.getElementById('f-name');
  const fSubtitle    = document.getElementById('f-subtitle');
  const fTag         = document.getElementById('f-tag');
  const fPrice       = document.getElementById('f-price');
  const fDesc        = document.getElementById('f-description');
  const fUrl         = document.getElementById('f-url');
  const fEmoji       = document.getElementById('f-emoji');
  const fLogo        = document.getElementById('f-logo');
  const fColor       = document.getElementById('f-color');
  const fColorPicker = document.getElementById('f-color-picker');
  const fFeatured    = document.getElementById('f-featured');
  const fActive      = document.getElementById('f-active');

  // ── Utilities ──
  function setStatus(msg, type) {
    statusEl.textContent = msg;
    statusEl.className = type || '';
  }

  function slugify(name) {
    return name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
  }

  function isDirty() {
    return JSON.stringify(games) !== JSON.stringify(savedSnapshot);
  }

  function updateDirty() {
    dirtyBadge.classList.toggle('show', isDirty());
  }

  // ── Render list ──
  function renderList() {
    listItems.innerHTML = '';
    games.forEach((g, i) => {
      const row = document.createElement('div');
      row.className = 'game-row' + (i === selectedIndex ? ' active' : '');
      row.innerHTML = `
        <span class="row-emoji">${g.emoji || '🎮'}</span>
        <span class="row-name">${g.name || '(unnamed)'}</span>
        ${!g.active ? '<span class="row-inactive">hidden</span>' : ''}
      `;
      row.addEventListener('click', () => selectGame(i));
      listItems.appendChild(row);
    });
  }

  // ── Select a game ──
  function selectGame(i) {
    selectedIndex = i;
    const g = games[i];
    fName.value        = g.name        || '';
    fSubtitle.value    = g.subtitle    || '';
    fTag.value         = g.tag         || '';
    fPrice.value       = g.price       || '';
    fDesc.value        = g.description || '';
    fUrl.value         = g.url         || '';
    fEmoji.value       = g.emoji       || '';
    fLogo.value        = g.logo        || '';
    fColor.value       = g.artColor    || '#111111';
    fColorPicker.value = g.artColor    || '#111111';
    fFeatured.checked  = !!g.featured;
    fActive.checked    = g.active !== false;
    emptyState.style.display = 'none';
    formWrap.style.display   = '';
    renderList();
  }

  // ── Capture form → games array ──
  function captureForm() {
    if (selectedIndex < 0) return;
    const g = games[selectedIndex];
    g.name        = fName.value.trim();
    g.subtitle    = fSubtitle.value.trim();
    g.id          = g.id || slugify(g.name);
    g.tag         = fTag.value.trim();
    g.price       = fPrice.value.trim();
    g.description = fDesc.value.trim();
    g.url         = fUrl.value.trim();
    g.emoji       = fEmoji.value.trim();
    g.logo        = fLogo.value.trim();
    g.artColor    = fColor.value.trim();
    g.featured    = fFeatured.checked;
    g.active      = fActive.checked;
    renderList();
  }

  // ── Add new game ──
  function addGame() {
    games.push({
      id: 'new-game-' + Date.now(),
      name: '',
      tag: '',
      price: '',
      description: '',
      url: '',
      emoji: '🎮',
      artColor: '#111111',
      featured: false,
      active: true
    });
    renderList();
    selectGame(games.length - 1);
    fName.focus();
    updateDirty();
  }

  // ── Delete game ──
  function deleteGame() {
    if (selectedIndex < 0) return;
    const name = games[selectedIndex].name || '(unnamed)';
    if (!confirm('Delete "' + name + '"?')) return;
    games.splice(selectedIndex, 1);
    selectedIndex = -1;
    emptyState.style.display = '';
    formWrap.style.display   = 'none';
    renderList();
    updateDirty();
    setStatus('Deleted "' + name + '".', 'ok');
  }

  // ── Load ──
  async function loadGames() {
    try {
      const resp = await fetch(GAMES_PATH, { cache: 'no-store' });
      if (resp.status === 404) {
        games = [];
        savedSnapshot = [];
        renderList();
        setStatus('No games.json found — start adding games and save.', 'warn');
        return;
      }
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      const data = await resp.json();
      games = Array.isArray(data) ? data : (data.games || []);
      savedSnapshot = JSON.parse(JSON.stringify(games));
      renderList();
      updateDirty();
      if (games.length) selectGame(games.length - 1);
      setStatus('Loaded ' + games.length + ' game(s) from games.json.', 'ok');
    } catch (err) {
      setStatus('Could not load games.json: ' + err.message, 'err');
    }
  }

  // ── Save ──
  async function saveGames() {
    captureForm();
    const text = JSON.stringify({ games }, null, 2) + '\n';
    try {
      if (window.showSaveFilePicker) {
        if (!fileHandle) {
          try {
            fileHandle = await window.showSaveFilePicker({
              suggestedName: 'games.json',
              types: [{ description: 'JSON file', accept: { 'application/json': ['.json'] } }]
            });
          } catch (e) {
            if (e.name === 'AbortError') return;
            throw e;
          }
        }
        const writable = await fileHandle.createWritable();
        await writable.write(text);
        await writable.close();
      } else {
        const blob = new Blob([text], { type: 'application/json' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'games.json';
        a.click();
        URL.revokeObjectURL(a.href);
      }
      savedSnapshot = JSON.parse(JSON.stringify(games));
      updateDirty();
      setStatus('Saved games.json.', 'ok');
    } catch (err) {
      setStatus('Save failed: ' + err.message, 'err');
    }
  }

  // ── Sync color picker ↔ hex input ──
  fColorPicker.addEventListener('input', () => {
    fColor.value = fColorPicker.value;
  });
  fColor.addEventListener('input', () => {
    if (/^#[0-9a-fA-F]{6}$/.test(fColor.value)) {
      fColorPicker.value = fColor.value;
    }
  });

  // ── Wire buttons ──
  document.getElementById('addBtn').addEventListener('click', addGame);
  document.getElementById('formSaveBtn').addEventListener('click', saveGames);
  document.getElementById('deleteBtn').addEventListener('click', deleteGame);
  document.getElementById('loadBtn').addEventListener('click', loadGames);
  document.getElementById('saveBtn').addEventListener('click', saveGames);

  // ── Auto-load on open ──
  loadGames();
</script>
</body>
</html>
