<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#ffffff">
  <title>Loading…</title>
  <link id="favicon" rel="icon" href="index.ico" type="image/x-icon">
  <style>
    /* ── Base chat UI (archive/index.css) ── */
    .icon-preload {
      position: absolute;
      width: 0;
      height: 0;
      overflow: hidden;
      pointer-events: none;
      background-image: url("index.ico");
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body.game-active {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #ffffff;
      color: #111827;
      height: 100vh;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #game-shell {
      flex: 1 1 auto;
      min-height: 0;
      width: 100%;
      display: flex;
      flex-direction: column;
    }

    .contact-header {
      background: #f9f9f9;
      border-bottom: 1px solid #e5e7eb;
      padding: 0.5rem 1rem 0.6rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      flex-shrink: 0;
      position: relative;
    }

    .avatar {
      height: 36px;
      width: auto;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      overflow: hidden;
      margin-bottom: 0.2rem;
      touch-action: none;
      -webkit-touch-callout: none;
      user-select: none;
    }

    .avatar img {
      height: 100%;
      width: auto;
      object-fit: contain;
      pointer-events: none;
      filter: brightness(0) saturate(100%);
    }

    .contact-name {
      font-size: 0.9rem;
      font-weight: 600;
      color: #111827;
      line-height: 1.3;
    }

    #header-title { font-weight: 700; }

    .contact-tagline {
      font-size: 0.72rem;
      font-weight: 500;
      color: #6b7280;
      line-height: 1.25;
      text-align: center;
    }

    .contact-status {
      font-size: 0.72rem;
      color: #6b7280;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .online-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #4ecf98;
      flex-shrink: 0;
    }

    .restart-btn {
      position: absolute;
      right: 1rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      color: #6b7280;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      padding: 0.25rem 0.55rem;
      cursor: pointer;
      line-height: 1;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .restart-btn:active { background: #f3f4f6; }

    .chat {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 1rem 0.75rem;
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }

    .msg {
      max-width: 80%;
      animation: slideIn 0.25s ease;
    }

    .msg.from-game { align-self: flex-start; }
    .msg.from-player { align-self: flex-end; }

    .msg-bubble {
      padding: 0.6rem 0.9rem;
      border-radius: 20px;
      line-height: 1.5;
      word-wrap: break-word;
      font-size: 1.5rem;
      font-weight: 700;
      overflow: visible;
      position: relative;
    }

    .msg.has-img .msg-bubble { padding: 0; }

    .msg.from-game.has-img .msg-bubble {
      background: #1a73e8;
      border: 0;
      padding: 0.35rem;
      border-bottom-left-radius: 5px;
      overflow: visible;
    }
    .msg.from-game.has-img .msg-bubble::before {
      content: '';
      position: absolute;
      bottom: 0;
      left: -8px;
      width: 20px;
      height: 20px;
      background: #1a73e8;
      border-bottom-right-radius: 16px;
      z-index: -1;
    }
    .msg.from-game.has-img .msg-bubble::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: -12px;
      width: 12px;
      height: 20px;
      background: #ffffff;
      border-bottom-right-radius: 10px;
      z-index: 0;
    }

    .msg.from-game .msg-bubble {
      background: #1a73e8;
      border-bottom-left-radius: 5px;
      color: #ffffff;
    }

    .msg.from-game:not(.has-img) .msg-bubble::before {
      content: '';
      position: absolute;
      bottom: 0;
      left: -8px;
      width: 20px;
      height: 20px;
      background: #1a73e8;
      border-bottom-right-radius: 16px;
      z-index: -1;
    }
    .msg.from-game:not(.has-img) .msg-bubble::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: -12px;
      width: 12px;
      height: 20px;
      background: #ffffff;
      border-bottom-right-radius: 10px;
      z-index: 0;
    }

    .msg.from-player .msg-bubble {
      background: #e5e7eb;
      color: #111827;
      border-bottom-right-radius: 5px;
    }

    .msg.from-player:not(.has-img) .msg-bubble::before {
      content: '';
      position: absolute;
      bottom: 0;
      right: -8px;
      width: 20px;
      height: 20px;
      background: #e5e7eb;
      border-bottom-left-radius: 16px;
      z-index: -1;
    }
    .msg.from-player:not(.has-img) .msg-bubble::after {
      content: '';
      position: absolute;
      bottom: 0;
      right: -12px;
      width: 12px;
      height: 20px;
      background: #ffffff;
      border-bottom-left-radius: 10px;
      z-index: 0;
    }

    .msg.call-to-action .msg-bubble { background: #cc0000; }
    .msg.call-to-action:not(.has-img) .msg-bubble::before { background: #cc0000; }

    .msg-bubble p { margin: 0 0 0.6rem; }
    .msg-bubble p:last-child { margin-bottom: 0; }
    .msg-bubble a { color: #ffffff; word-break: break-all; }
    .msg.from-player .msg-bubble a { color: #1a73e8; }

    .msg.from-game .msg-bubble:has(.action-btn) { background: #cc0000; }
    .msg.from-game:not(.has-img) .msg-bubble:has(.action-btn)::before { background: #cc0000; }

    .msg-bubble .action-btn {
      color: #ffffff;
      text-decoration: underline;
      word-break: break-all;
    }

    .msg.has-img { max-width: 92%; }

    .msg-bubble img {
      width: 100%;
      max-width: 100%;
      display: block;
      cursor: zoom-in;
    }
    .msg.from-game.has-img .msg-bubble img { border-radius: 14px; }

    .lb {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.93);
      z-index: 9999;
      align-items: center;
      justify-content: center;
      cursor: zoom-out;
    }
    .lb.open { display: flex; }
    .lb img {
      max-width: 100vw;
      max-height: 100vh;
      object-fit: contain;
    }

    .typing {
      align-self: flex-start;
      background: #e5e7eb;
      border-radius: 999px;
      padding: 0.55rem 0.9rem;
      display: flex;
      gap: 6px;
      align-items: center;
      position: relative;
    }
    .typing::before {
      content: '';
      position: absolute;
      left: 10px;
      bottom: -8px;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #e5e7eb;
    }
    .typing::after {
      content: '';
      position: absolute;
      left: 2px;
      bottom: -15px;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #e5e7eb;
    }
    .typing span {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #8e8e93;
      animation: typingBounce 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    .input-area {
      background: #ffffff;
      border-top: 1px solid #e5e7eb;
      padding: 0.6rem 0.75rem;
      flex-shrink: 0;
    }

    .answer-row {
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }

    .answer-input {
      flex: 1;
      background: #f3f4f6;
      border: 2px solid #e5e7eb;
      border-radius: 24px;
      padding: 0.6rem 1rem;
      color: #111827;
      font-size: 1rem;
      outline: none;
      -webkit-appearance: none;
      appearance: none;
      transition: border-color 0.2s, opacity 0.2s;
    }
    .answer-input:focus { border-color: #1a73e8; }
    .answer-input:disabled { opacity: 0.4; }
    .answer-input.wrong {
      border-color: #e85568;
      animation: shake 0.35s ease;
    }
    .answer-input::placeholder { color: #9ca3af; }
    .answer-input::-webkit-contacts-auto-fill-button,
    .answer-input::-webkit-credentials-auto-fill-button {
      visibility: hidden;
      pointer-events: none;
    }

    .submit-btn {
      background: #1a73e8;
      border: none;
      border-radius: 50%;
      width: 44px;
      height: 44px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, transform 0.1s, opacity 0.2s;
    }
    .submit-btn:active { transform: scale(0.9); background: #1557b0; }
    .submit-btn:disabled { opacity: 0.35; cursor: default; }

    .btn-choices {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      margin-bottom: 0.4rem;
    }

    .choice-btn {
      padding: 0.7rem 1rem;
      border-radius: 12px;
      border: 2px solid;
      background: transparent;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      text-align: left;
      transition: opacity 0.15s;
    }
    .choice-btn:active { opacity: 0.6; }
    .choice-btn.team-beignet { border-color: #6aaef7; color: #6aaef7; }
    .choice-btn.team-lagniappe { border-color: #f5a623; color: #f5a623; }
    .choice-btn.team-rougarou { border-color: #e85568; color: #e85568; }
    .choice-btn.team-tch { border-color: #4ecf98; color: #4ecf98; }
    .choice-btn.neutral { border-color: #d1d5db; color: #374151; }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-7px); }
      75% { transform: translateX(7px); }
    }
    @keyframes typingBounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-5px); }
    }

    /* ── iMessage overlay (game/play/game.css) ── */
    .msg-bubble {
      font-size: 1.25rem;
      font-weight: 400;
      line-height: 1.45;
    }

    .contact-header.compact {
      position: relative;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      gap: 3px;
      padding: max(env(safe-area-inset-top), 0px) 70px 10px;
      min-height: calc(max(env(safe-area-inset-top), 44px) + 54px);
      background: rgba(249, 249, 249, 0.97);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 0.5px solid rgba(0, 0, 0, 0.2);
    }

    .contact-header.compact .avatar {
      width: auto;
      max-width: calc(100vw - 140px);
      height: 36px;
      min-width: 36px;
      margin-bottom: 0;
      border-radius: 8px;
      overflow: hidden;
      background: transparent;
      flex-shrink: 0;
    }
    .avatar img { filter: none; }
    .contact-header.compact .avatar img {
      height: 100%;
      width: auto;
      max-width: 100%;
      object-fit: contain;
      filter: none;
    }

    .game-thumbnail {
      display: none;
      height: 36px;
      width: auto;
      max-width: calc(100vw - 140px);
      border-radius: 8px;
      object-fit: contain;
      flex-shrink: 0;
    }
    .game-thumbnail.show { display: block; }

    .header-info {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1px;
      min-width: 0;
    }

    .contact-header.compact .contact-name {
      font-size: 0.85rem;
      font-weight: 600;
      line-height: 1.2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: calc(100vw - 140px);
    }

    .contact-header.compact .contact-tagline {
      max-width: calc(100vw - 140px);
      color: #6b7280;
      font-size: 0.72rem;
      font-weight: 500;
      line-height: 1.25;
      text-align: center;
      display: -webkit-box;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 2;
      line-clamp: 2;
      overflow: hidden;
    }

    .contact-header.compact #header-subtitle { display: none; }

    .contact-header.compact .contact-status {
      margin-top: 0;
      font-size: 0.7rem;
      color: #8e8e93;
    }

    .contact-header.compact .restart-btn {
      position: absolute;
      right: 14px;
      bottom: 10px;
      transform: none;
      border: none;
      background: none;
      color: #1a73e8;
      font-size: 0.82rem;
      font-weight: 500;
      letter-spacing: 0;
      padding: 8px 0;
      min-height: 44px;
      display: flex;
      align-items: flex-end;
    }
    .contact-header.compact .restart-btn:active { opacity: 0.5; background: none; }

    .chat {
      padding: 1rem 0.85rem 0.5rem;
      gap: 0.5rem;
    }

    .msg { max-width: 88%; }

    .msg-bubble {
      padding: 0.75rem 1.1rem;
      border-radius: 22px;
    }

    .msg.from-game .msg-caps-loop {
      display: inline-block;
      font-weight: 700;
      transform-origin: 50% 60%;
      animation: msgCapsLoop 1.15s ease-in-out infinite;
    }

    @keyframes msgCapsLoop {
      0%, 100% { transform: scale(0.92); }
      50% { transform: scale(1.08); }
    }

    .msg.msg-action-btn {
      max-width: 100%;
      width: 100%;
      display: flex;
      justify-content: center;
      align-self: stretch;
      margin: 4px 0;
    }

    .msg-btn {
      display: block;
      width: 100%;
      padding: 14px 20px;
      background: var(--game-primary, #5468a7);
      color: var(--game-tertiary, #fff);
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: .03em;
      text-align: center;
      text-decoration: none;
      border-radius: 12px;
      cursor: pointer;
      transition: opacity .12s, transform .1s;
      -webkit-tap-highlight-color: transparent;
    }
    .msg-btn:active { opacity: .78; transform: scale(.977); }

    .btn-lightbox-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .6);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }

    .btn-lightbox-frame {
      position: relative;
      width: min(480px, calc(100vw - 32px));
      height: min(680px, calc(100vh - 32px));
      background: #fff;
      border-radius: 16px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .btn-lightbox-close {
      position: absolute;
      top: 10px;
      right: 10px;
      z-index: 1;
      width: 32px;
      height: 32px;
      border: none;
      border-radius: 50%;
      background: rgba(0, 0, 0, .3);
      color: #fff;
      font-size: 20px;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .btn-lightbox-close:active { opacity: .75; }

    .btn-lightbox-iframe { flex: 1; width: 100%; border: none; }
    .btn-lightbox-frame--video {
      width: min(960px, calc(100vw - 24px), calc((100vh - 24px) * 1.7777778));
      height: auto;
      max-height: calc(100vh - 24px);
      aspect-ratio: 16 / 9;
      background: #000;
    }
    .btn-lightbox-frame--video .btn-lightbox-close {
      background: rgba(0, 0, 0, .5);
    }
    .btn-lightbox-iframe--video {
      height: 100%;
      background: #000;
    }

    .input-area {
      padding: 10px 12px max(env(safe-area-inset-bottom), 10px);
      background: #f9f9f9;
      border-top: 0.5px solid rgba(0,0,0,0.15);
    }

    .answer-row { gap: 8px; }

    .answer-input {
      font-size: 1rem;
      padding: 0.75rem 1.1rem;
      border-radius: 22px;
      min-height: 44px;
    }

    .submit-btn { width: 44px; height: 44px; flex-shrink: 0; }
  </style>
</head>
<body class="game-active">
  <div class="icon-preload" aria-hidden="true"></div>

  <div class="contact-header compact">
    <img class="game-thumbnail" id="gameThumbnail" alt="">
    <div class="avatar"><img id="header-logo" src="assets/logo.png" alt=""></div>
    <div class="header-info">
      <div class="contact-name" id="header-title"></div>
      <div class="contact-name" id="header-subtitle"></div>
      <div class="contact-status">
        <div class="online-dot"></div>
        <span id="header-status">online</span>
      </div>
    </div>
    <button class="restart-btn" id="restartBtn" type="button">↺ RESTART</button>
  </div>

  <div class="chat" id="chat"></div>

  <div class="input-area" id="input-area">
    <div class="answer-row">
      <input id="gameInput" type="text" class="answer-input" autocomplete="off" placeholder="" disabled>
      <button id="gameSubmitBtn" class="submit-btn" aria-label="Send" disabled>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2L11 13"/><path d="M22 2L15 22L11 13L2 9L22 2Z" fill="white" stroke="white"/></svg>
      </button>
    </div>
  </div>

  <script>
    const TYPING_DELAY = 700;
    const BUBBLE_PAUSE = 180;

    const params  = new URLSearchParams(location.search);
    const gameId  = params.get('id') || params.get('game');
    const STORE_KEY = 'tgb_' + (gameId || 'default');
    const CHECKOUT_UNLOCKS_KEY = STORE_KEY + '_checkout_unlocks';
    const PLAYER_SESSION_KEY = STORE_KEY + '_player_id';
    const CHECKOUT_SUCCESS_COPY = 'Payment confirmed. Let\u2019s keep going.';

      const chatEl      = document.getElementById('chat');
      const inputAreaEl = document.getElementById('input-area');
      const gameInput   = document.getElementById('gameInput');
      const submitBtn   = document.getElementById('gameSubmitBtn');
    let gameStops          = [];
    let anytimeStops       = [];
    let currentStopIndex   = 0;
    let currentBubbleIndex = 0;
    let _submitHandler     = null;
    let vars               = {};
    let checkoutUnlocksCache = null;
    let lemonScriptPromise = null;
    let lemonConfigPromise = null;
    let lemonSetupComplete = false;
    let stopCheckoutContext = null;
    let activeCheckoutContext = null;

    // ── Persistence ──────────────────────────────────────────────
    function saveStep(i) {
      try { localStorage.setItem(STORE_KEY + '_step', String(i)); } catch(e) {}
    }
    function loadStep() {
      try { return parseInt(localStorage.getItem(STORE_KEY + '_step') || '0', 10) || 0; } catch(e) { return 0; }
    }
    function saveVars() {
      try { localStorage.setItem(STORE_KEY + '_vars', JSON.stringify(vars)); } catch(e) {}
    }
    function loadVars() {
      try { return JSON.parse(localStorage.getItem(STORE_KEY + '_vars') || '{}'); } catch(e) { return {}; }
    }
    function clearSave() {
      try {
        localStorage.removeItem(STORE_KEY + '_step');
        localStorage.removeItem(STORE_KEY + '_vars');
        vars = {};
      } catch(e) {}
    }

    // ── Helpers ───────────────────────────────────────────────────
    function loadCheckoutUnlocks() {
      if (checkoutUnlocksCache) return checkoutUnlocksCache;
      try {
        const parsed = JSON.parse(localStorage.getItem(CHECKOUT_UNLOCKS_KEY) || '{}');
        checkoutUnlocksCache = parsed && typeof parsed === 'object' ? parsed : {};
      } catch (e) {
        checkoutUnlocksCache = {};
      }
      return checkoutUnlocksCache;
    }
    function saveCheckoutUnlocks(unlocks) {
      checkoutUnlocksCache = unlocks && typeof unlocks === 'object' ? unlocks : {};
      try { localStorage.setItem(CHECKOUT_UNLOCKS_KEY, JSON.stringify(checkoutUnlocksCache)); } catch (e) {}
    }
    function isCheckoutUnlocked(key) {
      return !!(key && loadCheckoutUnlocks()[key]);
    }
    function markCheckoutUnlocked(key, meta = {}) {
      if (!key) return;
      const unlocks = loadCheckoutUnlocks();
      unlocks[key] = {
        unlockedAt: meta.unlockedAt || new Date().toISOString(),
        sourceUrl: meta.sourceUrl || '',
        orderId: meta.orderId || ''
      };
      saveCheckoutUnlocks(unlocks);
    }
    function getPlayerSessionId() {
      try {
        let id = localStorage.getItem(PLAYER_SESSION_KEY);
        if (!id) {
          id = 'player_' + Math.random().toString(36).slice(2, 10) + Date.now().toString(36);
          localStorage.setItem(PLAYER_SESSION_KEY, id);
        }
        return id;
      } catch (e) {
        return 'player_' + Date.now().toString(36);
      }
    }
    function escapeHtml(value) {
      return String(value || '').replace(/[&<>"']/g, (ch) => (
        ch === '&' ? '&amp;'
          : ch === '<' ? '&lt;'
          : ch === '>' ? '&gt;'
          : ch === '"' ? '&quot;'
          : '&#39;'
      ));
    }
    function escapeAttr(value) {
      return escapeHtml(value).replace(/`/g, '&#96;');
    }
    function norm(s) {
      return String(s || '').toLowerCase().replace(/[$,.\s]/g, '');
    }
    function pick(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }
    function scrollBottom() {
      chatEl.scrollTop = chatEl.scrollHeight;
    }
    function normalizeVarKey(raw) {
      const s = String(raw || '').trim();

    function parseVideoTimestamp(value) {
      const raw = String(value || '').trim().replace(/^#/, '').replace(/^t=/i, '');
      if (!raw) return 0;
      if (/^\d+$/.test(raw)) return Number(raw);
      let total = 0;
      const matches = raw.match(/(\d+)(h|m|s)/gi);
      if (!matches) return 0;
      matches.forEach(part => {
        const match = part.match(/(\d+)(h|m|s)/i);
        if (!match) return;
        const amount = Number(match[1]);
        const unit = match[2].toLowerCase();
        if (unit === 'h') total += amount * 3600;
        else if (unit === 'm') total += amount * 60;
        else total += amount;
      });
      return total;
    }

    function getVideoLightboxConfig(rawUrl) {
      try {
        const url = new URL(rawUrl);
        const host = url.hostname.toLowerCase().replace(/^www\./, '');
        const parts = url.pathname.split('/').filter(Boolean);

        let youTubeId = '';
        if (host === 'youtu.be') {
          youTubeId = parts[0] || '';
        } else if (
          host === 'youtube.com'
          || host.endsWith('.youtube.com')
          || host === 'youtube-nocookie.com'
          || host.endsWith('.youtube-nocookie.com')
        ) {
          if ((parts[0] || '') === 'watch') {

          } else if (parts[0] === 'shorts' || parts[0] === 'embed' || parts[0] === 'live') {

        if (youTubeId) {
          const embedUrl = new URL('https://www.youtube.com/embed/' + encodeURIComponent(youTubeId));
          const start = parseVideoTimestamp(url.searchParams.get('t') || url.searchParams.get('start') || url.hash);
          const list = url.searchParams.get('list');
          if (start > 0) embedUrl.searchParams.set('start', String(start));
          if (list) embedUrl.searchParams.set('list', list);
          embedUrl.searchParams.set('rel', '0');
          embedUrl.searchParams.set('playsinline', '1');
          return {
            src: embedUrl.toString(),
            allow: 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share'
          };
        }

        if (host === 'vimeo.com' || host.endsWith('.vimeo.com')) {

            ...pendingCheckout,
            stopIndex: index
          };
          if (checkoutUnlocked) {
            completeCheckoutFlow({
              unlockKey: pendingCheckout.unlockKey,
              sourceUrl: pendingCheckout.url,
              guideText: 'Payment already confirmed. Let\u2019s keep going.'
            });
            return;
          }
          disableInput();
          return;
        }
        if (needsInput) {
          showTextInput(stop, currentBubbleIndex);
        } else {
          setTimeout(() => { saveStep(index + 1); advanceStop(); }, 400);
        }
      });
    }

    function advanceStop() {
      const next = currentStopIndex + 1;
      if (next >= gameStops.length) { disableInput(); return; }
      playStop(next);
    }

    // ── Restart ───────────────────────────────────────────────────
    document.getElementById('restartBtn').addEventListener('click', () => {
      clearSave();
      chatEl.innerHTML = '';
      disableInput();
      playStop(0);
    });

    // ── Boot ──────────────────────────────────────────────────────
    disableInput();

    const SB_CONFIG = {
      url: 'https://qmaafbncpzrdmqapkkgr.supabase.co',
      key: 'sb_publishable_6a9XqxYa0-AZtyrwz4ZeUg_aiMsVH-3',
      table: 'games'
    };

    async function fetchGameFromSupabase(id) {
      const requestUrl = new URL(`rest/v1/${SB_CONFIG.table}`, `${SB_CONFIG.url.replace(/\/+$/, '')}/`);
      requestUrl.searchParams.set('select', '*');
      requestUrl.searchParams.set('id', `eq.${id}`);
      requestUrl.searchParams.set('limit', '1');

      const response = await fetch(requestUrl.toString(), {
        headers: {
          apikey: SB_CONFIG.key,
          Authorization: `Bearer ${SB_CONFIG.key}`,
          Accept: 'application/json'
        },
        cache: 'no-store'
      });

      if (!response.ok) throw new Error('Network error');
      const rows = await response.json();
      return Array.isArray(rows) && rows.length > 0 ? rows[0] : null;
    }

    function resolveAssetUrl(value) {
      if (typeof value !== 'string' || !value.trim()) return '';
      const raw = value.trim();
      if (/^(data:|blob:)/i.test(raw)) return raw;
      try {
        const resolvedUrl = new URL(raw, window.location.href);
        const protocol = String(resolvedUrl.protocol || '').toLowerCase();
        return protocol === 'http:' || protocol === 'https:' || protocol === 'file:' ? resolvedUrl.toString() : '';
      } catch (error) {
        return '';
      }
    }

    function applyHeaderImages(gameNode) {
      const thumbnailEl = document.getElementById('gameThumbnail');
      const headerLogoEl = document.getElementById('header-logo');
      const avatarWrap = headerLogoEl && headerLogoEl.closest('.avatar');
      if (!thumbnailEl || !headerLogoEl || !avatarWrap) return;

      const guideImageUrl = resolveAssetUrl((gameNode && (gameNode.guideImage || gameNode.guideImageUrl)) || '');
      const logoUrl = resolveAssetUrl((gameNode && (gameNode.logo || gameNode.logoUrl)) || '');
      const fallbackLogoUrl = logoUrl || resolveAssetUrl('assets/logo.png') || 'assets/logo.png';

      headerLogoEl.onerror = () => {
        headerLogoEl.onerror = null;
        headerLogoEl.src = resolveAssetUrl('assets/logo.png') || 'assets/logo.png';
      };
      headerLogoEl.src = fallbackLogoUrl;
      headerLogoEl.alt = (gameNode && (gameNode.title || gameNode.guideName)) || 'Game Logo';

      avatarWrap.style.display = '';
      thumbnailEl.classList.remove('show');
      thumbnailEl.removeAttribute('src');
      thumbnailEl.onerror = null;
      thumbnailEl.alt = (gameNode && (gameNode.guideName || gameNode.title)) || 'Guide image';

      if (!guideImageUrl) return;

      thumbnailEl.onerror = () => {
        thumbnailEl.onerror = null;
        thumbnailEl.classList.remove('show');
        thumbnailEl.removeAttribute('src');
        avatarWrap.style.display = '';
      };
      thumbnailEl.src = guideImageUrl;
      thumbnailEl.classList.add('show');
      avatarWrap.style.display = 'none';
    }

    function buildLegacyPayload(gameData) {
      const nodes = Array.isArray(gameData.nodes) ? gameData.nodes : [];
      const sortedNodes = [...nodes].sort((a, b) => {
        const rankA = a.type === 'game' ? 0 : (a.anytime ? 2 : 1);
        const rankB = b.type === 'game' ? 0 : (b.anytime ? 2 : 1);
        if (rankA !== rankB) return rankA - rankB;
        return (a.orderIndex || 0) - (b.orderIndex || 0);
      });

      const stops = [];
      let currentStop = null;

      sortedNodes.forEach(node => {
        if (node.type === 'game') return;

        if (node.anytime) {
          if (node.type === 'reply') {
            stops.push({
              id: node.id,
              playerReply: {
                anytime: true,
                anytimePairId: node.anytimePairId,
                answers: node.body ? node.body.split(/\n|;|,/g).map(s=>s.trim()).filter(Boolean) : [],
                storesAs: node.varName,
                type: node.acceptAny ? 'any' : 'text'
              },
              messages: []
            });
          } else if (node.type === 'bubble') {
            const target = stops.find(s => s.playerReply?.anytimePairId === node.anytimePairId);
            if (target) {
              target.messages.push({
                bubbleId: node.id,
                text: node.body,
                html: node.body
              });
            }
          }
          return;
        }

        if (node.type === 'stop') {
          currentStop = {
            id: node.id,
            title: node.title,
            messages: [],
            playerReply: null
          };
          stops.push(currentStop);
        } else if (node.type === 'bubble') {
          if (!currentStop) {
            currentStop = { id: 'virtual-stop', messages: [], playerReply: null };
            stops.push(currentStop);
          }
          currentStop.messages.push({
            bubbleId: node.id,
            text: node.body,
            html: node.body,
            callToAction: false
          });
        } else if (node.type === 'button') {
          if (!currentStop) {
            currentStop = { id: 'virtual-stop', messages: [], playerReply: null };
            stops.push(currentStop);
          }
          const buttonLabel = String(node.title || node.body || 'Continue').trim() || 'Continue';
          const buttonUrl = String(node.buttonUrl || '').trim();
          currentStop.messages.push({
            bubbleId: node.id,
            text: buttonLabel,
            html: buttonUrl
              ? `<a class="action-btn" href="${escapeAttr(buttonUrl)}">${escapeHtml(buttonLabel)}</a>`
              : escapeHtml(buttonLabel),
            buttonUrl: buttonUrl,
          });
        } else if (node.type === 'reply') {
          if (!currentStop) {
            currentStop = { id: 'virtual-stop', messages: [], playerReply: null };
            stops.push(currentStop);
          }
          if (currentStop.messages.length > 0) {
            currentStop.messages[currentStop.messages.length - 1].callToAction = true;
          }
          const answers = node.body ? node.body.split(/\n|;|,/g).map(s=>s.trim()).filter(Boolean) : [];
          currentStop.messages.push({
            bubbleId: node.id,
            fromPlayer: true,
            text: answers[0] || node.varName || '[Answered]',
            html: answers[0] || node.varName || '[Answered]',
            replyExpected: node.acceptAny ? 'any' : 'word',
            answers: answers,
            storesAs: node.varName,
            placeholder: 'Type here...'
          });
        }
      });

      return { stops };
    }

    if (!gameId) {
      chatEl.textContent = 'Game not found. Check the ?id= parameter.';
    } else {
      fetchGameFromSupabase(gameId).then(gameData => {
        if (!gameData) {
          chatEl.textContent = 'Game not found in database.';
          return;
        }

        const gameNode = (gameData.nodes || []).find(n => n.type === 'game') || {};

        const gameTitle = gameNode.title || gameData.name || gameId;
        const headerTitle = String(gameNode.guideName || '').trim() || gameTitle;

        document.title = gameTitle;
        document.getElementById('header-title').textContent = headerTitle;
        document.getElementById('header-subtitle').textContent = gameNode.guideName || '';

        applyHeaderImages(gameNode);

        if (gameNode.primaryColor) {
          document.documentElement.style.setProperty('--game-primary', gameNode.primaryColor);
        }
        if (gameNode.tertiaryColor) {
          document.documentElement.style.setProperty('--game-tertiary', gameNode.tertiaryColor);
        }

        const payload = buildLegacyPayload(gameData);
        const allStops = payload.stops || [];
        
        anytimeStops = allStops.filter(s => s.playerReply?.anytime);
        gameStops = allStops.filter(s => !s.playerReply?.anytime);

        if (!gameStops.length) { chatEl.textContent = 'No stops configured for this game.'; return; }

        vars = loadVars();
        const savedStep = Math.min(loadStep(), gameStops.length - 1);
        if (savedStep > 0) {
          for (let i = 0; i < savedStep; i++) {
            const stop = gameStops[i];
            let hasTriggerBubble = false;
            (stop.messages || []).filter(m => (m.html || m.text || '').trim()).forEach(m => {
              if (m.fromPlayer || m.direction === 'fromPlayer') {
                hasTriggerBubble = true;
                let replyText = m.text || m.html;
                const varKey = m.storesAs ? normalizeVarKey(m.storesAs) : '';
                if (varKey && vars[varKey]) {
                  replyText = vars[varKey];
                }
                addBubble(replyText, false);
              } else {
                addBubble(m, true);
              }
            });
            
            if (!hasTriggerBubble && stop.playerReply) {
              const pr = stop.playerReply;
              let replyText = '';
              const varKey = pr.storesAs ? normalizeVarKey(pr.storesAs) : '';
              if (varKey && vars[varKey]) {
                replyText = vars[varKey];
              } else if (pr.answers && pr.answers.length > 0) {
                replyText = pr.answers[0];
              } else {
                replyText = '[Answered]';
              }
              if (replyText) {
                addBubble(replyText, false);
              }
            }
          }
        }
        playStop(savedStep);

      }).catch(err => {
        console.error(err);
        chatEl.textContent = 'Could not load game data.';
      });
    }
  </script>
