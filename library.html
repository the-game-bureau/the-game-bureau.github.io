<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0c1428">
  <title>Library | The Game Bureau</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700;800&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    /* App Reset & Base */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    :root {
      --page-bg: #090b12;
      --page-bg-deep: #0f1420;
      --ink: #f5f7fb;
      --muted: rgba(245, 247, 251, 0.72);
      --line: rgba(255, 255, 255, 0.12);
      --line-strong: rgba(255, 255, 255, 0.2);
      --accent: #ffffff;
      --green-dot: #33d17a;
      --shadow-sm: 0 18px 40px rgba(0, 0, 0, 0.24);
      --shadow-md: 0 34px 100px rgba(0, 0, 0, 0.38);
      --shadow-hover: 0 44px 120px rgba(0, 0, 0, 0.5);
    }

    body {
      font-family: 'Manrope', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(83, 104, 255, 0.16), transparent 22%),
        radial-gradient(circle at 85% 10%, rgba(255,255,255,0.06), transparent 18%),
        linear-gradient(180deg, var(--page-bg) 0%, var(--page-bg-deep) 100%);
      color: var(--ink);
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
      position: relative;
      min-height: 100vh;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(rgba(255,255,255,0.04), rgba(255,255,255,0)),
        repeating-linear-gradient(
          90deg,
          rgba(255,255,255,0.012) 0 1px,
          transparent 1px 32px
        );
      opacity: 0.34;
    }

    .app-header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(9, 11, 18, 0.7);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--line);
      padding: 1rem 1.5rem 1.1rem;
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 0 1px 0 rgba(255,255,255,0.04) inset;
    }

    .app-brand {
      font-family: 'Fraunces', Georgia, serif;
      font-weight: 700;
      font-size: 1.5rem;
      letter-spacing: -0.02em;
      color: var(--accent);
    }

    .app-container {
      max-width: 1240px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem 5rem;
      position: relative;
    }

    .hero {
      position: relative;
      margin-bottom: 2.5rem;
      padding: 3rem 0 2rem;
      max-width: 860px;
      animation: fadeIn 0.6s ease-out;
    }

    .hero-kicker {
      display: inline-block;
      margin-bottom: 0.9rem;
      font-size: 0.76rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(245, 247, 251, 0.56);
      font-weight: 800;
    }

    .hero h1 {
      font-family: 'Fraunces', Georgia, serif;
      font-size: clamp(3.8rem, 9vw, 7rem);
      font-weight: 700;
      letter-spacing: -0.06em;
      line-height: 0.9;
      margin-bottom: 1rem;
      color: var(--accent);
      max-width: 7.5ch;
    }

    .hero p {
      font-size: 1.1rem;
      color: var(--muted);
      max-width: 54ch;
      margin: 0 0 1.4rem;
      line-height: 1.8;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: rgba(255,255,255,0.08);
      color: #fff;
      font-size: 0.82rem;
      font-weight: 700;
      padding: 0.58rem 0.98rem;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.12);
    }

    .badge::before {
      content: '';
      width: 8px;
      height: 8px;
      background-color: #fff;
      border-radius: 50%;
      display: inline-block;
    }

    .search-wrapper {
      max-width: 820px;
      margin: 0 0 2.4rem;
      position: relative;
    }

    .featured-shell {
      display: grid;
      gap: 1rem;
      margin: 0 0 2.4rem;
    }

    .featured-shell[hidden] {
      display: none;
    }

    .section-label {
      display: inline-flex;
      align-items: center;
      gap: 0.55rem;
      width: fit-content;
      font-size: 0.74rem;
      font-weight: 800;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(245, 247, 251, 0.62);
    }

    .section-label::before {
      content: '';
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 0 14px rgba(255, 255, 255, 0.38);
    }

    .featured-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      list-style: none;
    }

    #gameSearch {
      width: 100%;
      padding: 1.05rem 1.15rem;
      border-radius: 16px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.06);
      color: var(--ink);
      font-family: inherit;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s ease, background-color 0.2s ease, box-shadow 0.2s ease;
    }

    #gameSearch:focus {
      border-color: var(--line-strong);
      background: rgba(255,255,255,0.08);
      box-shadow: 0 0 0 3px rgba(255,255,255,0.05);
    }

    .game-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1.5rem;
      list-style: none;
      align-items: stretch;
    }

    .game-card {
      --game-primary: #111111;
      --game-secondary: #444444;
      --game-tertiary: #ffffff;
      position: relative;
      display: grid;
      gap: 0.95rem;
      animation: slideUp 0.5s ease-out backwards;
      transition: transform 0.22s ease;
    }

    .game-card:hover {
      transform: translateY(-8px) scale(1.015);
      z-index: 2;
    }

    .game-card.is-featured {
      grid-column: span 2;
    }

    .game-object {
      position: relative;
      min-height: 440px;
      border-radius: 24px;
      overflow: hidden;
      background:
        radial-gradient(circle at top, rgba(255,255,255,0.12), transparent 24%),
        linear-gradient(180deg, color-mix(in srgb, var(--game-secondary) 68%, black 32%), color-mix(in srgb, var(--game-primary) 88%, black 12%));
      box-shadow: var(--shadow-sm);
    }

    .game-object::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.06), transparent 32%),
        linear-gradient(180deg, rgba(0,0,0,0.01), rgba(0,0,0,0.24) 58%, rgba(0,0,0,0.68) 100%);
      pointer-events: none;
      z-index: 2;
    }

    .game-photo {
      position: absolute;
      inset: 0;
      z-index: 0;
      background-position: center;
      background-repeat: no-repeat;
      background-size: cover;
      opacity: 0.88;
      transform: scale(1.02);
    }

    .game-object-inner {
      position: absolute;
      inset: 0;
      z-index: 1;
      background:
        radial-gradient(circle at 22% 18%, rgba(255,255,255,0.12), transparent 14%),
        radial-gradient(circle at 78% 12%, rgba(255,255,255,0.1), transparent 10%);
    }

    .game-card[data-style="drama"] .game-object-inner {
      background:
        linear-gradient(180deg, rgba(255,255,255,0.05), transparent 42%),
        radial-gradient(circle at 50% 22%, rgba(255,255,255,0.12), transparent 14%),
        linear-gradient(145deg, color-mix(in srgb, var(--game-secondary) 24%, transparent 76%), color-mix(in srgb, var(--game-primary) 30%, transparent 70%));
    }

    .game-card[data-style="thriller"] .game-object-inner {
      background:
        linear-gradient(120deg, transparent 0 54%, rgba(255,255,255,0.08) 54% 60%, transparent 60%),
        radial-gradient(circle at 16% 78%, rgba(255,255,255,0.1), transparent 14%),
        linear-gradient(145deg, color-mix(in srgb, var(--game-primary) 26%, transparent 74%), color-mix(in srgb, var(--game-secondary) 24%, transparent 76%));
    }

    .game-card[data-style="ensemble"] .game-object-inner {
      background:
        linear-gradient(180deg, rgba(255,255,255,0.05), transparent 36%),
        repeating-linear-gradient(135deg, rgba(255,255,255,0.035) 0 2px, transparent 2px 14px),
        linear-gradient(145deg, color-mix(in srgb, var(--game-secondary) 24%, transparent 76%), color-mix(in srgb, var(--game-primary) 26%, transparent 74%));
    }

    .game-emblem {
      position: absolute;
      top: 18px;
      left: 18px;
      z-index: 2;
      font-size: 0.72rem;
      font-weight: 800;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.82);
    }

    .game-label {
      position: absolute;
      left: 18px;
      right: 18px;
      bottom: 18px;
      z-index: 2;
      display: grid;
      gap: 0.5rem;
      color: var(--game-tertiary);
    }

    .game-type {
      font-size: 0.72rem;
      font-weight: 800;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.74);
    }

    .game-title {
      font-family: 'Fraunces', Georgia, serif;
      font-size: clamp(2.2rem, 4vw, 3.5rem);
      font-weight: 700;
      letter-spacing: -0.06em;
      line-height: 0.92;
      color: var(--game-tertiary);
      text-wrap: balance;
      text-shadow: 0 12px 34px rgba(0,0,0,0.34);
      max-width: 9ch;
    }

    .game-card.is-featured .game-title {
      font-size: clamp(2.8rem, 4vw, 4.5rem);
      max-width: 8ch;
    }

    .game-card-body {
      display: grid;
      gap: 0.75rem;
      padding: 0 0.15rem;
    }

    .game-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      min-width: 0;
    }

    .game-chip {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      min-width: 0;
      padding: 0.45rem 0.7rem;
      border-radius: 999px;
      background: rgba(255,255,255,0.06);
      color: var(--game-tertiary);
      font-size: 0.72rem;
      font-weight: 800;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .game-chip::before {
      content: '';
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--game-primary);
      box-shadow: 0 0 18px color-mix(in srgb, var(--game-primary) 55%, transparent 45%);
      flex-shrink: 0;
    }

    .game-index {
      font-size: 0.76rem;
      font-weight: 800;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: rgba(245,247,251,0.54);
      white-space: nowrap;
    }

    .game-caption {
      font-size: 0.98rem;
      line-height: 1.65;
      color: var(--muted);
      min-height: 3.2em;
    }

    .play-action {
      display: flex;
      gap: 0.75rem;
      align-items: stretch;
    }

    .play-btn,
    .edit-btn {
      display: block;
      flex: 1 1 0;
      text-align: center;
      padding: 0.9rem;
      text-decoration: none;
      border-radius: 14px;
      font-weight: 700;
      font-size: 0.92rem;
      transition: transform 0.12s ease, background-color 0.2s ease, color 0.2s ease, border-color 0.2s ease;
    }

    .play-btn {
      background: var(--game-primary);
      color: var(--game-tertiary);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .play-btn:hover {
      background: var(--game-secondary);
    }

    .edit-btn {
      background: rgba(255,255,255,0.04);
      color: var(--game-tertiary);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .edit-btn:hover {
      background: rgba(255,255,255,0.08);
    }

    .play-btn:active,
    .edit-btn:active {
      transform: translateY(1px);
    }

    .admin-mode-indicator {
      position: fixed;
      right: 1.25rem;
      bottom: 5.75rem;
      z-index: 120;
      display: none;
      padding: 0.6rem 0.9rem;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(16, 18, 28, 0.9);
      color: var(--accent);
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      box-shadow: var(--shadow-md);
    }

    .admin-mode-indicator[data-visible="true"] {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }

    .admin-mode-indicator::before {
      content: '';
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green-dot);
      box-shadow: 0 0 12px rgba(16, 185, 129, 0.65);
    }

    .admin-mode-toggle {
      position: fixed;
      right: 1.25rem;
      bottom: 1.25rem;
      z-index: 130;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(16, 18, 28, 0.94);
      color: var(--ink);
      border-radius: 999px;
      padding: 0.95rem 1.1rem;
      font: inherit;
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.28);
      transition: transform 0.15s ease, background-color 0.2s ease, border-color 0.2s ease;
    }

    .admin-mode-toggle:hover {
      transform: translateY(-2px);
      border-color: var(--line-strong);
    }

    .admin-mode-toggle[data-active="true"] {
      background: #111;
      color: #fff;
      border-color: #111;
    }

    .empty-state,
    .error-state {
      text-align: center;
      grid-column: 1 / -1;
      color: var(--muted);
      padding: 3rem 1.5rem;
      background: rgba(255,255,255,0.04);
      border-radius: 22px;
      border: 1px solid var(--line);
      box-shadow: var(--shadow-sm);
    }

    .error-state {
      color: #ffb4a2;
      background: rgba(143, 57, 34, 0.12);
    }

    @media (max-width: 900px) {
      .game-card.is-featured {
        grid-column: span 1;
      }
    }

    @media (max-width: 640px) {
      .hero { padding: 2.1rem 0 1.8rem; }
      .hero h1 { font-size: 3.2rem; }
      .app-container { padding: 2rem 1rem 4rem; }
      .search-wrapper { margin-bottom: 2rem; }
      .game-grid { grid-template-columns: 1fr; gap: 1.35rem; }
      .game-object { min-height: 380px; }
      .play-action { flex-direction: column; }
      .admin-mode-toggle {
        right: 1rem;
        bottom: 1rem;
      }
      .admin-mode-indicator {
        right: 1rem;
        bottom: 5.5rem;
      }
    }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

  <header class="app-header">
    <div class="app-brand">The Game Bureau</div>
  </header>

  <main class="app-container">
    <section class="hero">
      <div class="hero-kicker">The Game Bureau Presents</div>
      <h1>Library</h1>
      <p>Live local games staged like featured titles. Choose the mood, gather your people, and let the night tilt cinematic.</p>
      <div class="badge">Story-driven. Social. No app necessary.</div>
    </section>

    <div class="search-wrapper">
      <input type="text" id="gameSearch" placeholder="Search the catalog...">
    </div>

    <section class="featured-shell" id="featuredShell" hidden>
      <div class="section-label">Featured Tonight</div>
      <ul class="featured-grid" id="featuredGameContainer"></ul>
    </section>
    
    <ul class="game-grid" id="gamesListContainer">
      <li class="empty-state">Loading games engine...</li>
    </ul>
  </main>

  <div class="admin-mode-indicator" id="adminModeIndicator" data-visible="false">Admin Mode</div>
  <button class="admin-mode-toggle" id="adminModeToggle" type="button" data-active="false" aria-pressed="false">Admin Mode</button>

  <script>
    window.TGB_SUPABASE_CONFIG = {
      enabled: true,
      url: 'https://qmaafbncpzrdmqapkkgr.supabase.co',
      publishableKey: 'sb_publishable_6a9XqxYa0-AZtyrwz4ZeUg_aiMsVH-3',
      gamesTable: 'games'
    };

    const ADMIN_MODE_KEY = 'tgb-library-admin-mode';
    let adminModeEnabled = false;
    const GAMES_SCHEMA = {
      featured: true
    };

    function readAdminMode() {
      try {
        return sessionStorage.getItem(ADMIN_MODE_KEY) === 'true';
      } catch (error) {
        return false;
      }
    }

    function writeAdminMode(value) {
      try {
        sessionStorage.setItem(ADMIN_MODE_KEY, value ? 'true' : 'false');
      } catch (error) {
        // Ignore storage issues and keep the in-memory state.
      }
    }

    function updateAdminModeUi() {
      const toggle = document.getElementById('adminModeToggle');
      const indicator = document.getElementById('adminModeIndicator');
      if (toggle) {
        toggle.dataset.active = adminModeEnabled ? 'true' : 'false';
        toggle.setAttribute('aria-pressed', adminModeEnabled ? 'true' : 'false');
        toggle.textContent = adminModeEnabled ? 'Admin On' : 'Admin Mode';
      }
      if (indicator) {
        indicator.dataset.visible = adminModeEnabled ? 'true' : 'false';
      }
    }

    function getMissingGamesColumnName(errorMessage = '') {
      const message = String(errorMessage || '');
      const match = message.match(/column\s+games\.([a-z_]+)\s+does\s+not\s+exist/i);
      return match ? String(match[1] || '').trim().toLowerCase() : '';
    }

    function buildGameSelect() {
      const columns = ['id', 'name', 'primary_color', 'secondary_color', 'archived', 'nodes'];
      if (GAMES_SCHEMA.featured) columns.splice(4, 0, 'featured');
      return columns.join(',');
    }

    async function fetchGames(config, selectOverride = '') {
      const baseUrl = `${config.url.replace(/\/+$/, '')}/`;
      const requestUrl = new URL(`rest/v1/${config.gamesTable}`, baseUrl);
      const select = selectOverride || buildGameSelect();
      requestUrl.searchParams.set('select', select);
      requestUrl.searchParams.set('order', 'name.asc');

      const response = await fetch(requestUrl.toString(), {
        headers: {
          apikey: config.publishableKey,
          Authorization: `Bearer ${config.publishableKey}`,
          Accept: 'application/json'
        },
        cache: 'no-store'
      });

      if (!response.ok) {
        let message = `Request failed with status ${response.status}`;

        try {
          const errorPayload = await response.json();
          message =
            errorPayload.message ||
            errorPayload.error_description ||
            errorPayload.error ||
            message;
        } catch (parseError) {
          // Fall back to the status-based message when no JSON body is available.
        }

        const missingColumn = getMissingGamesColumnName(message);
        if (missingColumn === 'featured' && GAMES_SCHEMA.featured) {
          GAMES_SCHEMA.featured = false;
          return fetchGames(config, buildGameSelect());
        }

        throw new Error(message);
      }

      return response.json();
    }

    function renderEmptyState(listContainer, message, className = 'empty-state') {
      listContainer.innerHTML = '';

      const item = document.createElement('li');
      item.className = className;
      item.textContent = message;
      listContainer.appendChild(item);
    }

    function getGameNode(game) {
      if (!game || !Array.isArray(game.nodes)) return null;
      return game.nodes.find((node) => node && node.type === 'game') || null;
    }

    function getFeaturedState(game) {
      const gameNode = getGameNode(game);
      const raw = String(game && game.featured || gameNode && gameNode.featured || '').trim().toUpperCase();
      return raw === 'YES' ? 'YES' : '';
    }

    function getGamePalette(game) {
      const gameNode = getGameNode(game);
      return {
        primary: String(game && (game.primary_color || game.primaryColor) || '').trim() || '#191919',
        secondary: String(game && (game.secondary_color || game.secondaryColor) || '').trim() || '#454545',
        tertiary: String(gameNode && gameNode.tertiaryColor || '').trim() || '#ffffff'
      };
    }

    function resolveLibraryAssetUrl(value) {
      const raw = String(value || '').trim();
      if (!raw) return '';
      try {
        if (/^assets\//i.test(raw)) {
          return new URL(`archive/game/${raw}`, window.location.href).toString();
        }
        return new URL(raw, window.location.href).toString();
      } catch (error) {
        return '';
      }
    }

    function getGameImageUrl(game) {
      const gameNode = getGameNode(game);
      return resolveLibraryAssetUrl(gameNode && (gameNode.logo || gameNode.logoUrl || gameNode.guideImage || gameNode.guideImageUrl) || '');
    }

    function getGameStyleName(index) {
      return ['drama', 'thriller', 'ensemble'][index % 3];
    }

    function getGameTypeLabel(game, index) {
      const gameNode = getGameNode(game);
      const tags = Array.isArray(gameNode && gameNode.tags) ? gameNode.tags.filter(Boolean) : [];
      if (tags.length) return String(tags[0]);
      return ['Featured', 'Story Game', 'Live Game'][index % 3];
    }

    function getGameCaption(game) {
      const gameNode = getGameNode(game);
      const body = String(gameNode && gameNode.body || '').replace(/\s+/g, ' ').trim();
      if (body) return body.length > 120 ? body.slice(0, 117).trimEnd() + '...' : body;
      return 'A live local experience with enough atmosphere to take over the room.';
    }

    function isGameFeatured(game) {
      return getFeaturedState(game) === 'YES';
    }

    function filterGames(games, filter = '') {
      const normalizedFilter = String(filter || '').trim().toLowerCase();
      return games.filter((game) => {
        const isArchived = typeof game?.archived === 'string' && game.archived.trim();
        if (isArchived) return false;
        if (!normalizedFilter) return true;
        return (game.name || '').toLowerCase().includes(normalizedFilter);
      });
    }

    function createGameCard(game, index, options = {}) {
      const palette = getGamePalette(game);
      const styleName = getGameStyleName(index);
      const typeLabel = options.typeLabel || getGameTypeLabel(game, index);
      const caption = getGameCaption(game);
      const isFeaturedCard = !!options.featuredCard;

      const li = document.createElement('li');
      li.className = 'game-card';
      li.dataset.style = styleName;
      if (isFeaturedCard) li.classList.add('is-featured');
      li.style.animationDelay = `${(index % 10) * 0.1}s`;
      li.style.setProperty('--game-primary', palette.primary);
      li.style.setProperty('--game-secondary', palette.secondary);
      li.style.setProperty('--game-tertiary', palette.tertiary);

      const objectWrap = document.createElement('div');
      objectWrap.className = 'game-object';

      const photo = document.createElement('div');
      photo.className = 'game-photo';
      const imageUrl = getGameImageUrl(game);
      if (imageUrl) {
        photo.style.backgroundImage = `url("${imageUrl.replace(/["\\]/g, '\\$&')}")`;
      }

      const objectInner = document.createElement('div');
      objectInner.className = 'game-object-inner';

      const emblem = document.createElement('div');
      emblem.className = 'game-emblem';
      emblem.textContent = isFeaturedCard ? 'Featured' : 'Play';

      const label = document.createElement('div');
      label.className = 'game-label';

      const type = document.createElement('div');
      type.className = 'game-type';
      type.textContent = typeLabel;

      const title = document.createElement('h2');
      title.className = 'game-title';
      title.textContent = game.name || 'Untitled Game';

      label.append(type, title);
      objectInner.append(emblem, label);
      objectWrap.append(photo, objectInner);

      const body = document.createElement('div');
      body.className = 'game-card-body';

      const meta = document.createElement('div');
      meta.className = 'game-meta';

      const chip = document.createElement('div');
      chip.className = 'game-chip';
      chip.textContent = typeLabel;

      const indexLabel = document.createElement('div');
      indexLabel.className = 'game-index';
      indexLabel.textContent = isFeaturedCard
        ? 'Now Showing'
        : `No. ${String(index + 1).padStart(2, '0')}`;

      meta.append(chip, indexLabel);

      const captionEl = document.createElement('p');
      captionEl.className = 'game-caption';
      captionEl.textContent = caption;

      const playAction = document.createElement('div');
      playAction.className = 'play-action';

      const playLink = document.createElement('a');
      playLink.className = 'play-btn';
      playLink.href = `game.html?id=${encodeURIComponent(game.id ?? '')}`;
      playLink.textContent = 'Play Game';
      playAction.appendChild(playLink);

      if (adminModeEnabled) {
        const editLink = document.createElement('a');
        editLink.className = 'edit-btn';
        editLink.href = `builder.html?id=${encodeURIComponent(game.id ?? '')}`;
        editLink.textContent = 'Edit';
        playAction.appendChild(editLink);
      }

      body.append(meta, captionEl, playAction);
      li.append(objectWrap, body);
      return li;
    }

    function renderFeatured(featuredContainer, featuredShell, games, filter = '') {
      if (!featuredContainer || !featuredShell) return;
      featuredContainer.innerHTML = '';
      const filteredGames = filterGames(games, filter);
      const featuredGame = filteredGames.find((game) => isGameFeatured(game)) || null;
      featuredShell.hidden = !featuredGame;
      if (!featuredGame) return;
      featuredContainer.appendChild(createGameCard(featuredGame, 0, {
        featuredCard: true,
        typeLabel: 'Featured Game'
      }));
    }

    function renderList(listContainer, featuredContainer, featuredShell, games, filter = '') {
      listContainer.innerHTML = '';
      renderFeatured(featuredContainer, featuredShell, games, filter);

      const filteredGames = filterGames(games, filter);
      if (filteredGames.length === 0) {
        renderEmptyState(listContainer, 'No games match your search.');
        return;
      }

      filteredGames.forEach((game, index) => {
        listContainer.appendChild(createGameCard(game, index));
      });
    }

    async function loadGames() {
      const listContainer = document.getElementById('gamesListContainer');
      const featuredContainer = document.getElementById('featuredGameContainer');
      const featuredShell = document.getElementById('featuredShell');
      const searchInput = document.getElementById('gameSearch');

      if (!window.TGB_SUPABASE_CONFIG) {
        renderEmptyState(listContainer, 'Error: Could not load database configuration.', 'error-state');
        return;
      }

      try {
        const games = await fetchGames(window.TGB_SUPABASE_CONFIG);

        if (!games || games.length === 0) {
          renderEmptyState(listContainer, 'No games available right now.');
          return;
        }

        renderList(listContainer, featuredContainer, featuredShell, games);

        searchInput.addEventListener('input', (e) => {
          renderList(listContainer, featuredContainer, featuredShell, games, e.target.value);
        });

        const adminModeToggle = document.getElementById('adminModeToggle');
        if (adminModeToggle) {
          adminModeToggle.addEventListener('click', () => {
            adminModeEnabled = !adminModeEnabled;
            writeAdminMode(adminModeEnabled);
            updateAdminModeUi();
            renderList(listContainer, featuredContainer, featuredShell, games, searchInput.value);
          });
        }
      } catch (err) {
        console.error('Database fetch error:', err);
        const errorMessage = err instanceof Error ? err.message : String(err);
        renderEmptyState(listContainer, `System Error: ${errorMessage}`, 'error-state');
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      adminModeEnabled = readAdminMode();
      updateAdminModeUi();
      loadGames();
    });
  </script>
</body>
</html>
