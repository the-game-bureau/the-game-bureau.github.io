<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0c1428">
  <title>Our Games | The Game Bureau</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    /* App Reset & Base */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    :root {
      /* Deep Midnight Blue Core */
      --bg-color: #0c1428; 
      --card-bg: #141e35;
      --text-main: #f0e6d6; /* Cream for body text */
      --text-muted: #94a3b8; /* Muted slate */
      --border-color: #1e293b; /* Subtle navy borders */
      
      /* New Aqua Blue Brand Accent */
      --primary: #33e6e6; /* Vibrant aqua blue */
      --primary-hover: #2bbdbd; /* Slightly deeper aqua for hover */
      --primary-text-on-dark: #33e6e6; /* Using aqua for main titles */

      --accent: #1e293b; 
      
      /* Status Green dot color */
      --green-dot: #10b981;

      --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
      --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
      --shadow-hover: 0 10px 15px -3px rgba(0, 0, 0, 0.15), 0 4px 6px -2px rgba(0, 0, 0, 0.1);
    }

    body {
      font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    /* Floating-Style App Header, using navy background with aqua text */
    .app-header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(12, 20, 40, 0.85); /* semi-transparent navy */
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border-color);
      padding: 1rem 1.5rem;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .app-brand {
      font-weight: 700;
      font-size: 1.25rem;
      letter-spacing: -0.02em;
      color: var(--primary); /* Aqua site title */
    }

    /* Main Layout */
    .app-container {
      max-width: 1080px;
      margin: 0 auto;
      padding: 3rem 1.5rem 5rem 1.5rem;
    }

    /* Hero Section */
    .hero {
      text-align: center;
      margin-bottom: 4rem;
      animation: fadeIn 0.6s ease-out;
    }

    .hero h1 {
      font-size: 3rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      margin-bottom: 1rem;
      color: var(--primary-text-on-dark); /* Aqua section title */
    }

    .hero p {
      font-size: 1.125rem;
      color: var(--text-muted); 
      max-width: 680px;
      margin: 0 auto 1.5rem auto;
      line-height: 1.7;
    }

    /* The "No app necessary" Badge, aqua badge with green dot */
    .badge {
      display: inline-flex;
      align-items: center;
      background: var(--primary); /* aqua background for the badge */
      color: #0c1428; /* Deep navy text on the badge for readability */
      font-size: 0.875rem;
      font-weight: 600;
      padding: 0.5rem 1rem;
      border-radius: 9999px;
      border: 1px solid var(--border-color);
      box-shadow: var(--shadow-sm);
    }

    .badge::before {
      content: '';
      display: inline-block;
      width: 8px;
      height: 8px;
      background-color: var(--green-dot); /* status-green dot */
      border-radius: 50%;
      margin-right: 8px;
    }

    /* Grid Layout */
    .game-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.5rem;
      list-style: none;
    }

    /* Tool Cards, with navy background and aqua title */
    .game-card {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 1.75rem;
      display: flex;
      flex-direction: column;
      box-shadow: var(--shadow-sm);
      transition: all 0.2s ease;
      animation: slideUp 0.5s ease-out backwards;
      animation-fill-mode: both;
    }

    /* Add staggered animation delays */
    .game-card:nth-child(1) { animation-delay: 0.1s; }
    .game-card:nth-child(2) { animation-delay: 0.2s; }
    .game-card:nth-child(3) { animation-delay: 0.3s; }

    .game-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
      border-color: #243256; /* Subtle lighter navy border on hover */
    }

    .game-title {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 0.5rem;
      color: var(--primary); /* Aqua game title inside card */
    }

    /* Push the button to the bottom if content above varies */
    .play-action {
      margin-top: auto;
      padding-top: 1.5rem;
    }

    .play-btn {
      display: block;
      width: 100%;
      text-align: center;
      padding: 0.875rem;
      background: var(--primary); /* Aqua brand color for the primary button */
      color: #0c1428; /* Navy text on the aqua button for readability */
      text-decoration: none;
      border-radius: 10px;
      font-weight: 600;
      font-size: 1rem;
      transition: background-color 0.2s, transform 0.1s;
    }

    .play-btn:hover { background: var(--primary-hover); } /* slightly deeper aqua hover */
    .play-btn:active { transform: scale(0.97); }

    /* States */
    .empty-state { text-align: center; grid-column: 1 / -1; color: var(--text-muted); padding: 3rem 0; }
    .error-state { color: var(--text-muted); font-weight: 500; text-align: center; grid-column: 1 / -1; padding: 2rem; background: var(--card-bg); border-radius: 12px; border: 1px solid #522; /* very subtle dark red border */ }

    /* Mobile Optimizations */
    @media (max-width: 640px) {
      .hero h1 { font-size: 2.25rem; }
      .hero p { font-size: 1rem; }
      .app-container { padding: 2rem 1rem 4rem 1rem; }
      .game-card { padding: 1.5rem; }
    }

    /* Subtle Animations */
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <header class="app-header">
    <div class="app-brand">The Game Bureau</div>
  </header>

  <main class="app-container">
    <section class="hero">
      <h1>Our Games</h1>
      <p>We create real world/real life games that allow people to interact with each other and the world around them while playing. We don’t hate technology. We use it and intertwine it with the human experience.</p>
      <div class="badge">No app necessary</div>
    </section>
    
    <ul class="game-grid" id="gamesListContainer">
      <li class="empty-state">Loading games engine...</li>
    </ul>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="game/config/supabase.js"></script>
  
  <script>
    async function loadGames() {
      const listContainer = document.getElementById('gamesListContainer');

      if (!window.TGB_SUPABASE_CONFIG) {
        listContainer.innerHTML = '<li class="error-state">Error: Could not load database configuration.</li>';
        return;
      }

      const dbUrl = window.TGB_SUPABASE_CONFIG.url;
      const dbKey = window.TGB_SUPABASE_CONFIG.publishableKey;
      const dbTable = window.TGB_SUPABASE_CONFIG.gamesTable;
      
      const db = supabase.createClient(dbUrl, dbKey);

      try {
        const { data: games, error } = await db
          .from(dbTable) 
          .select('id, name'); 

        if (error) throw error;

        listContainer.innerHTML = '';

        if (!games || games.length === 0) {
          listContainer.innerHTML = '<li class="empty-state">No games available right now. Check back soon!</li>';
          return;
        }

        games.forEach(game => {
          const li = document.createElement('li');
          li.className = 'game-card';
          
          li.innerHTML = `
            <div>
              <h2 class="game-title">${game.name || 'Untitled Game'}</h2>
            </div>
            <div class="play-action">
              <a class="play-btn" href="game.html?id=${game.id}">Play Game</a>
            </div>
          `;
          
          listContainer.appendChild(li);
        });

      } catch (err) {
        console.error("Database fetch error:", err);
        listContainer.innerHTML = `<li class="error-state">System Error: ${err.message}</li>`;
      }
    }

    document.addEventListener('DOMContentLoaded', loadGames);
  </script>
</body>
</html>
