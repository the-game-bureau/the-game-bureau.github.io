<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0c1428">
  <title>Our Games | The Game Bureau</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    /* App Reset & Base */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    :root {
      --bg-color: #0c1428; 
      --card-bg: #141e35;
      --text-main: #f0e6d6; 
      --text-muted: #94a3b8; 
      --border-color: #1e293b; 
      
      --primary: #33e6e6; 
      --primary-hover: #2bbdbd; 
      --primary-text-on-dark: #33e6e6; 

      --accent: #1e293b; 
      --green-dot: #10b981;

      --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
      --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
      --shadow-hover: 0 10px 15px -3px rgba(0, 0, 0, 0.15), 0 4px 6px -2px rgba(0, 0, 0, 0.1);
    }

    body {
      font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    /* Floating-Style App Header */
    .app-header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(12, 20, 40, 0.85); 
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border-color);
      padding: 1rem 1.5rem;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .app-brand {
      font-weight: 700;
      font-size: 1.25rem;
      letter-spacing: -0.02em;
      color: var(--primary);
    }

    .app-container {
      max-width: 1080px;
      margin: 0 auto;
      padding: 3rem 1.5rem 5rem 1.5rem;
    }

    /* Hero Section */
    .hero {
      text-align: center;
      margin-bottom: 3rem;
      animation: fadeIn 0.6s ease-out;
    }

    .hero h1 {
      font-size: 3rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      margin-bottom: 1rem;
      color: var(--primary-text-on-dark);
    }

    .hero p {
      font-size: 1.125rem;
      color: var(--text-muted); 
      max-width: 680px;
      margin: 0 auto 1.5rem auto;
      line-height: 1.7;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      background: var(--primary); 
      color: #0c1428; 
      font-size: 0.875rem;
      font-weight: 600;
      padding: 0.5rem 1rem;
      border-radius: 9999px;
      border: 1px solid var(--border-color);
    }

    .badge::before {
      content: '';
      display: inline-block;
      width: 8px;
      height: 8px;
      background-color: var(--green-dot);
      border-radius: 50%;
      margin-right: 8px;
    }

    /* Search Bar Styling */
    .search-wrapper {
      max-width: 500px;
      margin: 0 auto 3rem auto;
      position: relative;
    }

    #gameSearch {
      width: 100%;
      padding: 1rem 1.25rem;
      border-radius: 12px;
      border: 1px solid var(--border-color);
      background: var(--card-bg);
      color: var(--text-main);
      font-family: inherit;
      font-size: 1rem;
      outline: none;
      transition: all 0.2s ease;
      box-shadow: var(--shadow-sm);
    }

    #gameSearch:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(51, 230, 230, 0.15);
    }

    /* Grid Layout */
    .game-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.5rem;
      list-style: none;
    }

    .game-card {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 1.75rem;
      display: flex;
      flex-direction: column;
      box-shadow: var(--shadow-sm);
      transition: all 0.2s ease;
      animation: slideUp 0.5s ease-out backwards;
    }

    .game-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
      border-color: #243256; 
    }

    .game-title {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 0.5rem;
      color: var(--primary);
    }

    .play-action {
      margin-top: auto;
      padding-top: 1.5rem;
    }

    .play-btn {
      display: block;
      width: 100%;
      text-align: center;
      padding: 0.875rem;
      background: var(--primary); 
      color: #0c1428; 
      text-decoration: none;
      border-radius: 10px;
      font-weight: 600;
      font-size: 1rem;
      transition: background-color 0.2s, transform 0.1s;
    }

    .play-btn:hover { background: var(--primary-hover); }
    .play-btn:active { transform: scale(0.97); }

    .empty-state { text-align: center; grid-column: 1 / -1; color: var(--text-muted); padding: 3rem 0; }
    .error-state { color: var(--text-muted); font-weight: 500; text-align: center; grid-column: 1 / -1; padding: 2rem; background: var(--card-bg); border-radius: 12px; border: 1px solid #522; }

    @media (max-width: 640px) {
      .hero h1 { font-size: 2.25rem; }
      .app-container { padding: 2rem 1rem 4rem 1rem; }
    }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

  <header class="app-header">
    <div class="app-brand">The Game Bureau</div>
  </header>

  <main class="app-container">
    <section class="hero">
      <h1>Our Games</h1>
      <p>We create real world games that intertwine technology with the human experience.</p>
      <div class="badge">No app necessary</div>
    </section>

    <div class="search-wrapper">
      <input type="text" id="gameSearch" placeholder="Search by game name...">
    </div>
    
    <ul class="game-grid" id="gamesListContainer">
      <li class="empty-state">Loading games engine...</li>
    </ul>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="game/config/supabase.js"></script>
  
  <script>
    async function loadGames() {
      const listContainer = document.getElementById('gamesListContainer');
      const searchInput = document.getElementById('gameSearch');

      if (!window.TGB_SUPABASE_CONFIG) {
        listContainer.innerHTML = '<li class="error-state">Error: Could not load database configuration.</li>';
        return;
      }

      const { url: dbUrl, publishableKey: dbKey, gamesTable: dbTable } = window.TGB_SUPABASE_CONFIG;
      const db = supabase.createClient(dbUrl, dbKey);

      try {
        // Fetch and sort alphabetically from the start
        const { data: games, error } = await db
          .from(dbTable) 
          .select('id, name')
          .order('name', { ascending: true }); 

        if (error) throw error;

        if (!games || games.length === 0) {
          listContainer.innerHTML = '<li class="empty-state">No games available right now.</li>';
          return;
        }

        // Render function to handle both initial load and filtering
        const renderList = (filter = '') => {
          listContainer.innerHTML = '';
          const filteredGames = games.filter(game => 
            (game.name || '').toLowerCase().includes(filter.toLowerCase())
          );

          if (filteredGames.length === 0) {
            listContainer.innerHTML = '<li class="empty-state">No games match your search.</li>';
            return;
          }

          filteredGames.forEach((game, index) => {
            const li = document.createElement('li');
            li.className = 'game-card';
            // Stagger animation based on filtered position
            li.style.animationDelay = `${(index % 10) * 0.1}s`;
            
            li.innerHTML = `
              <div>
                <h2 class="game-title">${game.name || 'Untitled Game'}</h2>
              </div>
              <div class="play-action">
                <a class="play-btn" href="game.html?id=${game.id}">Play Game</a>
              </div>
            `;
            listContainer.appendChild(li);
          });
        };

        // Initial render
        renderList();

        // Search Listener
        searchInput.addEventListener('input', (e) => {
          renderList(e.target.value);
        });

      } catch (err) {
        console.error("Database fetch error:", err);
        listContainer.innerHTML = `<li class="error-state">System Error: ${err.message}</li>`;
      }
    }

    document.addEventListener('DOMContentLoaded', loadGames);
  </script>
</body>
</html>
