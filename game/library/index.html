<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#eef1ea">
  <title>LIBRARY | THE GAME BUREAU</title>
  <link rel="icon" href="../../assets/brand/tgb.ico" type="image/x-icon">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --paper: #eef1ea;
      --ink: #171511;
      --muted: #4f5a4e;
      --line: #171511;
    }

    body {
      min-height: 100svh;
      padding: 2rem 1.5rem;
      background: var(--paper);
      color: var(--ink);
      font-family: Georgia, 'Times New Roman', serif;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      min-height: 42px;
      padding: 0 1rem;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--paper);
      color: var(--ink);
      text-decoration: none;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 0.82rem;
    }

    .back-btn:hover,
    .back-btn:focus-visible {
      background: var(--ink);
      color: var(--paper);
      outline: none;
    }

    .admin-btn {
      position: fixed;
      right: 0.75rem;
      bottom: 0.75rem;
      padding: 0.25rem 0.55rem;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--paper);
      color: var(--muted);
      text-decoration: none;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 0.68rem;
      letter-spacing: 0.02em;
      opacity: 0.55;
    }

    .admin-btn:hover,
    .admin-btn:focus-visible {
      background: var(--ink);
      color: var(--paper);
      opacity: 1;
      outline: none;
    }
  </style>
</head>
<body>
  <a class="back-btn" href="https://thegamebureau.com">&larr; The Game Bureau</a>
  <a class="admin-btn" href="../../admin/">Admin</a>
</body>
</html>
