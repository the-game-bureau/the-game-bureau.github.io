<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0c0c0c">
  <title>The Game Bureau</title>
  <link id="favicon" rel="icon" href="../index.ico" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../index.css">
  <style>
    :root {
      --bg: #0c0c0c;
      --fg: #f5f5f5;
      --muted: rgba(245,245,245,0.55);
      --accent: var(--game-primary, #e85568);
    }

    body {
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--fg);
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    #landing {
      display: none;
      flex-direction: column;
      align-items: center;
      padding: 2.5rem 1.5rem 4rem;
      max-width: 480px;
      width: 100%;
      margin: 0 auto;
    }

    .logo-wrap {
      margin-bottom: 1.5rem;
    }

    .logo-wrap img {
      max-height: 80px;
      max-width: 200px;
      object-fit: contain;
      display: none;
    }

    .logo-wrap img.show { display: block; }

    .title-wrap {
      text-align: center;
      margin-bottom: 1rem;
    }

    #gameTitle {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 3rem;
      line-height: 1;
      letter-spacing: 0.02em;
      margin-bottom: 0.5rem;
    }

    #gameGuide, #price {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      font-size: 0.9rem;
      margin-top: 0.3rem;
    }

    #gameGuide.show, #price.show { display: flex; }

    .guide-label, .price-label {
      color: var(--muted);
    }

    .guide-val, .price-val {
      font-weight: 600;
    }

    #tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      justify-content: center;
      margin-bottom: 1rem;
    }

    .tag {
      background: rgba(245,245,245,0.1);
      border: 1px solid rgba(245,245,245,0.2);
      border-radius: 999px;
      padding: 0.2rem 0.7rem;
      font-size: 0.8rem;
      color: var(--muted);
    }

    .divider {
      width: 100%;
      border: none;
      border-top: 1px solid rgba(245,245,245,0.12);
      margin: 0.5rem 0 1.25rem;
    }

    #desc {
      font-size: 1rem;
      line-height: 1.65;
      color: var(--muted);
      text-align: center;
      margin-bottom: 2rem;
      white-space: pre-line;
    }

    .go-wrap {
      width: 100%;
      margin-bottom: 2.5rem;
    }

    #goBtn {
      display: block;
      width: 100%;
      padding: 1rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.5rem;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }

    #goBtn:active { opacity: 0.8; transform: scale(0.98); }

    .share-section {
      width: 100%;
      border: 1px solid rgba(245,245,245,0.12);
      border-radius: 16px;
      overflow: hidden;
    }

    .share-heading {
      padding: 0.75rem 1.25rem;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      border-bottom: 1px solid rgba(245,245,245,0.12);
    }

    .share-qr {
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
      border-bottom: 1px solid rgba(245,245,245,0.12);
    }

    .share-qr-label {
      font-size: 0.875rem;
      color: var(--muted);
      text-align: center;
    }

    .qr-box img {
      width: 140px;
      height: 140px;
      border-radius: 8px;
      display: block;
    }

    .share-or {
      display: flex;
      align-items: center;
      padding: 0 1.25rem;
      gap: 0.75rem;
      border-bottom: 1px solid rgba(245,245,245,0.12);
    }

    .share-or::before, .share-or::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(245,245,245,0.12);
    }

    .share-or span {
      font-size: 0.75rem;
      color: var(--muted);
      padding: 0.6rem 0;
    }

    .share-text {
      padding: 1rem 1.25rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    .share-text-title {
      font-size: 0.95rem;
      font-weight: 600;
    }

    .share-text-sub {
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 0.15rem;
    }

    .share-text-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0.5rem 1rem;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1rem;
      letter-spacing: 0.08em;
      cursor: pointer;
      flex-shrink: 0;
      transition: opacity 0.15s;
    }

    .share-text-btn:active { opacity: 0.7; }

    #error {
      display: none;
      padding: 2rem 1.5rem;
      color: #e85568;
      text-align: center;
      font-size: 1rem;
    }
  </style>
</head>
<body>

  <div id="landing">
    <div class="logo-wrap">
      <img id="gameLogo" alt="">
    </div>

    <div class="title-wrap">
      <div id="gameTitle"></div>
      <div id="gameGuide"><span class="guide-label">Your Guide</span><span class="guide-val" id="guideVal"></span></div>
      <div id="price">
        <span class="price-label">Price</span>
        <span class="price-val" id="priceVal"></span>
      </div>
    </div>

    <div id="tags"></div>

    <hr class="divider">

    <p id="desc"></p>

    <div class="go-wrap">
      <button id="goBtn">PLAY</button>
    </div>

    <div class="share-section">
      <div class="share-heading">Invite Players</div>

      <div class="share-qr">
        <div class="share-qr-label">Hold up your screen &amp; let players scan</div>
        <div class="qr-box"><img id="qrImg" alt="QR Code"></div>
      </div>

      <div class="share-or"><span>OR</span></div>

      <div class="share-text">
        <div class="share-text-info">
          <div class="share-text-title">Send via Text</div>
          <div class="share-text-sub">Opens a new message with the link</div>
        </div>
        <button class="share-text-btn" id="copyBtn">SEND</button>
      </div>
    </div>
  </div>

  <div id="error"></div>

  <!-- Game shell — revealed after PLAY is tapped -->
  <div id="game-shell" style="display:none; width:100%; flex:1 1 auto; min-height:0; flex-direction:column;">
    <div class="icon-preload" aria-hidden="true"></div>
    <div class="contact-header">
      <div class="avatar"><img id="header-logo" alt=""></div>
      <div class="contact-name" id="header-title"></div>
      <div class="contact-name" id="header-subtitle"></div>
      <div class="contact-status"><div class="online-dot"></div><span id="header-status">online</span></div>
      <button class="restart-btn" id="restartBtn" type="button">↺ RESTART</button>
    </div>
    <div class="chat" id="chat"></div>
    <div class="input-area" id="input-area"></div>
  </div>

  <script src="config/supabase.js"></script>
  <script src="lib/runtime.js?v=1774522002"></script>
  <script>
    const params = new URLSearchParams(location.search);
    const requestedGame = (params.get('game') || params.get('id') || '').trim();
    let resolvedGameQuery = requestedGame;

    function showError(msg) {
      const el = document.getElementById('error');
      el.textContent = msg;
      el.style.display = '';
    }

    function launchGame() {
      document.getElementById('landing').style.display = 'none';
      const shell = document.getElementById('game-shell');
      shell.style.display = 'flex';
      document.body.classList.add('game-active');
      history.replaceState(null, '', '?game=' + encodeURIComponent(resolvedGameQuery));
      const s = document.createElement('script');
      s.src = 'lib/engine.js?v=1774522002';
      document.body.appendChild(s);
    }

    function renderLanding(game) {
      const shareQuery = game.query || game.name || game.id || '';
      const shareUrl = location.origin + location.pathname + '?game=' + encodeURIComponent(shareQuery);

      resolvedGameQuery = shareQuery;
      document.title = game.name || game.id;

      const logo = document.getElementById('gameLogo');
      if (game.logo) {
        logo.src = game.logo;
        logo.classList.add('show');
      } else {
        logo.removeAttribute('src');
        logo.classList.remove('show');
      }

      document.getElementById('gameTitle').textContent = game.name || game.id;

      const gameGuide = document.getElementById('gameGuide');
      if (game.subtitle) {
        document.getElementById('guideVal').textContent = game.subtitle;
        gameGuide.classList.add('show');
      } else {
        document.getElementById('guideVal').textContent = '';
        gameGuide.classList.remove('show');
      }

      const tagsEl = document.getElementById('tags');
      tagsEl.innerHTML = '';
      (game.tags || []).forEach(function(tag) {
        const s = document.createElement('span');
        s.className = 'tag';
        s.textContent = tag;
        tagsEl.appendChild(s);
      });

      document.getElementById('desc').textContent = game.description || '';

      const priceEl = document.getElementById('price');
      if (game.price) {
        document.getElementById('priceVal').textContent = game.price;
        priceEl.classList.add('show');
      } else {
        document.getElementById('priceVal').textContent = '';
        priceEl.classList.remove('show');
      }

      document.getElementById('goBtn').onclick = launchGame;

      const px = Math.round(140 * Math.min(window.devicePixelRatio || 2, 3));
      document.getElementById('qrImg').src = 'https://api.qrserver.com/v1/create-qr-code/?size=' + px + 'x' + px + '&data=' + encodeURIComponent(shareUrl);

      document.getElementById('copyBtn').onclick = function() {
        window.location.href = 'sms:?body=' + encodeURIComponent(shareUrl);
      };

      document.getElementById('landing').style.display = 'flex';
    }

    async function loadLandingGame() {
      try {
        if (window.TGBGamesNewRuntime) {
          const graphGame = await window.TGBGamesNewRuntime.loadGraphGame(requestedGame);
          if (graphGame) {
            const landing = window.TGBGamesNewRuntime.buildLandingData(graphGame);
            renderLanding({
              id: graphGame.id,
              name: landing.name,
              subtitle: landing.subtitle,
              price: landing.price,
              tags: landing.tags,
              description: landing.description,
              logo: '',
              query: landing.query
            });
            return;
          }
        }
        showError('Could not load game data.');
      } catch (e) {
        showError('Could not load game data.');
      }
    }

    loadLandingGame();
  </script>

</body>
</html>
