<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#000000">
  <title>404 | THE GAME BUREAU</title>
  <link rel="icon" href="../assets/tgb.ico" type="image/x-icon">

  <meta property="og:type" content="website">
  <meta property="og:site_name" content="The Game Bureau">
  <meta property="og:title" content="The Game Bureau">
  <meta property="og:description" content="A live local experience by The Game Bureau.">
  <meta property="og:image" content="https://thegamebureau.com/assets/logo.png">
  <meta property="og:url" content="https://thegamebureau.com/game/index.html">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="https://thegamebureau.com/assets/logo.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&family=Outfit:wght@500;700&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

  <style>

    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --pad: 1.5rem;    /* horizontal page padding */
      --v: 1.75rem;     /* vertical section padding */
      --gap: 0.9rem;    /* internal element gap */
    }

    body {
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      padding-bottom: calc(90px + env(safe-area-inset-bottom));
    }

    #landing {
      max-width: 480px;
      width: 100%;
      margin: 0 auto;
      display: none;
      animation: fadeIn 0.35s ease-out;
    }

    /* ── HERO ── */
    .hero {
      position: relative;
      width: 100%;
      overflow: hidden;
      background: var(--secondary);
    }

    #landingLogo {
      display: none;
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .hero-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, var(--primary, #000) 10%, rgba(0,0,0,0.35) 55%, transparent 100%);
    }

    .hero-content {
      position: relative;
      z-index: 1;
      padding: clamp(140px, 45vw, 220px) var(--pad) var(--v);
      text-align: center;
    }

    .hero h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3rem, 14vw, 4.75rem);
      line-height: 0.88;
      letter-spacing: 0.02em;
      -webkit-text-stroke: 0.5px var(--primary);
      paint-order: stroke fill;
    }

    /* ── BODY ── */
    .body-pad { padding: 0 var(--pad); }

    #gameTagline {
      margin: 0;
      padding: 1.5rem var(--pad) 0.5rem;
      font-size: 1.1rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--secondary);
      line-height: 1.5;
      text-align: center;
      background: var(--primary);
    }
    #gameTagline:empty { display: none; }

    /* ── SECTION BLOCKS ── */
    .block {
      padding: var(--v) var(--pad);
      border-top: 1px solid var(--secondary);
    }

    .block-label {
      display: block;
      font-size: 0.85rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      color: var(--secondary);
      margin-bottom: var(--gap);
    }

    /* ── ABOUT ── */
    #descSection {
      display: none;
      background: var(--primary);
      padding: 0 var(--pad) 2rem;
    }
    #desc {
      font-size: 1rem;
      line-height: 1.75;
      white-space: pre-line;
      color: rgba(255,255,255,0.82);
      text-align: center;
    }

    /* ── HOW TO PLAY ── */
    #howToPlaySection {
      display: none;
      background: #fff;
      border: 2px solid var(--primary);
      border-radius: 20px;
      margin: 0 var(--pad) calc(var(--v) * 1.5);
      padding: 1.75rem var(--pad);
      color: #111;
      box-shadow: 0 8px 32px rgba(0,0,0,0.12);
    }

    .htp-header {
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      font-size: 1.9rem;
      letter-spacing: 0.01em;
      color: var(--primary);
      text-transform: uppercase;
      width: 100%;
    }

    .htp-divider {
      width: 100%;
      height: 1px;
      background: var(--secondary);
      margin-top: 1.1rem;
      display: block;
    }

    #howToPlayText {
      font-size: 1.1rem;
      line-height: 1.7;
      white-space: pre-line;
      color: #333;
      padding-top: 1rem;
    }

    /* ── MISSION GUIDE ── */
    #guideSection {
      display: none;
      background: var(--secondary);
      border-radius: 20px;
      margin: 0 var(--pad) calc(var(--v) * 1.5);
      padding: 1.5rem var(--pad);
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
    }

    .guide-card {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 1.2rem;
    }

    .guide-avatar-wrap {
      flex-shrink: 0;
      border-radius: 12px;
      overflow: hidden;
      border: 2px solid var(--primary);
      cursor: zoom-in;
    }

    .guide-avatar {
      width: 90px;
      height: 90px;
      object-fit: cover;
      display: block;
    }

    .guide-lightbox {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 999;
      background: rgba(0,0,0,0.78);
      align-items: center;
      justify-content: center;
      cursor: zoom-out;
    }

    .guide-lightbox.open {
      display: flex;
    }

    .guide-lightbox img {
      max-width: min(90vw, 480px);
      max-height: 80vh;
      border-radius: 16px;
      object-fit: contain;
      box-shadow: 0 24px 64px rgba(0,0,0,0.5);
    }

    .guide-text {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }

    .guide-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.4rem;
      letter-spacing: 0.06em;
      color: var(--primary);
      line-height: 1;
    }

    .guide-bio {
      font-size: 0.9rem;
      line-height: 1.5;
      color: rgba(255,255,255,0.75);
    }

    /* ── START ── */
    #startingLocationSection {
      display: none;
      position: relative;
      overflow: hidden;
      background: #fff;
      border: 2px solid var(--primary);
      border-radius: 20px;
      margin: calc(var(--v) * 1.5) var(--pad) calc(var(--v) * 1.5);
      padding: 1.75rem var(--pad);
      color: #111;
      flex-direction: column;
      align-items: center;
      gap: 1.1rem;
      box-shadow: 0 8px 32px rgba(0,0,0,0.12);
    }
    .start-bg-map {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      opacity: 0.32;
      border-radius: 18px;
      pointer-events: none;
    }

    .start-header {
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      font-size: 1.9rem;
      letter-spacing: 0.01em;
      color: var(--primary);
      -webkit-text-stroke: 1.5px var(--secondary);
      paint-order: stroke fill;
      text-align: center;
      text-transform: uppercase;
      width: 100%;
    }
    .start-header::after {
      content: '';
      display: block;
      width: 100%;
      height: 1px;
      background: var(--tertiary);
      margin-top: 1.1rem;
    }

    .start-blurb {
      font-size: 0.95rem;
      line-height: 1.6;
      color: #333;
      text-align: center;
      margin-top: -0.25rem;
      position: relative;
      z-index: 1;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      border-radius: 10px;
      padding: 0.75rem 1rem;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    .start-blurb strong { color: var(--tertiary); }

    .start-map-pin { fill: var(--secondary); }

    .start-map-wrap {
      position: relative;
      width: 200px;
      height: 200px;
      flex-shrink: 0;
      background: #e8e3da center/cover no-repeat;
      border-radius: 16px;
      border: 2px solid var(--secondary);
      box-shadow: 0 4px 24px rgba(0,0,0,0.15);
      cursor: pointer;
      user-select: none;
      overflow: hidden;
    }
    .start-map-wrap:active { opacity: 0.82; }

    /* w3w badge — overlaid on the map */
    .start-map-address {
      display: none;
      position: absolute;
      pointer-events: none;
      font-family: 'Source Sans 3', 'Outfit', sans-serif;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      white-space: nowrap;
      text-align: center;
    }
    .start-map-callout {
      display: inline-block;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -130%);
      background: rgba(255,255,255,0.96);
      border-radius: 20px;
      padding: 3px 11px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.28);
    }
    .start-map-address .w3w-slash { color: #E11F26; }
    .start-map-address .w3w-words { color: #0A3049; }

.start-w3w-logo {
      width: 110px;
      height: auto;
    }

    .start-btn-w3w {
      font-size: 0.78rem;
      font-weight: 400;
      opacity: 0.65;
      letter-spacing: 0.04em;
      font-family: monospace;
    }



    /* ── INVITE ── */
    /* ── INVITE_PLAYERS ── */
    #inviteSection {
      background: #fff;
      border: 2px solid var(--primary);
      border-radius: 20px;
      margin: calc(var(--v) * 1.5) var(--pad) calc(var(--v) * 2);
      padding: 1.75rem var(--pad);
      color: #111;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.1rem;
      box-shadow: 0 8px 32px rgba(0,0,0,0.12);
    }


    /* INVITE_PLAYERS: section title */
    .invite-header {
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      font-size: 1.9rem;
      letter-spacing: 0.01em;
      color: var(--primary);
      -webkit-text-stroke: 1.5px var(--secondary);
      paint-order: stroke fill;
      text-align: center;
      text-transform: uppercase;
      width: 100%;
    }
    .invite-header::after {
      content: '';
      display: block;
      width: 100%;
      height: 1px;
      background: var(--tertiary);
      margin-top: 1.1rem;
    }

    /* INVITE_PLAYERS: qr code block */
    .invite-qr-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.6rem;
    }

    /* INVITE_PLAYERS: qr code card */
    .qr-card {
      background: #fff;
      border-radius: 16px;
      padding: 16px;
      border: 2px solid var(--secondary);
      box-shadow: 0 4px 24px rgba(0,0,0,0.15);
    }

    /* INVITE_PLAYERS: caption above qr code */
    .invite-caption {
      font-size: 0.95rem;
      line-height: 1.6;
      color: #333;
      text-align: center;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      border-radius: 10px;
      padding: 0.75rem 1rem;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      width: 100%;
    }

    /* INVITE_PLAYERS: or divider */
    .invite-or {
      display: flex;
      align-items: center;
      gap: var(--gap);
      width: 100%;
      margin: 0;
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--secondary);
    }
    .invite-or::before,
    .invite-or::after {
      content: '';
      flex: 1;
      height: 1px;
      background: currentColor;
    }

    /* INVITE_PLAYERS: share button */
    .copy-btn {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      padding: 1.1rem var(--pad);
      background: var(--primary);
      color: #fff;
      border: 2px solid var(--secondary);
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.15);
      font-family: 'Outfit', sans-serif;
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity 0.18s, transform 0.12s;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.2rem;
    }
    .copy-btn:active { opacity: 0.82; transform: scale(0.97); }

    /* ── /INVITE_PLAYERS ── */

    /* ── W3W LIGHTBOX ── */
    #w3wLightbox {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 200;
      background: rgba(0,0,0,0.88);
      flex-direction: column;
    }
    #w3wLightbox.open { display: flex; }

    #w3wLightboxBar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: max(env(safe-area-inset-top), 0.75rem) 1rem 0.75rem;
      flex-shrink: 0;
    }

    #w3wLightboxLabel {
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      font-size: 0.8rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
    }

    #w3wLightboxRight {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-shrink: 0;
    }

    #w3wLightboxHint {
      font-family: 'Outfit', sans-serif;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.6);
      animation: w3w-blink 1.2s ease-in-out infinite;
    }

    @keyframes w3w-blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.2; }
    }

    #w3wLightboxClose {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(255,255,255,0.12);
      border: none;
      color: #fff;
      font-size: 1.2rem;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s;
    }
    #w3wLightboxClose:active { background: rgba(255,255,255,0.25); }

    #w3wLightboxFrame {
      flex: 1;
      width: 100%;
      border: none;
      display: block;
    }
    /* ── /W3W LIGHTBOX ── */

    /* ── CTA BAR ── */
    #ctaBar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      gap: calc(var(--gap) / 2);
      padding: var(--gap) var(--pad) max(env(safe-area-inset-bottom), var(--gap));
      border-top: 1px solid var(--secondary);
      z-index: 100;
    }

    .play-btn {
      -webkit-appearance: none;
      appearance: none;
      display: block;
      width: 100%;
      max-width: 480px;
      padding: 1.1rem var(--pad);
      background: var(--primary);
      color: #fff;
      text-decoration: none;
      font-family: 'Outfit', sans-serif;
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      border: 2px solid var(--secondary);
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.15);
      text-align: center;
      cursor: pointer;
      transition: opacity 0.18s, transform 0.12s;
    }
    .play-btn:active { opacity: 0.82; transform: scale(0.97); }

    #gamePrice {
      font-size: 0.85rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      opacity: 0.6;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  </style>
</head>
<body>

  <div id="landing">

    <!-- HERO: full-bleed logo + title overlay -->
    <div class="hero">
      <img id="landingLogo" src="" alt="Game Logo">
      <div class="hero-overlay"></div>
      <div class="hero-content">
        <h1 id="gameTitle"></h1>
      </div>
    </div>
    <p id="gameTagline"></p>

    <!-- ABOUT -->
    <section id="descSection">
      <p id="desc"></p>
    </section>

    <!-- HOW TO PLAY -->
    <section id="howToPlaySection">
      <div class="htp-header">How to Play</div>
      <span class="htp-divider"></span>
      <p id="howToPlayText"></p>
    </section>

    <!-- MISSION GUIDE -->
    <section id="guideSection">
      <div class="guide-card">
        <div class="guide-avatar-wrap">
          <img id="guideAvatar" src="" alt="Guide" class="guide-avatar">
        </div>
        <div class="guide-text">
          <div class="guide-name" id="guideNameDisplay"></div>
          <p class="guide-bio" id="guideDescription"></p>
        </div>
      </div>
    </section>

    <!-- START -->
    <section id="startingLocationSection">
      <div id="startBgMap" class="start-bg-map"></div>
      <div class="start-header">RENDEZVOUS</div>
      <p id="startBlurb" class="start-blurb"></p>

      <div class="start-map-wrap" id="startMapWrap">
        <div class="start-map-address" id="startDefinitionAddress"></div>
      </div>

      <img src="https://raw.githubusercontent.com/the-game-bureau/the-game-bureau.github.io/main/assets/w3w_HorizontalLogo_RGB_Fullcolour_ENG-1100x330.png" alt="what3words" class="start-w3w-logo">

    </section>

    <!-- INVITE PLAYERS -->
    <!-- INVITE_PLAYERS -->
    <section id="inviteSection">
      <div class="invite-header">Invite Players</div>

      <p class="invite-caption">Hold up your phone for players to scan.</p>

      <div class="invite-qr-block">
        <div class="qr-card" id="qrContainer"></div>
      </div>

      <div class="invite-or">OR</div>

      <button id="shareBtn" class="copy-btn" style="display:none">Invite Players by Text</button>
    </section>
    <!-- /INVITE_PLAYERS -->

  </div>

  <!-- W3W LIGHTBOX -->
  <div id="w3wLightbox">
    <div id="w3wLightboxBar">
      <span id="w3wLightboxLabel"></span>
      <div id="w3wLightboxRight">
        <span id="w3wLightboxHint">tap to close →</span>
        <button id="w3wLightboxClose" aria-label="Close">✕</button>
      </div>
    </div>
    <iframe id="w3wLightboxFrame" src="" allow="geolocation" title="what3words map"></iframe>
  </div>
  <!-- /W3W LIGHTBOX -->

  <div id="ctaBar">
    <a href="#" class="play-btn" id="startBtn">Start Game</a>
    <div id="gamePrice">Free</div>
  </div>

  <script>
    const SB_CONFIG = {
      url: 'https://qmaafbncpzrdmqapkkgr.supabase.co',
      key: 'sb_publishable_6a9XqxYa0-AZtyrwz4ZeUg_aiMsVH-3',
      table: 'games'
    };


    const W3W_API_KEY = '142RBYM4';

    const urlParams = new URLSearchParams(window.location.search);
    const gameId = urlParams.get('id');
    const FALLBACK_GUIDE_AVATAR =
      "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 96 96'%3E%3Crect width='96' height='96' rx='48' fill='%23111827'/%3E%3Ccircle cx='48' cy='36' r='18' fill='%23ffffff'/%3E%3Cpath d='M20 82c4-15 16-24 28-24s24 9 28 24' fill='%23ffffff'/%3E%3C/svg%3E";

    function renderNotFound() {
      document.body.innerHTML = '';
      document.body.style.cssText = 'background:#000;margin:0;padding:1.5rem;box-sizing:border-box;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:1.5rem;';
      document.body.innerHTML = `
        <img src="../assets/404.webp" alt="404" style="width:min(480px,90vw);max-height:40vh;object-fit:contain;display:block;">
        <div style="color:#fff;font-size:clamp(4rem,20vw,12rem);font-weight:900;line-height:1;letter-spacing:-0.02em;">404</div>
        <div style="display:flex;flex-wrap:wrap;gap:0.75rem;justify-content:center;">
          <button onclick="location.href='../library/'" style="background:none;border:1px solid rgba(255,255,255,0.3);color:#fff;padding:0.75rem 1.5rem;border-radius:999px;font-size:1rem;cursor:pointer;white-space:nowrap;">Go Back</button>
          <a href="help.html" style="background:none;border:1px solid rgba(255,255,255,0.3);color:#fff;padding:0.75rem 1.5rem;border-radius:999px;font-size:1rem;cursor:pointer;text-decoration:none;white-space:nowrap;">Contact Mission Control</a>
        </div>
      `;
    }

    function renderFatalState() {
      renderNotFound();
    }

    function renderMissingGameSelection() {
      renderNotFound();
    }

    function getDatabaseOrigin() {
      return new URL(SB_CONFIG.url).origin;
    }

    function sanitizeAssetUrl(value) {
      if (typeof value !== 'string' || !value.trim()) {
        return '';
      }

      const rawValue = value.trim().replace(/\\/g, '/')
        .replace('https://the-game-bureau.github.io/the-game-bureau/', 'https://thegamebureau.com/')
        .replace('https://the-game-bureau.github.io/', 'https://thegamebureau.com/')
        .replace('http://thegamebureau.com/assets/', 'https://raw.githubusercontent.com/the-game-bureau/the-game-bureau.github.io/main/assets/')
        .replace('https://thegamebureau.com/assets/', 'https://raw.githubusercontent.com/the-game-bureau/the-game-bureau.github.io/main/assets/');

      if (rawValue.startsWith('data:') || rawValue.startsWith('blob:')) {
        return rawValue;
      }

      try {
        const base = /^assets\//i.test(rawValue)
          ? new URL('../', window.location.href).toString()
          : window.location.href;
        const resolvedUrl = new URL(rawValue, base);
        const protocol = String(resolvedUrl.protocol || '').toLowerCase();
        return protocol === 'http:' || protocol === 'https:' || protocol === 'file:' ? resolvedUrl.toString() : '';
      } catch (error) {
        return '';
      }
    }

    function applyGameImages(gameNode) {

      const guideUrl = sanitizeAssetUrl((gameNode && (gameNode.guideImage || gameNode.guideImageUrl)) || '');

    async function fetchGameRecord(id) {
      const requestUrl = new URL(`rest/v1/${SB_CONFIG.table}`, `${SB_CONFIG.url.replace(/\/+$/, '')}/`);
      requestUrl.searchParams.set('select', '*');
      requestUrl.searchParams.set('id', `eq.${id}`);
      requestUrl.searchParams.set('limit', '1');

      const response = await fetch(requestUrl.toString(), {
        headers: {
          apikey: SB_CONFIG.key,
          Authorization: `Bearer ${SB_CONFIG.key}`,
          Accept: 'application/json'
        },
        cache: 'no-store'
      });

      if (!response.ok) {
        let message = `Request failed with status ${response.status}`;

        try {
          const payload = await response.json();
          message = payload.message || payload.error_description || payload.error || message;
        } catch (parseError) {
          // Fall back to the status-based message when no JSON body is available.
        }

        throw new Error(message);
      }

      const rows = await response.json();
      return Array.isArray(rows) ? rows[0] || null : null;
    }

    function multiplyGf256(x, y) {
      let result = 0;
      let a = x;
      let b = y;

      while (b > 0) {
        if (b & 1) {
          result ^= a;
        }

        a <<= 1;
        if (a & 0x100) {
          a ^= 0x11d;
        }
        b >>= 1;
      }

      return result;
    }

    function buildReedSolomonGenerator(degree) {
      let polynomial = [1];

      for (let i = 0; i < degree; i += 1) {
        const next = new Array(polynomial.length + 1).fill(0);

        for (let j = 0; j < polynomial.length; j += 1) {
          next[j] ^= multiplyGf256(polynomial[j], 1);
          next[j + 1] ^= multiplyGf256(polynomial[j], 1 << 0);
        }

        for (let j = 0; j < next.length; j += 1) {
          next[j] = next[j];
        }

        let factor = 1;
        for (let k = 0; k < i; k += 1) {
          factor = multiplyGf256(factor, 2);
        }

        const product = new Array(polynomial.length + 1).fill(0);
        for (let j = 0; j < polynomial.length; j += 1) {
          product[j] ^= polynomial[j];
          product[j + 1] ^= multiplyGf256(polynomial[j], factor);
        }
        polynomial = product;
      }

      return polynomial;
    }

    function computeErrorCorrection(dataCodewords, ecCodewords) {
      const generator = buildReedSolomonGenerator(ecCodewords);
      const remainder = new Array(ecCodewords).fill(0);

      for (const value of dataCodewords) {
        const factor = value ^ remainder[0];
        remainder.shift();
        remainder.push(0);

        for (let i = 0; i < ecCodewords; i += 1) {
          remainder[i] ^= multiplyGf256(generator[i + 1], factor);
        }
      }

      return remainder;
    }

    function appendBits(buffer, value, length) {
      for (let i = length - 1; i >= 0; i -= 1) {
        buffer.push((value >>> i) & 1);
      }
    }

    function createQrCodeBytes(text) {
      const version = 5;
      const dataCapacity = 108;
      const ecCodewords = 26;
      const maxPayloadLength = dataCapacity - 2;
      const encodedText = new TextEncoder().encode(text);

      if (encodedText.length > maxPayloadLength) {
        throw new Error('Invite link is too long to encode as a standalone QR code.');
      }

      const bits = [];
      appendBits(bits, 0b0100, 4);
      appendBits(bits, encodedText.length, 8);

      for (const byte of encodedText) {
        appendBits(bits, byte, 8);
      }

      const capacityBits = dataCapacity * 8;
      appendBits(bits, 0, Math.min(4, capacityBits - bits.length));

      while (bits.length % 8 !== 0) {
        bits.push(0);
      }

      const dataCodewords = [];
      for (let i = 0; i < bits.length; i += 8) {
        let value = 0;
        for (let j = 0; j < 8; j += 1) {
          value = (value << 1) | bits[i + j];
        }
        dataCodewords.push(value);
      }

      const padBytes = [0xec, 0x11];
      let padIndex = 0;
      while (dataCodewords.length < dataCapacity) {
        dataCodewords.push(padBytes[padIndex % padBytes.length]);
        padIndex += 1;
      }

      return dataCodewords.concat(computeErrorCorrection(dataCodewords, ecCodewords));
    }

    function createQrMatrix(text) {
      const version = 5;
      const size = 17 + version * 4;
      const matrix = Array.from({ length: size }, () => Array(size).fill(false));
      const isFunction = Array.from({ length: size }, () => Array(size).fill(false));
      const alignmentPositions = [6, 30];

      function setModule(x, y, value, markFunction = true) {
        matrix[y][x] = value;
        if (markFunction) {
          isFunction[y][x] = true;
        }
      }

      function drawFinder(x, y) {
        for (let dy = -1; dy <= 7; dy += 1) {
          for (let dx = -1; dx <= 7; dx += 1) {
            const xx = x + dx;
            const yy = y + dy;
            if (xx < 0 || yy < 0 || xx >= size || yy >= size) {
              continue;
            }

            const isBorder = dx === -1 || dx === 7 || dy === -1 || dy === 7;
            const isOuter = dx === 0 || dx === 6 || dy === 0 || dy === 6;
            const isInner = dx >= 2 && dx <= 4 && dy >= 2 && dy <= 4;
            setModule(xx, yy, !isBorder && (isOuter || isInner));
          }
        }
      }

      function drawAlignment(x, y) {
        for (let dy = -2; dy <= 2; dy += 1) {
          for (let dx = -2; dx <= 2; dx += 1) {
            setModule(x + dx, y + dy, Math.max(Math.abs(dx), Math.abs(dy)) !== 1);
          }
        }
      }

      function drawFormatBits(mask) {
        const formatData = (0b01 << 3) | mask;
        let formatBits = formatData << 10;
        const generator = 0x537;

        for (let i = 14; i >= 10; i -= 1) {
          if ((formatBits >>> i) & 1) {
            formatBits ^= generator << (i - 10);
          }
        }

        const finalBits = ((formatData << 10) | formatBits) ^ 0x5412;
        const bit = (index) => ((finalBits >>> index) & 1) === 1;

        for (let i = 0; i <= 5; i += 1) setModule(8, i, bit(i));
        setModule(8, 7, bit(6));
        setModule(8, 8, bit(7));
        setModule(7, 8, bit(8));
        for (let i = 9; i < 15; i += 1) setModule(14 - i, 8, bit(i));

        for (let i = 0; i < 8; i += 1) setModule(size - 1 - i, 8, bit(i));
        for (let i = 8; i < 15; i += 1) setModule(8, size - 15 + i, bit(i));
        setModule(8, size - 8, true);
      }

      function maskApplies(mask, x, y) {
        switch (mask) {
          case 0: return (x + y) % 2 === 0;
          case 1: return y % 2 === 0;
          case 2: return x % 3 === 0;
          case 3: return (x + y) % 3 === 0;
          case 4: return (Math.floor(y / 2) + Math.floor(x / 3)) % 2 === 0;
          case 5: return ((x * y) % 2) + ((x * y) % 3) === 0;
          case 6: return ((((x * y) % 2) + ((x * y) % 3)) % 2) === 0;
          case 7: return ((((x + y) % 2) + ((x * y) % 3)) % 2) === 0;
          default: return false;
        }
      }

      function penaltyScore(candidate) {
        let penalty = 0;

        for (let y = 0; y < size; y += 1) {
          let runColor = candidate[y][0];
          let runLength = 1;
          for (let x = 1; x < size; x += 1) {
            if (candidate[y][x] === runColor) {
              runLength += 1;
            } else {
              if (runLength >= 5) {
                penalty += runLength - 2;
              }
              runColor = candidate[y][x];
              runLength = 1;
            }
          }
          if (runLength >= 5) {
            penalty += runLength - 2;
          }
        }

        for (let x = 0; x < size; x += 1) {
          let runColor = candidate[0][x];
          let runLength = 1;
          for (let y = 1; y < size; y += 1) {
            if (candidate[y][x] === runColor) {
              runLength += 1;
            } else {
              if (runLength >= 5) {
                penalty += runLength - 2;
              }
              runColor = candidate[y][x];
              runLength = 1;
            }
          }
          if (runLength >= 5) {
            penalty += runLength - 2;
          }
        }

        for (let y = 0; y < size - 1; y += 1) {
          for (let x = 0; x < size - 1; x += 1) {
            const color = candidate[y][x];
            if (
              candidate[y][x + 1] === color &&
              candidate[y + 1][x] === color &&
              candidate[y + 1][x + 1] === color
            ) {
              penalty += 3;
            }
          }
        }

        const finderLike = [true, false, true, true, true, false, true, false, false, false, false];
        const reverseFinderLike = [...finderLike].reverse();

        function matchesPattern(line, index, pattern) {
          for (let i = 0; i < pattern.length; i += 1) {
            if (line[index + i] !== pattern[i]) {
              return false;
            }
          }
          return true;
        }

        for (let y = 0; y < size; y += 1) {
          for (let x = 0; x <= size - 11; x += 1) {
            if (matchesPattern(candidate[y], x, finderLike) || matchesPattern(candidate[y], x, reverseFinderLike)) {
              penalty += 40;
            }
          }
        }

        for (let x = 0; x < size; x += 1) {
          const column = [];
          for (let y = 0; y < size; y += 1) {
            column.push(candidate[y][x]);
          }
          for (let y = 0; y <= size - 11; y += 1) {
            if (matchesPattern(column, y, finderLike) || matchesPattern(column, y, reverseFinderLike)) {
              penalty += 40;
            }
          }
        }

        let darkModules = 0;
        for (const row of candidate) {
          for (const cell of row) {
            if (cell) {
              darkModules += 1;
            }
          }
        }

        const totalModules = size * size;
        const darkPercent = (darkModules * 100) / totalModules;
        penalty += Math.floor(Math.abs(darkPercent - 50) / 5) * 10;

        return penalty;
      }

      drawFinder(0, 0);
      drawFinder(size - 7, 0);
      drawFinder(0, size - 7);

      for (let i = 8; i < size - 8; i += 1) {
        setModule(i, 6, i % 2 === 0);
        setModule(6, i, i % 2 === 0);
      }

      for (const x of alignmentPositions) {
        for (const y of alignmentPositions) {
          const overlapsFinder =
            (x === 6 && y === 6) ||
            (x === 6 && y === size - 7) ||
            (x === size - 7 && y === 6);

          if (!overlapsFinder) {
            drawAlignment(x, y);
          }
        }
      }

      for (let i = 0; i < 8; i += 1) {
        if (i !== 6) {
          setModule(8, i, false);
          setModule(i, 8, false);
        }
      }
      for (let i = size - 8; i < size; i += 1) {
        setModule(8, i, false);
        setModule(i, 8, false);
      }
      setModule(8, size - 8, true);

      const codewords = createQrCodeBytes(text);
      const dataBits = [];
      for (const codeword of codewords) {
        appendBits(dataBits, codeword, 8);
      }

      let bitIndex = 0;
      let direction = -1;
      for (let x = size - 1; x >= 1; x -= 2) {
        if (x === 6) {
          x -= 1;
        }

        for (let step = 0; step < size; step += 1) {
          const y = direction === -1 ? size - 1 - step : step;
          for (let offset = 0; offset < 2; offset += 1) {
            const xx = x - offset;
            if (isFunction[y][xx]) {
              continue;
            }

            matrix[y][xx] = bitIndex < dataBits.length ? dataBits[bitIndex] === 1 : false;
            bitIndex += 1;
          }
        }

        direction *= -1;
      }

      let bestMask = 0;
      let bestMatrix = null;
      let bestPenalty = Number.POSITIVE_INFINITY;

      for (let mask = 0; mask < 8; mask += 1) {
        const candidate = matrix.map((row) => row.slice());

        for (let y = 0; y < size; y += 1) {
          for (let x = 0; x < size; x += 1) {
            if (!isFunction[y][x] && maskApplies(mask, x, y)) {
              candidate[y][x] = !candidate[y][x];
            }
          }
        }

        const previousMatrix = matrix.map((row) => row.slice());
        for (let y = 0; y < size; y += 1) {
          for (let x = 0; x < size; x += 1) {
            matrix[y][x] = candidate[y][x];
          }
        }
        drawFormatBits(mask);
        for (let y = 0; y < size; y += 1) {
          for (let x = 0; x < size; x += 1) {
            candidate[y][x] = matrix[y][x];
            matrix[y][x] = previousMatrix[y][x];
          }
        }

        const score = penaltyScore(candidate);
        if (score < bestPenalty) {
          bestPenalty = score;
          bestMask = mask;
          bestMatrix = candidate;
        }
      }

      for (let y = 0; y < size; y += 1) {
        for (let x = 0; x < size; x += 1) {
          matrix[y][x] = bestMatrix[y][x];
        }
      }
      drawFormatBits(bestMask);

      return matrix;
    }

    function renderQrCode(container, text, size = 180) {
      const matrix = createQrMatrix(text);
      const moduleCount = matrix.length;
      const quietZone = 4;
      const totalModules = moduleCount + quietZone * 2;
      const moduleSize = size / totalModules;

      const svgParts = [
        `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${totalModules} ${totalModules}" width="${size}" height="${size}" shape-rendering="crispEdges">`,
        `<rect width="${totalModules}" height="${totalModules}" fill="#ffffff"/>`
      ];

      for (let y = 0; y < moduleCount; y += 1) {
        for (let x = 0; x < moduleCount; x += 1) {
          if (matrix[y][x]) {
            svgParts.push(
              `<rect x="${x + quietZone}" y="${y + quietZone}" width="1" height="1" fill="#000000"/>`
            );
          }
        }
      }

      svgParts.push('</svg>');
      container.innerHTML = svgParts.join('');
      const svg = container.querySelector('svg');
      if (svg) {
        svg.style.display = 'block';
        svg.style.width = `${size}px`;
        svg.style.height = `${size}px`;
      }
    }

    async function init() {

        renderMissingGameSelection();
        return;
      }

        const game = await fetchGameRecord(gameId);

          renderFatalState('Error Loading Game');
          return;
        }

        const primaryColor = game.primary_color || game.primaryColor || '#33e6e6';
        const secondaryColor = game.secondary_color || game.secondaryColor || '#243256';
        document.documentElement.style.setProperty('--primary', primaryColor);
        document.documentElement.style.setProperty('--secondary', secondaryColor);
        document.body.style.background = primaryColor;

        const gameNode = game.nodes?.find((node) => node.type === 'game') || {};
        const defaultEmoji = gameNode.defaultEmoji || '🧩';

        const tertiaryColor = gameNode.tertiaryColor || '#ffffff';
        const quaternaryColor = gameNode.quaternaryColor || '#ffffff';
        document.documentElement.style.setProperty('--tertiary', tertiaryColor);
        document.documentElement.style.setProperty('--quaternary', quaternaryColor);
        document.body.style.color = quaternaryColor;
        const images = applyGameImages(gameNode);

        const gameName = String(game.name || 'Untitled Game').trim() || 'Untitled Game';

        const city = (gameNode.city || game.city || '').trim();
        document.getElementById('startBlurb').innerHTML = `Use the map to find exactly where in <strong>${city}</strong> the game starts.`;

        const qrUrl = `https://thegamebureau.com/game/index.html?id=${encodeURIComponent(gameId)}`;
        const ogImage = images.logoUrl || images.guideUrl || '';
        const setMeta = (sel, val) => { const el = document.querySelector(sel); if (el && val) el.setAttribute('content', val); };
        setMeta('meta[property="og:title"]', `${gameName} | The Game Bureau`);
        setMeta('meta[property="og:description"]', gameNode.tagline || 'A live local experience by The Game Bureau.');
        setMeta('meta[property="og:image"]', ogImage);
        setMeta('meta[property="og:url"]', qrUrl);
        setMeta('meta[name="twitter:image"]', ogImage);
        const gameTitleEl = document.getElementById('gameTitle');
        gameTitleEl.textContent = gameName;
        gameTitleEl.style.color = secondaryColor;
        document.getElementById('gameTagline').textContent = gameNode.tagline || '';

        if (gameNode.howToPlay) {
          document.getElementById('howToPlaySection').style.display = 'block';
          document.getElementById('howToPlayText').textContent = gameNode.howToPlay;
        }

        if (gameNode.guideName) {
          document.getElementById('guideSection').style.display = 'block';
          document.getElementById('guideNameDisplay').textContent = gameNode.guideName.toUpperCase();
          document.getElementById('guideDescription').textContent = gameNode.guideBio || 'Your mission lead.';
          const gImg = images.guideUrl || images.logoUrl || FALLBACK_GUIDE_AVATAR;
          document.getElementById('guideAvatar').src = gImg;
        }

        // START
        const startingLocation = (gameNode.startingLocation || '').trim();
        const startingLocationValid = startingLocation && startingLocation !== 'http://' && startingLocation !== 'https://';
        const isLocationBased = gameNode.locationBased === 'YES' || gameNode.locationBased === true;
        if (!isLocationBased) {
          document.getElementById('startingLocationSection').style.display = 'none';
        } else {
          document.getElementById('startingLocationSection').style.display = 'flex';

          // Render OSM tile map background from city/state via Nominatim geocoding
          const mapCity = (gameNode.city || '').trim();
          if (mapCity) {
            const bgMap = document.getElementById('startBgMap');
            (async () => {
              try {
                const geo = await fetch(
                  `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(mapCity)}&format=json&limit=1`,
                  { headers: { 'Accept-Language': 'en' } }
                );
                const places = await geo.json();
                if (!places.length) return;
                const mapLat = parseFloat(places[0].lat);
                const mapLon = parseFloat(places[0].lon);

                const W = bgMap.offsetWidth  || 640;
                const H = bgMap.offsetHeight || 400;
                const canvas = document.createElement('canvas');
                canvas.width  = W;
                canvas.height = H;
                const ctx = canvas.getContext('2d');
                const zoom     = 12;
                const tileSize = 256;
                const n        = Math.pow(2, zoom);
                const tileXf   = (mapLon + 180) / 360 * n;
                const latRad   = mapLat * Math.PI / 180;
                const tileYf   = (1 - Math.log(Math.tan(latRad) + 1 / Math.cos(latRad)) / Math.PI) / 2 * n;
                const tileXi   = Math.floor(tileXf);
                const tileYi   = Math.floor(tileYf);
                const offX     = (tileXf - tileXi) * tileSize;
                const offY     = (tileYf - tileYi) * tileSize;
                const cx = W / 2, cy = H / 2;
                const rangeX = Math.ceil(W / tileSize / 2) + 1;
                const rangeY = Math.ceil(H / tileSize / 2) + 1;

                const loads = [];
                for (let dy = -rangeY; dy <= rangeY; dy++) {
                  for (let dx = -rangeX; dx <= rangeX; dx++) {
                    loads.push(new Promise(resolve => {
                      const img = new Image();
                      img.crossOrigin = 'anonymous';
                      img.onload  = () => { ctx.drawImage(img, Math.round(cx - offX + dx * tileSize), Math.round(cy - offY + dy * tileSize), tileSize, tileSize); resolve(); };
                      img.onerror = resolve;
                      img.src = `https://tile.openstreetmap.org/${zoom}/${tileXi + dx}/${tileYi + dy}.png`;
                    }));
                  }
                }
                await Promise.all(loads);
                try { bgMap.style.backgroundImage = `url(${canvas.toDataURL()})`; } catch(e) {}
              } catch(e) {}
            })();
          }
        }

        if (isLocationBased) {
          // Parse w3w words from any stored format, fall back to raw value
          let words = null;
          const urlMatch = startingLocation.match(/(?:what3words\.com|w3w\.co)\/([a-z]+\.[a-z]+\.[a-z]+)/i);
          const rawMatch = startingLocation.match(/\/{1,3}([a-z]+\.[a-z]+\.[a-z]+)/i);
          if (urlMatch) words = urlMatch[1].toLowerCase();
          else if (rawMatch) words = rawMatch[1].toLowerCase();

          const webUrl = words
            ? `https://what3words.com/${words}`
            : startingLocationValid ? startingLocation : null;

          document.getElementById('w3wLightboxClose').onclick = () => {
            document.getElementById('w3wLightbox').classList.remove('open');
            document.body.style.overflow = '';
            document.getElementById('w3wLightboxFrame').src = '';
          };

          document.getElementById('startMapWrap').onclick = () => {
            document.getElementById('w3wLightboxFrame').src = webUrl || 'https://what3words.com';
            document.getElementById('w3wLightboxLabel').textContent = words ? `///${words}` : gameName;
            document.getElementById('w3wLightbox').classList.add('open');
            document.body.style.overflow = 'hidden';
          };

          if (words) {
            // Show badge
            const addrEl = document.getElementById('startDefinitionAddress');
            addrEl.className = 'start-map-address start-map-callout';
            addrEl.innerHTML = `<span class="w3w-slash">///</span><span class="w3w-words">${words}</span>`;

            // Fetch coordinates from W3W API and render OSM tile map
            (async () => {
              try {
                const w3wRes = await fetch(
                  `https://api.what3words.com/v3/convert-to-coordinates?words=${encodeURIComponent(words)}&key=${W3W_API_KEY}`
                );
                const w3wData = await w3wRes.json();
                if (!w3wData.coordinates) return;
                const mapLat = w3wData.coordinates.lat;
                const mapLon = w3wData.coordinates.lng;

                const canvas = document.createElement('canvas');
                canvas.width = 200; canvas.height = 200;
                const ctx = canvas.getContext('2d');
                const zoom = 16, tileSize = 256;
                const n = Math.pow(2, zoom);
                const tileXf = (mapLon + 180) / 360 * n;
                const latRad = mapLat * Math.PI / 180;
                const tileYf = (1 - Math.log(Math.tan(latRad) + 1 / Math.cos(latRad)) / Math.PI) / 2 * n;
                const tileXi = Math.floor(tileXf), tileYi = Math.floor(tileYf);
                const offX = (tileXf - tileXi) * tileSize, offY = (tileYf - tileYi) * tileSize;
                const cx = 100, cy = 100;

                const loads = [];
                for (let dy = -1; dy <= 1; dy++) for (let dx = -1; dx <= 1; dx++) {
                  loads.push(new Promise(resolve => {
                    const img = new Image(); img.crossOrigin = 'anonymous';
                    img.onload = () => { ctx.drawImage(img, Math.round(cx - offX + dx * tileSize), Math.round(cy - offY + dy * tileSize), tileSize, tileSize); resolve(); };
                    img.onerror = resolve;
                    img.src = `https://tile.openstreetmap.org/${zoom}/${tileXi + dx}/${tileYi + dy}.png`;
                  }));
                }
                await Promise.all(loads);

                // w3w grid overlay
                const gridStep = 14, pinX = cx, pinY = cy - 10, half = gridStep / 2;
                const offGX = ((pinX - half) % gridStep + gridStep) % gridStep;
                const offGY = ((pinY - half) % gridStep + gridStep) % gridStep;
                ctx.save();
                ctx.strokeStyle = 'rgba(10,48,73,0.18)'; ctx.lineWidth = 0.5; ctx.beginPath();
                for (let x = offGX; x <= 200; x += gridStep) { ctx.moveTo(x,0); ctx.lineTo(x,200); }
                for (let y = offGY; y <= 200; y += gridStep) { ctx.moveTo(0,y); ctx.lineTo(200,y); }
                ctx.stroke();
                ctx.fillStyle = 'rgba(225,31,38,0.14)';
                ctx.fillRect(pinX-half, pinY-half, gridStep, gridStep);
                ctx.strokeStyle = '#E11F26'; ctx.lineWidth = 1.5;
                ctx.strokeRect(pinX-half, pinY-half, gridStep, gridStep);
                ctx.restore();

                // pin
                const pinColor = getComputedStyle(document.documentElement).getPropertyValue('--secondary').trim() || '#e94560';
                ctx.beginPath(); ctx.arc(cx, cy-10, 9, 0, Math.PI*2); ctx.fillStyle = pinColor; ctx.fill();
                ctx.beginPath(); ctx.moveTo(cx, cy+2); ctx.lineTo(cx-7, cy-8); ctx.lineTo(cx+7, cy-8); ctx.closePath(); ctx.fillStyle = pinColor; ctx.fill();
                ctx.beginPath(); ctx.arc(cx, cy-10, 4, 0, Math.PI*2); ctx.fillStyle = '#fff'; ctx.fill();

                try { mapWrap.style.backgroundImage = `url(${canvas.toDataURL()})`; } catch(e) {}
              } catch(e) {}
            })();
          }
        }
        // /START

        const bodyText = gameNode.body || '';
        document.getElementById('desc').textContent = bodyText;
        if (bodyText) document.getElementById('descSection').style.display = 'block';
        document.getElementById('gamePrice').textContent = (gameNode.price || 'FREE').toUpperCase();

        // INVITE_PLAYERS — share button
        const shareBtn = document.getElementById('shareBtn');
        shareBtn.style.display = '';
        shareBtn.style.background = primaryColor;
        if (navigator.share) {
          shareBtn.addEventListener('click', () => {
            navigator.share({ title: gameName, url: qrUrl }).catch(() => {});
          });
        }

        document.getElementById('startBtn').href = `../play/index.html?id=${encodeURIComponent(gameId)}`;

        // INVITE_PLAYERS — qr code
        try {
          new QRCode(document.getElementById('qrContainer'), {
            text: qrUrl,
            width: 200,
            height: 200,
            colorDark: primaryColor || '#000000',
            colorLight: '#ffffff',
            correctLevel: QRCode.CorrectLevel.M
          });
        } catch (e) { document.getElementById('qrContainer').style.display = 'none'; }
        // /INVITE_PLAYERS
        document.getElementById('landing').style.display = 'block';
        const ctaBar = document.getElementById('ctaBar');
        ctaBar.style.background = primaryColor;
        ctaBar.style.display = 'flex';
      } catch (error) {
        console.error('Game fetch error:', error);
        renderFatalState('Error Loading Game');
      }
    }

    document.addEventListener('DOMContentLoaded', function () {
      init();

      const lightbox = document.getElementById('guideLightbox');
      const lightboxImg = document.getElementById('guideLightboxImg');
      const avatar = document.getElementById('guideAvatar');

      avatar.addEventListener('click', function () {
        lightboxImg.src = this.src;
        lightbox.classList.add('open');
      });

      lightbox.addEventListener('click', function () {
        lightbox.classList.remove('open');
      });
    });
  </script>

  <div class="guide-lightbox" id="guideLightbox">
    <img id="guideLightboxImg" src="" alt="Guide">
  </div>
</body>
</html>
