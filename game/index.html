<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#000000">
  <title>404 | THE GAME BUREAU</title>
  <link rel="icon" href="../assets/tgb.ico" type="image/x-icon">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

  <style>

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      padding-bottom: calc(110px + env(safe-area-inset-bottom));
    }

    /* ── Landing wrapper ── */
    #landing {
      max-width: 480px;
      width: 100%;
      margin: 0 auto;
      display: none;
      animation: fadeIn 0.4s ease-out;
    }

    /* ── Hero ── */
    .hero {
      padding: 3rem 1.25rem 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 0.5rem;
    }

    #landingLogo {
      width: 50%;
      height: auto;
      object-fit: contain;
      display: none;
      margin-bottom: 0.75rem;
    }

    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3.5rem, 15vw, 5.5rem);
      line-height: 0.9;
      letter-spacing: 0.02em;
      width: 100%;
    }

    #gameTagline {
      font-size: 1.05rem;
      font-weight: 400;
      line-height: 1.45;
      opacity: 0.75;
      margin-top: 0.25rem;
    }

    #tagsContainer {
      display: flex;
      flex-wrap: nowrap;
      overflow-x: auto;
      gap: 0;
      width: 100%;
      padding: 0.5rem 0 0.25rem;
      justify-content: center;
      align-items: center;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      margin-top: 0.5rem;
    }
    #tagsContainer::-webkit-scrollbar { display: none; }

    .tag {
      flex-shrink: 0;
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--tertiary);
      background: none;
      border: none;
      padding: 0.2rem 0;
      white-space: nowrap;
    }

    .tag + .tag::before {
      content: '·';
      margin: 0 0.55rem;
      color: var(--secondary);
      opacity: 0.6;
      font-weight: 400;
      font-size: 1rem;
    }

    /* ── Content sections ── */
    .content-section {
      border-top: 2px solid var(--secondary);
      padding: 1.5rem 1.25rem;
    }

    .section-label {
      display: block;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--secondary);
      margin-bottom: 0.85rem;
    }

    /* ── Description ── */
    #descSection { display: none; }

    #desc {
      font-size: 1rem;
      line-height: 1.65;
      white-space: pre-line;
    }

    /* ── How to Play (collapsible) ── */
    #howToPlaySection { display: none; }

    .section-toggle {
      width: 100%;
      background: none;
      border: none;
      padding: 0;
      margin: 0;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: inherit;
      font-family: inherit;
    }

    .section-toggle .section-label { margin-bottom: 0; }

    .toggle-arrow {
      font-size: 1.1rem;
      color: var(--secondary);
      transition: transform 0.25s ease;
      flex-shrink: 0;
      line-height: 1;
    }

    .section-toggle[aria-expanded="true"] .toggle-arrow {
      transform: rotate(180deg);
    }

    .collapsible-body {
      display: grid;
      grid-template-rows: 0fr;
      transition: grid-template-rows 0.3s ease;
    }

    .section-toggle[aria-expanded="true"] + .collapsible-body {
      grid-template-rows: 1fr;
    }

    .collapsible-body p {
      overflow: hidden;
      padding-top: 0;
      font-size: 1rem;
      line-height: 1.65;
      white-space: pre-line;
      transition: padding-top 0.3s ease;
    }

    .section-toggle[aria-expanded="true"] + .collapsible-body p {
      padding-top: 1rem;
    }

    /* ── Mission Guide ── */
    #guideSection { display: none; }

    .guide-inner {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .guide-img-wrap {
      width: 52px;
      height: 52px;
      border-radius: 999px;
      border: 2px solid var(--secondary);
      overflow: hidden;
      flex-shrink: 0;
    }

    .guide-img-wrap img { width: 100%; height: 100%; object-fit: cover; }

    .guide-info h3 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.1rem;
      letter-spacing: 0.06em;
      margin-bottom: 0.2rem;
    }

    .guide-info p {
      font-size: 0.875rem;
      line-height: 1.45;
      opacity: 0.75;
    }

    /* ── Invite Players ── */
    .share-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.25rem;
    }

    .share-option {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.6rem;
    }

    .share-option-label {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--secondary);
      align-self: flex-start;
    }

    .share-qr-wrap {
      background: #fff;
      border-radius: 12px;
      padding: 12px;
      border: 2px solid var(--secondary);
    }

    .share-caption {
      font-size: 0.85rem;
      text-align: center;
      opacity: 0.75;
    }

    .url-display-wrap {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      width: 100%;
    }

    .url-display {
      flex: 1;
      font-size: 0.65rem;
      font-family: 'Courier New', monospace;
      word-break: break-all;
      background: transparent;
      color: var(--quaternary);
      border: none;
      border-bottom: 1.5px solid var(--secondary);
      border-radius: 0;
      padding: 0.5rem 0.25rem;
      opacity: 0.8;
      user-select: all;
    }

    .copy-btn {
      flex-shrink: 0;
      padding: 0.5rem 1.1rem;
      background: var(--tertiary);
      color: var(--quaternary);
      border: 2px solid var(--secondary);
      border-radius: 999px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.1rem;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .copy-btn:active { opacity: 0.7; }

    .share-or {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      width: 100%;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 0.75rem;
      letter-spacing: 0.14em;
      color: var(--secondary);
    }

    .share-or::before,
    .share-or::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--secondary);
      opacity: 0.5;
    }

    /* ── Sticky CTA ── */
    #ctaBar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 0.35rem;
      padding: 0.85rem 1.25rem max(env(safe-area-inset-bottom), 0.85rem);
      border-top: 2px solid var(--secondary);
      z-index: 100;
    }

    .play-btn {
      display: block;
      width: 100%;
      max-width: 480px;
      padding: 1rem;
      background: var(--tertiary);
      color: var(--quaternary);
      text-decoration: none;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.5rem;
      letter-spacing: 0.08em;
      border-radius: 999px;
      border: 2px solid var(--secondary);
      text-align: center;
      transition: transform 0.1s, opacity 0.2s;
    }

    .play-btn:active { transform: scale(0.98); opacity: 0.9; }

    #gamePrice {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      opacity: 0.7;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

    /* ── Bubble text — large and readable ── */
    .msg-bubble {
      font-size: 1.25rem;
      font-weight: 400;
      line-height: 1.45;
    }

    /* ── iMessage-style header ── */
    .contact-header.compact {
      position: relative;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      gap: 3px;
      padding: max(env(safe-area-inset-top), 0px) 70px 10px;
      min-height: calc(max(env(safe-area-inset-top), 44px) + 54px);
      background: rgba(249, 249, 249, 0.97);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 0.5px solid rgba(0, 0, 0, 0.2);
    }

    /* Avatar logo — full colour, contain so wide logos aren't cropped */
    .contact-header.compact .avatar {
      width: auto;
      max-width: calc(100vw - 140px);
      height: 36px;
      min-width: 36px;
      margin-bottom: 0;
      border-radius: 8px;
      overflow: hidden;
      background: transparent;
      flex-shrink: 0;
    }
    .avatar img {
      filter: none;
    }
    .contact-header.compact .avatar img {
      height: 100%;
      width: auto;
      max-width: 100%;
      object-fit: contain;
      filter: none;
    }

    /* Thumbnail replaces avatar */
    .game-thumbnail {
      display: none;
      height: 36px;
      width: auto;
      max-width: calc(100vw - 140px);
      border-radius: 8px;
      object-fit: contain;
      flex-shrink: 0;
    }
    .game-thumbnail.show { display: block; }

    /* Info block: name + status, centered */
    .header-info {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1px;
      min-width: 0;
    }

    .contact-header.compact .contact-name {
      font-size: 0.85rem;
      font-weight: 600;
      line-height: 1.2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: calc(100vw - 140px);
    }

    .contact-header.compact .contact-tagline {
      max-width: calc(100vw - 140px);
      color: #6b7280;
      font-size: 0.72rem;
      font-weight: 500;
      line-height: 1.25;
      text-align: center;
      display: -webkit-box;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 2;
      line-clamp: 2;
      overflow: hidden;
    }

    /* Hide subtitle — iMessage only shows name */
    .contact-header.compact #header-subtitle { display: none; }

    .contact-header.compact .contact-status {
      margin-top: 0;
      font-size: 0.7rem;
      color: #8e8e93;
    }

    /* Restart button */
    .contact-header.compact .restart-btn {
      position: absolute;
      right: 14px;
      bottom: 10px;
      transform: none;
      border: none;
      background: none;
      color: #1a73e8;
      font-size: 0.82rem;
      font-weight: 500;
      letter-spacing: 0;
      padding: 8px 0;
      min-height: 44px;
      display: flex;
      align-items: flex-end;
    }
    .contact-header.compact .restart-btn:active {
      opacity: 0.5;
      background: none;
    }

    /* ── Chat area ── */
    .chat {
      padding: 1rem 0.85rem 0.5rem;
      gap: 0.5rem;
    }

    /* Bubbles: wider on mobile, comfortable padding */
    .msg { max-width: 88%; }

    .msg-bubble {
      padding: 0.75rem 1.1rem;
      border-radius: 22px;
    }

    .msg.from-game .msg-caps-loop {
      display: inline-block;
      font-weight: 700;
      transform-origin: 50% 60%;
      animation: msgCapsLoop 1.15s ease-in-out infinite;
    }

    @keyframes msgCapsLoop {
      0%, 100% { transform: scale(0.92); }
      50% { transform: scale(1.08); }
    }

    /* ── Button node ── */
    .msg.msg-action-btn {
      max-width: 100%;
      width: 100%;
      display: flex;
      justify-content: center;
      align-self: stretch;
      margin: 4px 0;
    }

    .msg-btn {
      display: block;
      width: 100%;
      padding: 14px 20px;
      background: var(--game-primary, #5468a7);
      color: var(--game-tertiary, #fff);
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: .03em;
      text-align: center;
      text-decoration: none;
      border-radius: 12px;
      cursor: pointer;
      transition: opacity .12s, transform .1s;
      -webkit-tap-highlight-color: transparent;
    }

    .msg-btn:active {
      opacity: .78;
      transform: scale(.977);
    }

    /* ── Button lightbox ── */
    .btn-lightbox-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .6);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }

    .btn-lightbox-frame {
      position: relative;
      width: min(480px, calc(100vw - 32px));
      height: min(680px, calc(100vh - 32px));
      background: #fff;
      border-radius: 16px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .btn-lightbox-close {
      position: absolute;
      top: 10px;
      right: 10px;
      z-index: 1;
      width: 32px;
      height: 32px;
      border: none;
      border-radius: 50%;
      background: rgba(0, 0, 0, .3);
      color: #fff;
      font-size: 20px;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn-lightbox-close:active { opacity: .75; }

    .btn-lightbox-iframe {
      flex: 1;
      width: 100%;
      border: none;
    }

    /* ── Input area — fixed at bottom with safe area ── */
    .input-area {
      padding: 10px 12px max(env(safe-area-inset-bottom), 10px);
      background: #f9f9f9;
      border-top: 0.5px solid rgba(0,0,0,0.15);
    }

    /* Input row */
    .answer-row { gap: 8px; }

    /* Text input — 16px min to prevent iOS zoom on focus */
    .answer-input {
      font-size: 1rem;
      padding: 0.75rem 1.1rem;
      border-radius: 22px;
      min-height: 44px;
    }

    /* Send button — 48px tap target */
    .submit-btn {
      width: 44px;
      height: 44px;
      flex-shrink: 0;
    }
  </style>
</head>
<body>

  <div id="landing">

    <section class="hero">
      <img id="landingLogo" src="" alt="Game Logo">
      <h1 id="gameTitle"></h1>
      <p id="gameTagline"></p>
      <div id="tagsContainer"></div>
    </section>

    <section class="content-section" id="descSection">
      <span class="section-label">About</span>
      <p id="desc"></p>
    </section>

    <section class="content-section" id="howToPlaySection">
      <button class="section-toggle" id="howToPlayToggle" aria-expanded="false">
        <span class="section-label">How to Play</span>
        <span class="toggle-arrow">↓</span>
      </button>
      <div class="collapsible-body">
        <p id="howToPlayText"></p>
      </div>
    </section>

    <section class="content-section" id="guideSection">
      <div class="guide-inner">
        <div class="guide-img-wrap">
          <img id="guideAvatar" src="" alt="Guide">
        </div>
        <div class="guide-info">
          <h3 id="guideNameDisplay"></h3>
          <p id="guideDescription"></p>
        </div>
      </div>
    </section>

    <section class="content-section share-section">
      <span class="section-label">Invite Players</span>
      <div class="share-option">
        <div class="share-option-label">Scan QR Code</div>
        <div class="share-qr-wrap" id="qrContainer"></div>
        <p class="share-caption">Hold up your phone for other players to scan.</p>
      </div>
      <div class="share-or">OR</div>
      <div class="share-option">
        <div class="share-option-label">Send Link</div>
        <div class="url-display-wrap">
          <span id="gameUrlDisplay" class="url-display"></span>
          <button id="copyUrlBtn" class="copy-btn">COPY</button>
        </div>
        <p class="share-caption">Copy the link and send it to your players by text message.</p>
      </div>
    </section>

  </div>

  <div id="ctaBar">
    <a href="#" class="play-btn" id="startBtn">Start Game</a>
    <div id="gamePrice">Free</div>
  </div>

  <script>
    const SB_CONFIG = {
      url: 'https://qmaafbncpzrdmqapkkgr.supabase.co',
      key: 'sb_publishable_6a9XqxYa0-AZtyrwz4ZeUg_aiMsVH-3',
      table: 'games'
    };

    const urlParams = new URLSearchParams(window.location.search);
    const gameId = urlParams.get('id');
    const FALLBACK_GUIDE_AVATAR =
      "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 96 96'%3E%3Crect width='96' height='96' rx='48' fill='%23111827'/%3E%3Ccircle cx='48' cy='36' r='18' fill='%23ffffff'/%3E%3Cpath d='M20 82c4-15 16-24 28-24s24 9 28 24' fill='%23ffffff'/%3E%3C/svg%3E";

    function renderNotFound() {
      document.body.innerHTML = '';
      document.body.style.cssText = 'background:#000;margin:0;padding:1.5rem;box-sizing:border-box;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:1.5rem;';
      document.body.innerHTML = `
        <img src="../assets/404.webp" alt="404" style="width:min(480px,90vw);max-height:40vh;object-fit:contain;display:block;">
        <div style="color:#fff;font-size:clamp(4rem,20vw,12rem);font-weight:900;line-height:1;letter-spacing:-0.02em;">404</div>
        <div style="display:flex;flex-wrap:wrap;gap:0.75rem;justify-content:center;">
          <button onclick="location.href='../library/'" style="background:none;border:1px solid rgba(255,255,255,0.3);color:#fff;padding:0.75rem 1.5rem;border-radius:999px;font-size:1rem;cursor:pointer;white-space:nowrap;">Go Back</button>
          <a href="help.html" style="background:none;border:1px solid rgba(255,255,255,0.3);color:#fff;padding:0.75rem 1.5rem;border-radius:999px;font-size:1rem;cursor:pointer;text-decoration:none;white-space:nowrap;">Contact Mission Control</a>
        </div>
      `;
    }

    function renderFatalState() {
      renderNotFound();
    }

    function renderMissingGameSelection() {
      renderNotFound();
    }

    function getDatabaseOrigin() {
      return new URL(SB_CONFIG.url).origin;
    }

    function sanitizeAssetUrl(value) {
      if (typeof value !== 'string' || !value.trim()) {
        return '';
      }

      const rawValue = value.trim();

      if (rawValue.startsWith('data:') || rawValue.startsWith('blob:')) {
        return rawValue;
      }

      try {
        const resolvedUrl = new URL(rawValue, window.location.href);
        const protocol = String(resolvedUrl.protocol || '').toLowerCase();
        return protocol === 'http:' || protocol === 'https:' || protocol === 'file:' ? resolvedUrl.toString() : '';
      } catch (error) {
        return '';
      }
    }

    function applyGameImages(gameNode) {
      const logoEl = document.getElementById('landingLogo');
      const guideAvatarEl = document.getElementById('guideAvatar');
      const logoUrl = sanitizeAssetUrl((gameNode && (gameNode.logo || gameNode.logoUrl)) || '');
      const guideUrl = sanitizeAssetUrl((gameNode && (gameNode.guideImage || gameNode.guideImageUrl)) || '');

      if (logoEl) {
        logoEl.style.display = 'none';
        logoEl.removeAttribute('src');
        logoEl.onerror = null;
        if (logoUrl) {
          logoEl.src = logoUrl;
          logoEl.style.display = 'block';
          logoEl.onerror = () => {
            logoEl.onerror = null;
            logoEl.style.display = 'none';
          };
        }
      }

      if (guideAvatarEl) {
        const fallbackGuideUrl = logoUrl || FALLBACK_GUIDE_AVATAR;
        guideAvatarEl.onerror = () => {
          guideAvatarEl.onerror = null;
          guideAvatarEl.src = fallbackGuideUrl;
        };
        guideAvatarEl.src = guideUrl || fallbackGuideUrl;
      }

      return { logoUrl, guideUrl };
    }

    async function fetchGameRecord(id) {
      const requestUrl = new URL(`rest/v1/${SB_CONFIG.table}`, `${SB_CONFIG.url.replace(/\/+$/, '')}/`);
      requestUrl.searchParams.set('select', '*');
      requestUrl.searchParams.set('id', `eq.${id}`);
      requestUrl.searchParams.set('limit', '1');

      const response = await fetch(requestUrl.toString(), {
        headers: {
          apikey: SB_CONFIG.key,
          Authorization: `Bearer ${SB_CONFIG.key}`,
          Accept: 'application/json'
        },
        cache: 'no-store'
      });

      if (!response.ok) {
        let message = `Request failed with status ${response.status}`;

        try {
          const payload = await response.json();
          message = payload.message || payload.error_description || payload.error || message;
        } catch (parseError) {
          // Fall back to the status-based message when no JSON body is available.
        }

        throw new Error(message);
      }

      const rows = await response.json();
      return Array.isArray(rows) ? rows[0] || null : null;
    }

    function multiplyGf256(x, y) {
      let result = 0;
      let a = x;
      let b = y;

      while (b > 0) {
        if (b & 1) {
          result ^= a;
        }

        a <<= 1;
        if (a & 0x100) {
          a ^= 0x11d;
        }
        b >>= 1;
      }

      return result;
    }

    function buildReedSolomonGenerator(degree) {
      let polynomial = [1];

      for (let i = 0; i < degree; i += 1) {
        const next = new Array(polynomial.length + 1).fill(0);

        for (let j = 0; j < polynomial.length; j += 1) {
          next[j] ^= multiplyGf256(polynomial[j], 1);
          next[j + 1] ^= multiplyGf256(polynomial[j], 1 << 0);
        }

        for (let j = 0; j < next.length; j += 1) {
          next[j] = next[j];
        }

        let factor = 1;
        for (let k = 0; k < i; k += 1) {
          factor = multiplyGf256(factor, 2);
        }

        const product = new Array(polynomial.length + 1).fill(0);
        for (let j = 0; j < polynomial.length; j += 1) {
          product[j] ^= polynomial[j];
          product[j + 1] ^= multiplyGf256(polynomial[j], factor);
        }
        polynomial = product;
      }

      return polynomial;
    }

    function computeErrorCorrection(dataCodewords, ecCodewords) {
      const generator = buildReedSolomonGenerator(ecCodewords);
      const remainder = new Array(ecCodewords).fill(0);

      for (const value of dataCodewords) {
        const factor = value ^ remainder[0];
        remainder.shift();
        remainder.push(0);

        for (let i = 0; i < ecCodewords; i += 1) {
          remainder[i] ^= multiplyGf256(generator[i + 1], factor);
        }
      }

      return remainder;
    }

    function appendBits(buffer, value, length) {
      for (let i = length - 1; i >= 0; i -= 1) {
        buffer.push((value >>> i) & 1);
      }
    }

    function createQrCodeBytes(text) {
      const version = 5;
      const dataCapacity = 108;
      const ecCodewords = 26;
      const maxPayloadLength = dataCapacity - 2;
      const encodedText = new TextEncoder().encode(text);

      if (encodedText.length > maxPayloadLength) {
        throw new Error('Invite link is too long to encode as a standalone QR code.');
      }

      const bits = [];
      appendBits(bits, 0b0100, 4);
      appendBits(bits, encodedText.length, 8);

      for (const byte of encodedText) {
        appendBits(bits, byte, 8);
      }

      const capacityBits = dataCapacity * 8;
      appendBits(bits, 0, Math.min(4, capacityBits - bits.length));

      while (bits.length % 8 !== 0) {
        bits.push(0);
      }

      const dataCodewords = [];
      for (let i = 0; i < bits.length; i += 8) {
        let value = 0;
        for (let j = 0; j < 8; j += 1) {
          value = (value << 1) | bits[i + j];
        }
        dataCodewords.push(value);
      }

      const padBytes = [0xec, 0x11];
      let padIndex = 0;
      while (dataCodewords.length < dataCapacity) {
        dataCodewords.push(padBytes[padIndex % padBytes.length]);
        padIndex += 1;
      }

      return dataCodewords.concat(computeErrorCorrection(dataCodewords, ecCodewords));
    }

    function createQrMatrix(text) {
      const version = 5;
      const size = 17 + version * 4;
      const matrix = Array.from({ length: size }, () => Array(size).fill(false));
      const isFunction = Array.from({ length: size }, () => Array(size).fill(false));
      const alignmentPositions = [6, 30];

      function setModule(x, y, value, markFunction = true) {
        matrix[y][x] = value;
        if (markFunction) {
          isFunction[y][x] = true;
        }
      }

      function drawFinder(x, y) {
        for (let dy = -1; dy <= 7; dy += 1) {
          for (let dx = -1; dx <= 7; dx += 1) {
            const xx = x + dx;
            const yy = y + dy;
            if (xx < 0 || yy < 0 || xx >= size || yy >= size) {
              continue;
            }

            const isBorder = dx === -1 || dx === 7 || dy === -1 || dy === 7;
            const isOuter = dx === 0 || dx === 6 || dy === 0 || dy === 6;
            const isInner = dx >= 2 && dx <= 4 && dy >= 2 && dy <= 4;
            setModule(xx, yy, !isBorder && (isOuter || isInner));
          }
        }
      }

      function drawAlignment(x, y) {
        for (let dy = -2; dy <= 2; dy += 1) {
          for (let dx = -2; dx <= 2; dx += 1) {
            setModule(x + dx, y + dy, Math.max(Math.abs(dx), Math.abs(dy)) !== 1);
          }
        }
      }

      function drawFormatBits(mask) {
        const formatData = (0b01 << 3) | mask;
        let formatBits = formatData << 10;
        const generator = 0x537;

        for (let i = 14; i >= 10; i -= 1) {
          if ((formatBits >>> i) & 1) {
            formatBits ^= generator << (i - 10);
          }
        }

        const finalBits = ((formatData << 10) | formatBits) ^ 0x5412;
        const bit = (index) => ((finalBits >>> index) & 1) === 1;

        for (let i = 0; i <= 5; i += 1) setModule(8, i, bit(i));
        setModule(8, 7, bit(6));
        setModule(8, 8, bit(7));
        setModule(7, 8, bit(8));
        for (let i = 9; i < 15; i += 1) setModule(14 - i, 8, bit(i));

        for (let i = 0; i < 8; i += 1) setModule(size - 1 - i, 8, bit(i));
        for (let i = 8; i < 15; i += 1) setModule(8, size - 15 + i, bit(i));
        setModule(8, size - 8, true);
      }

      function maskApplies(mask, x, y) {
        switch (mask) {
          case 0: return (x + y) % 2 === 0;
          case 1: return y % 2 === 0;
          case 2: return x % 3 === 0;
          case 3: return (x + y) % 3 === 0;
          case 4: return (Math.floor(y / 2) + Math.floor(x / 3)) % 2 === 0;
          case 5: return ((x * y) % 2) + ((x * y) % 3) === 0;
          case 6: return ((((x * y) % 2) + ((x * y) % 3)) % 2) === 0;
          case 7: return ((((x + y) % 2) + ((x * y) % 3)) % 2) === 0;
          default: return false;
        }
      }

      function penaltyScore(candidate) {
        let penalty = 0;

        for (let y = 0; y < size; y += 1) {
          let runColor = candidate[y][0];
          let runLength = 1;
          for (let x = 1; x < size; x += 1) {
            if (candidate[y][x] === runColor) {
              runLength += 1;
            } else {
              if (runLength >= 5) {
                penalty += runLength - 2;
              }
              runColor = candidate[y][x];
              runLength = 1;
            }
          }
          if (runLength >= 5) {
            penalty += runLength - 2;
          }
        }

        for (let x = 0; x < size; x += 1) {
          let runColor = candidate[0][x];
          let runLength = 1;
          for (let y = 1; y < size; y += 1) {
            if (candidate[y][x] === runColor) {
              runLength += 1;
            } else {
              if (runLength >= 5) {
                penalty += runLength - 2;
              }
              runColor = candidate[y][x];
              runLength = 1;
            }
          }
          if (runLength >= 5) {
            penalty += runLength - 2;
          }
        }

        for (let y = 0; y < size - 1; y += 1) {
          for (let x = 0; x < size - 1; x += 1) {
            const color = candidate[y][x];
            if (
              candidate[y][x + 1] === color &&
              candidate[y + 1][x] === color &&
              candidate[y + 1][x + 1] === color
            ) {
              penalty += 3;
            }
          }
        }

        const finderLike = [true, false, true, true, true, false, true, false, false, false, false];
        const reverseFinderLike = [...finderLike].reverse();

        function matchesPattern(line, index, pattern) {
          for (let i = 0; i < pattern.length; i += 1) {
            if (line[index + i] !== pattern[i]) {
              return false;
            }
          }
          return true;
        }

        for (let y = 0; y < size; y += 1) {
          for (let x = 0; x <= size - 11; x += 1) {
            if (matchesPattern(candidate[y], x, finderLike) || matchesPattern(candidate[y], x, reverseFinderLike)) {
              penalty += 40;
            }
          }
        }

        for (let x = 0; x < size; x += 1) {
          const column = [];
          for (let y = 0; y < size; y += 1) {
            column.push(candidate[y][x]);
          }
          for (let y = 0; y <= size - 11; y += 1) {
            if (matchesPattern(column, y, finderLike) || matchesPattern(column, y, reverseFinderLike)) {
              penalty += 40;
            }
          }
        }

        let darkModules = 0;
        for (const row of candidate) {
          for (const cell of row) {
            if (cell) {
              darkModules += 1;
            }
          }
        }

        const totalModules = size * size;
        const darkPercent = (darkModules * 100) / totalModules;
        penalty += Math.floor(Math.abs(darkPercent - 50) / 5) * 10;

        return penalty;
      }

      drawFinder(0, 0);
      drawFinder(size - 7, 0);
      drawFinder(0, size - 7);

      for (let i = 8; i < size - 8; i += 1) {
        setModule(i, 6, i % 2 === 0);
        setModule(6, i, i % 2 === 0);
      }

      for (const x of alignmentPositions) {
        for (const y of alignmentPositions) {
          const overlapsFinder =
            (x === 6 && y === 6) ||
            (x === 6 && y === size - 7) ||
            (x === size - 7 && y === 6);

          if (!overlapsFinder) {
            drawAlignment(x, y);
          }
        }
      }

      for (let i = 0; i < 8; i += 1) {
        if (i !== 6) {
          setModule(8, i, false);
          setModule(i, 8, false);
        }
      }
      for (let i = size - 8; i < size; i += 1) {
        setModule(8, i, false);
        setModule(i, 8, false);
      }
      setModule(8, size - 8, true);

      const codewords = createQrCodeBytes(text);
      const dataBits = [];
      for (const codeword of codewords) {
        appendBits(dataBits, codeword, 8);
      }

      let bitIndex = 0;
      let direction = -1;
      for (let x = size - 1; x >= 1; x -= 2) {
        if (x === 6) {
          x -= 1;
        }

        for (let step = 0; step < size; step += 1) {
          const y = direction === -1 ? size - 1 - step : step;
          for (let offset = 0; offset < 2; offset += 1) {
            const xx = x - offset;
            if (isFunction[y][xx]) {
              continue;
            }

            matrix[y][xx] = bitIndex < dataBits.length ? dataBits[bitIndex] === 1 : false;
            bitIndex += 1;
          }
        }

        direction *= -1;
      }

      let bestMask = 0;
      let bestMatrix = null;
      let bestPenalty = Number.POSITIVE_INFINITY;

      for (let mask = 0; mask < 8; mask += 1) {
        const candidate = matrix.map((row) => row.slice());

        for (let y = 0; y < size; y += 1) {
          for (let x = 0; x < size; x += 1) {
            if (!isFunction[y][x] && maskApplies(mask, x, y)) {
              candidate[y][x] = !candidate[y][x];
            }
          }
        }

        const previousMatrix = matrix.map((row) => row.slice());
        for (let y = 0; y < size; y += 1) {
          for (let x = 0; x < size; x += 1) {
            matrix[y][x] = candidate[y][x];
          }
        }
        drawFormatBits(mask);
        for (let y = 0; y < size; y += 1) {
          for (let x = 0; x < size; x += 1) {
            candidate[y][x] = matrix[y][x];
            matrix[y][x] = previousMatrix[y][x];
          }
        }

        const score = penaltyScore(candidate);
        if (score < bestPenalty) {
          bestPenalty = score;
          bestMask = mask;
          bestMatrix = candidate;
        }
      }

      for (let y = 0; y < size; y += 1) {
        for (let x = 0; x < size; x += 1) {
          matrix[y][x] = bestMatrix[y][x];
        }
      }
      drawFormatBits(bestMask);

      return matrix;
    }

    function renderQrCode(container, text, size = 180) {
      const matrix = createQrMatrix(text);
      const moduleCount = matrix.length;
      const quietZone = 4;
      const totalModules = moduleCount + quietZone * 2;
      const moduleSize = size / totalModules;

      const svgParts = [
        `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${totalModules} ${totalModules}" width="${size}" height="${size}" shape-rendering="crispEdges">`,
        `<rect width="${totalModules}" height="${totalModules}" fill="#ffffff"/>`
      ];

      for (let y = 0; y < moduleCount; y += 1) {
        for (let x = 0; x < moduleCount; x += 1) {
          if (matrix[y][x]) {
            svgParts.push(
              `<rect x="${x + quietZone}" y="${y + quietZone}" width="1" height="1" fill="#000000"/>`
            );
          }
        }
      }

      svgParts.push('</svg>');
      container.innerHTML = svgParts.join('');
      const svg = container.querySelector('svg');
      if (svg) {
        svg.style.display = 'block';
        svg.style.width = `${size}px`;
        svg.style.height = `${size}px`;
      }
    }

    async function init() {
      if (!gameId) {
        renderMissingGameSelection();
        return;
      }

      try {
        const game = await fetchGameRecord(gameId);
        if (!game) {
          renderFatalState('Error Loading Game');
          return;
        }

        const primaryColor = game.primary_color || game.primaryColor || '#33e6e6';
        const secondaryColor = game.secondary_color || game.secondaryColor || '#243256';
        document.documentElement.style.setProperty('--primary', primaryColor);
        document.documentElement.style.setProperty('--secondary', secondaryColor);
        document.body.style.background = primaryColor;

        const gameNode = game.nodes?.find((node) => node.type === 'game') || {};

        const tertiaryColor = gameNode.tertiaryColor || '#ffffff';
        const quaternaryColor = gameNode.quaternaryColor || '#ffffff';
        document.documentElement.style.setProperty('--tertiary', tertiaryColor);
        document.documentElement.style.setProperty('--quaternary', quaternaryColor);
        document.body.style.color = quaternaryColor;
        const images = applyGameImages(gameNode);

        const gameName = String(game.name || 'Untitled Game').trim() || 'Untitled Game';
        document.title = `${gameName} | The Game Bureau`;
        const gameTitleEl = document.getElementById('gameTitle');
        gameTitleEl.textContent = gameName;
        gameTitleEl.style.color = secondaryColor;
        document.getElementById('gameTagline').textContent = gameNode.tagline || '';

        if (gameNode.howToPlay) {
          document.getElementById('howToPlaySection').style.display = 'block';
          document.getElementById('howToPlayText').textContent = gameNode.howToPlay;
          document.getElementById('howToPlayToggle').addEventListener('click', () => {
            const btn = document.getElementById('howToPlayToggle');
            const expanded = btn.getAttribute('aria-expanded') === 'true';
            btn.setAttribute('aria-expanded', expanded ? 'false' : 'true');
          });
        }

        if (gameNode.guideName) {
          document.getElementById('guideSection').style.display = 'block';
          document.getElementById('guideNameDisplay').textContent = gameNode.guideName.toUpperCase();
          document.getElementById('guideDescription').textContent = gameNode.guideBio || 'Your mission lead.';
          const gImg = images.guideUrl || images.logoUrl || FALLBACK_GUIDE_AVATAR;
          document.getElementById('guideAvatar').src = gImg;
        }

        const bodyText = gameNode.body || '';
        document.getElementById('desc').textContent = bodyText;
        if (bodyText) document.getElementById('descSection').style.display = 'block';
        document.getElementById('gamePrice').textContent = (gameNode.price || 'FREE').toUpperCase();

        const tagsContainer = document.getElementById('tagsContainer');
        if (Array.isArray(gameNode.tags)) {
          gameNode.tags.forEach((tagValue) => {
            const span = document.createElement('span');
            span.className = 'tag';
            span.textContent = tagValue;
            tagsContainer.appendChild(span);
          });
        }

        const qrUrl = `https://the-game-bureau.github.io/the-game-bureau/game/index.html?id=${encodeURIComponent(gameId)}`;

        document.getElementById('gameUrlDisplay').textContent = qrUrl;
        document.getElementById('copyUrlBtn').addEventListener('click', () => {
          navigator.clipboard.writeText(qrUrl).then(() => {
            const btn = document.getElementById('copyUrlBtn');
            btn.textContent = 'COPIED!';
            setTimeout(() => { btn.textContent = 'COPY'; }, 2000);
          });
        });
        document.getElementById('startBtn').href = `../play/?id=${encodeURIComponent(gameId)}`;
        try {
          new QRCode(document.getElementById('qrContainer'), {
            text: qrUrl,
            width: 200,
            height: 200,
            colorDark: '#000000',
            colorLight: '#ffffff',
            correctLevel: QRCode.CorrectLevel.M
          });
        } catch (e) { document.getElementById('qrContainer').style.display = 'none'; }
        document.getElementById('landing').style.display = 'block';
        const ctaBar = document.getElementById('ctaBar');
        ctaBar.style.background = primaryColor;
        ctaBar.style.display = 'flex';
        history.replaceState(null, '', window.location.pathname);
      } catch (error) {
        console.error('Game fetch error:', error);
        renderFatalState('Error Loading Game');
      }
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
