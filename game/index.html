<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#000000">
  <title>GAME LOADING... | THE GAME BUREAU</title>
  <link rel="icon" href="../assets/tgb.ico" type="image/x-icon">

  <meta property="og:type" content="website">
  <meta property="og:site_name" content="The Game Bureau">
  <meta property="og:title" content="The Game Bureau">
  <meta property="og:description" content="A live local experience by The Game Bureau.">
  <meta property="og:image" content="https://thegamebureau.com/assets/logo.png">
  <meta property="og:url" content="https://thegamebureau.com/game/index.html">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="https://thegamebureau.com/assets/logo.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&family=Outfit:wght@500;700&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

  <style>

    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --pad: 1.75rem;   /* horizontal page padding */
      --v: 2.25rem;     /* vertical section padding */
      --gap: 1.2rem;    /* internal element gap */
      --body-size: clamp(1.2rem, 4.5vw, 1.45rem);
    }

    body {
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      padding-bottom: calc(90px + env(safe-area-inset-bottom));
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    #landing {
      max-width: 480px;
      width: 100%;
      margin: 0 auto;
      display: none;
      animation: fadeIn 0.35s ease-out;
    }

    /* ── HERO ── */
    .hero {
      position: relative;
      width: 100%;
      overflow: hidden;
      background: var(--secondary);
    }

    #landingLogo {
      display: none;
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .hero-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, var(--primary, #000) 10%, rgba(0,0,0,0.35) 55%, transparent 100%);
    }

    .hero-content {
      position: relative;
      z-index: 1;
      padding: clamp(140px, 45vw, 220px) var(--pad) var(--v);
      text-align: center;
    }

    .hero h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3rem, 14vw, 4.75rem);
      line-height: 0.88;
      letter-spacing: 0.02em;
      -webkit-text-stroke: 0.5px var(--primary);
      paint-order: stroke fill;
    }

    /* ── BODY ── */
    .body-pad { padding: 0 var(--pad); }

    #gameTagline {
      margin: 0;
      padding: var(--v) var(--pad) 0.75rem;
      font-size: var(--body-size);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--secondary);
      line-height: 1.5;
      text-align: center;
      background: var(--primary);
    }
    #gameTagline:empty { display: none; }

    /* ── SECTION BLOCKS ── */
    .block {
      padding: var(--v) var(--pad);
      border-top: 1px solid var(--secondary);
    }

    .block-label {
      display: block;
      font-size: var(--body-size);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      color: var(--secondary);
      margin-bottom: var(--gap);
    }

    /* ── ABOUT ── */
    #descSection {
      display: none;
      margin: calc(var(--v) * 1.5) var(--pad);
    }
    #desc {
      font-size: clamp(0.85rem, 3.2vw, 1rem);
      line-height: 1.75;
      white-space: pre-line;
      color: #333;
      text-align: center;
      background: #fff;
      border: 2px solid var(--primary);
      border-radius: 20px;
      padding: var(--v) var(--pad);
      box-shadow: 0 8px 32px rgba(0,0,0,0.12);
    }

    /* ── HOW TO PLAY ── */
    #howToPlaySection {
      display: none;
      background: #fff;
      border: 2px solid var(--primary);
      border-radius: 20px;
      margin: 0 var(--pad) calc(var(--v) * 1.5);
      padding: var(--v) var(--pad);
      color: #111;
      box-shadow: 0 8px 32px rgba(0,0,0,0.12);
    }

    .htp-header {
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      font-size: 1.9rem;
      letter-spacing: 0.01em;
      color: var(--primary);
      text-transform: uppercase;
      width: 100%;
    }

    .htp-divider {
      width: 100%;
      height: 1px;
      background: var(--secondary);
      margin-top: 1.4rem;
      display: block;
    }

    #howToPlayText {
      font-size: var(--body-size);
      line-height: 1.7;
      white-space: pre-line;
      color: #333;
      padding-top: 1.3rem;
    }

    /* ── MISSION GUIDE ── */
    #guideSection {
      display: none;
      background: var(--secondary);
      border-radius: 20px;
      margin: 0 var(--pad) calc(var(--v) * 1.5);
      padding: var(--v) var(--pad);
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
    }

    .guide-card {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 1.5rem;
    }

    .guide-avatar-wrap {
      flex-shrink: 0;
      border-radius: 12px;
      overflow: hidden;
      border: 2px solid var(--primary);
      cursor: zoom-in;
    }

    .guide-avatar {
      width: 90px;
      height: 90px;
      object-fit: cover;
      display: block;
    }

    .guide-lightbox {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 999;
      background: rgba(0,0,0,0.78);
      align-items: center;
      justify-content: center;
      cursor: zoom-out;
    }

    .guide-lightbox.open {
      display: flex;
    }

    .guide-lightbox img {
      max-width: min(90vw, 480px);
      max-height: 80vh;
      border-radius: 16px;
      object-fit: contain;
      box-shadow: 0 24px 64px rgba(0,0,0,0.5);
    }

    .guide-text {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .guide-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.4rem;
      letter-spacing: 0.06em;
      color: var(--primary);
      line-height: 1;
    }

    .guide-bio {
      font-size: var(--body-size);
      line-height: 1.5;
      color: rgba(255,255,255,0.75);
    }

    /* ── START ── */
    #startingLocationSection {
      --start-card-bg: rgba(255,255,255,0.55);
      --start-card-blur: blur(4px);
      display: none;
      position: relative;
      background: #fff;
      border: 2px solid var(--primary);
      border-radius: 20px;
      aspect-ratio: 1 / 1;
      margin: calc(var(--v) * 1.5) var(--pad) calc(var(--v) * 1.5);
      padding: var(--v) var(--pad);
      color: #111;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.1rem;
      box-shadow: 0 8px 32px rgba(0,0,0,0.12);
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .start-bg-map {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      opacity: 0.55;
      border-radius: 18px;
      pointer-events: none;
    }

    .start-blurb {
      font-size: clamp(0.95rem, 3.5vw, 1.1rem);
      font-weight: 500;
      letter-spacing: 0.005em;
      line-height: 1.6;
      color: #333;
      text-align: center;
      width: 100%;
      position: relative;
      z-index: 3;
      background: var(--start-card-bg);
      backdrop-filter: var(--start-card-blur);
      -webkit-backdrop-filter: var(--start-card-blur);
      border-radius: 16px;
      border: 2px solid var(--primary);
      padding: 1.25rem 1.5rem;
      box-shadow: 0 4px 24px rgba(0,0,0,0.15);
    }
    .start-blurb strong { color: var(--primary); }
    .start-x-marker {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 10%;
      height: auto;
      z-index: 2;
      pointer-events: none;
      overflow: visible;
    }
    .start-waypoint-pin {
      fill: var(--primary);
    }
    .start-flip {
      width: clamp(200px, 50vw, 240px);
      z-index: 3;
      perspective: 1200px;
      -webkit-perspective: 1200px;
    }
    .start-flip-inner {
      display: grid;
      transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      transform-style: preserve-3d;
      -webkit-transform-style: preserve-3d;
      will-change: transform;
    }
    .start-flip.flipped .start-flip-inner {
      transform: rotateY(180deg);
      -webkit-transform: rotateY(180deg);
    }
    .start-flip-face {
      grid-area: 1 / 1;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      transform-style: preserve-3d;
      -webkit-transform-style: preserve-3d;
      transition: visibility 0s linear 0.3s;
      width: 100%;
    }
    .start-flip-front {
      display: flex;
      align-items: center;
      transform: rotateY(0deg) translateZ(0.1px);
      -webkit-transform: rotateY(0deg) translateZ(0.1px);
      visibility: visible;
    }
    .start-flip-back {
      transform: rotateY(180deg) translateZ(0.1px);
      -webkit-transform: rotateY(180deg) translateZ(0.1px);
      display: flex;
      flex-direction: column;
      pointer-events: none;
      visibility: hidden;
    }
    .start-flip.flipped .start-flip-front {
      pointer-events: none;
      visibility: hidden;
    }
    .start-flip.flipped .start-flip-back {
      pointer-events: auto;
      visibility: visible;
    }
    .start-map-buttons {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      padding: 0.75rem;
      background: var(--start-card-bg);
      backdrop-filter: var(--start-card-blur);
      -webkit-backdrop-filter: var(--start-card-blur);
      border-radius: 10px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      cursor: pointer;
    }
    .start-map-label {
      font-family: 'Outfit', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--secondary);
      text-align: center;
      padding: 0 0.25rem 0.5rem;
    }
    .start-close-btn {
      align-self: flex-end;
      background: none;
      border: none;
      font-size: 1rem;
      color: var(--primary);
      font-weight: 700;
      cursor: pointer;
      padding: 0 0.25rem;
      line-height: 1;
    }
    .start-map-btn {
      display: block;
      text-align: center;
      padding: 0.6rem 1rem;
      border-radius: 8px;
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      font-size: 0.9rem;
      letter-spacing: 0.03em;
      cursor: pointer;
      background: #fff;
      color: var(--primary);
      border: 2px solid var(--primary);
      box-shadow: 0 1px 6px rgba(0,0,0,0.1);
    }
    .start-map-btn:active { opacity: 0.75; }
    .bottom-center-label {
      position: absolute;
      bottom: 0.9rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1;
      font-family: 'Outfit', sans-serif;
      font-size: clamp(0.85rem, 3.5vw, 1.1rem);
      font-weight: 700;
      letter-spacing: 0.06em;
      line-height: 1;
      text-transform: uppercase;
      text-align: center;
      white-space: nowrap;
      color: var(--primary);
      -webkit-text-stroke: 0.6px var(--secondary);
      paint-order: stroke fill;
      pointer-events: none;
    }
    .start-card-label {
      position: absolute;
      top: 0.9rem;
      left: 1rem;
      z-index: 1;
      font-family: 'Outfit', sans-serif;
      font-size: 1.9rem;
      font-weight: 700;
      letter-spacing: 0.01em;
      text-transform: uppercase;
      color: var(--primary);
      -webkit-text-stroke: 0.75px var(--secondary);
      paint-order: stroke fill;
      pointer-events: none;
    }
    .start-waypoint-btn {
      position: absolute;
      top: 0.9rem;
      right: 1rem;
      z-index: 5;
      width: 2.4rem;
      height: 2.4rem;
      padding: 0;
      border-radius: 50%;
      border: 2px solid var(--primary);
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      color: var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
      transition: transform 0.18s ease, opacity 0.18s ease;
      cursor: pointer;
    }
    .start-waypoint-btn:active { transform: scale(0.92); opacity: 0.85; }
    .start-waypoint-btn svg {
      width: 1.15rem;
      height: 1.15rem;
      display: block;
    }

    /* ── SHARE ── */
    #shareSection {
      display: none;
      position: relative;
      overflow: hidden;
      background: #fff;
      border: 2px solid var(--primary);
      border-radius: 20px;
      aspect-ratio: 1 / 1;
      margin: calc(var(--v) * 1.5) var(--pad) calc(var(--v) * 3);
      padding: var(--v) var(--pad);
      color: #111;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.1rem;
      box-shadow: 0 8px 32px rgba(0,0,0,0.12);
    }
    .share-bg-map {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      opacity: 0.55;
      border-radius: 18px;
      pointer-events: none;
    }
    .share-qr-wrap {
      position: absolute;
      top: 50%;
      left: 50%;
      width: clamp(160px, 45vw, 210px);
      height: clamp(160px, 45vw, 210px);
      transform: translate(-50%, -50%);
      z-index: 3;
      background: #fff;
      border-radius: 16px;
      border: 2px solid var(--primary);
      box-shadow: 0 4px 24px rgba(0,0,0,0.15);
      padding: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .share-qr-container {
      display: block;
      line-height: 0;
      width: 100%;
      height: 100%;
    }
    .share-qr-container > * {
      width: 100% !important;
      height: 100% !important;
    }
    .share-bottom-center-label {
      position: absolute;
      bottom: 0.9rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1;
      font-family: 'Outfit', sans-serif;
      font-size: clamp(0.75rem, 2.8vw, 1rem);
      font-weight: 700;
      letter-spacing: 0.06em;
      line-height: 1;
      text-transform: uppercase;
      text-align: center;
      white-space: nowrap;
      color: var(--primary);
      -webkit-text-stroke: 0.6px var(--secondary);
      paint-order: stroke fill;
      pointer-events: none;
    }
    .share-card-label {
      position: absolute;
      top: 0.9rem;
      left: 1rem;
      z-index: 1;
      font-family: 'Outfit', sans-serif;
      font-size: 1.9rem;
      font-weight: 700;
      letter-spacing: 0.01em;
      text-transform: uppercase;
      color: var(--primary);
      -webkit-text-stroke: 0.75px var(--secondary);
      paint-order: stroke fill;
      pointer-events: none;
    }
    .share-waypoint-btn {
      position: absolute;
      top: 0.9rem;
      right: 1rem;
      z-index: 5;
      width: 2.4rem;
      height: 2.4rem;
      padding: 0;
      border-radius: 50%;
      border: 2px solid var(--primary);
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      color: var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
      transition: transform 0.18s ease, opacity 0.18s ease;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .share-waypoint-btn:active { transform: scale(0.92); opacity: 0.85; }
    .share-btn-label {
      position: absolute;
      top: 3.6rem;
      right: calc(1rem + 1.2rem);
      transform: translateX(50%);
      min-width: 2.4rem;
      font-family: 'Outfit', sans-serif;
      font-size: clamp(0.6rem, 2vw, 0.72rem);
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--primary);
      text-align: center;
      line-height: 1.2;
      pointer-events: none;
      z-index: 6;
    }
    .share-waypoint-btn svg {
      width: 1.15rem;
      height: 1.15rem;
      display: block;
    }


    /* ── W3W LIGHTBOX ── */
    #w3wLightbox {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 200;
      background: rgba(0,0,0,0.88);
      flex-direction: column;
    }
    #w3wLightbox.open { display: flex; }

    #w3wLightboxBar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: max(env(safe-area-inset-top), 0.75rem) 1rem 0.75rem;
      flex-shrink: 0;
    }

    #w3wLightboxLabel {
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      font-size: var(--body-size);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
    }

    #w3wLightboxRight {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-shrink: 0;
    }

    #w3wLightboxHint {
      font-family: 'Outfit', sans-serif;
      font-size: var(--body-size);
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.6);
      animation: w3w-blink 1.2s ease-in-out infinite;
    }

    @keyframes w3w-blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.2; }
    }

    #w3wLightboxClose {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(255,255,255,0.12);
      border: none;
      color: #fff;
      font-size: 1.2rem;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s;
    }
    #w3wLightboxClose:active { background: rgba(255,255,255,0.25); }

    #w3wLightboxFrame {
      flex: 1;
      width: 100%;
      border: none;
      display: block;
    }
    /* ── /W3W LIGHTBOX ── */

    /* ── APP TOAST ── */
    #appToast {
      position: fixed;
      bottom: calc(env(safe-area-inset-bottom) + 1.5rem);
      left: 50%;
      transform: translateX(-50%) translateY(150%);
      opacity: 0;
      z-index: 300;
      background: #111;
      color: #fff;
      font-family: 'Outfit', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      padding: 0.85rem 1.25rem;
      border-radius: 12px;
      white-space: nowrap;
      box-shadow: 0 4px 24px rgba(0,0,0,0.35);
      transition: transform 0.3s ease, opacity 0.3s ease;
      pointer-events: none;
    }
    #appToast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    /* ── /APP TOAST ── */

    /* ── CTA BAR ── */
    #ctaBar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      gap: calc(var(--gap) / 2);
      padding: var(--gap) var(--pad) max(env(safe-area-inset-bottom), var(--gap));
      border-top: 1px solid var(--secondary);
      z-index: 100;
    }

    .play-btn {
      -webkit-appearance: none;
      appearance: none;
      display: block;
      width: 100%;
      max-width: 480px;
      padding: 1.35rem var(--pad);
      background: var(--primary);
      color: #fff;
      text-decoration: none;
      font-family: 'Outfit', sans-serif;
      font-size: var(--body-size);
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      border: 2px solid var(--secondary);
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.15);
      text-align: center;
      cursor: pointer;
      transition: opacity 0.18s, transform 0.12s;
    }
    .play-btn:active { opacity: 0.82; transform: scale(0.97); }

    #gamePrice {
      font-size: var(--body-size);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      opacity: 0.6;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      min-width: 0;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }


  </style>
</head>
<body>

  <div id="landing">

    <!-- HERO: full-bleed logo + title overlay -->
    <div class="hero">
      <img id="landingLogo" src="" alt="Game Logo">
      <div class="hero-overlay"></div>
      <div class="hero-content">
        <h1 id="gameTitle"></h1>
      </div>
    </div>
    <p id="gameTagline"></p>

    <!-- ABOUT -->
    <section id="descSection">
      <p id="desc"></p>
    </section>

    async function fetchGameRecord(id) {
      const requestUrl = new URL(`rest/v1/${SB_CONFIG.table}`, `${SB_CONFIG.url.replace(/\/+$/, '')}/`);
      requestUrl.searchParams.set('select', '*');
      requestUrl.searchParams.set('id', `eq.${id}`);
      requestUrl.searchParams.set('limit', '1');

      const response = await fetch(requestUrl.toString(), {
        headers: {
          apikey: SB_CONFIG.key,
          Authorization: `Bearer ${SB_CONFIG.key}`,
          Accept: 'application/json'
        },
        cache: 'no-store'
      });

      if (!response.ok) {
        let message = `Request failed with status ${response.status}`;

        try {
          const payload = await response.json();
          message = payload.message || payload.error_description || payload.error || message;
        } catch (parseError) {
          // Fall back to the status-based message when no JSON body is available.
        }

        throw new Error(message);
      }

      const rows = await response.json();
      return Array.isArray(rows) ? rows[0] || null : null;
    }

    function multiplyGf256(x, y) {
      let result = 0;
      let a = x;
      let b = y;

      while (b > 0) {
        if (b & 1) {
          result ^= a;
        }

        a <<= 1;
        if (a & 0x100) {
          a ^= 0x11d;
        }
        b >>= 1;
      }

      return result;
    }

    function buildReedSolomonGenerator(degree) {
      let polynomial = [1];

      for (let i = 0; i < degree; i += 1) {
        const next = new Array(polynomial.length + 1).fill(0);

        for (let j = 0; j < polynomial.length; j += 1) {
          next[j] ^= multiplyGf256(polynomial[j], 1);
          next[j + 1] ^= multiplyGf256(polynomial[j], 1 << 0);
        }

        for (let j = 0; j < next.length; j += 1) {
          next[j] = next[j];
        }

        let factor = 1;
        for (let k = 0; k < i; k += 1) {
          factor = multiplyGf256(factor, 2);
        }

        const product = new Array(polynomial.length + 1).fill(0);
        for (let j = 0; j < polynomial.length; j += 1) {
          product[j] ^= polynomial[j];
          product[j + 1] ^= multiplyGf256(polynomial[j], factor);
        }
        polynomial = product;
      }

      return polynomial;
    }

    function computeErrorCorrection(dataCodewords, ecCodewords) {
      const generator = buildReedSolomonGenerator(ecCodewords);
      const remainder = new Array(ecCodewords).fill(0);

      for (const value of dataCodewords) {
        const factor = value ^ remainder[0];
        remainder.shift();
        remainder.push(0);

        for (let i = 0; i < ecCodewords; i += 1) {
          remainder[i] ^= multiplyGf256(generator[i + 1], factor);
        }
      }

      return remainder;
    }

    function appendBits(buffer, value, length) {
      for (let i = length - 1; i >= 0; i -= 1) {
        buffer.push((value >>> i) & 1);
      }
    }

    function createQrCodeBytes(text) {
      const version = 5;
      const dataCapacity = 108;
      const ecCodewords = 26;
      const maxPayloadLength = dataCapacity - 2;
      const encodedText = new TextEncoder().encode(text);

      if (encodedText.length > maxPayloadLength) {
        throw new Error('Invite link is too long to encode as a standalone QR code.');
      }

      const bits = [];
      appendBits(bits, 0b0100, 4);
      appendBits(bits, encodedText.length, 8);

      for (const byte of encodedText) {
        appendBits(bits, byte, 8);
      }

      const capacityBits = dataCapacity * 8;
      appendBits(bits, 0, Math.min(4, capacityBits - bits.length));

      while (bits.length % 8 !== 0) {
        bits.push(0);
      }

      const dataCodewords = [];
      for (let i = 0; i < bits.length; i += 8) {
        let value = 0;
        for (let j = 0; j < 8; j += 1) {
          value = (value << 1) | bits[i + j];
        }
        dataCodewords.push(value);
      }

      const padBytes = [0xec, 0x11];
      let padIndex = 0;
      while (dataCodewords.length < dataCapacity) {
        dataCodewords.push(padBytes[padIndex % padBytes.length]);
        padIndex += 1;
      }

      return dataCodewords.concat(computeErrorCorrection(dataCodewords, ecCodewords));
    }

    function createQrMatrix(text) {
      const version = 5;
      const size = 17 + version * 4;
      const matrix = Array.from({ length: size }, () => Array(size).fill(false));
      const isFunction = Array.from({ length: size }, () => Array(size).fill(false));
      const alignmentPositions = [6, 30];

      function setModule(x, y, value, markFunction = true) {
        matrix[y][x] = value;
        if (markFunction) {
          isFunction[y][x] = true;
        }
      }

      function drawFinder(x, y) {
        for (let dy = -1; dy <= 7; dy += 1) {
          for (let dx = -1; dx <= 7; dx += 1) {
            const xx = x + dx;
            const yy = y + dy;
            if (xx < 0 || yy < 0 || xx >= size || yy >= size) {
              continue;
            }

            const isBorder = dx === -1 || dx === 7 || dy === -1 || dy === 7;
            const isOuter = dx === 0 || dx === 6 || dy === 0 || dy === 6;
            const isInner = dx >= 2 && dx <= 4 && dy >= 2 && dy <= 4;
            setModule(xx, yy, !isBorder && (isOuter || isInner));
          }
        }
      }

      function drawAlignment(x, y) {
        for (let dy = -2; dy <= 2; dy += 1) {
          for (let dx = -2; dx <= 2; dx += 1) {
            setModule(x + dx, y + dy, Math.max(Math.abs(dx), Math.abs(dy)) !== 1);
          }
        }
      }

      function drawFormatBits(mask) {
        const formatData = (0b01 << 3) | mask;
        let formatBits = formatData << 10;
        const generator = 0x537;

        for (let i = 14; i >= 10; i -= 1) {
          if ((formatBits >>> i) & 1) {
            formatBits ^= generator << (i - 10);
          }
        }

        const finalBits = ((formatData << 10) | formatBits) ^ 0x5412;
        const bit = (index) => ((finalBits >>> index) & 1) === 1;

        for (let i = 0; i <= 5; i += 1) setModule(8, i, bit(i));
        setModule(8, 7, bit(6));
        setModule(8, 8, bit(7));
        setModule(7, 8, bit(8));
        for (let i = 9; i < 15; i += 1) setModule(14 - i, 8, bit(i));

        for (let i = 0; i < 8; i += 1) setModule(size - 1 - i, 8, bit(i));
        for (let i = 8; i < 15; i += 1) setModule(8, size - 15 + i, bit(i));
        setModule(8, size - 8, true);
      }

      function maskApplies(mask, x, y) {
        switch (mask) {
          case 0: return (x + y) % 2 === 0;
          case 1: return y % 2 === 0;
          case 2: return x % 3 === 0;
          case 3: return (x + y) % 3 === 0;
          case 4: return (Math.floor(y / 2) + Math.floor(x / 3)) % 2 === 0;
          case 5: return ((x * y) % 2) + ((x * y) % 3) === 0;
          case 6: return ((((x * y) % 2) + ((x * y) % 3)) % 2) === 0;
          case 7: return ((((x + y) % 2) + ((x * y) % 3)) % 2) === 0;
          default: return false;
        }
      }

      function penaltyScore(candidate) {
        let penalty = 0;

        for (let y = 0; y < size; y += 1) {
          let runColor = candidate[y][0];
          let runLength = 1;
          for (let x = 1; x < size; x += 1) {
            if (candidate[y][x] === runColor) {
              runLength += 1;
            } else {
              if (runLength >= 5) {
                penalty += runLength - 2;
              }
              runColor = candidate[y][x];
              runLength = 1;
            }
          }
          if (runLength >= 5) {
            penalty += runLength - 2;
          }
        }

        for (let x = 0; x < size; x += 1) {
          let runColor = candidate[0][x];
          let runLength = 1;
          for (let y = 1; y < size; y += 1) {
            if (candidate[y][x] === runColor) {
              runLength += 1;
            } else {
              if (runLength >= 5) {
                penalty += runLength - 2;
              }
              runColor = candidate[y][x];
              runLength = 1;
            }
          }
          if (runLength >= 5) {
            penalty += runLength - 2;
          }
        }

        for (let y = 0; y < size - 1; y += 1) {
          for (let x = 0; x < size - 1; x += 1) {
            const color = candidate[y][x];
            if (
              candidate[y][x + 1] === color &&
              candidate[y + 1][x] === color &&
              candidate[y + 1][x + 1] === color
            ) {
              penalty += 3;
            }
          }
        }

        const finderLike = [true, false, true, true, true, false, true, false, false, false, false];
        const reverseFinderLike = [...finderLike].reverse();

        function matchesPattern(line, index, pattern) {
          for (let i = 0; i < pattern.length; i += 1) {
            if (line[index + i] !== pattern[i]) {
              return false;
            }
          }
          return true;
        }

        for (let y = 0; y < size; y += 1) {
          for (let x = 0; x <= size - 11; x += 1) {
            if (matchesPattern(candidate[y], x, finderLike) || matchesPattern(candidate[y], x, reverseFinderLike)) {
              penalty += 40;
            }
          }
        }

        for (let x = 0; x < size; x += 1) {
          const column = [];
          for (let y = 0; y < size; y += 1) {
            column.push(candidate[y][x]);
          }
          for (let y = 0; y <= size - 11; y += 1) {
            if (matchesPattern(column, y, finderLike) || matchesPattern(column, y, reverseFinderLike)) {
              penalty += 40;
            }
          }
        }

        let darkModules = 0;
        for (const row of candidate) {
          for (const cell of row) {
            if (cell) {
              darkModules += 1;
            }
          }
        }

        const totalModules = size * size;
        const darkPercent = (darkModules * 100) / totalModules;
        penalty += Math.floor(Math.abs(darkPercent - 50) / 5) * 10;

        return penalty;
      }

      drawFinder(0, 0);
      drawFinder(size - 7, 0);
      drawFinder(0, size - 7);

      for (let i = 8; i < size - 8; i += 1) {
        setModule(i, 6, i % 2 === 0);
        setModule(6, i, i % 2 === 0);
      }

      for (const x of alignmentPositions) {
        for (const y of alignmentPositions) {
          const overlapsFinder =
            (x === 6 && y === 6) ||
            (x === 6 && y === size - 7) ||
            (x === size - 7 && y === 6);

          if (!overlapsFinder) {
            drawAlignment(x, y);
          }
        }
      }

      for (let i = 0; i < 8; i += 1) {
        if (i !== 6) {
          setModule(8, i, false);
          setModule(i, 8, false);
        }
      }
      for (let i = size - 8; i < size; i += 1) {
        setModule(8, i, false);
        setModule(i, 8, false);
      }
      setModule(8, size - 8, true);

      const codewords = createQrCodeBytes(text);
      const dataBits = [];
      for (const codeword of codewords) {
        appendBits(dataBits, codeword, 8);
      }

      let bitIndex = 0;
      let direction = -1;
      for (let x = size - 1; x >= 1; x -= 2) {
        if (x === 6) {
          x -= 1;
        }

        for (let step = 0; step < size; step += 1) {
          const y = direction === -1 ? size - 1 - step : step;
          for (let offset = 0; offset < 2; offset += 1) {
            const xx = x - offset;
            if (isFunction[y][xx]) {
              continue;
            }

            matrix[y][xx] = bitIndex < dataBits.length ? dataBits[bitIndex] === 1 : false;
            bitIndex += 1;
          }
        }

        direction *= -1;
      }

      let bestMask = 0;
      let bestMatrix = null;
      let bestPenalty = Number.POSITIVE_INFINITY;

      for (let mask = 0; mask < 8; mask += 1) {
        const candidate = matrix.map((row) => row.slice());

        for (let y = 0; y < size; y += 1) {
          for (let x = 0; x < size; x += 1) {
            if (!isFunction[y][x] && maskApplies(mask, x, y)) {
              candidate[y][x] = !candidate[y][x];
            }
          }
        }

        const previousMatrix = matrix.map((row) => row.slice());
        for (let y = 0; y < size; y += 1) {
          for (let x = 0; x < size; x += 1) {
            matrix[y][x] = candidate[y][x];
          }
        }
        drawFormatBits(mask);
        for (let y = 0; y < size; y += 1) {
          for (let x = 0; x < size; x += 1) {
            candidate[y][x] = matrix[y][x];
            matrix[y][x] = previousMatrix[y][x];
          }
        }

        const score = penaltyScore(candidate);
        if (score < bestPenalty) {
          bestPenalty = score;
          bestMask = mask;
          bestMatrix = candidate;
        }
      }

      for (let y = 0; y < size; y += 1) {
        for (let x = 0; x < size; x += 1) {
          matrix[y][x] = bestMatrix[y][x];
        }
      }
      drawFormatBits(bestMask);

      return matrix;
    }

    function renderQrCode(container, text, size = 180) {
      const matrix = createQrMatrix(text);
      const moduleCount = matrix.length;
      const quietZone = 4;
      const totalModules = moduleCount + quietZone * 2;
      const moduleSize = size / totalModules;

      const svgParts = [
        `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${totalModules} ${totalModules}" width="${size}" height="${size}" shape-rendering="crispEdges">`,
        `<rect width="${totalModules}" height="${totalModules}" fill="#ffffff"/>`
      ];

      for (let y = 0; y < moduleCount; y += 1) {
        for (let x = 0; x < moduleCount; x += 1) {
          if (matrix[y][x]) {
            svgParts.push(
              `<rect x="${x + quietZone}" y="${y + quietZone}" width="1" height="1" fill="#000000"/>`
            );
          }
        }
      }

      svgParts.push('</svg>');
      container.innerHTML = svgParts.join('');
      const svg = container.querySelector('svg');
      if (svg) {
        svg.style.display = 'block';
        svg.style.width = `${size}px`;
        svg.style.height = `${size}px`;
      }
    }

    async function init() {
      if (!gameId) {
        renderMissingGameSelection();
        return;
      }

      try {
        const game = await fetchGameRecord(gameId);
        if (!game) {
          renderFatalState('Error Loading Game');
          return;
        }

        const primaryColor = game.primary_color || game.primaryColor || '#33e6e6';
        const secondaryColor = game.secondary_color || game.secondaryColor || '#243256';
        document.documentElement.style.setProperty('--primary', primaryColor);
        document.documentElement.style.setProperty('--secondary', secondaryColor);
        document.body.style.background = primaryColor;

        const gameNode = {
          defaultEmoji:        game.default_emoji,
          tertiaryColor:       game.tertiary_color,
          quaternaryColor:     game.quaternary_color,
          body:                game.body,
          tagline:             game.tagline,
          city:                game.city,
          guideName:           game.guide_name,
          guideBio:            game.guide_bio,
          guideImageUrl:       game.guide_image_url,
          price:               game.price,
          howToPlay:           game.how_to_play,
          locationBased:       game.location_based,
          startingLocation:    game.starting_location,
          startingLocationLat: game.starting_location_lat,
          startingLocationLon: game.starting_location_lon,
          logoUrl:             game.logo_url,
        };
        const defaultEmoji = gameNode.defaultEmoji || '🧩';

        const tertiaryColor = gameNode.tertiaryColor || '#ffffff';
        const quaternaryColor = gameNode.quaternaryColor || '#ffffff';
        document.documentElement.style.setProperty('--tertiary', tertiaryColor);
        document.documentElement.style.setProperty('--quaternary', quaternaryColor);
        document.body.style.color = quaternaryColor;
        const images = applyGameImages(gameNode);

        const gameName = String(game.name || 'Untitled Game').trim() || 'Untitled Game';
        document.title = `${gameName} | The Game Bureau`;
        const city = (gameNode.city || game.city || '').trim();
        document.getElementById('startBlurb').innerHTML = `You must go to <strong>${city}</strong> to play this game. Tap to reveal the starting point.`;

        const qrUrl = `https://thegamebureau.com/game/index.html?id=${encodeURIComponent(gameId)}`;
        const ogImage = images.logoUrl || images.guideUrl || 'https://thegamebureau.com/assets/logo.png';
        const setMeta = (sel, val) => { const el = document.querySelector(sel); if (el && val) el.setAttribute('content', val); };
        setMeta('meta[property="og:title"]', `${gameName} | The Game Bureau`);
        setMeta('meta[property="og:description"]', game.tagline || gameNode.tagline || 'A live local experience by The Game Bureau.');
        document.querySelector('meta[property="og:image"]')?.setAttribute('content', ogImage);
        setMeta('meta[property="og:url"]', qrUrl);
        document.querySelector('meta[name="twitter:image"]')?.setAttribute('content', ogImage);
        const gameTitleEl = document.getElementById('gameTitle');
        gameTitleEl.textContent = gameName;

        gameTitleEl.style.color = secondaryColor;
        document.getElementById('gameTagline').textContent = game.tagline || gameNode.tagline || '';

        if (gameNode.howToPlay) {
          document.getElementById('howToPlaySection').style.display = 'block';
          document.getElementById('howToPlayText').textContent = gameNode.howToPlay;
        }

        if (gameNode.guideName) {
          document.getElementById('guideSection').style.display = 'block';
          document.getElementById('guideNameDisplay').textContent = gameNode.guideName.toUpperCase();
          document.getElementById('guideDescription').textContent = gameNode.guideBio || 'Your mission lead.';
          const gImg = images.guideUrl || images.logoUrl || FALLBACK_GUIDE_AVATAR;
          document.getElementById('guideAvatar').src = gImg;
        }

        // START
        const isLocationBased = !!gameNode.locationBased;
        if (isLocationBased) {
          const startingLocation = (gameNode.startingLocation || '').trim();
          const startingLocationValid = startingLocation && startingLocation !== 'http://' && startingLocation !== 'https://';

          const urlMatch = startingLocation.match(/(?:what3words\.com|w3w\.co)\/([a-z]+\.[a-z]+\.[a-z]+)/i);
          const rawMatch = startingLocation.match(/\/{1,3}([a-z]+\.[a-z]+\.[a-z]+)/i);
          const words = urlMatch ? urlMatch[1].toLowerCase() : rawMatch ? rawMatch[1].toLowerCase() : null;
          const webUrl = words ? `https://what3words.com/${words}` : startingLocationValid ? startingLocation : null;

          const mapLat = typeof gameNode.startingLocationLat === 'number' ? gameNode.startingLocationLat : null;
          const mapLon = typeof gameNode.startingLocationLon === 'number' ? gameNode.startingLocationLon : null;
          const ll     = mapLat != null ? `${mapLat},${mapLon}` : null;
          const locQ   = encodeURIComponent(words || city || '');
          const mapUrls = {
            apple:  `https://maps.apple.com/?q=${ll || locQ}`,
            google: `https://www.google.com/maps/search/?api=1&query=${ll || locQ}`,
            w3w:    webUrl || 'https://what3words.com',
          };
          // Iframe-friendly URLs for the desktop lightbox (the "w3w frame").
          // Apple Maps blocks iframe embedding, so we substitute OpenStreetMap's
          // embed (iframe-safe, no key) centered on the same coordinates.
          const bboxPad = 0.003;
          const osmEmbedUrl = (mapLat != null && mapLon != null)
            ? `https://www.openstreetmap.org/export/embed.html?bbox=${mapLon - bboxPad},${mapLat - bboxPad},${mapLon + bboxPad},${mapLat + bboxPad}&marker=${mapLat},${mapLon}&layer=mapnik`
            : null;
          const frameUrls = {
            apple:  osmEmbedUrl,
            google: `https://maps.google.com/maps?q=${ll || locQ}&output=embed`,
            w3w:    mapUrls.w3w,
          };

          // Lightbox
          const lightbox = document.getElementById('w3wLightbox');
          const lbFrame  = document.getElementById('w3wLightboxFrame');
          const lbLabel  = document.getElementById('w3wLightboxLabel');
          const openLightbox = (url, label) => {
            lbFrame.src = url;
            lbLabel.textContent = label;
            lightbox.classList.add('open');
            document.body.style.overflow = 'hidden';
          };
          const closeLightbox = () => {
            lightbox.classList.remove('open');
            document.body.style.overflow = '';
            lbFrame.src = '';
          };
          document.getElementById('w3wLightboxClose').onclick = closeLightbox;

          // Platform detection
          const ua = navigator.userAgent;
          const isIOS = /iPhone|iPad|iPod/i.test(ua);
          const isAndroid = /Android/i.test(ua);
          const isMobile = isIOS || isAndroid;

          const storeUrls = {
            apple:  'https://apps.apple.com/app/maps/id915056765',
            google: isIOS
              ? 'https://apps.apple.com/app/google-maps/id585027354'
              : 'https://play.google.com/store/apps/details?id=com.google.android.apps.maps',
            w3w:    'https://what3words.com/products/what3words-app',
          };
          const deepLinks = {
            apple:  ll ? `maps://?ll=${ll}` : null,
            google: ll ? `comgooglemaps://?q=${ll}` : null,
            w3w:    words ? `https://w3w.co/${words}` : null,
          };
          const appNames = { apple: 'Apple Maps', google: 'Google Maps', w3w: 'what3words' };

          // Panel flip
          const btns  = document.getElementById('startMapButtons');
          const actionsPanel = document.getElementById('startMapActions');
          const actionsLabel = document.getElementById('startActionsLabel');
          const actionFrame = document.getElementById('startActionFrame');
          const actionApp = document.getElementById('startActionApp');
          const actionDownload = document.getElementById('startActionDownload');
          const startFlip = document.getElementById('startFlip');

          const flipToFront = () => startFlip.classList.remove('flipped');
          const flipToBack  = () => {
            btns.style.display = 'flex';
            actionsPanel.style.display = 'none';
            startFlip.classList.add('flipped');
          };

          document.getElementById('startingLocationSection').onclick = () => {
            if (startFlip.classList.contains('flipped')) flipToFront();
            else flipToBack();
          };
          document.getElementById('startMapButtons').onclick = (e) => { e.stopPropagation(); if (e.target === e.currentTarget) flipToFront(); };
          document.getElementById('startCloseBtn').onclick   = (e) => { e.stopPropagation(); flipToFront(); };
          actionsPanel.onclick = (e) => { e.stopPropagation(); if (e.target === e.currentTarget) { btns.style.display = 'flex'; actionsPanel.style.display = 'none'; } };
          document.getElementById('startActionsCloseBtn').onclick = (e) => { e.stopPropagation(); btns.style.display = 'flex'; actionsPanel.style.display = 'none'; };

          const showActions = (key) => {
            actionsLabel.textContent = appNames[key];
            // 1) Open in lightbox — Apple Maps blocks iframe embed; fall back to new tab
            actionFrame.onclick = (e) => {
              e.stopPropagation();
              if (key === 'apple' && !frameUrls.apple) {
                window.open(mapUrls[key], '_blank');
              } else {
                openLightbox(frameUrls[key] || mapUrls[key], appNames[key]);
              }
            };
            // 2) Open in app — deep link / universal link
            actionApp.onclick = (e) => {
              e.stopPropagation();
              const link = deepLinks[key] || mapUrls[key];
              if (link) window.location.href = link;
            };
            // 3) Download app — store listing
            actionDownload.onclick = (e) => {
              e.stopPropagation();
              if (storeUrls[key]) window.open(storeUrls[key], '_blank');
            };
            btns.style.display = 'none';
            actionsPanel.style.display = 'flex';
          };

          document.querySelectorAll('#startMapButtons .start-map-btn').forEach(btn => {
            btn.addEventListener('click', e => {
              e.stopPropagation();
              const key = btn.dataset.map;
              if (!key) return;
              // Desktop: skip the sub-panel and go straight to "Open Here"
              if (!isMobile) {
                if (key === 'apple' && !frameUrls.apple) {
                  window.open(mapUrls[key], '_blank');
                } else {
                  openLightbox(frameUrls[key] || mapUrls[key], appNames[key]);
                }
                return;
              }
              // Mobile: show the 3-action sub-panel
              showActions(key);
            });
          });

          // Populate
          document.getElementById('startingLocationSection').style.display = 'flex';
          document.getElementById('startBlurb').innerHTML = `You must go to <strong>${city}</strong> to play this game. Tap to reveal the starting point.`;
          document.getElementById('startCityLabel').textContent = (gameNode.city || city || '').trim();

          // OSM background map
          const bgMap = document.getElementById('startBgMap');
          (async () => {
            try {
              let lat = null, lon = null;

              // 1. w3w → most precise
              if (words) {
                try {
                  const res  = await fetch(`https://api.what3words.com/v3/convert-to-coordinates?words=${encodeURIComponent(words)}&key=${W3W_API_KEY}`);
                  const data = await res.json();
                  if (data.coordinates) { lat = data.coordinates.lat; lon = data.coordinates.lng; }
                } catch(e) {}
              }

              // 2. stored lat/lon
              if (lat == null && mapLat != null) { lat = mapLat; lon = mapLon; }

              // 3. Nominatim city geocode
              if (lat == null) {
                const mapCity = (gameNode.city || '').trim();
                if (!mapCity) return;
                const res    = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(mapCity)}&format=json&limit=1`, { headers: { 'Accept-Language': 'en' } });
                const places = await res.json();
                if (!places.length) return;
                lat = parseFloat(places[0].lat);
                lon = parseFloat(places[0].lon);
              }

              // Backfill all coordinate-only deep links
              const resolvedLL = `${lat},${lon}`;
              deepLinks.apple  = `maps://?ll=${resolvedLL}`;
              deepLinks.google = `comgooglemaps://?q=${resolvedLL}`;

              const zoom = (words || mapLat != null) ? 15 : 12;
              const W = bgMap.offsetWidth || 640, H = bgMap.offsetHeight || 400;
              const canvas = document.createElement('canvas');
              canvas.width = W; canvas.height = H;
              const ctx = canvas.getContext('2d');
              const ts = 256, n = Math.pow(2, zoom);
              const tXf = (lon + 180) / 360 * n;
              const tYf = (1 - Math.log(Math.tan(lat * Math.PI / 180) + 1 / Math.cos(lat * Math.PI / 180)) / Math.PI) / 2 * n;
              const tXi = Math.floor(tXf), tYi = Math.floor(tYf);
              const oX = (tXf - tXi) * ts, oY = (tYf - tYi) * ts;
              const cx = W / 2, cy = H / 2;
              const rX = Math.ceil(W / ts / 2) + 1, rY = Math.ceil(H / ts / 2) + 1;
              await Promise.all(
                Array.from({ length: (2*rY+1)*(2*rX+1) }, (_, i) => {
                  const dy = Math.floor(i / (2*rX+1)) - rY;
                  const dx = (i % (2*rX+1)) - rX;
                  return new Promise(r => {
                    const img = new Image(); img.crossOrigin = 'anonymous';
                    img.onload  = () => { ctx.drawImage(img, Math.round(cx - oX + dx*ts), Math.round(cy - oY + dy*ts), ts, ts); r(); };
                    img.onerror = r;
                    img.src = `https://tile.openstreetmap.org/${zoom}/${tXi+dx}/${tYi+dy}.png`;
                  });
                })
              );
              try { bgMap.style.backgroundImage = `url(${canvas.toDataURL()})`; } catch(e) {}
            } catch(e) {}
          })();
        } else {
          document.getElementById('startingLocationSection').style.display = 'none';
        }
        // /START

        // ── SHARE ──
        {
          document.getElementById('shareSection').style.display = 'flex';

          document.getElementById('shareBtn').addEventListener('click', (e) => {
            e.stopPropagation();
            if (navigator.share) {
              navigator.share({ title: gameName, url: qrUrl }).catch(() => {});
            } else {
              navigator.clipboard?.writeText(qrUrl).catch(() => {});
            }
          });

          try {
            new QRCode(document.getElementById('shareQrContainer'), {
              text: qrUrl, width: 200, height: 200,
              colorDark: '#000000', colorLight: '#ffffff',
              correctLevel: QRCode.CorrectLevel.M
            });
          } catch (e) { document.getElementById('shareQrContainer').style.display = 'none'; }

        }
        // /SHARE

        const bodyText = gameNode.body || '';
        document.getElementById('desc').textContent = bodyText;
        if (bodyText) document.getElementById('descSection').style.display = 'block';
        document.getElementById('gamePrice').textContent = (gameNode.price || 'FREE').toUpperCase();

        document.getElementById('startBtn').href = `../play/index.html?id=${encodeURIComponent(gameId)}`;
        document.getElementById('landing').style.display = 'block';
        const ctaBar = document.getElementById('ctaBar');
        ctaBar.style.background = primaryColor;
        ctaBar.style.display = 'flex';
      } catch (error) {
        console.error('Game fetch error:', error);
        renderFatalState('Error Loading Game');
      }
    }

    document.addEventListener('DOMContentLoaded', function () {
      init();

      const lightbox = document.getElementById('guideLightbox');
      const lightboxImg = document.getElementById('guideLightboxImg');
      const avatar = document.getElementById('guideAvatar');

      avatar.addEventListener('click', function () {
        lightboxImg.src = this.src;
        lightbox.classList.add('open');
      });

      lightbox.addEventListener('click', function () {
        lightbox.classList.remove('open');
      });
    });
  </script>

  <div class="guide-lightbox" id="guideLightbox">
    <img id="guideLightboxImg" src="" alt="Guide">
  </div>
</body>
</html>
