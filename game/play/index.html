<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LOADING | THE GAME BUREAU</title>
  <link rel="icon" href="../../assets/brand/tgb.ico" type="image/x-icon">
  <meta name="robots" content="noindex">
  <style>
    html, body { margin: 0; height: 100%; background: #ffffff; }
  </style>
</head>
<body>
  <script>
    // Engine router — picks an engine by ?e=<name> and forwards all
    // other query params + hash to that engine's folder.
    //
    //   e=text → ./text/  (default — iMessage-style chat engine)
    //   e=map  → ./map/   (map / pin engine)
    //
    // Legacy numeric values (e=1, e=2) are aliased to keep older shared
    // links working.
    //
    // To add a new engine: drop a folder under /game/play/, then add a
    // new entry to ENGINES below.
    (function () {
      const ENGINES = {
        text: 'text',
        map:  'map',
        '1':  'text',  // legacy alias
        '2':  'map'    // legacy alias
      };
      const DEFAULT_ENGINE = 'text';

      const params = new URLSearchParams(window.location.search);
      const requested = String(params.get('e') || '').trim().toLowerCase();
      const folder = ENGINES[requested] || DEFAULT_ENGINE;

      // Strip the routing-only param before forwarding.
      params.delete('e');
      const query = params.toString();
      const target = './' + folder + '/' + (query ? '?' + query : '') + window.location.hash;
      window.location.replace(target);
    })();
  </script>
  <noscript>
    <p style="font-family:system-ui,sans-serif;padding:2rem;">
      JavaScript is required to load the game. Try
      <a href="./text/">opening the game directly</a>.
    </p>
  </noscript>
</body>
</html>
