  <style>
    /* ── Base chat UI (archive/index.css) ── */
    .icon-preload {
      position: absolute;
      width: 0;
      height: 0;
      overflow: hidden;

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body.game-active {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;

      color: #111827;
      height: 100vh;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #game-shell {
      flex: 1 1 auto;
      min-height: 0;
      width: 100%;
      display: flex;
      flex-direction: column;
    }

    .contact-header {
      background: #f9f9f9;
      border-bottom: 1px solid #e5e7eb;
      padding: 0.5rem 1rem 0.6rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      flex-shrink: 0;
      position: relative;
    }

    .avatar {
      height: 36px;
      width: auto;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;

      user-select: none;

    .avatar img {

    .contact-name {

      font-weight: 600;
      color: #111827;

    }

    #header-title { font-weight: 700; }

    .contact-tagline {
      font-size: 0.72rem;
      font-weight: 500;
      color: #6b7280;
      line-height: 1.25;
      text-align: center;
    }

    .contact-status {
      font-size: 0.72rem;
      color: #6b7280;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .online-dot {

      height: 7px;
      border-radius: 50%;
      background: #4ecf98;
      flex-shrink: 0;

    .restart-btn {

      right: 1rem;
      top: 50%;

      border: 1px solid #d1d5db;
      border-radius: 8px;

      line-height: 1;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .restart-btn:active { background: #f3f4f6; }

    .chat {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 1rem 0.75rem;
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }

    .chat-empty-state {
      margin: auto 0;
      padding: 1.25rem 1rem;
      text-align: center;
      display: grid;
      gap: 0.9rem;
      justify-items: center;
      color: #374151;
    }

    .chat-empty-message {
      font-size: 1.2rem;
      font-weight: 700;
      line-height: 1.4;
    }

    .chat-empty-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 0.7rem 1rem;
      border-radius: 999px;
      border: 1px solid rgba(17, 24, 39, 0.14);
      background: rgba(255,255,255,0.88);
      color: #111827;
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 700;
      transition: transform 0.12s ease, background-color 0.18s ease;
    }

    .chat-empty-link:active {
      transform: scale(0.98);
    }

    .msg {
      max-width: 80%;
      animation: slideIn 0.25s ease;
    }

    .msg.from-game { align-self: flex-start; }
    .msg.from-player { align-self: flex-end; }

    .msg-bubble {
      padding: 0.6rem 0.9rem;
      border-radius: 20px;
      line-height: 1.5;
      word-wrap: break-word;
      font-size: 1.5rem;
      font-weight: 700;
      overflow: visible;
      position: relative;
    }

    .msg.has-img .msg-bubble { padding: 0; }

    .msg.from-game.has-img .msg-bubble {
      background: #1a73e8;
      border: 0;
      padding: 0.35rem;
      border-bottom-left-radius: 5px;
      overflow: visible;
    }
    .msg.from-game.has-img .msg-bubble::before {
      content: '';
      position: absolute;
      bottom: 0;
      left: -8px;
      width: 20px;
      height: 20px;
      background: #1a73e8;
      border-bottom-right-radius: 16px;
      z-index: -1;
    }
    .msg.from-game.has-img .msg-bubble::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: -12px;
      width: 12px;
      height: 20px;
      background: #ffffff;
      border-bottom-right-radius: 10px;
      z-index: 0;
    }

    .msg.from-game .msg-bubble {
      background: #1a73e8;
      border-bottom-left-radius: 5px;
      color: #ffffff;
    }

    .msg.from-game:not(.has-img) .msg-bubble::before {
      content: '';
      position: absolute;
      bottom: 0;
      left: -8px;
      width: 20px;
      height: 20px;
      background: #1a73e8;
      border-bottom-right-radius: 16px;
      z-index: -1;
    }
    .msg.from-game:not(.has-img) .msg-bubble::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: -12px;
      width: 12px;
      height: 20px;
      background: #ffffff;
      border-bottom-right-radius: 10px;
      z-index: 0;
    }

    .msg.from-player .msg-bubble {
      background: #e5e7eb;
      color: #111827;
      border-bottom-right-radius: 5px;
    }

    .msg.from-player:not(.has-img) .msg-bubble::before {
      content: '';
      position: absolute;
      bottom: 0;
      right: -8px;
      width: 20px;
      height: 20px;
      background: #e5e7eb;
      border-bottom-left-radius: 16px;
      z-index: -1;
    }
    .msg.from-player:not(.has-img) .msg-bubble::after {
      content: '';
      position: absolute;
      bottom: 0;
      right: -12px;
      width: 12px;
      height: 20px;
      background: #ffffff;
      border-bottom-left-radius: 10px;
      z-index: 0;
    }

    .msg.from-player.has-img .msg-bubble {
      background: #e5e7eb;
      border: 0;
      padding: 0.35rem;
      border-bottom-right-radius: 5px;
      overflow: visible;
    }
    .msg.from-player.has-img .msg-bubble::before {
      content: '';
      position: absolute;
      bottom: 0;
      right: -8px;
      width: 20px;
      height: 20px;
      background: #e5e7eb;
      border-bottom-left-radius: 16px;
      z-index: -1;
    }
    .msg.from-player.has-img .msg-bubble::after {
      content: '';
      position: absolute;
      bottom: 0;
      right: -12px;
      width: 12px;
      height: 20px;
      background: #ffffff;
      border-bottom-left-radius: 10px;
      z-index: 0;
    }
    .msg.from-player.has-img .msg-bubble img { border-radius: 14px; }

    .msg.call-to-action .msg-bubble { background: #cc0000; }
    .msg.call-to-action:not(.has-img) .msg-bubble::before { background: #cc0000; }

    .msg-bubble p { margin: 0 0 0.6rem; }
    .msg-bubble p:last-child { margin-bottom: 0; }
    .msg-bubble a { color: #ffffff; word-break: break-all; }
    .msg.from-player .msg-bubble a { color: #1a73e8; }

    .msg.from-game .msg-bubble:has(.action-btn) { background: #cc0000; }
    .msg.from-game:not(.has-img) .msg-bubble:has(.action-btn)::before { background: #cc0000; }

    .msg-bubble .action-btn {
      color: #ffffff;
      text-decoration: underline;
      word-break: break-all;
    }

    /* Match iMessage's collapsed photo width (~248-260pt on a 375pt screen). */
    .msg.has-img { width: min(92%, 260px); }

    .msg-bubble img {
      width: 100%;
      max-width: 100%;
      display: block;
      cursor: zoom-in;
    }
    .msg.from-game.has-img .msg-bubble img { border-radius: 14px; }

    /* video bubble */
    .msg.has-video { width: min(80%, 300px); }
    .msg.has-video .msg-bubble { padding: 0; background: #000; overflow: hidden; }
    .msg.has-video.from-game .msg-bubble { border-bottom-left-radius: 5px; }
    .msg.has-video .msg-bubble::before,
    .msg.has-video .msg-bubble::after { display: none; }
    .bubble-video-wrap { position: relative; width: 100%; aspect-ratio: 16/9; cursor: pointer; display: block; text-decoration: none; overflow: hidden; border-radius: inherit; }
    .bubble-video-wrap img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; display: block; border: none; }
    .bubble-video-wrap video { position: absolute; inset: 0; width: 100%; height: 100%; border: none; display: block; }
    .bubble-video-play { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.35); }
    .bubble-video-play svg { width: 48px; height: 48px; filter: drop-shadow(0 2px 6px rgba(0,0,0,0.5)); }

    /* audio bubble */
    .bubble-audio { display: flex; align-items: center; gap: 10px; padding: 2px 0; }
    .bubble-audio-play { flex-shrink: 0; width: 32px; height: 32px; border-radius: 50%; background: rgba(255,255,255,0.25); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #fff; }
    .from-player .bubble-audio-play { background: rgba(0,0,0,0.12); color: #333; }
    .bubble-audio-play svg { width: 14px; height: 14px; }
    .bubble-audio-wave { display: flex; align-items: center; gap: 2px; height: 28px; flex: 1; }
    .bubble-audio-wave span { flex: 1; border-radius: 2px; background: rgba(255,255,255,0.7); transition: background 0.15s; min-width: 2px; }
    .from-player .bubble-audio-wave span { background: rgba(0,0,0,0.2); }
    .bubble-audio-time { font-size: 0.75rem; opacity: 0.75; white-space: nowrap; }

    /* link bubble */
    .bubble-link { display: flex; align-items: center; gap: 8px; text-decoration: none !important; color: inherit !important; }
    .bubble-link-icon { flex-shrink: 0; opacity: 0.75; }
    .bubble-link-text { word-break: break-word; text-decoration: underline; }

    /* button bubble */
    .msg:has(.bubble-btn) { min-width: 45%; }
    .bubble-btn { display: block; padding: 0.55em 1.1em; width: 100%; background: var(--game-primary, #5468a7); color: var(--game-quaternary, #fff); border-radius: 14px; text-decoration: none; text-align: center; font-size: 0.95em; font-weight: 700; cursor: pointer; -webkit-tap-highlight-color: transparent; transition: opacity .12s; box-sizing: border-box; }
    .bubble-btn:active { opacity: .75; }

    .lb {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.93);
      z-index: 9999;
      align-items: center;
      justify-content: center;
      cursor: zoom-out;
    }
    .lb.open { display: flex; }
    .lb img {
      max-width: 100vw;
      max-height: 100vh;
      object-fit: contain;
    }

    .typing {
      align-self: flex-start;
      background: #e5e7eb;
      border-radius: 999px;
      padding: 0.55rem 0.9rem;
      display: flex;
      gap: 6px;
      align-items: center;
      position: relative;
    }
    .typing::before {
      content: '';
      position: absolute;
      left: 10px;
      bottom: -8px;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #e5e7eb;
    }
    .typing::after {
      content: '';
      position: absolute;
      left: 2px;
      bottom: -15px;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #e5e7eb;
    }
    .typing span {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #8e8e93;
      animation: typingBounce 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    .input-area {
      background: #ffffff;
      border-top: 1px solid #e5e7eb;
      padding: 0.6rem 0.75rem;
      flex-shrink: 0;
    }

    .answer-row {
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }

    .answer-input {
      flex: 1;
      background: #f3f4f6;
      border: 2px solid #e5e7eb;
      border-radius: 24px;
      padding: 0.6rem 1rem;
      color: #111827;
      font-size: 1rem;
      outline: none;
      -webkit-appearance: none;
      appearance: none;
      transition: border-color 0.2s, opacity 0.2s;
    }
    .answer-input:focus { border-color: #1a73e8; }
    .answer-input:disabled { opacity: 0.4; }
    .answer-input.wrong {
      border-color: #e85568;
      animation: shake 0.35s ease;
    }
    .answer-input::placeholder { color: #9ca3af; }
    .answer-input::-webkit-contacts-auto-fill-button,
    .answer-input::-webkit-credentials-auto-fill-button {
      visibility: hidden;
      pointer-events: none;
    }

    .submit-btn {
      background: #1a73e8;
      border: none;
      border-radius: 50%;
      width: 44px;
      height: 44px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, transform 0.1s, opacity 0.2s;
    }
    .submit-btn:active { transform: scale(0.9); background: #1557b0; }
    .submit-btn:disabled { opacity: 0.35; cursor: default; }

    .photo-input { display: none; }

    .photo-btn {
      background: #f3f4f6;
      border: 2px solid #e5e7eb;
      border-radius: 50%;
      width: 44px;
      height: 44px;
      color: #6b7280;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, transform 0.1s, opacity 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .photo-btn:active { transform: scale(0.9); background: #e5e7eb; }
    .photo-btn:disabled { opacity: 0.35; cursor: default; }
    .photo-btn svg {
      width: 21px;
      height: 21px;
      display: block;
    }

    .btn-choices {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      margin-bottom: 0.4rem;
    }

    .choice-btn {
      padding: 0.7rem 1rem;
      border-radius: 12px;
      border: 2px solid;
      background: transparent;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      text-align: left;
      transition: opacity 0.15s;
    }
    .choice-btn:active { opacity: 0.6; }
    .choice-btn.team-beignet { border-color: #6aaef7; color: #6aaef7; }
    .choice-btn.team-lagniappe { border-color: #f5a623; color: #f5a623; }
    .choice-btn.team-rougarou { border-color: #e85568; color: #e85568; }
    .choice-btn.team-tch { border-color: #4ecf98; color: #4ecf98; }
    .choice-btn.neutral { border-color: #d1d5db; color: #374151; }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-7px); }
      75% { transform: translateX(7px); }
    }
    @keyframes typingBounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-5px); }
    }

    /* ── iMessage overlay (game/play/game.css) ── */

      font-size: 1.25rem;
      font-weight: 400;
      line-height: 1.45;
    }

      flex-direction: column;

      justify-content: flex-end;

          ? trigger.answers.map((answer) => String(answer || '').trim()).filter(Boolean)
          : [];
        return answers.some((answer) => norm(answer) === norm(typed));
      }) || null;
    }
    function getPreviousGuideBubble(messages, triggerIndex) {
      for (let i = Math.max(0, triggerIndex - 1); i >= 0; i -= 1) {
        const msg = messages[i];
        if (!msg || !(msg.html || msg.text || '').trim()) continue;
        if (msg.fromPlayer || msg.direction === 'fromPlayer') continue;
        return msg;
      }
      return null;
    }

    // ── DOM builders ──────────────────────────────────────────────
    function parseVideoTimestamp(value) {
      const raw = String(value || '').trim().replace(/^#/, '').replace(/^t=/i, '');
      if (!raw) return 0;
      if (/^\d+$/.test(raw)) return Number(raw);
      let total = 0;
      const matches = raw.match(/(\d+)(h|m|s)/gi);
      if (!matches) return 0;
      matches.forEach(part => {
        const match = part.match(/(\d+)(h|m|s)/i);
        if (!match) return;
        const amount = Number(match[1]);
        const unit = match[2].toLowerCase();
        if (unit === 'h') total += amount * 3600;
        else if (unit === 'm') total += amount * 60;
        else total += amount;
      });
      return total;
    }

    function getVideoLightboxConfig(rawUrl) {
      try {
        const url = new URL(rawUrl);
        const host = url.hostname.toLowerCase().replace(/^www\./, '');
        const parts = url.pathname.split('/').filter(Boolean);

        let youTubeId = '';
        if (host === 'youtu.be') {
          youTubeId = parts[0] || '';
        } else if (
          host === 'youtube.com'
          || host.endsWith('.youtube.com')
          || host === 'youtube-nocookie.com'
          || host.endsWith('.youtube-nocookie.com')
        ) {
          if ((parts[0] || '') === 'watch') {
            youTubeId = url.searchParams.get('v') || '';
          } else if (parts[0] === 'shorts' || parts[0] === 'embed' || parts[0] === 'live') {
            youTubeId = parts[1] || '';
          }
        }

        if (youTubeId) {
          const embedUrl = new URL('https://www.youtube.com/embed/' + encodeURIComponent(youTubeId));
          const start = parseVideoTimestamp(url.searchParams.get('t') || url.searchParams.get('start') || url.hash);
          const list = url.searchParams.get('list');
          if (start > 0) embedUrl.searchParams.set('start', String(start));
          if (list) embedUrl.searchParams.set('list', list);
          embedUrl.searchParams.set('rel', '0');
          embedUrl.searchParams.set('playsinline', '1');
          return {
            src: embedUrl.toString(),
            allow: 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share',
            youTubeId,
            thumbnail: 'https://img.youtube.com/vi/' + encodeURIComponent(youTubeId) + '/hqdefault.jpg'
          };
        }

        if (host === 'vimeo.com' || host.endsWith('.vimeo.com')) {
          let vimeoId = '';
          if (host === 'player.vimeo.com' && parts[0] === 'video') {
            vimeoId = parts[1] || '';
          } else {
            vimeoId = parts.find(part => /^\d+$/.test(part)) || '';
          }
          if (vimeoId) {
            return {
              src: 'https://player.vimeo.com/video/' + encodeURIComponent(vimeoId),
              allow: 'autoplay; fullscreen; picture-in-picture'
            };
          }
        }
      } catch (error) {
        return null;
      }

      return null;
    }

    function openIframeLightbox(url) {
      const videoConfig = getVideoLightboxConfig(url);
      const backdrop = document.createElement('div');
      backdrop.className = 'btn-lightbox-backdrop';
      const frame = document.createElement('div');
      frame.className = 'btn-lightbox-frame' + (videoConfig ? ' btn-lightbox-frame--video' : '');
      const closeBtn = document.createElement('button');
      closeBtn.className = 'btn-lightbox-close';
      closeBtn.type = 'button';
      closeBtn.textContent = '\u00d7';
      closeBtn.setAttribute('aria-label', 'Close');
      const iframe = document.createElement('iframe');
      iframe.className = 'btn-lightbox-iframe' + (videoConfig ? ' btn-lightbox-iframe--video' : '');
      iframe.src = videoConfig ? videoConfig.src : url;
      iframe.allow = videoConfig ? videoConfig.allow : 'payment';
      iframe.referrerPolicy = 'strict-origin-when-cross-origin';
      if (videoConfig) iframe.allowFullscreen = true;
      frame.appendChild(closeBtn);
      frame.appendChild(iframe);
      backdrop.appendChild(frame);
      document.body.appendChild(backdrop);
      function onKey(e) {
        if (e.key === 'Escape') close();
      }
      function close() {
        backdrop.remove();
        document.removeEventListener('keydown', onKey);
      }
      closeBtn.addEventListener('click', close);
      backdrop.addEventListener('click', (e) => { if (e.target === backdrop) close(); });
      document.addEventListener('keydown', onKey);
    }
    async function openButtonLightbox(url) {
      const parsedUrl = parseUrl(url);
      if (!parsedUrl) return;
      if (!isCheckoutPauseUrl(parsedUrl)) {
        openIframeLightbox(parsedUrl.toString());
        return;
      }

      const unlockKey = getCheckoutUnlockKey(parsedUrl);
      if (unlockKey && isCheckoutUnlocked(unlockKey) && currentStopHasPendingCheckout(unlockKey)) {
        completeCheckoutFlow({
          unlockKey,
          sourceUrl: parsedUrl.toString(),
          guideText: 'Payment already confirmed. Let\u2019s keep going.'
        });
        return;
      }

      const resolvedCheckoutUrl = await resolveCheckoutUrl(parsedUrl);
      if (!resolvedCheckoutUrl) {
        openIframeLightbox(parsedUrl.toString());
        return;
      }

      activeCheckoutContext = {
        unlockKey,
        sourceUrl: parsedUrl.toString(),
        resolvedUrl: resolvedCheckoutUrl,
        stopIndex: currentStopIndex,
        stopId: activeStop && activeStop.id ? activeStop.id : '',
        flowKind: activeFlowKind
      };

      try {
        const lemon = await ensureLemonReady();
        if (lemon && lemon.Url && typeof lemon.Url.Open === 'function') {
          lemon.Url.Open(resolvedCheckoutUrl);
          return;
        }
      } catch (error) {
        console.warn('Could not open Lemon overlay.', error);
      }

      window.location.href = resolvedCheckoutUrl;
    }

    function renderImageUrls(html) {
      // Replace bare image URLs with <img> tags (iMessage-style inline images)
      return html.replace(
        /(https?:\/\/[^\s<>"']+\.(?:jpe?g|png|gif|webp|avif)(?:\?[^\s<>"']*)?)/gi,
        function (url, _m, offset, str) {
          // Skip if already inside an HTML tag attribute
          const before = str.slice(0, offset);
          if (before.lastIndexOf('<') > before.lastIndexOf('>')) return url;
          return '<img src="' + url + '">';
        }
      );
    }

    function addBubble(content, fromGame = true) {
      const isObj = typeof content === 'object' && content !== null;
      const html = isObj ? (content.html || content.text || '') : content;
      const kind = isObj ? (content.kind || 'text') : 'text';

      const wrap = document.createElement('div');
      wrap.className = 'msg ' + (fromGame ? 'from-game' : 'from-player');

      const bubble = document.createElement('div');
      bubble.className = 'msg-bubble';
      bubble.innerHTML = renderImageUrls(interpolate(String(html || '')).replace(/\n/g, '<br>'));

      if (kind === 'image' || bubble.querySelector('img')) wrap.classList.add('has-img');
      if (kind === 'video') wrap.classList.add('has-video');

      // audio: wire up play button
      const audioEl = bubble.querySelector('.bubble-audio');
      if (audioEl) {
        const src = audioEl.dataset.audioSrc;
        const playBtn = audioEl.querySelector('.bubble-audio-play');
        const timeEl = audioEl.querySelector('.bubble-audio-time');
        if (src && playBtn) {
          const audio = new Audio(src);
          let raf;
          const fmt = s => `${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}`;
          audio.addEventListener('loadedmetadata', () => { if (timeEl) timeEl.textContent = fmt(audio.duration); });
          audio.addEventListener('timeupdate', () => { if (timeEl) timeEl.textContent = fmt(audio.currentTime); });
          audio.addEventListener('ended', () => {
            playBtn.innerHTML = '<svg viewBox="0 0 11 13" fill="currentColor"><path d="M1 1.5l9 5-9 5v-10z"/></svg>';
            cancelAnimationFrame(raf);
          });
          playBtn.addEventListener('click', () => {
            if (audio.paused) {
              audio.play();
              playBtn.innerHTML = '<svg viewBox="0 0 12 12" fill="currentColor"><rect x="1" y="1" width="3.5" height="10" rx="1"/><rect x="7.5" y="1" width="3.5" height="10" rx="1"/></svg>';
            } else {
              audio.pause();
              playBtn.innerHTML = '<svg viewBox="0 0 11 13" fill="currentColor"><path d="M1 1.5l9 5-9 5v-10z"/></svg>';
            }
          });
        }
      }

      // links: open in lightbox (skip action-btn and bubble-video-wrap which handle themselves)
      bubble.querySelectorAll('a:not(.action-btn):not(.bubble-video-wrap)').forEach(a => {
        a.addEventListener('click', e => {
          const url = a.href;
          if (url && /^https?:\/\//i.test(url)) {
            e.preventDefault();
            openButtonLightbox(url);
          }
        });
      });

      // action-btn links
      bubble.querySelectorAll('a.action-btn').forEach(a => {
        a.addEventListener('click', e => {
          const url = a.href;
          if (url && /^https?:\/\//i.test(url)) {
            e.preventDefault();
            openButtonLightbox(url);
          }
        });
      });


      wrap.appendChild(bubble);
      chatEl.appendChild(wrap);
      bindBubbleAutoScroll(wrap);
      scrollBottom();
      return wrap;
    }

    function setPhotoUploadBusy(isBusy) {
      if (!photoBtn || !photoInput) return;
      photoBtn.disabled = !!isBusy;
      photoInput.disabled = !!isBusy;
    }

    function sanitizePhotoPathSegment(value, fallback) {
      const clean = String(value || '')
        .trim()
        .toLowerCase()
        .replace(/[^a-z0-9_-]+/g, '-')
        .replace(/^-+|-+$/g, '')
        .slice(0, 80);
      return clean || fallback;
    }

    function getPhotoExtension(file) {
      const mime = String(file && file.type || '').toLowerCase();
      if (mime === 'image/jpeg') return 'jpg';
      if (mime === 'image/png') return 'png';
      if (mime === 'image/webp') return 'webp';
      if (mime === 'image/gif') return 'gif';
      if (mime === 'image/heic') return 'heic';
      if (mime === 'image/heif') return 'heif';

      const match = String(file && file.name || '').match(/\.([a-z0-9]{2,5})$/i);
      const ext = match ? match[1].toLowerCase() : '';
      return ['jpg', 'jpeg', 'png', 'webp', 'gif', 'heic', 'heif'].includes(ext)
        ? (ext === 'jpeg' ? 'jpg' : ext)
        : '';
    }

    function getPhotoUploadMimeType(file, extension) {
      if (file && /^image\//i.test(String(file.type || ''))) return file.type;
      if (extension === 'png') return 'image/png';
      if (extension === 'webp') return 'image/webp';
      if (extension === 'gif') return 'image/gif';
      if (extension === 'heic') return 'image/heic';
      if (extension === 'heif') return 'image/heif';
      return 'image/jpeg';
    }

    function getActivePhotoContext() {
      const stop = activeStop || gameStops[currentStopIndex] || null;
      return {
        stop_id: stop && stop.id ? String(stop.id) : '',
        stop_title: stop && stop.title ? String(stop.title) : '',
        stop_index: Number.isFinite(currentStopIndex) ? currentStopIndex : null,
        flow_kind: activeFlowKind || 'main'
      };
    }

    function buildPhotoStoragePath(file) {
      const context = getActivePhotoContext();
      const extension = getPhotoExtension(file);
      if (!extension) throw new Error('Choose an image file.');

      const gamePart = sanitizePhotoPathSegment(gameId || 'game', 'game');
      const playerPart = sanitizePhotoPathSegment(getPlayerSessionId(), 'player');
      const stopPart = sanitizePhotoPathSegment(context.stop_id || ('stop-' + ((context.stop_index || 0) + 1)), 'stop');
      const nonce = Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 8);
      return `${gamePart}/${playerPart}/${stopPart}/${nonce}.${extension}`;
    }

    function buildStorageObjectUrl(bucket, path) {
      const encodedPath = String(path || '').split('/').map(encodeURIComponent).join('/');
      return new URL(`/storage/v1/object/${encodeURIComponent(bucket)}/${encodedPath}`, SB_CONFIG.url.replace(/\/+$/, '') + '/').toString();
    }

    async function readSupabaseError(response, fallbackMessage) {
      const fallback = fallbackMessage || 'Request failed.';
      try {
        const text = await response.text();
        if (!text) return fallback;
        try {
          const payload = JSON.parse(text);
          return payload.message || payload.error_description || payload.error || text || fallback;
        } catch (parseError) {
          return text || fallback;
        }
      } catch (error) {
        return fallback;
      }
    }

    async function insertPhotoSubmission(file, storagePath) {
      const context = getActivePhotoContext();
      const requestUrl = new URL(`rest/v1/${PHOTO_SUBMISSIONS_TABLE}`, `${SB_CONFIG.url.replace(/\/+$/, '')}/`);
      const payload = {
        game_id: String(gameId || ''),
        player_id: getPlayerSessionId(),
        storage_bucket: PHOTO_STORAGE_BUCKET,
        storage_path: storagePath,
        file_name: String(file && file.name || ''),
        mime_type: getPhotoUploadMimeType(file, getPhotoExtension(file)),
        file_size: file && Number.isFinite(file.size) ? file.size : null,
        stop_id: context.stop_id,
        stop_title: context.stop_title,
        stop_index: context.stop_index,
        flow_kind: context.flow_kind,
        player_vars: vars && typeof vars === 'object' ? vars : {},
        page_url: window.location.href,
        user_agent: navigator.userAgent || ''
      };

      const response = await fetch(requestUrl.toString(), {
        method: 'POST',
        headers: {
          apikey: SB_CONFIG.key,
          Authorization: `Bearer ${SB_CONFIG.key}`,
          'Content-Type': 'application/json',
          Prefer: 'return=minimal'
        },
        body: JSON.stringify(payload)
      });

      if (!response.ok) {
        throw new Error(await readSupabaseError(response, 'Could not save photo submission.'));
      }
    }

    async function uploadPhotoToSupabase(file) {
      if (!gameId) throw new Error('No game is loaded.');
      if (!file) throw new Error('Choose a photo first.');
      if (file.size > MAX_PHOTO_UPLOAD_BYTES) throw new Error('Choose a photo under 10 MB.');
      const extension = getPhotoExtension(file);
      if (!extension) throw new Error('Choose an image file.');

      const storagePath = buildPhotoStoragePath(file);
      const response = await fetch(buildStorageObjectUrl(PHOTO_STORAGE_BUCKET, storagePath), {
        method: 'POST',
        headers: {
          apikey: SB_CONFIG.key,
          Authorization: `Bearer ${SB_CONFIG.key}`,
          'Content-Type': getPhotoUploadMimeType(file, extension),
          'x-upsert': 'false'
        },
        body: file
      });

      if (!response.ok) {
        throw new Error(await readSupabaseError(response, 'Could not upload photo.'));
      }

      await insertPhotoSubmission(file, storagePath);
      return storagePath;
    }

    function showLocalPhotoBubble(file) {
      const previewUrl = URL.createObjectURL(file);
      const wrap = addBubble({
        kind: 'image',
        html: `<img src="${escapeAttr(previewUrl)}" alt="Submitted photo">`
      }, false);
      const image = wrap && wrap.querySelector('img');
      const releasePreview = () => URL.revokeObjectURL(previewUrl);
      if (image && !image.complete) image.addEventListener('load', releasePreview, { once: true });
      else setTimeout(releasePreview, 1000);
      setTimeout(releasePreview, 60000);
    }

    async function handlePhotoSelection() {
      const file = photoInput && photoInput.files ? photoInput.files[0] : null;
      if (!file) return;

      showLocalPhotoBubble(file);
      setPhotoUploadBusy(true);
      let uploaded = false;
      try {
        await uploadPhotoToSupabase(file);
        uploaded = true;
      } catch (error) {
        console.error('Photo upload failed:', error);
        addBubble('That photo did not upload. Try again.', true);
      } finally {
        setPhotoUploadBusy(false);
        if (photoInput) photoInput.value = '';
      }

      if (!uploaded) return;

      // PHOTO-mode reply: submitting any photo satisfies the reply and advances the flow.
      if (activePhotoReplyContext) {
        const ctx = activePhotoReplyContext;
        activePhotoReplyContext = null;
        const triggerBubble = ctx.triggerBubble;
        if (triggerBubble && triggerBubble.storesAs) {
          storeReplyValue(normalizeVarKey(triggerBubble.storesAs), '[photo]');
        }
        disableInput();
        const nextBubbleIndex = triggerBubble ? (ctx.triggerIndex + 1) : (ctx.allMessages ? ctx.allMessages.length : 0);
        continueStopAfterReply(ctx.stop, nextBubbleIndex, { flowKind: ctx.flowKind });
        return;
      }

      addBubble('Photo received.', true);
    }

    function completeCheckoutFlow(context = {}) {
      const unlockKey = context.unlockKey
        || (activeCheckoutContext && activeCheckoutContext.unlockKey)
        || (stopCheckoutContext && stopCheckoutContext.unlockKey)
        || '';
      const sourceUrl = context.sourceUrl
        || (activeCheckoutContext && activeCheckoutContext.sourceUrl)
        || (stopCheckoutContext && stopCheckoutContext.url)
        || '';

      if (unlockKey) {
        markCheckoutUnlocked(unlockKey, {
          sourceUrl,
          orderId: context.orderId || ''
        });
      }

      const currentStopId = activeStop && activeStop.id ? activeStop.id : '';
      const shouldResume = currentStopHasPendingCheckout(unlockKey)
        || !!(activeCheckoutContext && activeCheckoutContext.stopId === currentStopId)
        || !!(stopCheckoutContext && stopCheckoutContext.stopId === currentStopId);

      activeCheckoutContext = null;
      stopCheckoutContext = null;

      if (!shouldResume) return;

      disableInput();
      const finish = () => {
        if (activeFlowKind === 'interrupt') {
          finishAnytimeInterrupt();
          return;
        }
        saveStep(currentStopIndex + 1);
        advanceStop();
      };
      const guideText = String(context.guideText || CHECKOUT_SUCCESS_COPY).trim();
      if (!guideText) {
        finish();
        return;
      }
      showMessages([{ html: guideText, text: guideText }], finish);
    }

    function showTypingIndicator() {
      const el = document.createElement('div');
      el.className = 'typing';
      el.innerHTML = '<span></span><span></span><span></span>';
      chatEl.appendChild(el);
      scrollBottom();
      return el;
    }

    // ── Message sequencing ────────────────────────────────────────
      function showMessages(messages, onDone) {
        const flowToken = clearPendingMessageFlow();
        let i = 0;
        function next() {
          if (flowToken !== messageFlowToken) return;
          if (i >= messages.length) {
            if (onDone) onDone();
            return;
          }
          const msg = messages[i++];
          const html = msg.html || msg.text || '';
          const fromGame = !(msg && (msg.fromPlayer || msg.direction === 'fromPlayer'));
          if (!html) {
            next();
            return;
          }
          const indicator = showTypingIndicator();
          scheduleMessageFlow(() => {
            if (indicator && indicator.isConnected) indicator.remove();
            addBubble(msg, fromGame);
            scheduleMessageFlow(next, BUBBLE_PAUSE, flowToken);
          }, TYPING_DELAY, flowToken);
        }
        next();
    }

    // ── Permanent input bar ───────────────────────────────────────
    function hideInputArea() {
      if(inputAreaEl) inputAreaEl.style.display = '';
    }
    function showInputArea() {
      if(inputAreaEl) inputAreaEl.style.display = '';
    }
    function disableInput() {
      showInputArea();
      gameInput.value = '';
      gameInput.placeholder = 'Message';
      gameInput.classList.remove('wrong');
      gameInput.disabled = false;
      submitBtn.disabled = false;
      _submitHandler = null;
    }

    function finishAnytimeInterrupt() {
      const context = activeInterruptContext || {};
      activeInterruptContext = null;
      stopCheckoutContext = null;
      activeCheckoutContext = null;
      refreshGroupedGameStops();
      if (!gameStops.length) {
        activeStop = null;
        activeFlowKind = 'main';
        disableInput();
        return;
      }

      let resumeIndex = -1;
      if (context.resumeStopId) {
        resumeIndex = gameStops.findIndex((stop) => stop && stop.id === context.resumeStopId);
      }
      if (resumeIndex < 0 && Number.isFinite(context.resumeStopIndex)) {
        resumeIndex = Math.max(0, Math.min(context.resumeStopIndex, gameStops.length - 1));
      }
      if (resumeIndex < 0) {
        activeStop = null;
        activeFlowKind = 'main';
        disableInput();
        return;
      }

      playStop(resumeIndex, 0, { flowKind: 'main' });
    }

    function continueStopAfterReply(stop, nextBubbleIndex, options = {}) {
      const flowKind = String(options.flowKind || activeFlowKind || 'main');
      const allMessages = getStopMessages(stop);
      const trailingMessages = getInitialStopMessages(allMessages, nextBubbleIndex);
      const trailingCheckout = getPendingCheckoutTarget(trailingMessages, 0);
      const trailingCheckoutUnlocked = !!(trailingCheckout && isCheckoutUnlocked(trailingCheckout.unlockKey));
      const finish = () => {
        currentBubbleIndex = nextBubbleIndex;
        if (trailingCheckout) {
          stopCheckoutContext = {
            ...trailingCheckout,
            stopIndex: currentStopIndex,
            stopId: stop && stop.id ? stop.id : '',
            flowKind
          };
          if (trailingCheckoutUnlocked) {
            completeCheckoutFlow({
              unlockKey: trailingCheckout.unlockKey,
              sourceUrl: trailingCheckout.url,
              guideText: 'Payment already confirmed. Let\u2019s keep going.'
            });
            return;
          }
          disableInput();
          return;
        }
        if (getTriggerBubble(allMessages, nextBubbleIndex)) {
          showTextInput(stop, nextBubbleIndex, { flowKind });
          return;
        }
        if (flowKind === 'interrupt') {
          finishAnytimeInterrupt();
          return;
        }
        saveStep(currentStopIndex + 1);
        advanceStop();
      };

      if (trailingMessages.length) {
        showMessages(trailingMessages, finish);
      } else {
        finish();
      }
    }

    function playAnytimeInterruptStop(stop, triggerValue) {
      if (!stop) return false;
      disableInput();
      activeStop = stop;
      activeFlowKind = 'interrupt';
      currentBubbleIndex = 0;
      stopCheckoutContext = null;
      activeCheckoutContext = null;

      const messages = getStopMessages(stop);
      const triggerIndex = Number.isInteger(stop.anytimeTriggerIndex)
        ? stop.anytimeTriggerIndex
        : messages.findIndex((message) => !!(message && message.anytime));
      const introMessages = triggerIndex > 0 ? messages.slice(0, triggerIndex) : [];
      const triggerBubble = triggerIndex >= 0 ? messages[triggerIndex] : null;
      const continueInterrupt = () => {
        if (triggerBubble) {
          addBubble(triggerValue, false);
          storeReplyValue(triggerBubble.storesAs || '', triggerValue);
          continueStopAfterReply(stop, triggerIndex + 1, { flowKind: 'interrupt' });
          return;
        }
        continueStopAfterReply(stop, 0, { flowKind: 'interrupt' });
      };

      if (introMessages.length) {
        showMessages(introMessages, continueInterrupt);
      } else {
        continueInterrupt();
      }
      return true;
    }

    function tryStartAnytimeInterrupt(value) {
      const typedValue = String(value || '').trim();
      const canInterruptFromCurrentState = !!activeStop || mainFlowCompleted;
      if (!typedValue || activeInterruptContext || !canInterruptFromCurrentState) return false;
      const anytimeMatch = getMatchingInlineAnytimeStop(typedValue);
      if (!anytimeMatch) return false;
      activeInterruptContext = {
        resumeStopId: activeStop && activeStop.id ? activeStop.id : '',
        resumeStopIndex: activeStop ? currentStopIndex : -1
      };
      clearPendingMessageFlow();
      disableInput();
      playAnytimeInterruptStop(anytimeMatch, typedValue);
      return true;
    }

    // Global SPECIFIC ANYTIME: paired PLAYER MSG + GUIDE MSG fires whenever the
    // typed text matches, regardless of active stop or main-flow state. Pending
    // state is preserved and resumed after the paired guide message finishes.
    function tryStartPairedAnytimeInterrupt(value) {
      const typedValue = String(value || '').trim();
      if (!typedValue || activeInterruptContext) return false;
      const pairedMatch = legacyAnytimeStops.find((candidateStop) =>
        (candidateStop.playerReply?.answers || []).some((answer) => norm(answer) === norm(typedValue))
      );
      if (!pairedMatch) return false;

      const canResume = !!activeStop || !mainFlowCompleted;
      if (canResume) {
        activeInterruptContext = {
          resumeStopId: activeStop && activeStop.id ? activeStop.id : '',
          resumeStopIndex: activeStop ? currentStopIndex : -1
        };
        clearPendingMessageFlow();
      }

      disableInput();
      addBubble(typedValue, false);
      const messages = getStopMessages(pairedMatch);
      showMessages(messages, () => {
        if (canResume) {
          finishAnytimeInterrupt();
        } else {
          activeStop = null;
          activeFlowKind = 'main';
          disableInput();
        }
      });
      return true;
    }

    function showTextInput(stop, startIndex = 0, options = {}) {
      const flowKind = String(options.flowKind || activeFlowKind || 'main');
      showInputArea();
      activeStop = stop || activeStop;
      activeFlowKind = flowKind;
      const allMessages = getStopMessages(stop);
      const triggerIndex = getTriggerIndex(allMessages, startIndex);
      const triggerBubble = getTriggerBubble(allMessages, startIndex);
      const reply = stop.playerReply || {};
      const isPhotoReply = !!(triggerBubble && (triggerBubble.kind === 'photo' || triggerBubble.replyExpected === 'photo'));
      const triggerText = triggerBubble ? String(triggerBubble.html || triggerBubble.text || '').trim() : '';
      const placeholder = triggerBubble ? (triggerBubble.placeholder || '') : (reply.placeholder || '');
      gameInput.value = '';
      gameInput.placeholder = placeholder || (isPhotoReply ? 'Tap the camera to send a photo' : 'Type here…');
      gameInput.disabled = isPhotoReply;
      submitBtn.disabled = isPhotoReply;
      if (!isPhotoReply) setTimeout(() => gameInput.focus(), 80);

      if (isPhotoReply) {
        activePhotoReplyContext = {
          stop,
          startIndex,
          triggerIndex,
          triggerBubble,
          allMessages,
          flowKind
        };
        _submitHandler = null;
        return;
      }
      activePhotoReplyContext = null;

      _submitHandler = function(forcedValue) {
        const val = String(forcedValue != null ? forcedValue : gameInput.value).trim();
        if (!val) return;

        const legacyAnytimeMatch = legacyAnytimeStops.find((candidateStop) =>
          (candidateStop.playerReply?.answers || []).some((answer) => norm(answer) === norm(val))
        );
        if (legacyAnytimeMatch) {
          disableInput();
          addBubble(val, false);
          const msgs = getStopMessages(legacyAnytimeMatch);
          showMessages(msgs, () => showTextInput(stop, startIndex, { flowKind }));
          return;
        }

        let answers = [];
        let isAny = false;
        let varKey = '';
        
        if (triggerBubble) {
          answers = Array.isArray(triggerBubble.answers) && triggerBubble.answers.length > 0 
            ? triggerBubble.answers 
            : (triggerText ? triggerText.split(/\n|;|,/g).map(s=>s.trim()).filter(Boolean) : []);
          isAny = triggerBubble.replyExpected === 'any';
          varKey = normalizeVarKey(triggerBubble.storesAs || '');
        } else {
          answers = (reply.answers || []).map(a => String(a || '').trim()).filter(Boolean);
          isAny = reply.type === 'any' || answers.length === 0;
          varKey = normalizeVarKey(reply.storesAs || '');
        }

        const correct = isAny || answers.some(a => norm(a) === norm(val));

        if (correct) {
          storeReplyValue(varKey, val);
        }

        disableInput();
        addBubble(val, false);

        if (!correct) {
          const after = () => {
            showTextInput(stop, startIndex, { flowKind });
            setTimeout(() => gameInput.focus(), 80);
          };
          if (triggerBubble) {
            const previousBubble = getPreviousGuideBubble(allMessages, triggerIndex);
            if (previousBubble) showMessages([previousBubble], after);
            else after();
          } else {
            after();
            gameInput.classList.add('wrong');
            setTimeout(() => gameInput.classList.remove('wrong'), 400);
          }
          return;
        }

        const nextBubbleIndex = triggerBubble ? (triggerIndex + 1) : allMessages.length;
        continueStopAfterReply(stop, nextBubbleIndex, { flowKind });
      };
    }

    function handleComposerSubmit() {
      const typedValue = String(gameInput.value || '').trim();
      if (!typedValue) return;
      // Paired SPECIFIC-ANYTIME fires first (global, interrupts anything),
      // then the legacy inline-anytime-in-waypoint path.
      if (tryStartPairedAnytimeInterrupt(typedValue)) return;
      if (tryStartAnytimeInterrupt(typedValue)) return;
      if (_submitHandler) _submitHandler(typedValue);

    // ── Stop flow ─────────────────────────────────────────────────
    function playStop(index, startIndex = 0, options = {}) {
      const flowKind = String(options.flowKind || 'main');
      const stop = gameStops[index];
      if (!stop) {
        if (flowKind === 'main') mainFlowCompleted = true;
        activeStop = null;
        activeFlowKind = 'main';
        disableInput();
        return;
      }

      clearPendingMessageFlow();
      disableInput();
      if (flowKind === 'main') {
        currentStopIndex = index;
        mainFlowCompleted = false;
      }
      currentBubbleIndex = Math.max(0, startIndex || 0);
      stopCheckoutContext = null;
      activeCheckoutContext = null;
      activeStop = stop;
      activeFlowKind = flowKind;
      const reply = stop.playerReply || {};
      const messages = getStopMessages(stop);
      const initialMessages = getInitialStopMessages(messages, currentBubbleIndex);
      const hasTrigger = !!getTriggerBubble(messages, currentBubbleIndex);
      const allowLegacyReply = currentBubbleIndex === 0;
      const pendingCheckout = getPendingCheckoutTarget(initialMessages, 0);
      const checkoutUnlocked = !!(pendingCheckout && isCheckoutUnlocked(pendingCheckout.unlockKey));

      const hasCallToAction = messages.slice(currentBubbleIndex).some(m => m.callToAction);
      const needsInput = hasTrigger
        || (allowLegacyReply && reply.type === 'any')
        || (allowLegacyReply && Array.isArray(reply.answers) && reply.answers.length > 0)
        || (allowLegacyReply && !!(reply.placeholder && reply.placeholder.trim()))
        || hasCallToAction;

      showMessages(initialMessages, () => {
        if (pendingCheckout) {
          stopCheckoutContext = {
            ...pendingCheckout,
            stopIndex: index,
            stopId: stop.id,
            flowKind
          };
          if (checkoutUnlocked) {
            completeCheckoutFlow({
              unlockKey: pendingCheckout.unlockKey,
              sourceUrl: pendingCheckout.url,
              guideText: 'Payment already confirmed. Let\u2019s keep going.'
            });
            return;
          }
          disableInput();
          return;
        }
        if (needsInput) {
          showTextInput(stop, currentBubbleIndex, { flowKind });
        } else {
          const flowToken = clearPendingMessageFlow();
          scheduleMessageFlow(() => {
            if (flowKind === 'interrupt') {
              finishAnytimeInterrupt();
              return;
            }
            saveStep(index + 1);
            advanceStop();
          }, 400, flowToken);
        }
      });
    }

    function advanceStop() {
      const next = currentStopIndex + 1;
      if (next >= gameStops.length) {
        mainFlowCompleted = true;
        activeStop = null;
        activeFlowKind = 'main';
        disableInput();
        return;
      }
      playStop(next, 0, { flowKind: 'main' });
    }

          return {

            playerReply: {
              anytime: true,
              anytimePairId: row.id,
              answers,
              storesAs: '',
              type: 'text'

    async function fetchGameFromSupabase(id) {

    function resolveAssetUrl(value) {
      if (typeof value !== 'string' || !value.trim()) return '';
      const raw = value.trim();
      if (/^(data:|blob:)/i.test(raw)) return raw;
      try {
        const resolvedUrl = new URL(raw, window.location.href);
        const protocol = String(resolvedUrl.protocol || '').toLowerCase();
        return protocol === 'http:' || protocol === 'https:' || protocol === 'file:' ? resolvedUrl.toString() : '';
      } catch (error) {
        return '';
      }
    }

    function buildLegacyPayload(gameData) {
      const nodes = Array.isArray(gameData.nodes) ? gameData.nodes : [];
      const isLegacyAnytimeNodeData = (node) => !!(node && node.anytime && String(node.anytimePairId || '').trim());
      // LEGACY ANYTIME-WAYPOINT: orphan anytime replies (no pair) are no longer treated
      // as inline-in-waypoint triggers. They fall through to the regular reply path.
      const isInlineAnytimeReplyData = (_node) => false;
      const sortedNodes = [...nodes].sort((a, b) => {
        const rankA = a.type === 'game' ? 0 : (isLegacyAnytimeNodeData(a) ? 2 : 1);
        const rankB = b.type === 'game' ? 0 : (isLegacyAnytimeNodeData(b) ? 2 : 1);
        if (rankA !== rankB) return rankA - rankB;
        return (a.orderIndex || 0) - (b.orderIndex || 0);
      });

      const stops = [];
      let currentStop = null;

      sortedNodes.forEach(node => {
        if (node.type === 'game') return;

        // Orphan anytime nodes (anytime=true with no pairId) are leftover data from the
        // pre-decouple refactor. Skip them entirely so they don't break the main flow.
        if (node && node.anytime && !String(node.anytimePairId || '').trim()) return;

        if (isLegacyAnytimeNodeData(node)) {
          if (node.type === 'reply') {
            stops.push({
              id: node.id,
              playerReply: {
                anytime: true,
                anytimePairId: node.anytimePairId,
                answers: node.body ? node.body.split(/\n|;|,/g).map(s=>s.trim()).filter(Boolean) : [],
                storesAs: node.varName,
                type: node.acceptAny ? 'any' : 'text'
              },
              messages: []
            });
          } else if (node.type === 'bubble') {
            const target = stops.find(s => s.playerReply?.anytimePairId === node.anytimePairId);
            if (target) {
              target.messages.push({
                bubbleId: node.id,
                text: node.body,
                html: node.body
              });
            }
          }
          return;
        }

        if (node.type === 'stop') {
          currentStop = {
            id: node.id,
            title: node.title,
            waypointGroup: normalizeWaypointGroup(node.waypointGroup),
            messages: [],
            playerReply: null
          };
          stops.push(currentStop);
        } else if (node.type === 'bubble') {
          if (!currentStop) {
            currentStop = { id: 'virtual-stop', messages: [], playerReply: null };
            stops.push(currentStop);
          }
          const bubbleKind = node.kind || 'text';
          let bubbleHtml = node.body || '';
          if (bubbleKind === 'image') {
            const src = String(node.body || '').trim();
            bubbleHtml = src ? `<img src="${escapeAttr(src)}" alt="">` : '';
          } else if (bubbleKind === 'video') {
            const src = String(node.body || '').trim();
            const cfg = src ? getVideoLightboxConfig(src) : null;
            if (cfg && cfg.thumbnail) {
              // YouTube: thumbnail card linking to YouTube (avoids embed restrictions)
              const playIcon = `<svg viewBox="0 0 68 48" fill="none" xmlns="http://www.w3.org/2000/svg"><rect width="68" height="48" rx="10" fill="#FF0000"/><path d="M45 24L27 34.5V13.5L45 24Z" fill="white"/></svg>`;
              bubbleHtml = `<a class="bubble-video-wrap" href="${escapeAttr(src)}" target="_blank" rel="noopener" data-video-src="${escapeAttr(src)}"><img src="${escapeAttr(cfg.thumbnail)}" alt="Video"><div class="bubble-video-play">${playIcon}</div></a>`;
            } else if (cfg) {
              // Vimeo or other embeddable sources
              bubbleHtml = `<div class="bubble-video-wrap" data-video-src="${escapeAttr(src)}"><iframe src="${escapeAttr(cfg.src)}" allow="${escapeAttr(cfg.allow)}" allowfullscreen></iframe></div>`;
            } else if (src) {
              bubbleHtml = `<div class="bubble-video-wrap" data-video-src="${escapeAttr(src)}"><video src="${escapeAttr(src)}" controls playsinline></video></div>`;
            } else {
              bubbleHtml = '';
            }
          } else if (bubbleKind === 'audio') {
            const src = String(node.body || '').trim();
            const waveHeights = [22,38,60,42,78,35,58,44,82,30,54,48,88,40,70,28,62,52,84,36,68,50,80,32,58,45,76,25,60,50,85,38,65,48,80];
            const bars = waveHeights.map(h => `<span style="height:${h}%"></span>`).join('');
            bubbleHtml = src
              ? `<div class="bubble-audio" data-audio-src="${escapeAttr(src)}"><button class="bubble-audio-play" type="button" aria-label="Play audio"><svg viewBox="0 0 11 13" fill="currentColor"><path d="M1 1.5l9 5-9 5v-10z"/></svg></button><div class="bubble-audio-wave">${bars}</div><span class="bubble-audio-time">0:00</span></div>`
              : '';
          } else if (bubbleKind === 'link') {
            const url = String(node.linkUrl || '').trim();
            const label = String(node.body || '').trim() || url;
            bubbleHtml = url
              ? `<a class="bubble-link" href="${escapeAttr(url)}" target="_blank" rel="noopener"><svg class="bubble-link-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg><span class="bubble-link-text">${escapeHtml(label)}</span></a>`
              : escapeHtml(label);
          } else if (bubbleKind === 'cta') {
            const url = String(node.linkUrl || '').trim();
            const label = String(node.body || '').trim() || 'Continue';
            bubbleHtml = url
              ? `<a class="bubble-btn" href="${escapeAttr(url)}" target="_blank" rel="noopener">${escapeHtml(label)}</a>`
              : `<span class="bubble-btn">${escapeHtml(label)}</span>`;
          }
          currentStop.messages.push({
            bubbleId: node.id,
            kind: bubbleKind,
            text: node.body,
            html: bubbleHtml,
            callToAction: false
          });
        } else if (node.type === 'button') {
          if (!currentStop) {
            currentStop = { id: 'virtual-stop', messages: [], playerReply: null };
            stops.push(currentStop);
          }
          const buttonLabel = String(node.title || node.body || 'Continue').trim() || 'Continue';
          const buttonUrl = String(node.buttonUrl || '').trim();
          currentStop.messages.push({
            bubbleId: node.id,
            kind: 'button',
            text: buttonLabel,
            html: buttonUrl
              ? `<a class="bubble-btn" href="${escapeAttr(buttonUrl)}" target="_blank" rel="noopener">${escapeHtml(buttonLabel)}</a>`
              : `<span class="bubble-btn">${escapeHtml(buttonLabel)}</span>`,
            buttonUrl: buttonUrl,
          });
        } else if (node.type === 'reply') {
          if (!currentStop) {
            currentStop = { id: 'virtual-stop', messages: [], playerReply: null };
            stops.push(currentStop);
          }
          if (currentStop.messages.length > 0) {
            currentStop.messages[currentStop.messages.length - 1].callToAction = true;
          }
          const answers = node.body ? node.body.split(/\n|;|,/g).map(s=>s.trim()).filter(Boolean) : [];
          const isPhotoReply = node.kind === 'photo';
          currentStop.messages.push({
            bubbleId: node.id,
            fromPlayer: true,
            text: answers[0] || node.varName || (isPhotoReply ? '[Photo]' : '[Answered]'),
            html: answers[0] || node.varName || (isPhotoReply ? '[Photo]' : '[Answered]'),
            replyExpected: isPhotoReply ? 'photo' : (node.acceptAny ? 'any' : 'word'),
            answers: answers,
            storesAs: node.varName,
            placeholder: isPhotoReply ? 'Tap the camera to send a photo' : 'Type here...',
            anytime: isInlineAnytimeReplyData(node),
            kind: isPhotoReply ? 'photo' : ''
          });
        }
      });

      stops.forEach((stop) => {
        if (!stop || stop.playerReply?.anytime) return;
        const anytimeTriggerIndex = Array.isArray(stop.messages)
          ? stop.messages.findIndex((message) => !!(message && message.anytime))
          : -1;
        stop.inlineAnytime = anytimeTriggerIndex >= 0;
        stop.anytimeTriggerIndex = anytimeTriggerIndex;
        stop.anytimeTrigger = anytimeTriggerIndex >= 0 ? stop.messages[anytimeTriggerIndex] : null;
      });

      return { stops };
    }

    if (!gameId) {

      fetchGameFromSupabase(gameId).then(async (gameData) => {

        const gameNode = {

          document.documentElement.style.setProperty('--game-quaternary', gameNode.quaternaryColor);
        }

        const payload = buildLegacyPayload(gameData);
        const allStops = payload.stops || [];

        // SPECIFIC ANYTIME replies now live in the anytime_replies table, not in nodes.
        const anytimeReplyRows = await fetchAnytimeRepliesFromSupabase(gameId);
        legacyAnytimeStops = buildAnytimeReplyStopsFromRows(anytimeReplyRows);
        anytimeStops = allStops.filter((stop) => stop.inlineAnytime);
        baseGameStops = allStops.filter((stop) => !stop.playerReply?.anytime && !stop.inlineAnytime);
        vars = loadVars();
        refreshGroupedGameStops();

        if (!gameStops.length) { chatEl.textContent = 'No stops configured for this game.'; return; }

        const savedStep = Math.min(loadStep(), gameStops.length - 1);
        if (savedStep > 0) {
          for (let i = 0; i < savedStep; i++) {
            const stop = gameStops[i];
            let hasTriggerBubble = false;
            (stop.messages || []).filter(m => (m.html || m.text || '').trim()).forEach(m => {
              if (m.fromPlayer || m.direction === 'fromPlayer') {
                hasTriggerBubble = true;
                let replyText = m.text || m.html;
                const varKey = m.storesAs ? normalizeVarKey(m.storesAs) : '';
                if (varKey && vars[varKey]) {
                  replyText = vars[varKey];
                }
                addBubble(replyText, false);
              } else {
                addBubble(m, true);
              }
            });
            
            if (!hasTriggerBubble && stop.playerReply) {
              const pr = stop.playerReply;
              let replyText = '';
              const varKey = pr.storesAs ? normalizeVarKey(pr.storesAs) : '';
              if (varKey && vars[varKey]) {
                replyText = vars[varKey];
              } else if (pr.answers && pr.answers.length > 0) {
                replyText = pr.answers[0];
              } else {
                replyText = '[Answered]';
              }
              if (replyText) {
                addBubble(replyText, false);
              }
            }
          }
        }
        playStop(savedStep);

      }).catch(err => {
        console.error(err);
        chatEl.textContent = 'Could not load game data.';
      });
    }
  </script>
</body>
</html>
