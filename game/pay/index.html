<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0c0c0c">
  <title>Checkout — The Game Bureau</title>
  <link rel="icon" href="../../assets/brand/tgb.ico" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; padding: 0; min-height: 100%; }
    body {
      background: #0c0c0c;
      color: #fff;
      font-family: 'DM Sans', -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100svh;
      padding: 32px 24px;
    }
    .card {
      width: 100%;
      max-width: 380px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .kicker {
      font-size: .62rem;
      font-weight: 700;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: rgba(255,255,255,.32);
      margin-bottom: 16px;
    }
    .heading {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2.4rem, 11vw, 3.2rem);
      letter-spacing: .04em;
      line-height: .94;
      margin-bottom: 12px;
    }
    .subtext {
      font-size: .9rem;
      line-height: 1.7;
      color: rgba(255,255,255,.48);
      margin-bottom: 36px;
    }
    .go-btn {
      width: 100%;
      height: 72px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fff;
      color: #0c0c0c;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.2rem;
      letter-spacing: .2em;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      text-decoration: none;
      touch-action: manipulation;
      transition: opacity .1s, transform .1s;
      margin-bottom: 16px;
    }
    .go-btn:active { opacity: .78; transform: scale(.977); }
    .back-link {
      font-size: .75rem;
      color: rgba(255,255,255,.3);
      text-decoration: none;
      letter-spacing: .04em;
    }
    .back-link:active { color: rgba(255,255,255,.55); }
    .error-msg {
      font-size: .85rem;
      color: #f87171;
      line-height: 1.6;
    }
    .spinner {
      width: 28px;
      height: 28px;
      border: 2px solid rgba(255,255,255,.12);
      border-top-color: rgba(255,255,255,.55);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin-bottom: 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card" id="card"></div>

  <script>
    const params  = new URLSearchParams(location.search);
    const gameId  = (params.get('game') || params.get('id') || '').trim();
    const variant = (params.get('variant') || '').trim();

    // Return URL: back to the play page with paid confirmation
    function buildReturnUrl() {
      const playUrl = new URL('../../game/play/index.html', location.href);
      if (gameId) playUrl.searchParams.set('game', gameId);
      playUrl.searchParams.set('paid', '1');
      const checkoutKey = ['pay', gameId, variant || 'default'].filter(Boolean).join(':');
      playUrl.searchParams.set('checkout_key', checkoutKey);
      return playUrl.toString();
    }

    function buildCheckoutUrl(cfg) {
      const vid  = variant || cfg.variantId || 'default';
      let base;
      if (cfg.checkoutUrl) {
        base = cfg.checkoutUrl;
      } else {
        const slug = cfg.storeSlug;
        if (!slug || !vid || vid === 'your_variant_id_here') return null;
        base = `https://${slug}.lemonsqueezy.com/buy/${encodeURIComponent(vid)}`;
      }
      const url = new URL(base);
      url.searchParams.set('checkout[redirect_url]', buildReturnUrl());
      if (gameId) {
        url.searchParams.set('checkout[custom][game_id]', gameId);
        const checkoutKey = ['pay', gameId, vid].join(':');
        url.searchParams.set('checkout[custom][checkout_key]', checkoutKey);
      }
      return url.toString();
    }

    function renderError(msg) {
      const card = document.getElementById('card');
      card.innerHTML = `
        <p class="kicker">The Game Bureau</p>
        <p class="error-msg">${msg}</p>
        ${gameId ? `<br><a class="back-link" href="../../game/play/index.html?game=${encodeURIComponent(gameId)}">← Back to game</a>` : ''}
      `;
    }

    function launch(cfg) {
      if (!cfg || !cfg.enabled) { renderError('Payments are not configured yet.'); return; }
      const checkoutUrl = buildCheckoutUrl(cfg);
      if (!checkoutUrl) { renderError('Missing store or variant ID.'); return; }

      const card = document.getElementById('card');
      card.innerHTML = `
        <div class="spinner"></div>
        <p class="kicker">The Game Bureau</p>
        <h1 class="heading">One More Step</h1>
        <p class="subtext">You're heading to checkout.<br>We'll bring you right back when you're done.</p>
        <a class="go-btn" href="${checkoutUrl}">CHECKOUT</a>
        ${gameId ? `<a class="back-link" href="../../game/play/index.html?game=${encodeURIComponent(gameId)}">← Back to game</a>` : ''}
      `;
      setTimeout(() => { location.href = checkoutUrl; }, 1800);
    }

    // Load config then launch
    if (window.TGB_LEMON_CONFIG && window.TGB_LEMON_CONFIG.enabled) {
      launch(window.TGB_LEMON_CONFIG);
    } else {
      const s = document.createElement('script');
      s.src = new URL('../../_dev/archive/game/config/lemon-config.js', location.href).toString();
      s.onload = () => launch(window.TGB_LEMON_CONFIG || {});
      s.onerror = () => renderError('Could not load payment configuration.');
      document.head.appendChild(s);
    }
  </script>
</body>
</html>
