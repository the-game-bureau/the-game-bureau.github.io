<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>POST-GAME SURVEY | THE GAME BUREAU</title>
  <link rel="icon" href="../assets/brand/tgb.ico" type="image/x-icon">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --paper: #eef1ea;
      --ink: #171511;
      --muted: #4f5a4e;
      --line: #171511;
      --accent: #c2432a;
    }

    body {
      min-height: 100svh;
      padding: 2.5rem 1.25rem 4rem;
      background: var(--paper);
      color: var(--ink);
      font-family: Georgia, 'Times New Roman', serif;
    }

    main {
      max-width: 640px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 2rem;
    }

    h1 {
      font-size: clamp(2rem, 7vw, 3.2rem);
      font-weight: 800;
      line-height: 0.95;
      text-transform: uppercase;
      letter-spacing: 0.01em;
    }

    .tag {
      margin-top: 0.5rem;
      color: var(--muted);
      font-size: clamp(1rem, 2.6vw, 1.2rem);
      font-style: italic;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 1.6rem;
    }

    fieldset {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 1rem 1.1rem 1.1rem;
      background: transparent;
    }

    legend {
      padding: 0 0.4rem;
      font-weight: 700;
      text-transform: uppercase;
      font-size: 0.78rem;
      letter-spacing: 0.08em;
    }

    label.block {
      display: block;
      font-weight: 700;
      text-transform: uppercase;
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      margin-bottom: 0.4rem;
    }

    .hint {
      margin-top: 0.3rem;
      color: var(--muted);
      font-size: 0.85rem;
      font-style: italic;
    }

    input[type="text"],
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 0.6rem 0.7rem;
      background: #fff;
      color: var(--ink);
      font-family: inherit;
      font-size: 1rem;
      resize: vertical;
    }

    textarea {
      min-height: 5.5rem;
    }

    input[type="text"]:focus,
    textarea:focus {
      outline: 2px solid var(--accent);
      outline-offset: 1px;
    }

    .stars {
      display: flex;
      gap: 0.3rem;
      flex-wrap: wrap;
    }

    .stars input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .stars label {
      cursor: pointer;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 0.45rem 0.75rem;
      min-width: 2.6rem;
      text-align: center;
      font-weight: 700;
      user-select: none;
      background: #fff;
    }

    .stars input:checked + label {
      background: var(--ink);
      color: var(--paper);
    }

    .stars input:focus-visible + label {
      outline: 2px solid var(--accent);
      outline-offset: 1px;
    }

    .yesno {
      display: flex;
      gap: 0.5rem;
    }

    .yesno label {
      flex: 1;
      text-align: center;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 0.55rem 0.75rem;
      font-weight: 700;
      cursor: pointer;
      background: #fff;
      user-select: none;
    }

    .yesno input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .yesno input:checked + label {
      background: var(--ink);
      color: var(--paper);
    }

    button.submit {
      margin-top: 0.5rem;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0.85rem 1rem;
      background: var(--ink);
      color: var(--paper);
      font-family: inherit;
      font-size: 1rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      cursor: pointer;
    }

    button.submit:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .status {
      margin-top: 0.75rem;
      min-height: 1.2em;
      font-size: 0.95rem;
      text-align: center;
    }

    .status.error {
      color: var(--accent);
    }

    .thanks {
      text-align: center;
      padding: 2rem 1rem;
    }

    .thanks h2 {
      font-size: clamp(1.6rem, 6vw, 2.4rem);
      text-transform: uppercase;
      font-weight: 800;
    }

    .thanks p {
      margin-top: 0.8rem;
      color: var(--muted);
      font-size: 1.05rem;
    }

    .hidden { display: none !important; }

    .row2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.8rem;
    }

    @media (max-width: 420px) {
      .row2 { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>Post-Game Survey</h1>
      <p class="tag">Tell us how it went. It takes about a minute.</p>
    </header>

    <form id="survey-form" novalidate>
      <fieldset>
        <legend>You</legend>
        <div class="row2">
          <div>
            <label class="block" for="player_name">Name (optional)</label>
            <input id="player_name" name="player_name" type="text" autocomplete="name" />
          </div>
          <div>
            <label class="block" for="team_color">Team (optional)</label>
            <input id="team_color" name="team_color" type="text" autocomplete="off" />
          </div>
        </div>
      </fieldset>

      <fieldset>
        <legend>Overall</legend>
        <label class="block">How would you rate the game? <span style="color:var(--accent)">*</span></label>
        <div class="stars" role="radiogroup" aria-label="Overall rating">
          <input type="radio" id="rO1" name="rating_overall" value="1" required><label for="rO1">1</label>
          <input type="radio" id="rO2" name="rating_overall" value="2"><label for="rO2">2</label>
          <input type="radio" id="rO3" name="rating_overall" value="3"><label for="rO3">3</label>
          <input type="radio" id="rO4" name="rating_overall" value="4"><label for="rO4">4</label>
          <input type="radio" id="rO5" name="rating_overall" value="5"><label for="rO5">5</label>
        </div>
        <p class="hint">1 = not for me &nbsp;·&nbsp; 5 = loved it</p>
      </fieldset>

      <fieldset>
        <legend>Fun</legend>
        <label class="block">How fun was it?</label>
        <div class="stars" role="radiogroup" aria-label="Fun rating">
          <input type="radio" id="rF1" name="rating_fun" value="1"><label for="rF1">1</label>
          <input type="radio" id="rF2" name="rating_fun" value="2"><label for="rF2">2</label>
          <input type="radio" id="rF3" name="rating_fun" value="3"><label for="rF3">3</label>
          <input type="radio" id="rF4" name="rating_fun" value="4"><label for="rF4">4</label>
          <input type="radio" id="rF5" name="rating_fun" value="5"><label for="rF5">5</label>
        </div>
      </fieldset>

      <fieldset>
        <legend>Difficulty</legend>
        <label class="block">How was the difficulty?</label>
        <div class="stars" role="radiogroup" aria-label="Difficulty rating">
          <input type="radio" id="rD1" name="rating_difficulty" value="1"><label for="rD1">1</label>
          <input type="radio" id="rD2" name="rating_difficulty" value="2"><label for="rD2">2</label>
          <input type="radio" id="rD3" name="rating_difficulty" value="3"><label for="rD3">3</label>
          <input type="radio" id="rD4" name="rating_difficulty" value="4"><label for="rD4">4</label>
          <input type="radio" id="rD5" name="rating_difficulty" value="5"><label for="rD5">5</label>
        </div>
        <p class="hint">1 = too easy &nbsp;·&nbsp; 5 = too hard</p>
      </fieldset>

      <fieldset>
        <legend>Moments</legend>
        <label class="block" for="favorite_moment">Favorite stop or moment</label>
        <textarea id="favorite_moment" name="favorite_moment" rows="3" placeholder="What stuck with you?"></textarea>
      </fieldset>

      <fieldset>
        <legend>Feedback</legend>
        <label class="block" for="suggestions">Anything we should change?</label>
        <textarea id="suggestions" name="suggestions" rows="3" placeholder="Suggestions, bugs, confusing bits…"></textarea>
      </fieldset>

      <fieldset>
        <legend>Would you recommend it?</legend>
        <div class="yesno" role="radiogroup" aria-label="Would recommend">
          <input type="radio" id="recYes" name="would_recommend" value="true">
          <label for="recYes">Yes</label>
          <input type="radio" id="recNo" name="would_recommend" value="false">
          <label for="recNo">No</label>
        </div>
      </fieldset>

      <button type="submit" class="submit" id="submit-btn">Submit survey</button>
      <div class="status" id="status" role="status" aria-live="polite"></div>
    </form>

    <section id="thanks" class="thanks hidden" aria-live="polite">
      <h2>Thank You</h2>
      <p>Your notes are in. We read every one.</p>
    </section>
  </main>

  <script>
    const SB_CONFIG = {
      url: 'https://qmaafbncpzrdmqapkkgr.supabase.co',
      key: 'sb_publishable_6a9XqxYa0-AZtyrwz4ZeUg_aiMsVH-3',
      table: 'survey'
    };

    const params = new URLSearchParams(window.location.search);
    const prefillGame = (params.get('game') || '').trim();
    const prefillTeam = (params.get('team') || params.get('team_color') || '').trim();
    const prefillName = (params.get('name') || params.get('player_name') || '').trim();

    if (prefillTeam) document.getElementById('team_color').value = prefillTeam;
    if (prefillName) document.getElementById('player_name').value = prefillName;

    const form = document.getElementById('survey-form');
    const submitBtn = document.getElementById('submit-btn');
    const statusEl = document.getElementById('status');
    const thanksEl = document.getElementById('thanks');

    function setStatus(msg, isError) {
      statusEl.textContent = msg || '';
      statusEl.classList.toggle('error', !!isError);
    }

    function parseIntOrNull(value) {
      const n = parseInt(value, 10);
      return Number.isFinite(n) ? n : null;
    }

    function readForm() {
      const data = new FormData(form);
      const recommendRaw = data.get('would_recommend');
      return {
        game_id: prefillGame || null,
        player_name: (data.get('player_name') || '').toString().trim() || null,
        team_color: (data.get('team_color') || '').toString().trim() || null,
        rating_overall: parseIntOrNull(data.get('rating_overall')),
        rating_fun: parseIntOrNull(data.get('rating_fun')),
        rating_difficulty: parseIntOrNull(data.get('rating_difficulty')),
        favorite_moment: (data.get('favorite_moment') || '').toString().trim() || null,
        suggestions: (data.get('suggestions') || '').toString().trim() || null,
        would_recommend: recommendRaw === 'true' ? true : recommendRaw === 'false' ? false : null,
        page_url: window.location.href,
        user_agent: navigator.userAgent || ''
      };
    }

    async function readSupabaseError(response, fallback) {
      try {
        const text = await response.text();
        if (!text) return fallback;
        try {
          const payload = JSON.parse(text);
          return payload.message || payload.error_description || payload.error || text || fallback;
        } catch (_) {
          return text || fallback;
        }
      } catch (_) {
        return fallback;
      }
    }

    async function submitSurvey(payload) {
      const endpoint = new URL(`rest/v1/${SB_CONFIG.table}`, SB_CONFIG.url.replace(/\/+$/, '') + '/').toString();
      const response = await fetch(endpoint, {
        method: 'POST',
        headers: {
          apikey: SB_CONFIG.key,
          Authorization: `Bearer ${SB_CONFIG.key}`,
          'Content-Type': 'application/json',
          Prefer: 'return=minimal'
        },
        body: JSON.stringify(payload)
      });
      if (!response.ok) {
        throw new Error(await readSupabaseError(response, 'Could not save survey.'));
      }
    }

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      const payload = readForm();

      if (!payload.rating_overall) {
        setStatus('Please give an overall rating.', true);
        const firstStar = form.querySelector('input[name="rating_overall"]');
        if (firstStar) firstStar.focus();
        return;
      }

      submitBtn.disabled = true;
      setStatus('Sending…');

      try {
        await submitSurvey(payload);
        form.classList.add('hidden');
        thanksEl.classList.remove('hidden');
        setStatus('');
      } catch (error) {
        console.error('Survey submit failed:', error);
        setStatus(error && error.message ? error.message : 'Could not save survey.', true);
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
