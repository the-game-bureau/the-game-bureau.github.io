<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#000000">
  <title>Play | The Game Bureau</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #000000;
      --card-bg: #111827;
      --fg: #ffffff;
      --muted: #94a3b8;
      --primary: #33e6e6; 
      --secondary: #243256; /* Default, updated by JS */
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--fg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1rem 1.25rem 4rem; /* Adjusted for mobile notch/spacing */
    }

    #landing {
      max-width: 480px;
      width: 100%;
      text-align: center;
      display: none;
      animation: fadeIn 0.5s ease-in;
    }

    #landingLogo { 
      height: 70px; 
      margin-bottom: 1.25rem; 
      object-fit: contain; 
      display: none; 
    }

    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3rem, 10vw, 4rem); /* Responsive sizing */
      line-height: 0.9;
      letter-spacing: 0.02em;
      color: var(--primary);
      margin-bottom: 0.25rem;
    }

    #gameTagline {
      font-size: 1.15rem;
      color: var(--muted);
      margin-bottom: 1.75rem;
      font-weight: 500;
      letter-spacing: -0.01em;
    }

    #tagsContainer { 
      display: flex; 
      flex-wrap: wrap; 
      justify-content: center; 
      gap: 0.5rem; 
      margin-bottom: 1.5rem; 
    }

    .tag {
      font-size: 0.65rem;
      text-transform: uppercase;
      font-weight: 700;
      background: #1f2937;
      color: var(--muted);
      padding: 0.35rem 0.75rem;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.08);
    }

    /* ── Description Styling ── */
    .desc-wrap {
      margin-bottom: 2.5rem;
    }

    .desc-line {
      height: 1px;
      background-color: var(--secondary);
      width: 60%;
      margin: 0 auto;
      border: none;
      opacity: 0.8;
    }

    #desc {
      font-size: 1.05rem;
      line-height: 1.6;
      color: var(--muted);
      padding: 1.5rem 0.5rem;
      white-space: pre-line;
      text-align: center;
    }

    /* ── Guide Styling ── */
    .guide-box {
      background: var(--card-bg);
      border: 1px solid var(--primary);
      border-radius: 20px;
      padding: 1.25rem;
      margin-bottom: 2.5rem;
      display: none; 
      align-items: center;
      gap: 1rem;
      text-align: left;
    }

    .guide-img-wrap {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      border: 2px solid var(--primary);
      overflow: hidden;
      flex-shrink: 0;
      background: #000;
    }

    .guide-img-wrap img { width: 100%; height: 100%; object-fit: cover; }

    .guide-info h3 {
      font-size: 0.75rem;
      color: var(--primary);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 0.15rem;
    }

    .guide-info p { 
      font-size: 0.875rem; 
      color: var(--muted); 
      line-height: 1.4; 
    }

    /* ── Buttons & Price ── */
    .play-btn {
      display: block;
      width: 100%;
      padding: 1.15rem;
      background: var(--primary);
      color: #000;
      text-decoration: none;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.75rem;
      letter-spacing: 0.05em;
      border-radius: 14px;
      margin-bottom: 0.5rem;
      transition: transform 0.1s, opacity 0.2s;
    }

    .play-btn:active { transform: scale(0.97); opacity: 0.9; }

    #gamePrice {
      font-weight: 700;
      font-size: 1rem;
      color: var(--muted);
      margin-bottom: 4rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    /* ── Share Section ── */
    .share-section {
      width: 100%;
      background: var(--card-bg);
      border: 1px solid var(--primary);
      border-radius: 18px;
      overflow: hidden;
    }

    .share-heading {
      padding: 0.85rem;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      background: rgba(255,255,255,0.04);
      border-bottom: 1px solid var(--primary);
      color: var(--muted);
      letter-spacing: 0.1em;
    }

    .qr-container {
      background: #ffffff;
      padding: 16px;
      margin: 1.5rem auto;
      border-radius: 14px;
      width: fit-content;
    }

    #qrcode img { display: block; }

    .sms-btn {
      display: block;
      padding: 1.25rem;
      border-top: 1px solid var(--primary);
      color: var(--primary);
      font-family: 'Bebas Neue', sans-serif;
      text-decoration: none;
      font-size: 1.4rem;
      letter-spacing: 0.08em;
      transition: background-color 0.2s;
    }

    .sms-btn:active { background-color: rgba(255,255,255,0.05); }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

  <div id="landing">
    <img id="landingLogo" src="" alt="Game Logo">
    
    <h1 id="gameTitle"></h1>
    <div id="gameTagline"></div>

    <div id="tagsContainer"></div>

    <div class="desc-wrap">
      <hr class="desc-line">
      <p id="desc"></p>
      <hr class="desc-line">
    </div>

    <div class="guide-box" id="guideSection">
      <div class="guide-img-wrap">
        <img id="guideAvatar" src="" alt="Guide">
      </div>
      <div class="guide-info">
        <h3 id="guideNameDisplay">MISSION GUIDE</h3>
        <p id="guideDescription"></p>
      </div>
    </div>

    <a href="#" class="play-btn" id="startBtn">START GAME</a>
    <div id="gamePrice">FREE</div>

    <div class="share-section">
      <div class="share-heading">Invite Players</div>
      <div class="qr-container">
        <div id="qrcode"></div>
      </div>
      <a href="#" class="sms-btn" id="smsBtn">SEND INVITE LINK</a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

  <script>
    const SB_CONFIG = {
      url: 'https://qmaafbncpzrdmqapkkgr.supabase.co',
      key: 'sb_publishable_6a9XqxYa0-AZtyrwz4ZeUg_aiMsVH-3',
      table: 'games'
    };

    const db = supabase.createClient(SB_CONFIG.url, SB_CONFIG.key);
    const urlParams = new URLSearchParams(window.location.search);
    const gameId = urlParams.get('id');

    async function init() {
      if (!gameId) {
        document.body.innerHTML = "<h2 style='color:white; text-align:center; margin-top:50px;'>No Game ID Found</h2>";
        return;
      }

      const { data: game, error } = await db
        .from(SB_CONFIG.table)
        .select('*')
        .eq('id', gameId)
        .single();

      if (error || !game) {
        document.body.innerHTML = `<h2 style='color:white; text-align:center; margin-top:50px;'>Error Loading Game</h2>`;
        return;
      }

      // 1. BRANDING (Primary and Secondary Colors)
      const primaryColor = game.primary_color || game.primaryColor || '#33e6e6';
      const secondaryColor = game.secondary_color || game.secondaryColor || '#243256';
      document.documentElement.style.setProperty('--primary', primaryColor);
      document.documentElement.style.setProperty('--secondary', secondaryColor);

      const gameNode = game.nodes?.find(n => n.type === 'game') || {};

      document.getElementById('gameTitle').textContent = game.name || "Untitled Game";
      document.getElementById('gameTagline').textContent = gameNode.tagline || "";
      
      if (gameNode.logoUrl) {
        const logo = document.getElementById('landingLogo');
        logo.src = gameNode.logoUrl;
        logo.style.display = 'inline-block';
      }

      if (gameNode.guideName) {
        document.getElementById('guideSection').style.display = 'flex';
        document.getElementById('guideNameDisplay').textContent = gameNode.guideName.toUpperCase();
        document.getElementById('guideDescription').textContent = gameNode.guideBio || "Your mission lead.";
        const gImg = gameNode.guideImage || gameNode.guideImageUrl;
        document.getElementById('guideAvatar').src = gImg || 'https://img.icons8.com/ios-glyphs/90/ffffff/user--v1.png';
      }

      document.getElementById('desc').textContent = gameNode.body || "";
      document.getElementById('gamePrice').textContent = (gameNode.price || 'FREE').toUpperCase();

      const tagsContainer = document.getElementById('tagsContainer');
      if (gameNode.tags && Array.isArray(gameNode.tags)) {
        gameNode.tags.forEach(t => {
          const span = document.createElement('span');
          span.className = 'tag';
          span.textContent = t;
          tagsContainer.appendChild(span);
        });
      }

      const gameUrl = `https://the-game-bureau.github.io/the-game-bureau/game.html?id=${gameId}`;

      new QRCode(document.getElementById("qrcode"), {
        text: gameUrl,
        width: 180,
        height: 180,
        colorDark : "#000000",
        colorLight : "#ffffff",
        correctLevel : QRCode.CorrectLevel.H
      });
      
      document.getElementById('smsBtn').href = `sms:?body=Join me for this experience: ${encodeURIComponent(gameUrl)}`;
      document.getElementById('startBtn').href = `play.html?id=${gameId}`;

      document.getElementById('landing').style.display = 'block';
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
